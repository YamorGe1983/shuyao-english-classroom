 */
const QUESTION_TYPES = {
    EN_TO_CN: 'en_to_cn',
    CN_TO_EN: 'cn_to_en',
    LISTEN_CHOOSE: 'listen_choose',
    SPELLING: 'spelling',
    PHONETIC: 'phonetic'
};

/**
 * 题目生成器
 */
const QuestionGenerator = {
    generateEnToCn(word, allWords) {
        const correctAnswer = word.chinese;
        const distractors = this.getDistractors(word, allWords, 'chinese', 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        return {
            type: QUESTION_TYPES.EN_TO_CN,
            question: `单词 "${word.word}" 的中文意思是？`,
            word: word.word,
            phonetic: word.phonetic,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generateCnToEn(word, allWords) {
        const correctAnswer = word.word;
        const distractors = this.getDistractors(word, allWords, 'word', 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        return {
            type: QUESTION_TYPES.CN_TO_EN,
            question: `"${word.chinese}" 的英文是？`,
            chinese: word.chinese,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generateListenChoose(word, allWords) {
        const correctAnswer = word.word;
        const distractors = this.getDistractors(word, allWords, 'word', 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        return {
            type: QUESTION_TYPES.LISTEN_CHOOSE,
            question: '请选择你听到的单词',
            playAudio: true,
            audioWord: word.word,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generateSpelling(word) {
        const correctAnswer = word.word;
        const wrongSpellings = this.generateWrongSpellings(word.word, 3);
        const options = this.shuffle([correctAnswer, ...wrongSpellings]);
        return {
            type: QUESTION_TYPES.SPELLING,
            question: '🎧 听发音，选出正确的拼写：',
            word: word.word,
            playAudio: true,
            audioWord: word.word,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generatePhonetic(word, letterGroup) {
        const correctAnswer = letterGroup.sound;
        const distractors = this.getPhoneticDistractors(letterGroup.sound, 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        
        const highlighted = this.highlightLetters(word.word, letterGroup.letters);
        
        return {
            type: QUESTION_TYPES.PHONETIC,
            question: '高亮部分的发音是？',
            wordHighlighted: highlighted,
            letters: letterGroup.letters,
            word: word.word,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    getDistractors(word, allWords, field, count) {
        const sameWords = allWords.filter(w => w.word !== word.word);
        const shuffled = sameWords.sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count).map(w => w[field]);
    },
    
    generateWrongSpellings(word, count) {
        const wrongs = [];
        const wordLower = word.toLowerCase();
        
        // 常见易混淆字母对
        const confusions = {
            'a': ['e', 'o'], 'e': ['a', 'i'], 'i': ['e', 'y'], 'o': ['a', 'u'], 'u': ['o'],
            'c': ['s', 'k'], 's': ['c', 'z'], 'z': ['s'],
            'f': ['v', 'ph'], 'v': ['f'],
            'g': ['j'], 'j': ['g'],
            'l': ['ll', 'le'], 'r': ['er', 're'],
            'y': ['i', 'ie'], 'w': ['u', 'wh']
        };
        
        const methods = [
            // 替换易混淆字母
            (w) => {
                for (let i = 0; i < w.length; i++) {
                    const char = w[i];
                    if (confusions[char]) {
                        const replacement = confusions[char][Math.floor(Math.random() * confusions[char].length)];
                        return w.slice(0, i) + replacement + w.slice(i + 1);
                    }
                }
                return null;
            },
            // 交换相邻字母
            (w) => {
                if (w.length < 2) return null;
                const idx = Math.floor(Math.random() * (w.length - 1));
                return w.slice(0, idx) + w[idx + 1] + w[idx] + w.slice(idx + 2);
            },
            // 删除一个字母
            (w) => {
                if (w.length < 3) return null;
                const idx = Math.floor(Math.random() * w.length);
                return w.slice(0, idx) + w.slice(idx + 1);
            },
            // 重复一个字母
            (w) => {
                const idx = Math.floor(Math.random() * w.length);
                return w.slice(0, idx) + w[idx] + w.slice(idx);
            }
        ];
        
        let attempts = 0;
        while (wrongs.length < count && attempts < 50) {
            const method = methods[Math.floor(Math.random() * methods.length)];
            const wrong = method(wordLower);
            if (wrong && wrong !== wordLower && !wrongs.includes(wrong) && wrong.length >= 2) {
                wrongs.push(wrong);
            }
            attempts++;
        }
        
        return wrongs;
    },
    
    highlightLetters(word, letters) {
        const regex = new RegExp(`(${letters})`, 'gi');
        return word.replace(regex, '<span class="highlight">$1</span>');
    },
    
    getPhoneticDistractors(correctSound, count) {
        const commonPhonetics = [
            '/æ/', '/e/', '/ɪ/', '/ɒ/', '/ʌ/', '/ə/',
            '/p/', '/b/', '/t/', '/d/', '/k/', '/g/',
            '/s/', '/z/', '/ʃ/', '/ʒ/', '/h/', '/f/',
            '/iː/', '/uː/', '/ɔː/', '/ɑː/', '/ɜː/',
            '/eɪ/', '/aɪ/', '/əʊ/', '/aʊ/', '/ɔɪ/'
        ];
        const filtered = commonPhonetics.filter(p => p !== correctSound);
        const shuffled = filtered.sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count);
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

/**
 * 复习引擎
 */
const ReviewEngine = {
    generateReviewSession(words, count = 10) {
        const session = [];
        const shuffledWords = this.shuffle([...words]);
        
        for (let i = 0; i < Math.min(count, shuffledWords.length); i++) {
            const word = shuffledWords[i];
            const questionType = this.pickQuestionType(word);
            const question = this.generateQuestion(word, words, questionType);
            session.push(question);
        }
        
        return session;
    },
    
    pickQuestionType(word) {
        const types = ['en_to_cn', 'cn_to_en', 'listen_choose', 'spelling'];
        
        if (word.letterSounds && word.letterSounds.length > 0) {
            types.push('phonetic');
        }
        
        return types[Math.floor(Math.random() * types.length)];
    },
    
    generateQuestion(word, allWords, type) {
        switch (type) {
            case QUESTION_TYPES.EN_TO_CN:
                return QuestionGenerator.generateEnToCn(word, allWords);
            case QUESTION_TYPES.CN_TO_EN:
                return QuestionGenerator.generateCnToEn(word, allWords);
            case QUESTION_TYPES.LISTEN_CHOOSE:
                return QuestionGenerator.generateListenChoose(word, allWords);
            case QUESTION_TYPES.SPELLING:
                return QuestionGenerator.generateSpelling(word);
            case QUESTION_TYPES.PHONETIC:
                const letterGroup = word.letterSounds[Math.floor(Math.random() * word.letterSounds.length)];
                return QuestionGenerator.generatePhonetic(word, letterGroup);
            default:
                return QuestionGenerator.generateEnToCn(word, allWords);
        }
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

/**
 * 用户管理模块
 */
const UserModule = {
    STORAGE_KEYS: {
        USERS: 'users',
        CURRENT_USER: 'current_user'
    },
    
    AVATARS: ['👧', '👦', '👸', '🦸', '🐱', '🐶', '🐰', '🦊'],
    
    // 获取所有用户
    getUsers() {
        const users = localStorage.getItem(this.STORAGE_KEYS.USERS);
        return users ? JSON.parse(users) : [];
    },
    
    // 保存用户列表
    saveUsers(users) {
        localStorage.setItem(this.STORAGE_KEYS.USERS, JSON.stringify(users));
    },
    
    // 获取当前用户
    getCurrentUser() {
        const currentUserId = localStorage.getItem(this.STORAGE_KEYS.CURRENT_USER);
        if (!currentUserId) return null;
        
        const users = this.getUsers();
        return users.find(u => u.id === currentUserId) || null;
    },
    
    // 设置当前用户
    setCurrentUser(userId) {
        localStorage.setItem(this.STORAGE_KEYS.CURRENT_USER, userId);
    },
    
    // 创建新用户
    createUser(name, avatar) {
        const users = this.getUsers();
        const newUser = {
            id: 'user_' + Date.now(),
            name: name || '新用户',
            avatar: avatar || this.AVATARS[0],
            createdAt: new Date().toISOString()
        };
        
        users.push(newUser);
        this.saveUsers(users);
        this.setCurrentUser(newUser.id);
        
        // 初始化用户数据
        StorageModule.initForUser(newUser.id);
        
        return newUser;
    },
    
    // 删除用户
    deleteUser(userId) {
        const users = this.getUsers();
        const filteredUsers = users.filter(u => u.id !== userId);
        this.saveUsers(filteredUsers);
        
        // 清除用户数据
        StorageModule.clearUserData(userId);
        
        // 如果删除的是当前用户，切换到第一个用户
        if (this.getCurrentUser()?.id === userId) {
            if (filteredUsers.length > 0) {
                this.setCurrentUser(filteredUsers[0].id);
            } else {
                localStorage.removeItem(this.STORAGE_KEYS.CURRENT_USER);
            }
        }
    },
    
    // 检查是否有用户
    hasUsers() {
        return this.getUsers().length > 0;
    },
    
    // 获取用户统计数据
    getUserStats(userId) {
        // 临时切换到该用户以获取数据
        const originalUser = this.getCurrentUser();
        this.setCurrentUser(userId);
        
        const stats = {
            totalWordsLearned: StorageModule.getStatistics().totalWordsLearned || 0,
            totalReviewsDone: StorageModule.getStatistics().totalReviewsDone || 0,
            streakDays: StorageModule.getStreakDays()
        };
        
        // 恢复原始用户
        if (originalUser) {
            this.setCurrentUser(originalUser.id);
        }
        
        return stats;
    }
};

    // ==================== 答题复习系统 ====================
    
    async startQuizForUnit(unitId) {
        const textbook = await getCurrentTextbookAsync();
        const unit = textbook.units[unitId];
        if (!unit || !unit.vocabulary) return;
        
        AppState.currentUnit = unitId;
        AppState.quizMode = 'unit';
        
        // 使用复习引擎生成答题会话
        AppState.currentQuiz = ReviewEngine.generateReviewSession(unit.vocabulary, Math.min(10, unit.vocabulary.length));
        AppState.currentQuizIndex = 0;
        AppState.reviewResults = [];
        AppState.sessionStartTime = Date.now();
        
        this.renderQuizQuestion();
    },
    
    async startQuizReview() {
        const textbook = await getCurrentTextbookAsync();
        const todayTasks = MemoryModule.getTodayReviewTasks(20);
        
        if (todayTasks.length === 0) {
            // 如果没有待复习单词，从所有已学单词中随机选
            const allProgress = StorageModule.getAllWordProgress();
            const words = Object.keys(allProgress).map(key => {
                const [unitId, word] = key.split('_');
                const unit = textbook.units[unitId];
                const vocab = unit?.vocabulary?.find(v => v.word === word);
                return vocab ? { ...vocab, unitId, moduleId: unit?.module } : null;
            }).filter(Boolean);
            
            if (words.length < 5) {
                this.showToast('请先学习一些单词');
                return;
            }
            
            AppState.currentQuiz = ReviewEngine.generateReviewSession(words, Math.min(10, words.length));
        } else {
            // 从复习任务生成题目
            const words = todayTasks.map(task => {
                const [unitId, word] = task.wordKey.split('_');
                const unit = textbook.units[unitId];
                const vocab = unit?.vocabulary?.find(v => v.word === word);
                return vocab ? { ...vocab, unitId, moduleId: unit?.module } : null;
            }).filter(Boolean);
            
            AppState.currentQuiz = ReviewEngine.generateReviewSession(words, Math.min(10, words.length));
        }
        
        AppState.currentQuizIndex = 0;
        AppState.reviewResults = [];
        AppState.sessionStartTime = Date.now();
        
        this.renderQuizQuestion();
    },
    
    renderQuizQuestion() {
        if (AppState.currentQuizIndex >= AppState.currentQuiz.length) {
            this.showQuizComplete();
            return;
        }
        
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const total = AppState.currentQuiz.length;
        const progress = Math.round((AppState.currentQuizIndex / total) * 100);
        
        let questionHtml = '';
        
        switch (question.type) {
            case QUESTION_TYPES.EN_TO_CN:
                questionHtml = `
                    <div class="question-type-label">英译中</div>
                    <p class="question-text" style="font-size:24px;margin-bottom:16px;">"${question.word}" 的中文意思是？</p>
                    <p class="word-phonetic" style="color:var(--text-secondary);">${question.phonetic || ''}</p>
                `;
                break;

    playQuestionAudio() {
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        if (question && question.audioWord) {
            TTS.speakWord(question.audioWord);
        }
    },
    
    selectAnswer(index) {
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const selected = question.options[index];
        const isCorrect = selected.isCorrect;
        const responseTime = Date.now() - AppState.cardStartTime;
        
        // 显示反馈
        this.showAnswerFeedback(isCorrect, question.correctAnswer);
        
        // 高亮选项
        document.querySelectorAll('.quiz-option').forEach((btn, i) => {
            if (question.options[i].isCorrect) {
                btn.classList.add('correct');
            } else if (i === index && !isCorrect) {
                btn.classList.add('wrong');
            }
            btn.style.pointerEvents = 'none';
        });
        
        // 记录结果
        AppState.reviewResults.push({
            question: question.question,
            selected: selected.text,
            correct: question.correctAnswer,
            isCorrect,
            type: question.type,
            unitId: AppState.currentUnit,
            responseTime
        });
        
        // 更新记忆曲线
        this.updateMemoryCurve(question, isCorrect);
        
        // 延迟进入下一题
        setTimeout(() => {
            AppState.currentQuizIndex++;
            this.renderQuizQuestion();
        }, 1500);
    },
    
    showAnswerFeedback(isCorrect, correctAnswer) {
        if (isCorrect) {
            document.getElementById('quiz-feedback-correct').style.display = 'block';
            TTS.speak('Great!');
        } else {
            document.getElementById('quiz-feedback-wrong').style.display = 'block';
            document.getElementById('wrong-answer-text').textContent = `正确答案是：${correctAnswer}`;
            TTS.speak('Try again!');
        }
    },
    
    updateMemoryCurve(question, isCorrect) {
        const wordKey = `${AppState.currentUnit}_${question.word || question.audioWord}`;
        const task = StorageModule.getReviewSchedule().find(t => t.wordKey === wordKey);
        
        if (task) {
            const updatedTask = MemoryModule.processAnswer(task, isCorrect, 0);
            MemoryModule.updateReviewTask(updatedTask);
        }
        
        if (isCorrect) {
            StorageModule.incrementReviewsDone();
        }
    },
    
    confirmQuizExit() {
        this.showModal('确认退出', `你已完成 ${AppState.currentQuizIndex} 道题，确定要退出吗？`, [

            { text: '确定', type: 'primary', onClick: () => {

                if (AppState.quizMode === 'unit') {

        if (speedValue) {

        if (slider) {

    async findExampleForWord(word, unitIds) {
        const textbook = await getCurrentTextbookAsync();
        for (const unitId of unitIds) {
            const unit = textbook.units[unitId];
            if (unit && unit.sentences) {
                const found = unit.sentences.find(s => 
                    s.english.toLowerCase().includes(word.toLowerCase())
                );
                if (found) return found;
            }
        }
        return null;
    },
    
    startListeningTrain() {
        const state = this.listeningState;
        
        const selectedWords = state.selectedWords.filter(w => w.selected);
        
        if (selectedWords.length === 0) {
            this.showToast('请先选择单词');
            return;
        }
        
        if (state.playOrder === 'random') {
            selectedWords.sort(() => Math.random() - 0.5);
        }
        
        state.selectedWords = selectedWords;
        state.currentWordIndex = 0;
        state.isPlaying = true;
        state.isPaused = false;
        
        this.renderListeningPage();
        this.playListeningSequence();
    },
    
    renderListeningPage() {
        const state = this.listeningState;
        const currentWord = state.selectedWords[state.currentWordIndex];
        const example = this.findExampleForWord(currentWord?.word, state.selectedUnits);
        
        const html = `
            <div class="listening-page">
                <div class="listening-controls-top">
                    <button class="stop-btn" onclick="App.stopListening()">
                        ⏹️ 停止
                    </button>
                    <button class="pause-btn ${state.isPaused ? 'paused' : ''}" 
                            onclick="App.toggleListening()">
                        ${state.isPaused ? '▶️ 继续' : '⏸️ 暂停'}
                    </button>

                    <div class="word-chinese">${currentWord?.chinese || ''}</div>
                    ${example ? `
                        <div class="word-example">${example.english}</div>
                    ` : ''}
                </div>
                
                <div class="playing-progress">
                    <span class="playing-indicator ${state.isPaused ? 'paused' : ''}"></span>
                    进度: <strong>${state.currentWordIndex + 1}</strong> / ${state.selectedWords.length}
                </div>
            </div>
        `;
        
        this.setContent(html);
    },
    
    async playListeningSequence() {
        const state = this.listeningState;
        if (!state.isPlaying) return;
        
        while (state.isPlaying && !state.isPaused) {
            const word = state.selectedWords[state.currentWordIndex];
            if (!word) {
                state.currentWordIndex = 0;
                continue;
            }
            
            this.renderListeningPage();
            
            try {
                await TTS.speak(word.word, { rate: 0.85 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                await TTS.speak(word.word, { rate: 0.85 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                const letters = word.word.split('').join('-').toUpperCase();
                await TTS.speak(letters, { rate: 0.6 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                await TTS.speak(word.word, { rate: 0.85 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                if (word.chinese) {
                    await TTS.speak(word.chinese, { rate: 0.85 });
                    if (!state.isPlaying || state.isPaused) break;
                    await this.wait(600);
                }
                
                const example = this.findExampleForWord(word.word, state.selectedUnits);
                if (example) {
                    await TTS.speak(example.english, { rate: 0.85 });
                    if (!state.isPlaying || state.isPaused) break;
                    await this.wait(800);
                }
                
                await this.wait(1000);
                
            } catch (e) {
                console.error('播放出错:', e);
            }
            
            state.currentWordIndex = (state.currentWordIndex + 1) % state.selectedWords.length;
        }
    },
    
    toggleListening() {
        const state = this.listeningState;
        state.isPaused = !state.isPaused;
        
        if (!state.isPaused) {
            this.playListeningSequence();
        }
        
        this.renderListeningPage();
    },
    
    stopListening() {
        this.listeningState.isPlaying = false;
        this.listeningState.isPaused = false;
        TTS.cancel();
        this.renderHome();
    },

        }
        
        this.phoneticState.questions = this.generatePhoneticQuestions(sounds);

    generatePhoneticQuestions(sounds) {
        const questions = [];
        
        // 生成听音标选描述的题目
        sounds.forEach(sound => {
            const distractors = sounds
                .filter(s => s.symbol !== sound.symbol)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
                .map(s => s.description);
            
            const options = this.shuffle([sound.description, ...distractors]);
            
            questions.push({
                type: 'symbol_to_desc',
                sound: sound,
                question: '听音标，选择正确的描述',
                playAudio: true,
                audioName: sound.audio,
                options: options.map(opt => ({ text: opt, isCorrect: opt === sound.description })),
                correctAnswer: sound.description
            });
        });
        
        // 生成听单词选音标的题目
        sounds.forEach(sound => {
            const distractors = sounds
                .filter(s => s.symbol !== sound.symbol)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            
            const options = this.shuffle([
                { text: sound.symbol, isCorrect: true },
                ...distractors.map(s => ({ text: s.symbol, isCorrect: false }))
            ]);
            
            questions.push({
                type: 'word_to_symbol',
                sound: sound,
                question: `听到含${sound.symbol}音的单词，选择正确的音标`,
                playAudio: true,
                audioName: sound.audio,
                word: sound.example,
                options: options,
                correctAnswer: sound.symbol
            });
        });
        
        return this.shuffle(questions);
    },
    
    renderPhoneticQuestion() {
        const state = this.phoneticState;
        const q = state.questions[state.currentIndex];
        const progress = state.currentIndex + 1;
        const total = state.questions.length;
        const percent = (progress / total) * 100;
        
        const html = `
            <div class="phonetic-practice-page">
                <button class="back-btn" onclick="App.confirmPhoneticExit()">
                    ← 返回
                </button>
                
                <div class="phonetic-progress">
                    <div class="phonetic-progress-bar">
                        <div class="phonetic-progress-fill" style="width:${percent}%"></div>
                    </div>
                    <span class="phonetic-progress-text">${progress}/${total}</span>
                </div>
                
                <div class="phonetic-question-card">
                    <div class="phonetic-question-type">
                        ${q.type === 'symbol_to_desc' ? '🎧 听音标选描述' : '📝 听单词选音标'}
                    </div>
                    
                    <button class="phonetic-audio-btn" id="phonetic-audio-btn" onclick="App.playPhoneticAudio('${q.audioName}')">
                        🔊
                    </button>
                    
                    <div class="phonetic-play-hint">点击播放音频</div>
                    
                    ${q.type === 'word_to_symbol' ? `
                        <div class="phonetic-word-display">${q.word}</div>
                    ` : ''}
                </div>
                
                <div class="phonetic-options-grid" id="phonetic-options">
                    ${q.options.map((opt, idx) => `
                        <div class="phonetic-option" onclick="App.selectPhoneticAnswer(${idx})" id="phonetic-option-${idx}">
                            ${opt.text}
                        </div>
                    `).join('')}
                </div>
                
                <div id="phonetic-feedback"></div>
            </div>
        `;
        this.setContent(html);
        
        // 自动播放音频
        setTimeout(() => {
            this.playPhoneticAudio(q.audioName);
        }, 500);
    },
    
    playPhoneticAudio(audioName) {
        const btn = document.getElementById('phonetic-audio-btn');
        if (btn) {
            btn.classList.add('playing');
        }
        
        PhoneticAudioModule.play(audioName).finally(() => {
            if (btn) {
                btn.classList.remove('playing');
            }
        });
    },
    
    selectPhoneticAnswer(index) {
        const state = this.phoneticState;
        const q = state.questions[state.currentIndex];
        const selectedOpt = q.options[index];
        const isCorrect = selectedOpt.isCorrect;
        
        // 禁用所有选项
        document.querySelectorAll('.phonetic-option').forEach((el, idx) => {
            el.onclick = null;
            if (q.options[idx].isCorrect) {
                el.classList.add('correct');
            } else if (idx === index && !isCorrect) {
                el.classList.add('wrong');
            }
        });
        
        if (isCorrect) {
            state.correctCount++;
        } else {
            state.wrongCount++;
        }
        
        // 显示反馈
        const feedback = document.getElementById('phonetic-feedback');
        feedback.innerHTML = `
            <div class="phonetic-feedback ${isCorrect ? 'correct' : 'wrong'}">
                <div class="phonetic-feedback-icon">${isCorrect ? '✅' : '❌'}</div>
                <div>${isCorrect ? '回答正确！' : '回答错误，正确答案是：' + q.correctAnswer}</div>
                <div style="margin-top:8px;font-size:14px;color:var(--text-secondary);">
                    音标: ${q.sound.symbol} | 示例: ${q.sound.example}
                </div>
            </div>
            <button class="primary-btn" style="width:100%;margin-top:16px;" onclick="App.nextPhoneticQuestion()">
                ${state.currentIndex < state.questions.length - 1 ? '下一题' : '查看结果'}
            </button>
        `;
    },
    
    nextPhoneticQuestion() {
        const state = this.phoneticState;
        state.currentIndex++;
        
        if (state.currentIndex < state.questions.length) {
            this.renderPhoneticQuestion();
        } else {
            this.showPhoneticComplete();
        }
    },
    
    confirmPhoneticExit() {
        this.showModal(
            '退出练习',
            '确定要退出当前练习吗？进度将不会保存。',
            [
                { text: '取消', type: 'secondary', onClick: () => this.closeModal() },
                { text: '退出', type: 'danger', onClick: () => {
                    this.closeModal();
                    this.showPhoneticMain();
                }}
            ]
        );
    },
    
    showPhoneticComplete() {
        const state = this.phoneticState;
        const total = state.correctCount + state.wrongCount;
        const accuracy = total > 0 ? Math.round((state.correctCount / total) * 100) : 0;
        
        let grade, message;
        if (accuracy >= 90) {
            grade = '🌟';
            message = '太棒了！你已经掌握这些音标了！';
        } else if (accuracy >= 70) {
            grade = '👍';
            message = '做得不错！继续加油！';
        } else if (accuracy >= 50) {
            grade = '💪';
            message = '还需要多多练习哦！';
        } else {
            grade = '📚';
            message = '别灰心，多听多练一定会进步！';
        }
        
        const html = `
            <div class="phonetic-complete-page">
                <button class="back-btn" onclick="App.showPhoneticMain()">
                    ← 返回
                </button>
                
                <div class="phonetic-complete-icon">${grade}</div>
                <div class="phonetic-complete-title">${message}</div>
                
                <div class="phonetic-complete-stats">
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">总题数</span>
                        <span class="phonetic-stat-value">${total}</span>
                    </div>
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">正确数</span>
                        <span class="phonetic-stat-value success">${state.correctCount}</span>
                    </div>
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">错误数</span>
                        <span class="phonetic-stat-value danger">${state.wrongCount}</span>
                    </div>
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">正确率</span>
                        <span class="phonetic-stat-value ${accuracy >= 70 ? 'success' : 'danger'}">${accuracy}%</span>
                    </div>
                </div>
                
                <button class="phonetic-practice-btn" onclick="App.startPhoneticPractice()">
                    再练一次
                </button>
                
                <button class="primary-btn secondary" style="width:100%;margin-top:12px;" onclick="App.showPhoneticMain()">
                    返回音标练习
                </button>
            </div>
        `;
        this.setContent(html);
    },
    
    // ==================== 工具函数 ====================
    
    setContent(html) {
        this.elements.content.innerHTML = html;
        window.scrollTo(0, 0);
    },
    
    showModal(title, message, buttons = []) {
        const modal = this.elements.modal;
        
        if (buttons.length === 0) {
            buttons = [{ text: '确定', type: 'primary', onClick: () => this.closeModal() }];
        }
        
        let buttonsHtml = buttons.map((btn, index) => `
            <button class="modal-btn ${btn.type}" data-btn-index="${index}">
                ${btn.text}
            </button>
        `).join('');
        
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="modal-buttons">${buttonsHtml}</div>
            </div>
        `;
        
        modal.querySelectorAll('.modal-btn').forEach((btnEl, index) => {
            btnEl.addEventListener('click', () => {
                if (buttons[index] && buttons[index].onClick) {
                    buttons[index].onClick();
                }
            });
        });
        
        modal.classList.add('show');
    },
    
    closeModal() {
        this.elements.modal.classList.remove('show');
    },
    
    showToast(message, duration = 2000) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    },
    
    formatTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
        return date.toLocaleDateString('zh-CN');
    },
    
    wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

document.addEventListener('DOMContentLoaded', () => {
    App.init();
});

window.QUESTION_TYPES = QUESTION_TYPES;
