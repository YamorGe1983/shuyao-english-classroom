/**
 * 小学英语学习App - 样式表
 * 儿童友好的明亮色彩和大按钮设计
 */

/* ==================== 变量定义 ==================== */
:root {
    /* 主色调 */
    --primary: #FF6B6B;
    --primary-light: #FF8E8E;
    --primary-dark: #E85555;
    
    /* 辅助色 */
    --secondary: #4ECDC4;
    --secondary-light: #7EDED7;
    --secondary-dark: #3DBDB4;
    
    /* 强调色 */
    --accent: #FFE66D;
    --accent-dark: #FFD93D;
    
    /* 背景色 */
    --bg-primary: #F7F9FC;
    --bg-secondary: #FFFFFF;
    --bg-card: #FFFFFF;
    
    /* 文字颜色 */
    --text-primary: #2D3436;
    --text-secondary: #636E72;
    --text-light: #B2BEC3;
    --text-white: #FFFFFF;
    
    /* 状态颜色 */
    --success: #00B894;
    --warning: #FDCB6E;
    --danger: #E17055;
    --info: #74B9FF;
    
    /* 模块颜色 */
    --module1: #FF6B6B;
    --module2: #FF8E8E;
    --module3: #4ECDC4;
    --module4: #FFE66D;
    
    /* 阴影 */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
    
    /* 圆角 */
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    
    /* 字体大小 */
    --font-xs: 12px;
    --font-sm: 14px;
    --font-md: 16px;
    --font-lg: 20px;
    --font-xl: 24px;
    --font-xxl: 32px;
    --font-giant: 48px;
    
    /* 间距 */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-xxl: 48px;
    
    /* 导航高度 */
    --nav-height: 70px;
}

/* ==================== 基础样式 ==================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: var(--font-md);
    line-height: 1.6;
    color: var(--text-primary);
    background-color: var(--bg-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
}

h1, h2, h3, h4, h5, h6 {
    font-weight: 600;
    line-height: 1.3;
}

/* ==================== 用户相关页面 ==================== */
.user-page {
    padding: var(--space-xl);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 用户选择页面 - 欢迎页样式 */
.welcome-user-page, .user-select-page {
    padding: 40px 20px;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.welcome-user-page .welcome-icon {
    font-size: 80px;
    margin-bottom: 20px;
}

.user-form {
    max-width: 300px;
    margin: 30px auto;
}

.user-form .user-name-input {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);
    text-align: center;
    margin-bottom: 20px;
}

.avatar-select {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
}

.avatar-option {
    width: 60px;
    height: 60px;
    font-size: 36px;
    border-radius: 50%;
    background: white;
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.avatar-option:hover {
    transform: scale(1.1);
}

.avatar-option.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.create-user-btn, .add-user-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

.add-user-btn {
    background: var(--bg-card);
    color: var(--text-primary);
    margin-top: 20px;
}

.user-list {
    margin: 24px 0;
}

.user-card {
    display: flex;
    align-items: center;
    padding: 20px;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
}

.user-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.user-card .user-avatar {
    font-size: 40px;
    margin-right: 16px;
}

.user-card .user-name {
    font-size: 20px;
    font-weight: 600;
}

.page-subtitle {
    color: var(--text-secondary);
    font-size: var(--font-md);
    margin-top: var(--space-sm);
}

.current-user-info {
    color: var(--text-secondary);
    font-size: var(--font-sm);
    margin-bottom: var(--space-md);
}

.home-page {
    min-height: calc(100vh - var(--nav-height));
    background: var(--bg-primary);
}

.welcome-page {
    text-align: center;
    padding: var(--space-xl);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
}

.welcome-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.welcome-page h1 {
    color: white;
    font-size: var(--font-xxl);
    margin-bottom: var(--space-sm);
}

.welcome-page p {
    color: rgba(255,255,255,0.9);
    font-size: var(--font-lg);
    margin-bottom: var(--space-xl);
}

.user-avatar-select {
    display: flex;
    justify-content: center;
    gap: var(--space-md);
    margin-bottom: var(--space-xl);
    flex-wrap: wrap;
}

.avatar-option {
    width: 60px;
    height: 60px;
    font-size: 36px;
    border-radius: 50%;
    background: white;
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.avatar-option:hover {
    transform: scale(1.1);
}

.avatar-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 230, 109, 0.5);
}

.user-name-input {
    width: 100%;
    max-width: 280px;
    padding: var(--space-md) var(--space-lg);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    text-align: center;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-md);
}

.start-btn {
    width: 100%;
    max-width: 280px;
    padding: var(--space-lg) var(--space-xl);
    background: var(--accent);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-xl);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: all 0.2s;
}

.start-btn:active {
    transform: scale(0.96);
}

/* 用户选择页面 */
.user-select-page {
    padding: var(--space-xl);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.user-select-page h1 {
    text-align: center;
    font-size: var(--font-xl);
    color: var(--text-primary);
    margin-bottom: var(--space-xl);
}

.user-list {
    margin-bottom: var(--space-xl);
}

.user-card {
    display: flex;
    align-items: center;
    padding: var(--space-lg);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-md);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
}

.user-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.user-card:active {
    transform: scale(0.98);
}

.user-avatar-large {
    font-size: 48px;
    margin-right: var(--space-lg);
}

.user-info {
    flex: 1;
}

.user-name-large {
    font-size: var(--font-xl);
    font-weight: 600;
    color: var(--text-primary);
}

.user-stats {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-top: var(--space-xs);
}

.add-user-btn {
    width: 100%;
    padding: var(--space-lg);
    background: var(--bg-card);
    border: 2px dashed var(--text-light);
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}

.add-user-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}

/* 当前用户指示器 */
.current-user-indicator {
    display: flex;
    align-items: center;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
}

.current-user-indicator:hover {
    background: var(--bg-primary);
}

/* 头部切换区域 */
.header-switches {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
}

.header-switches > div {
    flex: 1;
}

.current-user-indicator {
    display: flex;
    align-items: center;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
}

.current-user-indicator:hover {
    background: var(--bg-primary);
}

.current-user-avatar {
    font-size: 24px;
    margin-right: var(--space-sm);
}

.current-user-name {
    font-size: var(--font-sm);
    font-weight: 600;
}

/* 年级选择器 */
.grade-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: var(--space-sm) var(--space-md);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
    color: white;
    font-weight: 600;
}

.grade-indicator:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

.grade-indicator:active {
    transform: scale(0.98);
}

.grade-indicator .grade-icon {
    font-size: 20px;
}

/* 年级选择页面 */
.grade-select-page {
    padding: var(--space-md);
}

.grade-select-page h1 {
    text-align: center;
    font-size: var(--font-xl);
    margin-bottom: var(--space-xl);
    color: var(--text-primary);
}

.grade-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.grade-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-lg);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
    border: 2px solid transparent;
}

.grade-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--primary-light);
}

.grade-card:active {
    transform: scale(0.98);
}

.grade-card.current {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.08);
}

.grade-card .grade-info {
    display: flex;
    flex-direction: column;
}

.grade-card .grade-name {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.grade-card .grade-modules {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.grade-card .grade-check {
    font-size: 24px;
    color: var(--primary);
    opacity: 0;
    transition: opacity 0.2s;
}

.grade-card.current .grade-check {
    opacity: 1;
}

/* ==================== 导航栏 ==================== */
#nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--nav-height);
    background: var(--bg-secondary);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
    padding: 0 var(--space-md);
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-sm) var(--space-md);
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
    cursor: pointer;
    background: none;
    border: none;
    font-size: var(--font-xs);
    min-width: 60px;
}

.nav-item .nav-icon {
    font-size: 24px;
    margin-bottom: 2px;
    transition: transform 0.2s ease;
}

.nav-item span:last-child {
    font-size: 11px;
}

.nav-item.active {
    color: var(--primary);
}

.nav-item.active .nav-icon {
    transform: scale(1.1);
}

/* ==================== 答题选项样式 ==================== */
.quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
    margin-top: var(--space-lg);
}

.quiz-option {
    padding: var(--space-lg);
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    box-shadow: var(--shadow-sm);
}

.quiz-option:hover {
    border-color: var(--primary-light);
}

.quiz-option:active {
    transform: scale(0.96);
}

.quiz-option.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.quiz-option.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.1);
}

.quiz-option.wrong {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.1);
}

/* 答题反馈 */
.quiz-feedback {
    text-align: center;
    padding: var(--space-lg);
    margin-top: var(--space-lg);
    border-radius: var(--radius-lg);
}

.quiz-feedback.correct {
    background: linear-gradient(135deg, #E8F8F5 0%, #D4EDDA 100%);
    color: var(--success);
}

.quiz-feedback.wrong {
    background: linear-gradient(135deg, #FFF5F5 0%, #FFE8E8 100%);
    color: var(--danger);
}

.quiz-feedback .feedback-icon {
    font-size: 48px;
    margin-bottom: var(--space-sm);
}

.quiz-feedback .feedback-text {
    font-size: var(--font-lg);
    font-weight: 600;
}

/* 题目标签 */
.question-type-label {
    background: var(--secondary);
    color: white;
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    display: inline-block;
    margin-bottom: var(--space-md);
}

/* 大播放按钮 */
.audio-btn-large {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    color: white;
    border: none;
    padding: 16px 32px;
    border-radius: var(--radius-lg);
    font-size: 18px;
    cursor: pointer;
    margin: 16px 0;
    box-shadow: var(--shadow-md);
    transition: all 0.2s;
}

.audio-btn-large:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.audio-btn-large:active {
    transform: scale(0.98);
}

/* 高亮字母样式 */
.highlight-letters {
    color: var(--danger);
    text-decoration: underline;
    font-weight: bold;
}

.word-highlighted {
    font-size: var(--font-giant);
    font-weight: 700;
    color: var(--primary);
    margin: var(--space-lg) 0;
}

.word-highlighted .highlight {
    color: var(--danger);
    text-decoration: underline;
}

/* 听音按钮 */
.play-audio-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-md) var(--space-xl);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-md);
    transition: all 0.2s;
}

.play-audio-btn:active {
    transform: scale(0.96);
}

/* 单词卡片 */
.word-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    text-align: center;
    box-shadow: var(--shadow-md);
    margin-bottom: var(--space-xl);
}

.word-main {
    margin-bottom: var(--space-xl);
}

.word-text {
    font-size: var(--font-giant);
    font-weight: 700;
    color: var(--primary);
    margin-bottom: var(--space-sm);
    letter-spacing: 2px;
}

.word-phonetic {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-sm);
}

.word-chinese {
    font-size: var(--font-xl);
    color: var(--text-primary);
}

.speak-btn {
    display: block;
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-md);
}

.speak-btn:active {
    transform: scale(0.95);
}

/* 复习卡片页 */
.review-card-page {
    padding: var(--space-sm);
}

.review-word-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    text-align: center;
    box-shadow: var(--shadow-md);
    margin-bottom: var(--space-xl);
}

.word-display {
    margin-bottom: var(--space-xl);
}

.reveal-area {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.reveal-btn {
    display: inline-block;
    padding: var(--space-lg) var(--space-xxl);
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-md);
}

.answer-buttons {
    text-align: center;
}

.answer-prompt {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-lg);
}

.answer-btns {
    display: flex;
    gap: var(--space-md);
    justify-content: center;
}

.answer-btn {
    padding: var(--space-lg) var(--space-xl);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.answer-btn.wrong {
    background: var(--danger);
    color: white;
}

.answer-btn.correct {
    background: var(--success);
    color: white;
}

/* 完成页 */
.complete-page {
    padding: var(--space-xl);
    text-align: center;
}

.complete-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
    animation: celebrate 0.5s ease;
}

@keyframes celebrate {
    0% { transform: scale(0); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

.complete-page h1 {
    font-size: var(--font-xxl);
    color: var(--primary);
    margin-bottom: var(--space-sm);
}

.complete-message {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-xl);
}

.complete-stats {
    display: flex;
    justify-content: center;
    gap: var(--space-xl);
    margin-bottom: var(--space-xl);
}

.complete-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.complete-stat .stat-num {
    font-size: var(--font-xxl);
    font-weight: 700;
    color: var(--primary);
}

.complete-stat .stat-label {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.complete-actions {
    display: flex;
    flex-direction: column;

/* ==================== 其他样式保持不变 ==================== */

/* 应用容器 */
.app-container {
    max-width: 480px;
    margin: 0 auto;
    padding: var(--space-md);
}

/* 欢迎卡片 */
.welcome-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    color: var(--text-white);
    text-align: center;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-lg);
}

.welcome-subtitle {
    opacity: 0.9;
    font-size: var(--font-sm);
}

.stats-row {
    display: flex;
    justify-content: space-around;
    margin-top: var(--space-lg);
}

.stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.stat-number {
    font-size: var(--font-xxl);
    font-weight: 700;
}

.stat-label {
    font-size: var(--font-xs);
    opacity: 0.9;
}

/* 复习提醒 */
.review-reminder {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    display: flex;
    align-items: center;
    margin-bottom: var(--space-lg);
    cursor: pointer;
    transition: transform 0.2s ease;
    box-shadow: var(--shadow-md);
}

.review-reminder:active {
    transform: scale(0.98);
}

.reminder-icon {
    font-size: 36px;
    margin-right: var(--space-md);
}

.reminder-content {
    flex: 1;
    color: var(--text-white);
}

.reminder-content strong {
    font-size: var(--font-md);
}

.reminder-content p {
    font-size: var(--font-sm);
    opacity: 0.9;
}

.reminder-arrow {
    font-size: 24px;
    color: var(--text-white);
}

/* 区块标题 */
.section-title {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: var(--font-lg);
    font-weight: 600;
    margin-bottom: var(--space-md);
    color: var(--text-primary);
}

/* 模块卡片网格 */
.modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.module-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
}

.module-card:active {
    transform: scale(0.96);
}

.module-card:hover {
    border-color: var(--primary-light);
}

.module-icon {
    font-size: 40px;
    margin-bottom: var(--space-sm);
}

.module-card h3 {
    font-size: var(--font-md);
    margin-bottom: var(--space-xs);
}

.module-name-cn {
    font-size: var(--font-xs);
    color: var(--text-secondary);
    margin-bottom: var(--space-sm);
}

.module-units {
    font-size: var(--font-xs);
    color: var(--text-light);
}

/* 快速操作按钮 */
.quick-actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

.quick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-lg);
    border-radius: var(--radius-lg);
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: var(--font-md);
    font-weight: 600;
}

.quick-btn.primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: var(--text-primary);
}

.quick-btn.secondary {
    background: linear-gradient(135deg, var(--info) 0%, #5BA4F5 100%);
    color: var(--text-white);
}

.quick-icon {
    font-size: 28px;
    margin-bottom: var(--space-xs);
}

/* 返回按钮 */
.back-btn {
    background: var(--bg-card);
    border: none;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.back-btn:active {
    transform: scale(0.96);
}

/* 学习头部 */
.learning-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-lg);
}

.learning-progress {
    flex: 1;
    margin: 0 var(--space-md);
}

.progress-bar {
    height: 8px;
    background: #E8E8E8;
    border-radius: 4px;
    overflow: hidden;
}

.progress-text {
    font-size: var(--font-xs);
    color: var(--text-secondary);
    text-align: center;
    display: block;
    margin-top: var(--space-xs);
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: 3px;
    transition: width 0.3s ease;
}

.fav-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: var(--space-sm);
}

.fav-btn:active {
    transform: scale(1.2);
}

.word-chinese.hidden {
    visibility: hidden;
}

.word-chinese.hidden::after {
    content: '?????';
    visibility: visible;
    color: #ccc;
}

/* 按钮样式 */
.action-btn {
    padding: var(--space-md) var(--space-lg);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.action-btn:active {
    transform: scale(0.96);
}

.action-btn.primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    box-shadow: var(--shadow-md);
}

.action-btn.secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
}

.card-actions {
    display: flex;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.card-actions .action-btn {
    flex: 1;
}

.card-info {
    text-align: center;
}

.status-tag {
    display: inline-block;
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    background: var(--bg-primary);
    color: var(--text-secondary);
}

.status-tag.new {
    background: var(--info);
    color: white;
}

.status-tag.mastered {
    background: var(--success);
    color: white;
}

.status-tag.learning {
    background: var(--warning);
    color: var(--text-primary);
}

/* 单元卡片 */
.unit-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.unit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    margin-bottom: var(--space-sm);
}

.unit-info {
    display: flex;
    align-items: center;
    gap: var(--space-md);
}

.unit-number {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: var(--font-md);
}

.unit-text h3 {
    font-size: var(--font-md);
    margin-bottom: 2px;
}

.unit-text p {
    font-size: var(--font-xs);
    color: var(--text-secondary);
}

.unit-arrow {
    font-size: 24px;
    color: var(--text-light);
}

.unit-progress-bar {
    height: 6px;
    background: #E8E8E8;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: var(--space-xs);
}

.unit-progress-text {
    font-size: var(--font-xs);
    color: var(--text-light);
    text-align: right;
    margin-bottom: var(--space-sm);
}

.unit-actions {
    display: flex;
    gap: var(--space-sm);
    justify-content: space-between;
}

.unit-action-btn {
    flex: 1;
    padding: var(--space-sm);
    border: none;
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: var(--font-xs);
    cursor: pointer;
    transition: all 0.2s ease;
}

.unit-action-btn:active {
    transform: scale(0.95);
    background: var(--primary-light);
    color: white;
}

/* 学习选项卡片 */
.learning-option-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.learning-option-card:active {
    transform: scale(0.98);
}

.option-icon {
    font-size: 36px;
    margin-right: var(--space-md);
}

.option-content {
    flex: 1;
}

.option-content h3 {
    font-size: var(--font-md);
    margin-bottom: 2px;
}

.option-content p {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.option-arrow {
    font-size: 24px;
    color: var(--text-light);
}

/* 复习页面 */
.review-page {
    padding: var(--space-sm);
}

.review-page.empty {
    text-align: center;
    padding: var(--space-xxl) var(--space-md);
}

.empty-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
}

.empty-hint {
    color: var(--text-light);
    margin-top: var(--space-sm);
}

.review-stats {
    display: flex;
    justify-content: center;
    gap: var(--space-md);
    margin: var(--space-xl) 0;
}

.stat-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md) var(--space-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.stat-card.large {
    padding: var(--space-lg) var(--space-xl);
}

.stat-icon {
    font-size: 24px;
    margin-bottom: var(--space-xs);
}

.stat-card .stat-num {
    font-size: var(--font-xxl);
    font-weight: 700;
    color: var(--primary);
}

.stat-card .stat-label {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.start-review-btn {
    display: block;
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-xl);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    margin-bottom: var(--space-xl);
}

.start-select-btn {
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-xl);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    position: fixed;
    bottom: 85px;
    left: 16px;
    right: 16px;
    z-index: 50;
}

.start-select-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.start-select-btn:active:not(:disabled) {
    transform: scale(0.98);
}

/* 预览标签 */
.preview-tags {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
}

.preview-tag {
    background: var(--bg-primary);
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
}

.preview-tag.mastered {
    background: var(--success);
    color: white;
}

.preview-tag.learning {
    background: var(--warning);
    color: var(--text-primary);
}

.preview-tag.new {
    background: var(--info);
    color: white;
}

/* 设置页面 */
.settings-page {
    padding: var(--space-sm);
}

.settings-section {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.settings-section h3 {
    font-size: var(--font-md);
    margin-bottom: var(--space-md);
    color: var(--text-primary);
}

.setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md) 0;
    border-bottom: 1px solid var(--bg-primary);
}

.setting-item:last-child {
    border-bottom: none;
}

.setting-item label {
    font-size: var(--font-md);
    color: var(--text-primary);
}

.speed-control {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
}

.speed-btn {
    padding: var(--space-xs) var(--space-sm);
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    cursor: pointer;
}

.speed-value {
    min-width: 50px;
    text-align: center;
    font-weight: 600;
}

.speed-slider {
    width: 100%;
    margin-top: var(--space-sm);
    -webkit-appearance: none;
    height: 8px;
    background: linear-gradient(90deg, var(--secondary) 0%, var(--primary) 100%);
    border-radius: 4px;
    outline: none;
}

.speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: var(--shadow-md);
}

.setting-select {
    padding: var(--space-sm) var(--space-md);
    border: 1px solid var(--bg-primary);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    background: white;
}

.setting-btn {
    display: block;
    width: 100%;
    padding: var(--space-md);
    background: var(--bg-primary);
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--font-md);
    color: var(--text-primary);
    cursor: pointer;
    margin-bottom: var(--space-sm);
    transition: all 0.2s ease;
}

.setting-btn:active {
    transform: scale(0.98);
}

.setting-btn.danger {
    background: #FFE8E8;
    color: var(--danger);
}

.about-text {
    text-align: center;
    color: var(--text-secondary);
    font-size: var(--font-sm);
    line-height: 1.8;
}

/* 模态框 */
#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: var(--space-md);
}

#modal.show {
    display: flex;
}

.modal-content {
    background: white;
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    max-width: 320px;
    width: 100%;
    text-align: center;
}

.modal-content h3 {
    font-size: var(--font-xl);
    margin-bottom: var(--space-md);
}

.modal-content p {
    color: var(--text-secondary);
    margin-bottom: var(--space-xl);
}

.modal-buttons {
    display: flex;
    gap: var(--space-md);
    justify-content: center;
}

.modal-btn {
    padding: var(--space-md) var(--space-xl);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
}

.modal-btn.primary {
    background: var(--primary);
    color: white;
}

.modal-btn.secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
}

.modal-btn.danger {
    background: var(--danger);
    color: white;
}

/* 提示框 */
#toast {
    position: fixed;
    bottom: calc(var(--nav-height) + var(--space-lg));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-primary);
    color: white;
    padding: var(--space-md) var(--space-xl);
    border-radius: var(--radius-lg);
    font-size: var(--font-sm);
    z-index: 1001;
    opacity: 0;
    transition: all 0.3s ease;
}

#toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* 随身听卡片 */
.morning-listen-card {
    background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    display: flex;
    align-items: center;
    margin-bottom: var(--space-lg);
    cursor: pointer;
    transition: transform 0.2s ease;
    box-shadow: var(--shadow-md);
}

.morning-listen-card:active {
    transform: scale(0.98);
}

.morning-icon {
    font-size: 40px;
    margin-right: var(--space-md);
}

.morning-content {
    flex: 1;
    color: var(--text-primary);
}

.morning-content strong {
    font-size: var(--font-lg);
}

.morning-content p {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.morning-arrow {
    font-size: 24px;
}

.unit-select-page, .word-select-page {
    padding: var(--space-md);

.select-title {

.module-section {

    cursor: pointer;
}

.word-item:last-child {
    border-bottom: none;
}

.word-checkbox {
    width: 20px;
    height: 20px;
    margin-right: var(--space-md);
    cursor: pointer;
    accent-color: var(--primary);
}

.word-main-info {
    flex: 1;
}

.word-english {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--primary);
}

.word-details {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-top: 2px;
}

.word-chinese-preview {
    font-size: var(--font-sm);
    color: var(--text-primary);
    margin-left: var(--space-sm);
}

.selected-count {
    text-align: center;
    padding: var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-md);
    font-size: var(--font-md);
    color: var(--text-secondary);
}

.selected-count strong {
    color: var(--primary);
    font-size: var(--font-lg);
}

/* 播放页 */
.listening-page {
    text-align: center;
    padding-top: var(--space-xl);
}

.listening-controls-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: var(--space-xl);
}

.stop-btn, .pause-btn {
    padding: var(--space-md) var(--space-lg);
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--font-md);
    cursor: pointer;
    transition: all 0.2s ease;
}

.stop-btn {
    background: var(--bg-card);
    color: var(--text-primary);
}

.pause-btn {
    background: var(--secondary);
    color: white;
}

.pause-btn.paused {
    background: var(--primary);
}

.stop-btn:active, .pause-btn:active {
    transform: scale(0.95);
}

.current-word-display {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    margin: var(--space-lg) 0;
    box-shadow: var(--shadow-lg);
}

.current-word-display .word-text {
    font-size: 56px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: var(--space-sm);
}

.current-word-display .word-phonetic {
    font-size: var(--font-xl);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

.current-word-display .word-chinese {
    font-size: var(--font-xxl);
    color: var(--text-primary);
    margin-bottom: var(--space-lg);
}

.current-word-display .word-example {
    font-size: var(--font-md);
    color: var(--text-secondary);
    font-style: italic;
    padding-top: var(--space-md);
    border-top: 1px dashed var(--bg-primary);
}

.playing-progress {
    color: var(--text-secondary);
    font-size: var(--font-lg);
    margin-bottom: var(--space-lg);
}

.playing-progress strong {
    color: var(--primary);
    font-size: var(--font-xl);
}

.playing-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    background: var(--success);
    border-radius: 50%;
    margin-right: var(--space-sm);
    animation: pulse 1s infinite;
}

.playing-indicator.paused {
    background: var(--warning);
    animation: none;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* 动画效果 */
.fade-in {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 学习日历卡片 */
.calendar-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.calendar-items {
    display: flex;
    justify-content: space-around;
    margin-top: var(--space-md);
}

.calendar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
}

.calendar-label {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.calendar-days {
    font-size: var(--font-xl);
    font-weight: 700;
    color: var(--primary);
}

.calendar-days.urgent {
    color: var(--danger);
}

.calendar-days.summer {
    color: var(--secondary);
}

/* 响应式 */
@media (min-width: 768px) {
    :root {
        --font-giant: 64px;
    }
    
    .modules-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 360px) {
    :root {
        --font-giant: 40px;
        --font-xxl: 28px;
    }
}

.phonetic-type-btn {

    justify-content: center;

    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);

    transition: all 0.2s;
}

.phonetic-type-btn:hover {
    border-color: var(--primary);
    transform: scale(1.02);
}

.phonetic-type-btn .icon {
    font-size: 40px;
}

.phonetic-type-btn .text {
    text-align: left;
}

.phonetic-type-btn .title {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-primary);
}

.phonetic-type-btn .desc {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.phonetic-category {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-md);

}

.phonetic-category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
}

.phonetic-category-title {

}

.phonetic-category-count {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.phonetic-category-toggle {
    transition: transform 0.3s;
}

.phonetic-category-toggle.collapsed {
    transform: rotate(-90deg);
}

.phonetic-sound-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-sm);
    margin-top: var(--space-md);
}

.phonetic-sound-item {
    background: var(--bg-primary);
    border-radius: var(--radius-md);
    padding: var(--space-sm);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.phonetic-sound-item:hover {
    transform: scale(1.05);
}

.phonetic-sound-item.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.phonetic-symbol {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 2px;
}

.phonetic-example {
    font-size: var(--font-xs);
    color: var(--text-secondary);
}

.phonetic-selected-summary {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-top: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.phonetic-selected-count {
    font-size: var(--font-lg);
    font-weight: 600;
    text-align: center;
    margin-bottom: var(--space-md);
}

.phonetic-selected-list {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    justify-content: center;
}

.phonetic-selected-tag {
    background: var(--primary);
    color: white;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    font-size: var(--font-sm);
}

.phonetic-practice-btn {
    width: 100%;
    padding: var(--space-lg);
    margin-top: var(--space-md);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);

    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    position: fixed;
    bottom: 85px;
    left: 16px;
    right: 16px;
    z-index: 50;
    box-shadow: var(--shadow-lg);
}

/* 音标统一选择页面样式 */
.phonetic-selection-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.selected-label {
    font-size: var(--font-md);
    color: var(--text-primary);
}

.selected-label strong {
    color: var(--primary);
}

.select-all-btn {
    padding: var(--space-sm) var(--space-md);
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    cursor: pointer;
}

.phonetic-section {
    margin-bottom: var(--space-lg);
}

.phonetic-section-header {
    display: flex;
    align-items: center;
    margin-bottom: var(--space-md);
    gap: var(--space-sm);
}

.section-tag {
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    font-weight: 600;
    color: white;
}

.vowel-tag {
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
}

.consonant-tag {
    background: linear-gradient(135deg, #4ECDC4 0%, #7EDED7 100%);
}

.section-name {
    flex: 1;
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-primary);
}

.category-select-btn {
    padding: 4px 10px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 1px solid var(--text-light);

    font-size: var(--font-xs);
    cursor: pointer;
}

.phonetic-category-new {
    margin-bottom: var(--space-md);

.phonetic-category-label {
    display: flex;

    border-radius: var(--radius-md);
    margin-bottom: var(--space-sm);

    font-weight: 600;
    color: var(--text-primary);
}

    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    cursor: pointer;

    box-shadow: var(--shadow-md);
}

.phonetic-question-type {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

    height: 100px;

    align-items: center;
    justify-content: center;

}

    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.phonetic-play-hint {

    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

    font-weight: 600;
    color: var(--primary);
    margin-top: var(--space-md);
}

.phonetic-options-grid {

    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

.phonetic-option {
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);

    padding: var(--space-lg);
    font-size: var(--font-lg);
    cursor: pointer;
    transition: all 0.2s;
}

.phonetic-option:hover {
    border-color: var(--primary);

    background: rgba(225, 112, 85, 0.1);

    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

    gap: var(--space-md);
    margin-bottom: var(--space-lg);

    height: 8px;
    background: var(--bg-primary);
    border-radius: 4px;
    overflow: hidden;
}

.phonetic-progress-fill {

    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);

.phonetic-progress-text {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    min-width: 50px;
}

.phonetic-feedback {

    padding: var(--space-lg);
    border-radius: var(--radius-lg);
    margin-top: var(--space-md);
}

.phonetic-feedback.correct {
    background: rgba(0, 184, 148, 0.1);
    color: var(--success);
}

.phonetic-feedback.wrong {
    background: rgba(225, 112, 85, 0.1);
    color: var(--danger);
}

.phonetic-feedback-icon {

    margin-bottom: var(--space-sm);

.phonetic-complete-page {

    text-align: center;
}

.phonetic-complete-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
}

.phonetic-complete-title {
    font-size: var(--font-xxl);
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--space-md);
}

.phonetic-complete-stats {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    margin: var(--space-lg) 0;
    box-shadow: var(--shadow-sm);
}

.phonetic-stat-item {
    display: flex;
    justify-content: space-between;
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--bg-primary);
}

.phonetic-stat-item:last-child {
    border-bottom: none;
}

.phonetic-stat-label {
    color: var(--text-secondary);
}

.phonetic-stat-value {
    font-weight: 600;
}

.phonetic-stat-value.success {
    color: var(--success);
}

.phonetic-stat-value.danger {
    color: var(--danger);
}

@media (max-width: 400px) {
    .phonetic-sound-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

// ==================== DataLoader Module ====================
const DataLoader = {
    _cache: {},
    VERSION: '1.0.0',
    
    async loadGrade(gradeId) {
        // 内存缓存
        if (this._cache[gradeId]) {
            return this._cache[gradeId];
        }
        
        // localStorage缓存
        const cacheKey = `englearn_${gradeId}`;
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
            try {
                const data = JSON.parse(cached);
                if (data._version === this.VERSION) {
                    this._cache[gradeId] = data;
                    return data;
                }
            } catch (e) {}
        }
        
        // 从服务器加载
        const response = await fetch(`./data/english/${gradeId}.json`);
        const data = await response.json();
        data._version = this.VERSION;
        
        // 缓存
        this._cache[gradeId] = data;
        try {
            localStorage.setItem(cacheKey, JSON.stringify(data));
        } catch (e) {}
        
        return data;
    },
    
    async preloadAll() {
        return Promise.all(Object.keys(GRADES).map(id => this.loadGrade(id)));
    }
};

// 异步获取教材数据
async function getCurrentTextbookAsync() {
    const gradeId = StorageModule.getCurrentGrade();
    return await DataLoader.loadGrade(gradeId);
}

// 同步获取教材数据（从缓存或GRADES元数据）
function getCurrentTextbook() {
    const gradeId = StorageModule.getCurrentGrade();
    // 优先从DataLoader缓存获取
    if (DataLoader._cache[gradeId]) {
        return DataLoader._cache[gradeId];
    }
    // 否则返回GRADES中的元数据
    return GRADES[gradeId] || GRADES['grade3_2'];
}

// 获取当前年级名称
function getCurrentGradeName() {
    const gradeId = StorageModule.getCurrentGrade();
    const grade = GRADES[gradeId] || GRADES['grade3_2'];
    return grade ? grade.name : '三年级下';
}

const StorageModule = {
    PREFIX: 'englearn_',
    
    KEYS: {
        VOCABULARY_PROGRESS: 'vocabulary_progress',
        REVIEW_SCHEDULE: 'review_schedule',
        LEARNING_HISTORY: 'learning_history',
        USER_SETTINGS: 'user_settings',
        FAVOURITES: 'favourites',
        STATISTICS: 'statistics',
        UNIT_PROGRESS: 'unit_progress',
        CURRENT_GRADE: 'current_grade'
    },
    
    // 获取当前用户ID
    getCurrentUserId() {
        return localStorage.getItem(UserModule.STORAGE_KEYS.CURRENT_USER) || null;
    },
    
    // 获取当前年级ID
    getCurrentGrade() {
        return this.get(this.KEYS.CURRENT_GRADE, 'grade3_2');
    },
    
    // 设置当前年级ID
    setCurrentGrade(gradeId) {
        return this.save(this.KEYS.CURRENT_GRADE, gradeId);
    },
    
    // 获取用户专属键
    getUserKey(key) {
        const userId = this.getCurrentUserId();
        return userId ? `${userId}_${key}` : key;
    },
    
    // 初始化当前用户数据
    init() {
        const currentUser = UserModule.getCurrentUser();
        if (currentUser) {
            this.initForUser(currentUser.id);
        }
    },
    
    // 为指定用户初始化数据
    initForUser(userId) {
        const originalUserId = this.getCurrentUserId();
        this.setCurrentUserIdForStorage(userId);
        
        this.ensureDataStructure();
        
        // 恢复原始用户
        if (originalUserId) {
            this.setCurrentUserIdForStorage(originalUserId);
        }
    },
    
    // 内部方法：设置用户ID（不影响全局current_user）
    setCurrentUserIdForStorage(userId) {
        // 这个方法用于在获取统计数据时临时切换用户
        this._tempUserId = userId;
    },
    
    // 内部方法：获取当前用户ID（优先使用临时值）
    _getCurrentUserId() {
        return this._tempUserId || this.getCurrentUserId();
    },
    
    // 获取用户专属键
    _getUserKey(key) {
        const userId = this._getCurrentUserId();
        return userId ? `${userId}_${key}` : key;
    },
    
    ensureDataStructure() {
        const userKey = this._getUserKey.bind(this);
        
        Object.values(this.KEYS).forEach(key => {
            const fullKey = this.PREFIX + userKey(key);
            if (!localStorage.getItem(fullKey)) {
                if (key === this.KEYS.STATISTICS) {
                    localStorage.setItem(fullKey, JSON.stringify(this.getDefaultStatistics()));
                } else if (key === this.KEYS.USER_SETTINGS) {
                    localStorage.setItem(fullKey, JSON.stringify(this.getDefaultSettings()));
                } else {
                    localStorage.setItem(fullKey, JSON.stringify(key === this.KEYS.REVIEW_SCHEDULE || key === this.KEYS.LEARNING_HISTORY || key === this.KEYS.FAVOURITES ? [] : {}));
                }
            }
        });
    },
    
    getDefaultSettings() {
        return {
            ttsRate: 0.85,
            theme: 'light',
            showPhonetic: true,
            autoPlay: true,
            dailyGoal: 10,
            reminderTime: '20:00'
        };
    },
    
    getDefaultStatistics() {
        return {
            totalWordsLearned: 0,
            totalReviewsDone: 0,
            streakDays: 0,
            lastStudyDate: null,
            wordsPerDay: {},
            accuracyHistory: []
        };
    },
    
    save(key, data) {
        try {
            const fullKey = this.PREFIX + this._getUserKey(key);
            localStorage.setItem(fullKey, JSON.stringify(data));
            return true;
        } catch (e) {
            console.error('保存数据失败:', e);
            return false;
        }
    },
    
    get(key, defaultValue = null) {
        try {
            const fullKey = this.PREFIX + this._getUserKey(key);
            const data = localStorage.getItem(fullKey);
            return data ? JSON.parse(data) : defaultValue;
        } catch (e) {
            console.error('读取数据失败:', e);
            return defaultValue;
        }
    },
    
    remove(key) {
        const fullKey = this.PREFIX + this._getUserKey(key);
        localStorage.removeItem(fullKey);
    },
    
    saveSetting(key, value) {
        const settings = this.get(this.KEYS.USER_SETTINGS, this.getDefaultSettings());
        settings[key] = value;
        return this.save(this.KEYS.USER_SETTINGS, settings);
    },
    
    getSetting(key, defaultValue = null) {
        const settings = this.get(this.KEYS.USER_SETTINGS, this.getDefaultSettings());
        return settings.hasOwnProperty(key) ? settings[key] : defaultValue;
    },
    
    getWordProgress(wordKey) {
        const progress = this.get(this.KEYS.VOCABULARY_PROGRESS, {});
        return progress[wordKey] || null;
    },
    
    saveWordProgress(wordKey, progressData) {
        const progress = this.get(this.KEYS.VOCABULARY_PROGRESS, {});
        progress[wordKey] = {
            ...progressData,
            lastUpdated: new Date().toISOString()
        };
        return this.save(this.KEYS.VOCABULARY_PROGRESS, progress);
    },
    
    getAllWordProgress() {
        return this.get(this.KEYS.VOCABULARY_PROGRESS, {});
    },
    
    getUnitWordProgress(unitId) {
        const allProgress = this.getAllWordProgress();
        const unitProgress = {};
        for (const key in allProgress) {
            if (key.startsWith(unitId + '_')) {
                unitProgress[key] = allProgress[key];
            }
        }
        return unitProgress;
    },
    
    getUnitCompletion(unitId, totalWords) {
        const unitProgress = this.getUnitWordProgress(unitId);
        const learnedCount = Object.keys(unitProgress).filter(key => 
            unitProgress[key].status === 'learned' || unitProgress[key].status === 'mastered'
        ).length;
        return totalWords > 0 ? Math.round((learnedCount / totalWords) * 100) : 0;
    },
    
    getReviewSchedule() {
        return this.get(this.KEYS.REVIEW_SCHEDULE, []);
    },
    
    addReviewTask(task) {
        const schedule = this.getReviewSchedule();
        schedule.push({
            ...task,
            id: Date.now().toString(),
            createdAt: new Date().toISOString()
        });
        return this.save(this.KEYS.REVIEW_SCHEDULE, schedule);
    },
    
    updateReviewTask(taskId, updates) {
        const schedule = this.getReviewSchedule();
        const index = schedule.findIndex(t => t.id === taskId);
        if (index !== -1) {
            schedule[index] = { ...schedule[index], ...updates };
            return this.save(this.KEYS.REVIEW_SCHEDULE, schedule);
        }
        return false;
    },
    
    removeReviewTask(taskId) {
        const schedule = this.getReviewSchedule();
        const filtered = schedule.filter(t => t.id !== taskId);
        return this.save(this.KEYS.REVIEW_SCHEDULE, filtered);
    },
    
    getTodayReviews() {
        const schedule = this.getReviewSchedule();
        const today = new Date().toDateString();
        return schedule.filter(task => {
            const reviewDate = new Date(task.nextReview).toDateString();
            return reviewDate <= today;
        });
    },
    
    getReviewCount() {
        return this.getTodayReviews().length;
    },
    
    addLearningRecord(record) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        history.push({
            ...record,
            id: Date.now().toString(),
            timestamp: new Date().toISOString()
        });
        if (history.length > 100) {
            history.shift();
        }
        return this.save(this.KEYS.LEARNING_HISTORY, history);
    },
    
    getLearningHistory(limit = 20) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        return history.slice(-limit).reverse();
    },
    
    getFavourites() {
        return this.get(this.KEYS.FAVOURITES, []);
    },
    
    addFavourite(wordKey, wordData) {
        const favourites = this.getFavourites();
        if (!favourites.find(f => f.wordKey === wordKey)) {
            favourites.push({
                wordKey,
                ...wordData,
                addedAt: new Date().toISOString()
            });
            return this.save(this.KEYS.FAVOURITES, favourites);
        }
        return false;
    },
    
    removeFavourite(wordKey) {
        const favourites = this.getFavourites();
        const filtered = favourites.filter(f => f.wordKey !== wordKey);
        return this.save(this.KEYS.FAVOURITES, filtered);
    },
    
    isFavourite(wordKey) {
        const favourites = this.getFavourites();
        return favourites.some(f => f.wordKey === wordKey);
    },
    
    getStatistics() {
        return this.get(this.KEYS.STATISTICS, this.getDefaultStatistics());
    },
    
    updateStatistics(updates) {
        const stats = this.getStatistics();
        return this.save(this.KEYS.STATISTICS, { ...stats, ...updates });
    },
    
    incrementWordsLearned(count = 1) {
        const stats = this.getStatistics();
        stats.totalWordsLearned += count;
        const today = new Date().toDateString();
        stats.wordsPerDay[today] = (stats.wordsPerDay[today] || 0) + count;
        this.updateStreak();
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    incrementReviewsDone(count = 1) {
        const stats = this.getStatistics();
        stats.totalReviewsDone += count;
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    updateStreak() {
        const stats = this.getStatistics();
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (stats.lastStudyDate) {
            const lastDate = new Date(stats.lastStudyDate);
            if (lastDate.toDateString() === today.toDateString()) {
                // 今天已经学习，不更新
            } else if (lastDate.toDateString() === yesterday.toDateString()) {
                stats.streakDays += 1;
            } else {
                stats.streakDays = 1;
            }
        } else {
            stats.streakDays = 1;
        }
        
        stats.lastStudyDate = today.toISOString();
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    getStreakDays() {
        const stats = this.getStatistics();
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (stats.lastStudyDate) {
            const lastDate = new Date(stats.lastStudyDate);
            if (lastDate.toDateString() !== today.toDateString() && 
                lastDate.toDateString() !== yesterday.toDateString()) {
                return 0;
            }
        }
        
        return stats.streakDays || 0;
    },
    
    getTodayWordsLearned() {
        const stats = this.getStatistics();
        const today = new Date().toDateString();
        return stats.wordsPerDay[today] || 0;
    },
    
    getUnitProgress(unitId) {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        return allProgress[unitId] || {
            wordsLearned: 0,
            sentencesLearned: 0,
            dialoguesLearned: 0,
            exercisesDone: 0,
            completed: false
        };
    },
    
    updateUnitProgress(unitId, updates) {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        allProgress[unitId] = {
            ...allProgress[unitId],
            ...updates,
            lastUpdated: new Date().toISOString()
        };
        return this.save(this.KEYS.UNIT_PROGRESS, allProgress);
    },
    
    completeUnit(unitId) {
        return this.updateUnitProgress(unitId, { completed: true, completedAt: new Date().toISOString() });
    },
    
    getCompletedUnits() {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        return Object.keys(allProgress).filter(unitId => allProgress[unitId].completed);
    },
    
    clearAllData() {
        Object.values(this.KEYS).forEach(key => {
            this.remove(key);
        });
        this.ensureDataStructure();
    },
    
    // 清除指定用户的所有数据
    clearUserData(userId) {
        const prefix = this.PREFIX + userId + '_';
        const keysToRemove = [];
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith(prefix)) {
                keysToRemove.push(key);
            }
        }
        
        keysToRemove.forEach(key => localStorage.removeItem(key));
    },
    
    exportData() {
        const data = {};
        Object.keys(this.KEYS).forEach(key => {
            data[key] = this.get(key);
        });
        return data;
    },
    
    importData(data) {
        if (data && typeof data === 'object') {
            Object.keys(data).forEach(key => {
                if (this.KEYS.hasOwnProperty(key)) {
                    this.save(key, data[key]);
                }
            });
            return true;
        }
        return false;
    }
};

/**
 * TTS (Text-to-Speech) 发音模块
 * 优先级：ResponsiveVoice > 百度TTS
 * 页面初始化时加载ResponsiveVoice，失败则使用百度TTS
 */

const TTSModule = {
    config: {
        voice: 'US English Female',
        chineseVoice: 'Chinese Female',
        rate: 0.85,
        pitch: 1.0
    },
    
    // 标记ResponsiveVoice是否可用
    responsiveVoiceReady: false,
    
    availableVoices: [
        { id: 'US English Female', name: '美式女声', lang: 'en-US' },
        { id: 'UK English Female', name: '英式女声', lang: 'en-GB' },
        { id: 'US English Male', name: '美式男声', lang: 'en-US' },
        { id: 'UK English Male', name: '英式男声', lang: 'en-GB' },
        { id: 'Chinese Female', name: '中文女声', lang: 'zh-CN' },
        { id: 'Chinese Male', name: '中文男声', lang: 'zh-CN' }
    ],
    
    // 页面初始化时加载TTS
    init() {
        return new Promise((resolve) => {
            // 设置超时，5秒内没加载成功就使用百度TTS
            const timeout = setTimeout(() => {
                console.warn('ResponsiveVoice 加载超时，将使用百度TTS');
                resolve(false);
            }, 5000);
            
            if (typeof responsiveVoice !== 'undefined') {
                clearTimeout(timeout);
                console.log('✓ ResponsiveVoice 已加载');
                this.responsiveVoiceReady = true;
                resolve(true);
                return;
            }
            
            const script = document.createElement('script');
            script.src = 'https://code.responsivevoice.org/responsivevoice.js?key=free-non-commercial-use';
            script.onload = () => {
                clearTimeout(timeout);
                console.log('✓ ResponsiveVoice 加载成功');
                this.responsiveVoiceReady = true;
                setTimeout(() => resolve(true), 300);
            };
            script.onerror = () => {
                clearTimeout(timeout);
                console.warn('ResponsiveVoice 加载失败，将使用百度TTS');
                this.responsiveVoiceReady = false;
                resolve(false);
            };
            document.head.appendChild(script);
        });
    },
    
    // 用户交互后激活音频（iOS Safari需要这个来解锁音频）
    activateAudioAfterGesture() {
        if (this._audioActivated) return;
        this._audioActivated = true;
        
        // iOS Safari 音频解锁
        // 创建一个静音的AudioContext并resume
        try {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass) {
                const tempContext = new AudioContextClass();
                tempContext.resume().then(() => {
                    console.log('✓ AudioContext已解锁');
                    tempContext.close();
                }).catch(() => {});
            }
        } catch (e) {}
        
        // 播放一个静音音频来解锁iOS音频
        try {
            const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
            silentAudio.play().then(() => {
                console.log('✓ iOS音频已解锁');
            }).catch(() => {});
        } catch (e) {}
        
        console.log('✓ 音频系统已激活');
    },
    
    // 检测是否是iOS设备
    isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    },
    
    containsChinese(text) {
        return /[\u4e00-\u9fa5]/.test(text);
    },
    
    autoDetectVoice(text) {
        if (this.containsChinese(text)) {
            return this.config.chineseVoice;
        }
        return this.config.voice;
    },
    
    speak(text, options = {}) {
        return new Promise(async (resolve, reject) => {
            const voice = options.voice || this.autoDetectVoice(text);
            const rate = options.rate || this.config.rate;
            
            // 优先使用 ResponsiveVoice
            if (this.responsiveVoiceReady && typeof responsiveVoice !== 'undefined') {
                responsiveVoice.speak(text, voice, {
                    rate: rate,
                    pitch: options.pitch || this.config.pitch,
                    onend: () => resolve(),
                    onerror: (e) => {
                        console.warn('ResponsiveVoice错误，fallback到Web Speech API:', e);
                        // 失败时fallback到Web Speech API
                        this.speakWithBrowser(text).then(resolve);
                    }
                });
            } 
            // Fallback: Web Speech API
            else {
                this.speakWithBrowser(text).then(resolve);
            }
        });
    },
    
    // 浏览器原生TTS（最后的备用方案）
    speakWithBrowser(text) {
        return new Promise((resolve) => {
            if (!('speechSynthesis' in window)) {
                console.warn('浏览器不支持TTS');
                resolve();
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            const isChinese = this.containsChinese(text);
            utterance.lang = isChinese ? 'zh-CN' : 'en-US';
            utterance.rate = this.config.rate;
            utterance.pitch = this.config.pitch;
            
            // 尝试找到合适的声音
            const voices = speechSynthesis.getVoices();
            const targetLang = isChinese ? 'zh-CN' : 'en-US';
            const voice = voices.find(v => v.lang.startsWith(targetLang));
            if (voice) {
                utterance.voice = voice;
            }
            
            utterance.onend = () => resolve();
            utterance.onerror = () => resolve();
            
            // 某些浏览器需要延迟执行
            setTimeout(() => {
                speechSynthesis.speak(utterance);
            }, 100);
        });
    },
    
    speakChinese(text, options = {}) {
        return this.speak(text, { ...options, voice: this.config.chineseVoice });
    },
    
    // 当前播放的音频元素
    currentAudio: null,
    
    cancel() {
        if (this.responsiveVoiceReady && typeof responsiveVoice !== 'undefined') {
            responsiveVoice.cancel();
        }
        if (this.currentAudio) {
            this.currentAudio.pause();
            this.currentAudio = null;
        }
    },
    
    isSpeaking() {
        if (this.responsiveVoiceReady && typeof responsiveVoice !== 'undefined') {
            return responsiveVoice.isPlaying();
        }
        return this.currentAudio && !this.currentAudio.paused;
    },
    
    speakWord(word, phonetic = '') {
        return this.speak(word, { rate: this.config.rate });
    },
    
    speakSentence(sentence) {
        return this.speak(sentence, { rate: this.config.rate * 0.9 });
    },
    
    async speakWithHighlight(text, onWordChange) {
        const words = text.split(/\s+/);
        for (let i = 0; i < words.length; i++) {
            if (onWordChange) {
                onWordChange(words[i], i, words.length);
            }
            await this.speak(words[i], { rate: this.config.rate });
            await this.wait(100);
        }
    },
    
    setRate(rate) {
        this.config.rate = Math.max(0.5, Math.min(2.0, rate));
        StorageModule.saveSetting('tts_rate', this.config.rate);
    },
    
    getRate() {
        return this.config.rate;
    },
    
    getRateLabel() {
        const rate = this.config.rate;
        if (rate <= 0.7) return '很慢';
        if (rate <= 0.85) return '较慢';
        if (rate <= 1.0) return '正常';
        if (rate <= 1.3) return '较快';
        return '很快';
    },
    
    loadSettings() {
        const savedRate = StorageModule.getSetting('tts_rate');
        if (savedRate) {
            this.config.rate = parseFloat(savedRate);
        }
    },
    
    getAvailableVoices() {
        return this.availableVoices;
    },
    
    setVoice(voiceId) {
        this.config.voice = voiceId;
    },
    
    wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

/**
 * 记忆曲线算法模块
 */

const MemoryModule = {
    config: {
        intervals: [
            5, 30, 720, 1440, 2880, 5760, 10080, 21600, 43200, 86400
        ],
        
        STATES: {
            NEW: 'new',
            LEARNING: 'learning',
            REVIEW: 'review',
            MASTERED: 'mastered',
            FORGOTTEN: 'forgotten'
        },
        
        MASTER_THRESHOLD: 4,
        RESET_THRESHOLD: 2
    },
    
    createReviewTask(wordKey, wordData) {
        const now = new Date();
        const firstReview = new Date(now.getTime() + this.config.intervals[0] * 60 * 1000);
        
        return {
            wordKey,
            word: wordData.word,
            chinese: wordData.chinese,
            phonetic: wordData.phonetic,
            letterSounds: wordData.letterSounds || [],
            unitId: wordData.unitId,
            moduleId: wordData.moduleId,
            easeFactor: 2.5,
            interval: 0,
            repetitions: 0,
            nextReview: firstReview.toISOString(),
            status: this.config.STATES.NEW,
            history: []
        };
    },
    
    calculateNextReview(task, quality) {
        const now = new Date();
        let newTask = { ...task };
        
        newTask.history = [...(task.history || []), {
            date: now.toISOString(),
            quality,
            interval: task.interval
        }];
        
        if (quality < 2) {
            newTask.repetitions = 0;
            newTask.interval = 0;
            newTask.nextReview = new Date(now.getTime() + 5 * 60 * 1000).toISOString();
            newTask.status = this.config.STATES.LEARNING;
            
            if (task.forgotCount !== undefined) {
                newTask.forgotCount = task.forgotCount + 1;
            } else {
                newTask.forgotCount = 1;
            }
            
            newTask.easeFactor = Math.max(1.3, task.easeFactor - 0.2);
        } 
        else {
            newTask.forgotCount = 0;
            newTask.repetitions += 1;
            
            const qualityBonus = (quality - 3) * 0.1;
            newTask.easeFactor = Math.max(1.3, task.easeFactor + qualityBonus);
            
            if (newTask.repetitions === 1) {
                newTask.interval = 1;
            } else if (newTask.repetitions === 2) {
                newTask.interval = 3;
            } else {
                newTask.interval = Math.round(task.interval * newTask.easeFactor);
            }
            
            newTask.interval = Math.min(60, newTask.interval);
            
            const nextTime = now.getTime() + newTask.interval * 24 * 60 * 60 * 1000;
            newTask.nextReview = new Date(nextTime).toISOString();
            
            if (newTask.repetitions >= this.config.MASTER_THRESHOLD) {
                newTask.status = this.config.STATES.MASTERED;
            } else {
                newTask.status = this.config.STATES.REVIEW;
            }
        }
        
        newTask.lastReview = now.toISOString();
        
        return newTask;
    },
    
    processAnswer(task, isCorrect, responseTime = 0) {
        let quality;
        if (!isCorrect) {
            if (responseTime < 2000) {
                quality = 1;
            } else {
                quality = 0;
            }
        } else {
            if (responseTime < 1000) {
                quality = 5;
            } else if (responseTime < 2000) {
                quality = 4;
            } else if (responseTime < 4000) {
                quality = 3;
            } else {
                quality = 2;
            }
        }
        
        return this.calculateNextReview(task, quality);
    },
    
    getStatusDescription(task) {
        if (!task || !task.status) return '新单词';
        
        switch (task.status) {
            case this.config.STATES.NEW:
                return '新单词';
            case this.config.STATES.LEARNING:
                return '学习中';
            case this.config.STATES.REVIEW:
                return `复习中 (${task.repetitions}/${this.config.MASTER_THRESHOLD})`;
            case this.config.STATES.MASTERED:
                return '已掌握';
            case this.config.STATES.FORGOTTEN:
                return '已遗忘';
            default:
                return '未知状态';
        }
    },
    
    getTimeUntilReview(nextReview) {
        const now = new Date();
        const reviewDate = new Date(nextReview);
        const diff = reviewDate - now;
        
        if (diff <= 0) {
            return '现在可以复习';
        }
        
        const minutes = Math.floor(diff / (1000 * 60));
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        if (days > 0) {
            return `${days}天后`;
        } else if (hours > 0) {
            return `${hours}小时后`;
        } else {
            return `${minutes}分钟后`;
        }
    },
    
    isDueForReview(nextReview) {
        const now = new Date();
        const reviewDate = new Date(nextReview);
        return reviewDate <= now;
    },
    
    getSuggestion(quality) {
        if (quality >= 4) {
            return '很好！继续保持！';
        } else if (quality >= 2) {
            return '不错，但可以再多练习一下';
        } else if (quality >= 1) {
            return '试着回忆一下它的发音和用法';
        } else {
            return '多听几遍，试着理解它的意思';
        }
    },
    
    scheduleReview(wordKey, wordData) {
        const task = this.createReviewTask(wordKey, wordData);
        StorageModule.addReviewTask(task);
        
        StorageModule.saveWordProgress(wordKey, {
            status: task.status,
            nextReview: task.nextReview,
            easeFactor: task.easeFactor,
            interval: task.interval,
            repetitions: task.repetitions
        });
        
        return task;
    },
    
    updateReviewTask(task) {
        StorageModule.updateReviewTask(task.id, task);
        
        StorageModule.saveWordProgress(task.wordKey, {
            status: task.status,
            nextReview: task.nextReview,
            easeFactor: task.easeFactor,
            interval: task.interval,
            repetitions: task.repetitions
        });
    },
    
    getTodayReviewTasks(limit = 20) {
        const allReviews = StorageModule.getTodayReviews();
        
        allReviews.sort((a, b) => {
            return new Date(a.nextReview) - new Date(b.nextReview);
        });
        
        return limit ? allReviews.slice(0, limit) : allReviews;
    },
    
    getUnitReviewTasks(unitId) {
        const allTasks = StorageModule.getReviewSchedule();
        return allTasks.filter(task => task.unitId === unitId);
    },
    
    getReviewStats() {
        const allTasks = StorageModule.getReviewSchedule();
        const todayReviews = this.getTodayReviewTasks();
        
        const stats = {
            totalWords: allTasks.length,
            dueToday: todayReviews.length,
            mastered: allTasks.filter(t => t.status === this.config.STATES.MASTERED).length,
            learning: allTasks.filter(t => t.status === this.config.STATES.LEARNING).length,
            new: allTasks.filter(t => t.status === this.config.STATES.NEW).length,
            review: allTasks.filter(t => t.status === this.config.STATES.REVIEW).length
        };
        
        stats.masterRate = stats.totalWords > 0 
            ? Math.round((stats.mastered / stats.totalWords) * 100) 
            : 0;
        
        return stats;
    },
    
    getReviewCount() {
        return this.getTodayReviewTasks().length;
    },
    
    generateReviewReport(results) {
        const total = results.length;
        const correct = results.filter(r => r.isCorrect).length;
        const wrong = total - correct;
        
        const avgResponseTime = results.reduce((sum, r) => sum + r.responseTime, 0) / total;
        
        const byUnit = {};
        results.forEach(r => {
            if (!byUnit[r.unitId]) {
                byUnit[r.unitId] = { total: 0, correct: 0 };
            }
            byUnit[r.unitId].total++;
            if (r.isCorrect) byUnit[r.unitId].correct++;
        });
        
        return {
            date: new Date().toISOString(),
            total,
            correct,
            wrong,
            accuracy: total > 0 ? Math.round((correct / total) * 100) : 0,
            avgResponseTime: Math.round(avgResponseTime),
            byUnit,
            suggestions: this.getImprovementSuggestions(results)
        };
    },
    
    getImprovementSuggestions(results) {
        const suggestions = [];
        const wrongResults = results.filter(r => !r.isCorrect);
        
        if (wrongResults.length > 0) {
            suggestions.push('建议多听几遍这些单词的正确发音');
        }
        
        const slowResults = results.filter(r => r.responseTime > 3000);
        if (slowResults.length > results.length * 0.3) {
            suggestions.push('试着加快反应速度，看到单词就能想起意思');
        }
        
        const accuracy = results.filter(r => r.isCorrect).length / results.length;
        if (accuracy >= 0.9) {
            suggestions.push('太棒了！继续保持，你学得很好！');
        } else if (accuracy >= 0.7) {
            suggestions.push('做得不错，但还有进步空间');
        } else {
            suggestions.push('别灰心，多练习几次就会越来越好');
        }
        
        return suggestions;
    }
};

/**
