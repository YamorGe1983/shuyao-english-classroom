/**
 * 小学英语学习App - 样式表
 * 儿童友好的明亮色彩和大按钮设计
 */

/* ==================== 变量定义 ==================== */
:root {
    /* 主色调 */
    --primary: #FF6B6B;
    --primary-light: #FF8E8E;
    --primary-dark: #E85555;
    
    /* 辅助色 */
    --secondary: #4ECDC4;
    --secondary-light: #7EDED7;
    --secondary-dark: #3DBDB4;
    
    /* 强调色 */
    --accent: #FFE66D;
    --accent-dark: #FFD93D;
    
    /* 背景色 */
    --bg-primary: #F7F9FC;
    --bg-secondary: #FFFFFF;
    --bg-card: #FFFFFF;
    
    /* 文字颜色 */
    --text-primary: #2D3436;
    --text-secondary: #636E72;
    --text-light: #B2BEC3;
    --text-white: #FFFFFF;
    
    /* 状态颜色 */
    --success: #00B894;
    --warning: #FDCB6E;
    --danger: #E17055;
    --info: #74B9FF;
    
    /* 模块颜色 */
    --module1: #FF6B6B;
    --module2: #FF8E8E;
    --module3: #4ECDC4;
    --module4: #FFE66D;
    
    /* 阴影 */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
    
    /* 圆角 */
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    
    /* 字体大小 */
    --font-xs: 12px;
    --font-sm: 14px;
    --font-md: 16px;
    --font-lg: 20px;
    --font-xl: 24px;
    --font-xxl: 32px;
    --font-giant: 48px;
    
    /* 间距 */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-xxl: 48px;
    
    /* 导航高度 */
    --nav-height: 70px;
    
    /* 学科主题色 */
    --subject-english: #FF6B6B;
    --subject-english-light: #FF8E8E;
    --subject-math: #9B59B6;
    --subject-math-light: #AB7BC7;
    --subject-chinese: #27AE60;
    --subject-chinese-light: #3DD881;
}

/* 动态学科主题色 - 根据当前学科切换 */
:root {
    --current-subject-color: var(--subject-english);
    --current-subject-light: var(--subject-english-light);
}

/* ==================== 基础样式 ==================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: var(--font-md);
    line-height: 1.6;
    color: var(--text-primary);
    background-color: var(--bg-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
}

h1, h2, h3, h4, h5, h6 {
    font-weight: 600;
    line-height: 1.3;
}

/* ==================== 用户相关页面 ==================== */
.user-page {
    padding: var(--space-xl);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 用户选择页面 - 欢迎页样式 */
.welcome-user-page, .user-select-page {
    padding: 40px 20px;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.welcome-user-page .welcome-icon {
    font-size: 80px;
    margin-bottom: 20px;
}

.user-form {
    max-width: 300px;
    margin: 30px auto;
}

.user-form .user-name-input {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);
    text-align: center;
    margin-bottom: 20px;
}

.avatar-select {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
}

.avatar-option {
    width: 60px;
    height: 60px;
    font-size: 36px;
    border-radius: 50%;
    background: white;
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.avatar-option:hover {
    transform: scale(1.1);
}

.avatar-option.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.create-user-btn, .add-user-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

.add-user-btn {
    background: var(--bg-card);
    color: var(--text-primary);
    margin-top: 20px;
}

.user-list {
    margin: 24px 0;
}

.user-card {
    display: flex;
    align-items: center;
    padding: 20px;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
}

.user-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.user-card .user-avatar {
    font-size: 40px;
    margin-right: 16px;
}

.user-card .user-name {
    font-size: 20px;
    font-weight: 600;
}

.page-subtitle {
    color: var(--text-secondary);
    font-size: var(--font-md);
    margin-top: var(--space-sm);
}

.current-user-info {
    color: var(--text-secondary);
    font-size: var(--font-sm);
    margin-bottom: var(--space-md);
}

.home-page {
    min-height: calc(100vh - var(--nav-height));
    background: var(--bg-primary);
}

/* ==================== 学科切换栏 ==================== */
.subject-tabs {
    display: flex;
    background: white;
    border-radius: 16px;
    padding: 4px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.subject-tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 8px;
    border: none;
    background: transparent;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #636E72;
    cursor: pointer;
    transition: all 0.2s ease;
}

.subject-tab:active {
    transform: scale(0.95);
}

.subject-tab.active {
    background: var(--current-subject-color);
    color: white;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

.subject-tab .tab-icon {
    font-size: 18px;
}

/* 学科专属颜色 */
.subject-tab[data-subject="english"].active {
    background: var(--subject-english);
    box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
}

.subject-tab[data-subject="math"].active {
    background: var(--subject-math);
    box-shadow: 0 2px 8px rgba(155, 89, 182, 0.3);
}

.subject-tab[data-subject="chinese"].active {
    background: var(--subject-chinese);
    box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
}

/* 学科内容区 */
.subject-content {
    display: none;
}

.subject-content.active {
    display: block;
}

/* 数学模块卡片 */
.math-modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 16px;
}

.math-module-card {
    background: white;
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    border: 2px solid transparent;
}

.math-module-card:active {
    transform: scale(0.95);
}

.math-module-card:hover {
    border-color: #4A90D9;
}

.math-module-card .math-icon {
    font-size: 32px;
    margin-bottom: 8px;
}

.math-module-card h3 {
    font-size: 16px;
    color: #2D3436;
    margin-bottom: 4px;
}

.math-module-card .math-desc {
    font-size: 12px;
    color: #636E72;
}

/* 语文模块卡片 */
.chinese-modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 16px;
}

.chinese-module-card {
    background: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%);
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    color: white;
}

.chinese-module-card:active {
    transform: scale(0.95);
}

.chinese-module-card .chinese-icon {
    font-size: 32px;
    margin-bottom: 8px;
}

.chinese-module-card h3 {
    font-size: 16px;
    margin-bottom: 4px;
}

.chinese-module-card .chinese-desc {
    font-size: 12px;
    opacity: 0.9;
}

/* 敬请期待提示 */
.coming-soon {
    text-align: center;
    padding: 40px 20px;
    background: white;
    border-radius: 16px;
    margin-top: 16px;
}

.coming-soon .soon-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

.coming-soon h3 {
    font-size: 18px;
    color: #2D3436;
    margin-bottom: 8px;
}

.coming-soon p {
    font-size: 14px;
    color: #636E72;
}


.welcome-page {
    text-align: center;
    padding: var(--space-xl);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
}

.welcome-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.welcome-page h1 {
    color: white;
    font-size: var(--font-xxl);
    margin-bottom: var(--space-sm);
}

.welcome-page p {
    color: rgba(255,255,255,0.9);
    font-size: var(--font-lg);
    margin-bottom: var(--space-xl);
}

.user-avatar-select {
    display: flex;
    justify-content: center;
    gap: var(--space-md);
    margin-bottom: var(--space-xl);
    flex-wrap: wrap;
}

.avatar-option {
    width: 60px;
    height: 60px;
    font-size: 36px;
    border-radius: 50%;
    background: white;
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.avatar-option:hover {
    transform: scale(1.1);
}

.avatar-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 230, 109, 0.5);
}

.user-name-input {
    width: 100%;
    max-width: 280px;
    padding: var(--space-md) var(--space-lg);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    text-align: center;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-md);
}

.start-btn {
    width: 100%;
    max-width: 280px;
    padding: var(--space-lg) var(--space-xl);
    background: var(--accent);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-xl);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: all 0.2s;
}

.start-btn:active {
    transform: scale(0.96);
}

/* 用户选择页面 */
.user-select-page {
    padding: var(--space-xl);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.user-select-page h1 {
    text-align: center;
    font-size: var(--font-xl);
    color: var(--text-primary);
    margin-bottom: var(--space-xl);
}

.user-list {
    margin-bottom: var(--space-xl);
}

.user-card {
    display: flex;
    align-items: center;
    padding: var(--space-lg);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-md);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
}

.user-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.user-card:active {
    transform: scale(0.98);
}

.user-avatar-large {
    font-size: 48px;
    margin-right: var(--space-lg);
}

.user-info {
    flex: 1;
}

.user-name-large {
    font-size: var(--font-xl);
    font-weight: 600;
    color: var(--text-primary);
}

.user-stats {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-top: var(--space-xs);
}

.add-user-btn {
    width: 100%;
    padding: var(--space-lg);
    background: var(--bg-card);
    border: 2px dashed var(--text-light);
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}

.add-user-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}

/* 当前用户指示器 */
.current-user-indicator {
    display: flex;
    align-items: center;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
}

.current-user-indicator:hover {
    background: var(--bg-primary);
}

/* 头部切换区域 */
.header-switches {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
}

.header-switches > div {
    flex: 1;
}

.current-user-indicator {
    display: flex;
    align-items: center;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
}

.current-user-indicator:hover {
    background: var(--bg-primary);
}

.current-user-avatar {
    font-size: 24px;
    margin-right: var(--space-sm);
}

.current-user-name {
    font-size: var(--font-sm);
    font-weight: 600;
}

/* 年级选择器 */
.grade-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: var(--space-sm) var(--space-md);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
    color: white;
    font-weight: 600;
}

.grade-indicator:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

.grade-indicator:active {
    transform: scale(0.98);
}

.grade-indicator .grade-icon {
    font-size: 20px;
}

/* 年级选择页面 */
.grade-select-page {
    padding: var(--space-md);
}

.grade-select-page h1 {
    text-align: center;
    font-size: var(--font-xl);
    margin-bottom: var(--space-xl);
    color: var(--text-primary);
}

.grade-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.grade-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-lg);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
    border: 2px solid transparent;
}

.grade-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--primary-light);
}

.grade-card:active {
    transform: scale(0.98);
}

.grade-card.current {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.08);
}

.grade-card .grade-info {
    display: flex;
    flex-direction: column;
}

.grade-card .grade-name {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.grade-card .grade-modules {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.grade-card .grade-check {
    font-size: 24px;
    color: var(--primary);
    opacity: 0;
    transition: opacity 0.2s;
}

.grade-card.current .grade-check {
    opacity: 1;
}

/* ==================== 导航栏 ==================== */
#nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--nav-height);
    background: var(--bg-secondary);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
    padding: 0 var(--space-md);
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-sm) var(--space-md);
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
    cursor: pointer;
    background: none;
    border: none;
    font-size: var(--font-xs);
    min-width: 60px;
}

.nav-item .nav-icon {
    font-size: 24px;
    margin-bottom: 2px;
    transition: transform 0.2s ease;
}

.nav-item span:last-child {
    font-size: 11px;
}

.nav-item.active {
    color: var(--primary);
}

.nav-item.active .nav-icon {
    transform: scale(1.1);
}

/* ==================== 答题选项样式 ==================== */
.quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
    margin-top: var(--space-lg);
}

.quiz-option {
    padding: var(--space-lg);
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    box-shadow: var(--shadow-sm);
}

.quiz-option:hover {
    border-color: var(--primary-light);
}

.quiz-option:active {
    transform: scale(0.96);
}

.quiz-option.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.quiz-option.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.1);
}

.quiz-option.wrong {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.1);
}

/* 答题反馈 */
.quiz-feedback {
    text-align: center;
    padding: var(--space-lg);
    margin-top: var(--space-lg);
    border-radius: var(--radius-lg);
}

.quiz-feedback.correct {
    background: linear-gradient(135deg, #E8F8F5 0%, #D4EDDA 100%);
    color: var(--success);
}

.quiz-feedback.wrong {
    background: linear-gradient(135deg, #FFF5F5 0%, #FFE8E8 100%);
    color: var(--danger);
}

.quiz-feedback .feedback-icon {
    font-size: 48px;
    margin-bottom: var(--space-sm);
}

.quiz-feedback .feedback-text {
    font-size: var(--font-lg);
    font-weight: 600;
}

/* ==================== 新答题系统样式 ==================== */

/* 答题卡片 */
.exercise-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    box-shadow: var(--shadow-md);
}

/* 题目元信息 */
.question-meta {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

/* 难度标签 */
.question-type-badge {
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    font-weight: 600;
}

.question-type-badge.basic {
    background: #E8F5E9;
    color: #2E7D32;
}

.question-type-badge.improved {
    background: #FFF3E0;
    color: #E65100;
}

.question-type-badge.challenge {
    background: #FCE4EC;
    color: #C2185B;
}

/* 答题输入框 */
.exercise-input {
    width: 100%;
    padding: var(--space-md) var(--space-lg);
    font-size: var(--font-lg);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-md);
    text-align: center;
    transition: border-color 0.2s;
}

.exercise-input:focus {
    outline: none;
    border-color: var(--primary);
}

.exercise-input:disabled {
    background: var(--bg-primary);
    cursor: not-allowed;
}

/* 答题选项（新样式） */
.exercise-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
    margin-top: var(--space-lg);
}

.exercise-option-btn {
    display: flex;
    align-items: center;
    padding: var(--space-md) var(--space-lg);
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-md);
    font-size: var(--font-lg);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
}

/* ==================== 答题反馈图标 ==================== */
.answer-feedback {
    font-size: 24px;
    margin-left: 8px;
    display: inline-block;
    vertical-align: middle;
}

.answer-feedback.correct {
    color: #4CAF50;
    animation: feedbackPopIn 0.3s ease-out;
}

.answer-feedback.wrong {
    color: #F44336;
    animation: feedbackPopIn 0.3s ease-out;
}

@keyframes feedbackPopIn {
    0% {
        transform: scale(0);
        opacity: 0;
    }
    50% {
        transform: scale(1.3);
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}

/* 选项按钮选中状态 */
.exercise-option-btn.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.15);
}

.exercise-option-btn.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.15);
}

.exercise-option-btn.wrong {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.15);
}


.exercise-option-btn:hover:not(.disabled) {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.05);
}

.exercise-option-btn:active:not(.disabled) {
    transform: scale(0.98);
}

.exercise-option-btn.disabled {
    cursor: not-allowed;
    opacity: 0.7;
}

.option-letter {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    border-radius: 50%;
    margin-right: var(--space-md);
    font-weight: 600;
    font-size: var(--font-md);
}

.option-text {
    flex: 1;
    text-align: left;
}

/* 讲解框 */
.explanation-box {
    background: linear-gradient(135deg, #FFF9C4 0%, #FFECB3 100%);
    border-radius: var(--radius-md);
    padding: var(--space-md);
    margin-top: var(--space-lg);
    border-left: 4px solid #FFC107;
}

/* 题目标签 */
.question-type-label {
    background: var(--secondary);
    color: white;
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    display: inline-block;
    margin-bottom: var(--space-md);
}

/* 大播放按钮 */
.audio-btn-large {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    color: white;
    border: none;
    padding: 16px 32px;
    border-radius: var(--radius-lg);
    font-size: 18px;
    cursor: pointer;
    margin: 16px 0;
    box-shadow: var(--shadow-md);
    transition: all 0.2s;
}

.audio-btn-large:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.audio-btn-large:active {
    transform: scale(0.98);
}

/* 高亮字母样式 */
.highlight-letters {
    color: var(--danger);
    text-decoration: underline;
    font-weight: bold;
}

.word-highlighted {
    font-size: var(--font-giant);
    font-weight: 700;
    color: var(--primary);
    margin: var(--space-lg) 0;
}

.word-highlighted .highlight {
    color: var(--danger);
    text-decoration: underline;
}

/* 最小对立体辨析样式 */
.minimal-pair-container {
    display: flex;
    justify-content: center;
    gap: var(--space-xl);
    margin: var(--space-lg) 0;
}

.minimal-pair-word {
    font-size: var(--font-xxl);
    font-weight: 700;
    color: var(--primary);
    background: var(--bg-card);
    padding: var(--space-lg) var(--space-xl);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    cursor: pointer;
    transition: all 0.2s;
    min-width: 120px;
    text-align: center;
    border: 3px solid transparent;
}

.minimal-pair-word:hover {
    transform: scale(1.05);
    box-shadow: var(--shadow-lg);
}

.minimal-pair-word:active,
.minimal-pair-word.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.minimal-pair-word.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.1);
    color: var(--success);
}

.minimal-pair-word.wrong {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.1);
    color: var(--danger);
}

.phonetic-question-tip {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-primary);
    border-radius: var(--radius-md);
}

/* 听音按钮 */
.play-audio-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-md) var(--space-xl);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-md);
    transition: all 0.2s;
}

.play-audio-btn:active {
    transform: scale(0.96);
}

/* 单词卡片 */
.word-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    text-align: center;
    box-shadow: var(--shadow-md);
    margin-bottom: var(--space-xl);
}

.word-main {
    margin-bottom: var(--space-xl);
}

.word-text {
    font-size: var(--font-giant);
    font-weight: 700;
    color: var(--primary);
    margin-bottom: var(--space-sm);
    letter-spacing: 2px;
}

.word-phonetic {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-sm);
}

.word-chinese {
    font-size: var(--font-xl);
    color: var(--text-primary);
}

.speak-btn {
    display: block;
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-md);
}

.speak-btn:active {
    transform: scale(0.95);
}

/* 熟练度按钮 */
.memory-buttons {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 16px 0;
}

.memory-btn {
    flex: 1;
    max-width: 110px;
    padding: 12px 8px;
    border-radius: 24px;
    border: 3px solid;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: white;
}

.memory-btn .emoji {
    font-size: 24px;
}

.memory-btn.strange {
    border-color: #e74c3c;
    color: #e74c3c;
}
.memory-btn.strange:hover {
    background: #fdf2f2;
}

.memory-btn.fuzzy {
    border-color: #f39c12;
    color: #f39c12;
}
.memory-btn.fuzzy:hover {
    background: #fefbf0;
}

.memory-btn.mastered {
    border-color: #27ae60;
    color: #27ae60;
}
.memory-btn.mastered:hover {
    background: #f0fdf4;
}

/* 三选一选项按钮 */
.word-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 16px 16px;
}

.word-option-btn {
    padding: 18px 20px;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 16px;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
}

.word-option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.05);
}

.word-option-btn:active:not(:disabled) {
    transform: scale(0.98);
}

.word-option-btn.correct {
    background: #d4edda;
    border-color: #27ae60;
    color: #27ae60;
}

.word-option-btn.wrong {
    background: #f8d7da;
    border-color: #e74c3c;
    color: #e74c3c;
}

/* 反馈提示 */
.feedback-hint {
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    margin: 8px 16px;
}

.feedback-hint.correct {
    background: #d4edda;
    color: #27ae60;
}

.feedback-hint.wrong {
    background: #f8d7da;
    color: #e74c3c;
}

/* 显示翻译按钮 */
.show-answer-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 16px;
}

.show-answer-btn:active {
    transform: scale(0.98);
}

/* 翻译显示区域 */
.translation-display {
    font-size: var(--font-xxl);
    color: var(--text-primary);
    padding: 16px;
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    border-radius: var(--radius-lg);
    margin-top: 16px;
    font-weight: 500;
}

/* 单词学习页容器 */
.vocabulary-page .word-card {
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 词组卡片样式 */
.word-card.phrase-card {
    background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
    border-left: 4px solid #4CAF50;
}

.word-text.phrase-text {
    color: #2E7D32;
    font-size: var(--font-xl);
}

/* 类型标签 */
.type-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: var(--font-xs);
    font-weight: 600;
    margin-right: 8px;
}

.type-tag.word {
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
    color: white;
}

.type-tag.phrase {
    background: linear-gradient(135deg, #66BB6A 0%, #43A047 100%);
    color: white;
}

/* 词汇预览标签 */
.vocab-tag.phrase-tag {
    background: linear-gradient(135deg, #C8E6C9 0%, #A5D6A7 100%);
    color: #2E7D32;
    border: 1px solid #81C784;
}

/* 教材音标相关样式 */
.phonetic-rule-info {
    background: #E3F2FD;
    padding: 12px;
    border-radius: var(--radius-md);
    margin-top: 12px;
    font-size: var(--font-sm);
}

.phonetic-rule-info .rule-label {
    color: #1565C0;
    font-weight: 600;
}

.phonetic-rule-info .rule-desc {
    color: #1976D2;
    margin-left: 8px;
}

.section-tag.textbook-tag {
    background: linear-gradient(135deg, #9575CD 0%, #7E57C2 100%);
    color: white;
}

.phonetic-selected-summary {
    background: #F5F5F5;
    padding: 16px;
    border-radius: var(--radius-md);
    margin: 16px 0;
}

.vocab-tag.selected {
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
    color: white;
    border-color: var(--primary);
}



/* 复习卡片页 */
.review-card-page {
    padding: var(--space-sm);
}

.review-word-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    text-align: center;
    box-shadow: var(--shadow-md);
    margin-bottom: var(--space-xl);
}

.word-display {
    margin-bottom: var(--space-xl);
}

.reveal-area {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.reveal-btn {
    display: inline-block;
    padding: var(--space-lg) var(--space-xxl);
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-md);
}

.answer-buttons {
    text-align: center;
}

.answer-prompt {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-lg);
}

.answer-btns {
    display: flex;
    gap: var(--space-md);
    justify-content: center;
}

.answer-btn {
    padding: var(--space-lg) var(--space-xl);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.answer-btn.wrong {
    background: var(--danger);
    color: white;
}

.answer-btn.correct {
    background: var(--success);
    color: white;
}

/* 完成页 */
.complete-page {
    padding: var(--space-xl);
    text-align: center;
}

.complete-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
    animation: celebrate 0.5s ease;
}

@keyframes celebrate {
    0% { transform: scale(0); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

.complete-page h1 {
    font-size: var(--font-xxl);
    color: var(--primary);
    margin-bottom: var(--space-sm);
}

.complete-message {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-xl);
}

.complete-stats {
    display: flex;
    justify-content: center;
    gap: var(--space-xl);
    margin-bottom: var(--space-xl);
}

.complete-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.complete-stat .stat-num {
    font-size: var(--font-xxl);
    font-weight: 700;
    color: var(--primary);
}

.complete-stat .stat-label {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.complete-actions {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

/* ==================== 其他样式保持不变 ==================== */

/* 应用容器 */
.app-container {
    max-width: 480px;
    margin: 0 auto;
    padding: var(--space-md);
}

/* 欢迎卡片 */
.welcome-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    color: var(--text-white);
    text-align: center;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-lg);
}

.welcome-subtitle {
    opacity: 0.9;
    font-size: var(--font-sm);
}

.stats-row {
    display: flex;
    justify-content: space-around;
    margin-top: var(--space-lg);
}

.stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.stat-number {
    font-size: var(--font-xxl);
    font-weight: 700;
}

.stat-label {
    font-size: var(--font-xs);
    opacity: 0.9;
}

/* 复习提醒 */
.review-reminder {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    display: flex;
    align-items: center;
    margin-bottom: var(--space-lg);
    cursor: pointer;
    transition: transform 0.2s ease;
    box-shadow: var(--shadow-md);
}

.review-reminder:active {
    transform: scale(0.98);
}

.reminder-icon {
    font-size: 36px;
    margin-right: var(--space-md);
}

.reminder-content {
    flex: 1;
    color: var(--text-white);
}

.reminder-content strong {
    font-size: var(--font-md);
}

.reminder-content p {
    font-size: var(--font-sm);
    opacity: 0.9;
}

.reminder-arrow {
    font-size: 24px;
    color: var(--text-white);
}

/* 区块标题 */
.section-title {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: var(--font-lg);
    font-weight: 600;
    margin-bottom: var(--space-md);
    color: var(--text-primary);
}

/* 模块卡片网格 */
.modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.module-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
}

.module-card:active {
    transform: scale(0.96);
}

.module-card:hover {
    border-color: var(--primary-light);
}

.module-icon {
    font-size: 40px;
    margin-bottom: var(--space-sm);
}

.module-card h3 {
    font-size: var(--font-md);
    margin-bottom: var(--space-xs);
}

.module-name-cn {
    font-size: var(--font-xs);
    color: var(--text-secondary);
    margin-bottom: var(--space-sm);
}

.module-units {
    font-size: var(--font-xs);
    color: var(--text-light);
}

/* 快速操作按钮 */
.quick-actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

.quick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-lg);
    border-radius: var(--radius-lg);
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: var(--font-md);
    font-weight: 600;
}

.quick-btn.primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: var(--text-primary);
}

.quick-btn.secondary {
    background: linear-gradient(135deg, var(--info) 0%, #5BA4F5 100%);
    color: var(--text-white);
}

.quick-icon {
    font-size: 28px;
    margin-bottom: var(--space-xs);
}

/* 返回按钮 */
.back-btn {
    background: var(--bg-card);
    border: none;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.back-btn:active {
    transform: scale(0.96);
}

/* 学习头部 */
.learning-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-lg);
}

.learning-progress {
    flex: 1;
    margin: 0 var(--space-md);
}

.progress-bar {
    height: 8px;
    background: #E8E8E8;
    border-radius: 4px;
    overflow: hidden;
}

.progress-text {
    font-size: var(--font-xs);
    color: var(--text-secondary);
    text-align: center;
    display: block;
    margin-top: var(--space-xs);
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: 3px;
    transition: width 0.3s ease;
}

.fav-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: var(--space-sm);
}

.fav-btn:active {
    transform: scale(1.2);
}

.word-chinese.hidden {
    visibility: hidden;
}

.word-chinese.hidden::after {
    content: '?????';
    visibility: visible;
    color: #ccc;
}

/* 按钮样式 */
.action-btn {
    padding: var(--space-md) var(--space-lg);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.action-btn:active {

}

.action-btn.primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);

    box-shadow: var(--shadow-md);
}

.action-btn.secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
}

.card-actions {
    display: flex;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.card-actions .action-btn {
    flex: 1;
}

.card-info {
    text-align: center;
}

.status-tag {
    display: inline-block;
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    background: var(--bg-primary);
    color: var(--text-secondary);
}

.status-tag.new {
    background: var(--info);
    color: white;
}

.status-tag.mastered {
    background: var(--success);
    color: white;
}

.status-tag.learning {
    background: var(--warning);
    color: var(--text-primary);
}

/* 单元卡片 */
.unit-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.unit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    margin-bottom: var(--space-sm);
}

.unit-info {
    display: flex;
    align-items: center;
    gap: var(--space-md);
}

.unit-number {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: var(--font-md);
}

.unit-text h3 {
    font-size: var(--font-md);
    margin-bottom: 2px;
}

.unit-text p {
    font-size: var(--font-xs);
    color: var(--text-secondary);
}

.unit-arrow {
    font-size: 24px;
    color: var(--text-light);
}

.unit-progress-bar {
    height: 6px;
    background: #E8E8E8;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: var(--space-xs);
}

.unit-progress-text {
    font-size: var(--font-xs);
    color: var(--text-light);
    text-align: right;
    margin-bottom: var(--space-sm);
}

.unit-actions {
    display: flex;
    gap: var(--space-sm);
    justify-content: space-between;
}

.unit-action-btn {
    flex: 1;
    padding: var(--space-sm);
    border: none;
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: var(--font-xs);
    cursor: pointer;
    transition: all 0.2s ease;
}

.unit-action-btn:active {
    transform: scale(0.95);
    background: var(--primary-light);
    color: white;
}

/* 学习选项卡片 */
.learning-option-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.learning-option-card:active {
    transform: scale(0.98);
}

.option-icon {
    font-size: 36px;
    margin-right: var(--space-md);
}

.option-content {
    flex: 1;
}

.option-content h3 {
    font-size: var(--font-md);
    margin-bottom: 2px;
}

.option-content p {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.option-arrow {
    font-size: 24px;
    color: var(--text-light);
}

/* 复习页面 */
.review-page {
    padding: var(--space-sm);
}

.review-page.empty {
    text-align: center;
    padding: var(--space-xxl) var(--space-md);
}

.empty-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
}

.empty-hint {
    color: var(--text-light);
    margin-top: var(--space-sm);
}

.review-stats {
    display: flex;
    justify-content: center;
    gap: var(--space-md);
    margin: var(--space-xl) 0;
}

.stat-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md) var(--space-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.stat-card.large {
    padding: var(--space-lg) var(--space-xl);
}

.stat-icon {
    font-size: 24px;
    margin-bottom: var(--space-xs);
}

.stat-card .stat-num {
    font-size: var(--font-xxl);
    font-weight: 700;
    color: var(--primary);
}

.stat-card .stat-label {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.start-review-btn {
    display: block;
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-xl);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    margin-bottom: var(--space-xl);
}

.start-select-btn {
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-xl);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    position: fixed;
    bottom: 85px;
    left: 16px;
    right: 16px;
    z-index: 50;
}

.start-select-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.start-select-btn:active:not(:disabled) {
    transform: scale(0.98);
}

/* 预览标签 */
.preview-tags {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
}

.preview-tag {
    background: var(--bg-primary);
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
}

.preview-tag.mastered {
    background: var(--success);
    color: white;
}

.preview-tag.learning {
    background: var(--warning);
    color: var(--text-primary);
}

.preview-tag.new {
    background: var(--info);
    color: white;
}

/* 设置页面 */
.settings-page {
    padding: var(--space-sm);
}

.settings-section {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.settings-section h3 {
    font-size: var(--font-md);
    margin-bottom: var(--space-md);
    color: var(--text-primary);
}

.setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md) 0;
    border-bottom: 1px solid var(--bg-primary);
}

.setting-item:last-child {
    border-bottom: none;
}

.setting-item label {
    font-size: var(--font-md);
    color: var(--text-primary);
}

.speed-control {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
}

.speed-btn {
    padding: var(--space-xs) var(--space-sm);
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    cursor: pointer;
}

.speed-value {
    min-width: 50px;
    text-align: center;
    font-weight: 600;
}

.speed-slider {
    width: 100%;
    margin-top: var(--space-sm);
    -webkit-appearance: none;
    height: 8px;
    background: linear-gradient(90deg, var(--secondary) 0%, var(--primary) 100%);
    border-radius: 4px;
    outline: none;
}

.speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: var(--shadow-md);
}

.setting-select {
    padding: var(--space-sm) var(--space-md);
    border: 1px solid var(--bg-primary);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    background: white;
}

.setting-btn {
    display: block;
    width: 100%;
    padding: var(--space-md);
    background: var(--bg-primary);
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--font-md);
    color: var(--text-primary);
    cursor: pointer;
    margin-bottom: var(--space-sm);
    transition: all 0.2s ease;
}

.setting-btn:active {
    transform: scale(0.98);
}

.setting-btn.danger {
    background: #FFE8E8;
    color: var(--danger);
}

.about-text {
    text-align: center;
    color: var(--text-secondary);
    font-size: var(--font-sm);
    line-height: 1.8;
}

/* 模态框 */
#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: var(--space-md);
}

#modal.show {
    display: flex;
}

.modal-content {
    background: white;
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    max-width: 320px;
    width: 100%;
    text-align: center;
}

.modal-content h3 {
    font-size: var(--font-xl);
    margin-bottom: var(--space-md);
}

.modal-content p {
    color: var(--text-secondary);
    margin-bottom: var(--space-xl);
}

.modal-buttons {
    display: flex;
    gap: var(--space-md);
    justify-content: center;
}

.modal-btn {
    padding: var(--space-md) var(--space-xl);
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
}

.modal-btn.primary {
    background: var(--primary);
    color: white;
}

.modal-btn.secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
}

.modal-btn.danger {
    background: var(--danger);
    color: white;
}

/* 提示框 */
#toast {
    position: fixed;
    bottom: calc(var(--nav-height) + var(--space-lg));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-primary);
    color: white;
    padding: var(--space-md) var(--space-xl);
    border-radius: var(--radius-lg);
    font-size: var(--font-sm);
    z-index: 1001;
    opacity: 0;
    transition: all 0.3s ease;
}

#toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* 随身听卡片 */
.morning-listen-card {
    background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    display: flex;
    align-items: center;
    margin-bottom: var(--space-lg);
    cursor: pointer;
    transition: transform 0.2s ease;
    box-shadow: var(--shadow-md);
}

.morning-listen-card:active {
    transform: scale(0.98);
}

.morning-icon {
    font-size: 40px;
    margin-right: var(--space-md);
}

.morning-content {
    flex: 1;
    color: var(--text-primary);
}

.morning-content strong {
    font-size: var(--font-lg);
}

.morning-content p {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.morning-arrow {
    font-size: 24px;
}

/* 随身听选择页 */
.unit-select-page, .word-select-page {
    padding: var(--space-md);
    padding-bottom: 160px;
}

/* 底部按钮间距 - 防止被导航栏遮挡 */
.has-bottom-action {
    padding-bottom: 80px !important;
}

.select-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-lg);
}

.select-title {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-primary);
}

.module-section {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.module-select-header {
    display: flex;
    align-items: center;
    margin-bottom: var(--space-md);
}

.module-checkbox {
    width: 24px;
    height: 24px;
    margin-right: var(--space-md);
    cursor: pointer;
    accent-color: var(--primary);
}

.module-select-title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--module1);
}

.module-select-title.module2 { color: var(--module2); }
.module-select-title.module3 { color: var(--module3); }
.module-select-title.module4 { color: var(--accent-dark); }

.unit-select-item {
    display: flex;
    align-items: center;
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--bg-primary);
    cursor: pointer;
}

.unit-select-item:last-child {
    border-bottom: none;
}

.unit-checkbox {
    width: 20px;
    height: 20px;
    margin-right: var(--space-md);
    cursor: pointer;
    accent-color: var(--primary);
}

.unit-info {
    flex: 1;
}

.unit-info .unit-name {
    font-size: var(--font-md);
    color: var(--text-primary);
}

.unit-info .unit-words {
    font-size: var(--font-xs);
    color: var(--text-secondary);
}

.word-select-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-md);
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
}

.order-toggle {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    cursor: pointer;
    font-size: var(--font-sm);
    color: var(--text-primary);
}

.order-toggle select {
    padding: var(--space-xs) var(--space-sm);
    border: 1px solid var(--bg-primary);
    border-radius: var(--radius-sm);
    font-size: var(--font-sm);
    cursor: pointer;
}

.select-all-btn {
    padding: var(--space-xs) var(--space-md);
    background: var(--info);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: var(--font-sm);
    cursor: pointer;
}

.select-all-btn.unselected {
    background: var(--text-light);
}

.word-list {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.word-item {
    display: flex;
    align-items: center;
    padding: var(--space-md) 0;
    border-bottom: 1px solid var(--bg-primary);
    cursor: pointer;
}

.word-item:last-child {
    border-bottom: none;
}

.word-checkbox {
    width: 20px;
    height: 20px;
    margin-right: var(--space-md);
    cursor: pointer;
    accent-color: var(--primary);
}

.word-main-info {
    flex: 1;
}

.word-english {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--primary);
}

.word-details {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-top: 2px;
}

.word-chinese-preview {
    font-size: var(--font-sm);
    color: var(--text-primary);
    margin-left: var(--space-sm);
}

.selected-count {
    text-align: center;
    padding: var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-md);
    font-size: var(--font-md);
    color: var(--text-secondary);
}

.selected-count strong {
    color: var(--primary);
    font-size: var(--font-lg);
}

/* 播放页 */
.listening-page {
    text-align: center;
    padding-top: var(--space-xl);
}

.listening-controls-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: var(--space-xl);
}

.stop-btn, .pause-btn {
    padding: var(--space-md) var(--space-lg);
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--font-md);
    cursor: pointer;
    transition: all 0.2s ease;
}

.stop-btn {
    background: var(--bg-card);
    color: var(--text-primary);
}

.pause-btn {
    background: var(--secondary);
    color: white;
}

.pause-btn.paused {
    background: var(--primary);
}

.stop-btn:active, .pause-btn:active {
    transform: scale(0.95);
}

.current-word-display {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    margin: var(--space-lg) 0;
    box-shadow: var(--shadow-lg);
}

.current-word-display .word-text {
    font-size: 56px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: var(--space-sm);
}

.current-word-display .word-phonetic {
    font-size: var(--font-xl);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

.current-word-display .word-chinese {
    font-size: var(--font-xxl);
    color: var(--text-primary);
    margin-bottom: var(--space-lg);
}

.current-word-display .word-example {
    font-size: var(--font-md);
    color: var(--text-secondary);
    font-style: italic;
    padding-top: var(--space-md);
    border-top: 1px dashed var(--bg-primary);
}

.playing-progress {
    color: var(--text-secondary);
    font-size: var(--font-lg);
    margin-bottom: var(--space-lg);
}

.playing-progress strong {
    color: var(--primary);
    font-size: var(--font-xl);
}

.playing-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    background: var(--success);
    border-radius: 50%;
    margin-right: var(--space-sm);
    animation: pulse 1s infinite;
}

.playing-indicator.paused {
    background: var(--warning);
    animation: none;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* 动画效果 */
.fade-in {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 学习日历卡片 */
.calendar-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.calendar-items {
    display: flex;
    justify-content: space-around;
    margin-top: var(--space-md);
}

.calendar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
}

.calendar-label {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.calendar-days {
    font-size: var(--font-xl);
    font-weight: 700;
    color: var(--primary);
}

.calendar-days.urgent {
    color: var(--danger);
}

.calendar-days.summer {
    color: var(--secondary);
}

/* 响应式 */
@media (min-width: 768px) {
    :root {
        --font-giant: 64px;
    }
    
    .modules-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 360px) {
    :root {
        --font-giant: 40px;
        --font-xxl: 28px;
    }
}

.phonetic-main-page, .phonetic-select-page, .phonetic-practice-page {
    padding: var(--space-md);
    padding-bottom: 160px;
}

.phonetic-type-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-md);
    width: 100%;
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all 0.2s;
}

.phonetic-type-btn:hover {
    border-color: var(--primary);
    transform: scale(1.02);
}

.phonetic-type-btn .icon {
    font-size: 40px;
}

.phonetic-type-btn .text {
    text-align: left;
}

.phonetic-type-btn .title {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-primary);
}

.phonetic-type-btn .desc {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.phonetic-category {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.phonetic-category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
}

.phonetic-category-title {
    font-size: var(--font-lg);
    font-weight: 600;
}

.phonetic-category-count {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.phonetic-category-toggle {
    transition: transform 0.3s;
}

.phonetic-category-toggle.collapsed {
    transform: rotate(-90deg);
}

.phonetic-sound-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-sm);
    margin-top: var(--space-md);
}

.phonetic-sound-item {
    background: var(--bg-primary);
    border-radius: var(--radius-md);
    padding: var(--space-sm);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.phonetic-sound-item:hover {
    transform: scale(1.05);
}

.phonetic-sound-item.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

.phonetic-symbol {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 2px;
}

.phonetic-example {
    font-size: var(--font-xs);
    color: var(--text-secondary);
}

.phonetic-selected-summary {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-top: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.phonetic-selected-count {
    font-size: var(--font-lg);
    font-weight: 600;
    text-align: center;
    margin-bottom: var(--space-md);
}

.phonetic-selected-list {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    justify-content: center;
}

.phonetic-selected-tag {
    background: var(--primary);
    color: white;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    font-size: var(--font-sm);
}

.phonetic-practice-btn {
    width: 100%;
    padding: var(--space-lg);
    margin-top: var(--space-md);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    position: fixed;
    bottom: 85px;
    left: 16px;
    right: 16px;
    z-index: 50;
    box-shadow: var(--shadow-lg);
}

/* 音标统一选择页面样式 */
.phonetic-selection-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.selected-label {
    font-size: var(--font-md);
    color: var(--text-primary);
}

.selected-label strong {
    color: var(--primary);
}

.select-all-btn {
    padding: var(--space-sm) var(--space-md);
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    cursor: pointer;
}

.phonetic-section {
    margin-bottom: var(--space-lg);
}

.phonetic-section-header {
    display: flex;
    align-items: center;
    margin-bottom: var(--space-md);
    gap: var(--space-sm);
}

.section-tag {
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    font-weight: 600;
    color: white;
}

.vowel-tag {
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
}

.consonant-tag {
    background: linear-gradient(135deg, #4ECDC4 0%, #7EDED7 100%);
}

.section-name {
    flex: 1;
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-primary);
}

.category-select-btn {
    padding: 4px 10px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 1px solid var(--text-light);
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    cursor: pointer;
}

.phonetic-category-new {
    margin-bottom: var(--space-md);
}

.phonetic-category-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-primary);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-sm);
}

.category-name {
    font-size: var(--font-sm);
    font-weight: 600;
    color: var(--text-primary);
}

.cat-select-btn {
    padding: 2px 8px;
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    cursor: pointer;
}

.phonetic-sound-item.selected {
    border-color: var(--info);
    background: rgba(116, 185, 255, 0.15);
    box-shadow: 0 0 0 2px var(--info);
}

.phonetic-question-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    text-align: center;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-md);
}

.phonetic-question-type {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

.phonetic-audio-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border: none;
    font-size: 40px;
    cursor: pointer;
    margin: 0 auto var(--space-lg);
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.phonetic-audio-btn:active {
    transform: scale(0.95);
}

.phonetic-audio-btn.playing {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.phonetic-play-hint {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

.phonetic-word-display {
    font-size: var(--font-xxl);
    font-weight: 600;
    color: var(--primary);
    margin-top: var(--space-md);
}

.phonetic-options-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

.phonetic-option {
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    font-size: var(--font-lg);
    cursor: pointer;
    transition: all 0.2s;
}

.phonetic-option:hover {
    border-color: var(--primary);
}

.phonetic-option.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.1);
}

.phonetic-option.wrong {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.1);
}

.phonetic-option.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
}

/* ==================== 听音拼词题型样式 ==================== */
.phonetic-spell-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-lg);
}

.phonetic-spell-hint {
    font-size: var(--font-md);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
}

.phonetic-letter-pool {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: var(--space-sm);
    min-height: 60px;
    padding: var(--space-md);
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-md);
}

.phonetic-letter-block {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-xl);
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
    text-transform: uppercase;
}

.phonetic-letter-block:hover {
    transform: scale(1.1);
    box-shadow: var(--shadow-md);
}

.phonetic-letter-block:active {
    transform: scale(0.95);
}

.phonetic-letter-block.used {
    background: var(--bg-primary);
    color: var(--text-light);
    cursor: default;
    opacity: 0.5;
}

.phonetic-letter-block.used:hover {
    transform: none;
    box-shadow: var(--shadow-sm);
}

.phonetic-answer-area {
    display: flex;
    justify-content: center;
    gap: var(--space-sm);
    min-height: 60px;
    padding: var(--space-md);
    background: rgba(255, 107, 107, 0.1);
    border: 2px dashed var(--primary);
    border-radius: var(--radius-lg);
    min-width: 200px;
}

.phonetic-answer-slot {
    width: 50px;
    height: 50px;
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-xl);
    font-weight: 600;
    color: var(--text-primary);
}

.phonetic-answer-slot.filled {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border-color: transparent;
}

.phonetic-spell-hint-text {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    text-align: center;
}

/* ==================== 音标归类题型样式 ==================== */
.phonetic-sort-container {
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
}

.phonetic-basket-row {
    display: flex;
    justify-content: center;
    gap: var(--space-xl);
    flex-wrap: wrap;
}

.phonetic-basket {
    background: var(--bg-card);
    border: 3px solid var(--bg-primary);
    border-radius: var(--radius-xl);
    padding: var(--space-lg);
    min-width: 140px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
}

.phonetic-basket:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
}

.phonetic-basket.selected {
    border-color: var(--primary);
    background: rgba(255, 107, 107, 0.1);
    box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.3);
}

.phonetic-basket.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.1);
}

.phonetic-basket.wrong {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.1);
    animation: shake 0.5s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

.phonetic-basket-label {
    font-size: var(--font-xxl);
    font-weight: 600;
    color: var(--primary);
    margin-bottom: var(--space-sm);
}

.phonetic-basket-words {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: var(--space-xs);
    min-height: 40px;
}

.phonetic-sort-words {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: var(--space-sm);
    padding: var(--space-lg);
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
}

.phonetic-sort-word {
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border: 2px solid var(--bg-primary);
    border-radius: var(--radius-md);
    font-size: var(--font-lg);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.phonetic-sort-word:hover {
    border-color: var(--primary);
    transform: scale(1.05);
}

.phonetic-sort-word.selected {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

.phonetic-sort-word.placed {
    opacity: 0.4;
    cursor: default;
}

.phonetic-sort-word.placed:hover {
    transform: none;
    border-color: var(--bg-primary);
}

.phonetic-sort-instruction {
    text-align: center;
    font-size: var(--font-md);
    color: var(--text-secondary);
    padding: var(--space-md);
    background: rgba(78, 205, 196, 0.1);
    border-radius: var(--radius-lg);
}

.phonetic-sort-instruction strong {
    color: var(--secondary);
}

/* 单词移动动画 */
.phonetic-word-moving {
    animation: moveToBasket 0.3s ease-out;
}

@keyframes moveToBasket {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); }
    100% { transform: scale(0); opacity: 0; }
}

.phonetic-progress {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.phonetic-progress-bar {
    flex: 1;
    height: 8px;
    background: var(--bg-primary);
    border-radius: 4px;
    overflow: hidden;
}

.phonetic-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
    transition: width 0.3s;
}

.phonetic-progress-text {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    min-width: 50px;
}

.phonetic-feedback {
    text-align: center;
    padding: var(--space-lg);
    border-radius: var(--radius-lg);
    margin-top: var(--space-md);
}

.phonetic-feedback.correct {
    background: rgba(0, 184, 148, 0.1);
    color: var(--success);
}

.phonetic-feedback.wrong {
    background: rgba(225, 112, 85, 0.1);
    color: var(--danger);
}

.phonetic-feedback-icon {
    font-size: 48px;
    margin-bottom: var(--space-sm);
}

/* 下一题按钮样式 - 增大尺寸 */
.next-question-btn {
    padding: 16px 32px;
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, #4ECDC4, #44A08D);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    width: 100%;
    max-width: 300px;
    box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
    transition: all 0.2s;
}

.next-question-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(78, 205, 196, 0.4);
}

.next-question-btn:active {
    transform: translateY(0);
}

/* 选项音标详情样式 */
.option-phonetic-detail {
    margin-top: 16px;
    padding: 12px;
    background: rgba(0, 0, 0, 0.03);
    border-radius: 8px;
    font-size: 14px;
}

.option-phonetic-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    margin: 4px 0;
    border-radius: 6px;
    background: white;
}

.option-phonetic-item.correct {
    background: rgba(0, 184, 148, 0.15);
    border: 1px solid var(--success);
}

.option-phonetic-item.wrong {
    background: rgba(225, 112, 85, 0.1);
    border: 1px solid var(--danger);
}

.option-phonetic-item.selected-wrong {
    background: rgba(225, 112, 85, 0.2);
    border: 2px solid var(--danger);
}

.option-phonetic-label {
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    border-radius: 50%;
    background: var(--bg-primary);
    font-weight: 600;
    margin-right: 12px;
}

.option-phonetic-text {
    flex: 1;
}

.option-phonetic-tip {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 12px;
    padding: 10px;
    background: rgba(255, 230, 109, 0.2);
    border-radius: 6px;
    text-align: left;
}

/* 新题型样式 */
.phonetic-word-large {
    font-size: 48px;
    font-weight: bold;
    color: var(--text-primary);
    margin: var(--space-lg) 0;
}

.phonetic-symbol-large {
    font-size: 56px;
    font-weight: bold;
    color: var(--primary);
    margin: var(--space-lg) 0;
}

.phonetic-blank-word {
    font-size: 48px;
    font-weight: bold;
    color: var(--text-primary);
    margin: var(--space-lg) 0;
    letter-spacing: 4px;
}

.phonetic-question-text {
    font-size: 18px;
    color: var(--text-secondary);
    margin: var(--space-md) 0;
}

.phonetic-audio-btn-small {
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
    margin-top: var(--space-sm);
}

.phonetic-audio-btn-small:hover {
    opacity: 0.9;
}

.phonetic-highlight {
    text-decoration: underline;
    text-decoration-color: var(--primary);
    text-decoration-thickness: 3px;
    text-underline-offset: 4px;
    color: var(--primary);
}

.phonetic-words-row {
    display: flex;
    justify-content: center;
    gap: var(--space-lg);
    margin: var(--space-lg) 0;
    flex-wrap: wrap;
}

.phonetic-word-item {
    font-size: 32px;
    font-weight: bold;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-card);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
}

.phonetic-complete-page {
    padding: var(--space-xl);
    text-align: center;
}

.phonetic-complete-icon {
    font-size: 80px;
    margin-bottom: var(--space-lg);
}

.phonetic-complete-title {
    font-size: var(--font-xxl);
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--space-md);
}

.phonetic-complete-stats {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    margin: var(--space-lg) 0;
    box-shadow: var(--shadow-sm);
}

.phonetic-stat-item {
    display: flex;
    justify-content: space-between;
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--bg-primary);
}

.phonetic-stat-item:last-child {
    border-bottom: none;
}

.phonetic-stat-label {
    color: var(--text-secondary);
}

.phonetic-stat-value {
    font-weight: 600;
}

.phonetic-stat-value.success {
    color: var(--success);
}

.phonetic-stat-value.danger {
    color: var(--danger);
}

/* ==================== 单词强化训练模块样式 ==================== */

/* 入口卡片 */
.word-memory-card {
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 50%, #FFB4B4 100%);
    border-radius: var(--radius-xl);
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
}

.word-memory-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: rotate(30deg);
}

.word-memory-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
}

.word-memory-card:active {
    transform: scale(0.98);
}

.word-memory-card .card-icon {
    font-size: 40px;
    margin-bottom: var(--space-sm);
}

.word-memory-card h3 {
    color: white;
    font-size: var(--font-lg);
    margin-bottom: var(--space-xs);
}

.word-memory-card p {
    color: rgba(255,255,255,0.9);
    font-size: var(--font-sm);
}

/* 单元选择页面 */
.word-memory-select-page {
    padding: var(--space-md);
}

.word-memory-select-page .page-header {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.word-memory-select-page .page-header h1 {
    color: var(--primary);
    margin-bottom: var(--space-sm);
}

.word-memory-select-page .grade-info {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-lg);
    display: inline-block;
    margin-bottom: var(--space-lg);
}

.word-memory-select-page .section-title {
    font-size: var(--font-md);
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
    display: flex;
    align-items: center;
    gap: var(--space-sm);
}

.unit-memory-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.unit-memory-item {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
    border: 2px solid transparent;
}

.unit-memory-item:hover {
    border-color: var(--primary-light);
    transform: translateY(-2px);
}

.unit-memory-item:active {
    transform: scale(0.98);
}

.unit-memory-item.all-units {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    color: white;
}

.unit-memory-item.all-units .unit-memory-name,
.unit-memory-item.all-units .unit-memory-count {
    color: white;
}

.unit-memory-name {
    font-weight: 600;
    color: var(--text-primary);
}

.unit-memory-count {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

/* 单词记忆训练页面 */
.word-memory-training {
    padding: var(--space-md);
    min-height: calc(100vh - var(--nav-height));
}

.word-memory-training .progress-bar {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    height: 24px;
    margin-bottom: var(--space-lg);
    overflow: hidden;
    position: relative;
}

.word-memory-training .progress-fill {
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
    height: 100%;
    border-radius: var(--radius-lg);
    transition: width 0.3s ease;
}

.word-memory-training .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: var(--font-sm);
    font-weight: 600;
