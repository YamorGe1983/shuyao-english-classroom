    async startQuizReview() {
        const textbook = await getCurrentTextbookAsync();
        const todayTasks = MemoryModule.getTodayReviewTasks(20);
        
        if (todayTasks.length === 0) {
            // 如果没有待复习单词，从所有已学单词中随机选
            const allProgress = StorageModule.getAllWordProgress();
            const words = Object.keys(allProgress).map(key => {
                const [unitId, word] = key.split('_');
                const unit = textbook.units[unitId];
                const vocab = unit?.vocabulary?.find(v => v.word === word);
                return vocab ? { ...vocab, unitId, moduleId: unit?.module } : null;
            }).filter(Boolean);
            
            if (words.length < 5) {
                this.showToast('请先学习一些单词');
                return;
            }
            
            AppState.currentQuiz = ReviewEngine.generateReviewSession(words, Math.min(10, words.length));
        } else {
            // 从复习任务生成题目
            const words = todayTasks.map(task => {
                const [unitId, word] = task.wordKey.split('_');
                const unit = textbook.units[unitId];
                const vocab = unit?.vocabulary?.find(v => v.word === word);
                return vocab ? { ...vocab, unitId, moduleId: unit?.module } : null;
            }).filter(Boolean);
            
            AppState.currentQuiz = ReviewEngine.generateReviewSession(words, Math.min(10, words.length));
        }
        
        AppState.currentQuizIndex = 0;
        AppState.reviewResults = [];
        AppState.sessionStartTime = Date.now();
        
        this.renderQuizQuestion();
    },

        // 如果是听音题，自动播放音频
        if (question.type === QUESTION_TYPES.LISTEN_CHOOSE) {
            setTimeout(() => this.playQuestionAudio(), 500);
        }

    playQuestionAudio() {
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        if (question && question.audioWord) {
            TTS.speakWord(question.audioWord);
        }
    },
    
    selectAnswer(index) {
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const selected = question.options[index];
        const isCorrect = selected.isCorrect;
        const responseTime = Date.now() - AppState.cardStartTime;
        
        // 显示反馈
        this.showAnswerFeedback(isCorrect, question.correctAnswer);
        
        // 高亮选项
        document.querySelectorAll('.quiz-option').forEach((btn, i) => {
            if (question.options[i].isCorrect) {
                btn.classList.add('correct');
            } else if (i === index && !isCorrect) {
                btn.classList.add('wrong');
            }
            btn.style.pointerEvents = 'none';
        });
        
        // 记录结果
        AppState.reviewResults.push({
            question: question.question,
            selected: selected.text,
            correct: question.correctAnswer,
            isCorrect,
            type: question.type,
            unitId: AppState.currentUnit,
            responseTime
        });
        
        // 更新记忆曲线
        this.updateMemoryCurve(question, isCorrect);
        
        // 延迟进入下一题
        setTimeout(() => {
            AppState.currentQuizIndex++;
            this.renderQuizQuestion();
        }, 1500);
    },
    
    showAnswerFeedback(isCorrect, correctAnswer) {
        if (isCorrect) {
            document.getElementById('quiz-feedback-correct').style.display = 'block';
            TTS.speak('Great!');
        } else {
            document.getElementById('quiz-feedback-wrong').style.display = 'block';
            document.getElementById('wrong-answer-text').textContent = `正确答案是：${correctAnswer}`;
            TTS.speak('Try again!');
        }
    },
    
    updateMemoryCurve(question, isCorrect) {
        const wordKey = `${AppState.currentUnit}_${question.word || question.audioWord}`;
        const task = StorageModule.getReviewSchedule().find(t => t.wordKey === wordKey);
        
        if (task) {
            const updatedTask = MemoryModule.processAnswer(task, isCorrect, 0);
            MemoryModule.updateReviewTask(updatedTask);
        }
        
        if (isCorrect) {
            StorageModule.incrementReviewsDone();
        }
    },

    async toggleUnit(unitId) {
        event.stopPropagation();
        
        const checkbox = document.getElementById(`unit-${unitId}`);
        const isChecked = checkbox.checked;
        
        const textbook = await getCurrentTextbookAsync();
        const module = textbook.modules.find(m => 
            m.units.some(u => (u.id || u) === unitId)
        );
        
        if (module) {
            const allUnitsChecked = module.units.every(u => {
                const uId = u.id || u;
                return document.getElementById(`unit-${uId}`)?.checked;
            });
            const moduleCheckbox = document.getElementById(`mod-${module.id}`);
            if (moduleCheckbox) {
                moduleCheckbox.checked = allUnitsChecked;
            }
        }
        
        this.updateStartButton();

        document.querySelectorAll('.unit-checkbox:checked').forEach(cb => {
            selectedUnits.push(cb.dataset.unit);

        if (selectedUnits.length > 0) {

            btn.textContent = `开始 (已选${selectedUnits.length}个单元)`;
        } else {

    async findExampleForWord(word, unitIds) {
        const textbook = await getCurrentTextbookAsync();
        for (const unitId of unitIds) {
            const unit = textbook.units[unitId];
            if (unit && unit.sentences) {
                const found = unit.sentences.find(s => 
                    s.english.toLowerCase().includes(word.toLowerCase())
                );
                if (found) return found;
            }
        }
        return null;
    },
    
    startListeningTrain() {
        const state = this.listeningState;
        
        const selectedWords = state.selectedWords.filter(w => w.selected);
        
        if (selectedWords.length === 0) {
            this.showToast('请先选择单词');
            return;
        }
        
        if (state.playOrder === 'random') {
            selectedWords.sort(() => Math.random() - 0.5);
        }
        
        state.selectedWords = selectedWords;
        state.currentWordIndex = 0;
        state.isPlaying = true;
        state.isPaused = false;
        
        this.renderListeningPage();
        this.playListeningSequence();
    },
    
    renderListeningPage() {
        const state = this.listeningState;
        const currentWord = state.selectedWords[state.currentWordIndex];
        const example = this.findExampleForWord(currentWord?.word, state.selectedUnits);
        
        const html = `
            <div class="listening-page">
                <div class="listening-controls-top">
                    <button class="stop-btn" onclick="App.stopListening()">
                        ⏹️ 停止
                    </button>
                    <button class="pause-btn ${state.isPaused ? 'paused' : ''}" 
                            onclick="App.toggleListening()">
                        ${state.isPaused ? '▶️ 继续' : '⏸️ 暂停'}
                    </button>
                </div>
                
                <div class="current-word-display">
                    <div class="word-text">${currentWord?.word || ''}</div>
                    <div class="word-phonetic">${currentWord?.phonetic || ''}</div>
                    <div class="word-chinese">${currentWord?.chinese || ''}</div>
                    ${example ? `
                        <div class="word-example">${example.english}</div>
                    ` : ''}
                </div>
                
                <div class="playing-progress">
                    <span class="playing-indicator ${state.isPaused ? 'paused' : ''}"></span>
                    进度: <strong>${state.currentWordIndex + 1}</strong> / ${state.selectedWords.length}
                </div>
            </div>
        `;
        
        this.setContent(html);
    },
    
    async playListeningSequence() {
        const state = this.listeningState;
        if (!state.isPlaying) return;
        
        while (state.isPlaying && !state.isPaused) {
            const word = state.selectedWords[state.currentWordIndex];
            if (!word) {
                state.currentWordIndex = 0;
                continue;
            }
            
            this.renderListeningPage();
            
            try {
                await TTS.speak(word.word, { rate: 0.85 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                await TTS.speak(word.word, { rate: 0.85 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                const letters = word.word.split('').join('-').toUpperCase();
                await TTS.speak(letters, { rate: 0.6 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                await TTS.speak(word.word, { rate: 0.85 });
                if (!state.isPlaying || state.isPaused) break;
                await this.wait(600);
                
                if (word.chinese) {
                    await TTS.speak(word.chinese, { rate: 0.85 });
                    if (!state.isPlaying || state.isPaused) break;
                    await this.wait(600);
                }
                
                const example = this.findExampleForWord(word.word, state.selectedUnits);
                if (example) {
                    await TTS.speak(example.english, { rate: 0.85 });
                    if (!state.isPlaying || state.isPaused) break;
                    await this.wait(800);
                }
                
                await this.wait(1000);
                
            } catch (e) {
                console.error('播放出错:', e);
            }
            
            state.currentWordIndex = (state.currentWordIndex + 1) % state.selectedWords.length;
        }
    },
    
    toggleListening() {
        const state = this.listeningState;
        state.isPaused = !state.isPaused;
        
        if (!state.isPaused) {
            this.playListeningSequence();
        }
        
        this.renderListeningPage();
    },

        this.listeningState.isPlaying = false;
        this.listeningState.isPaused = false;
        TTS.cancel();
        this.renderHome();

        const selected = this.phoneticState.selectedExamples || [];

        const examples = this.phoneticState.textbookExamples;

    // 生成教材音标练习题
    generateTextbookPhoneticQuestions(examples) {
        const questions = [];
        
        examples.forEach(item => {
            // 从例词中提取字母组合
            const word = item.word;
            const pattern = item.pattern;
            
            // 找到单词中符合该规则的字母组合
            const regex = new RegExp(pattern.replace(/[\[\](){}?*+.^$|]/g, '\\$&').replace('→', ''), 'gi');
            const matches = word.match(regex);
            
            if (matches && matches[0]) {
                const letter = matches[0];
                const sound = item.phonetic;
                
                questions.push({
                    type: 'word_to_phonetic',
                    word: word,
                    letter: letter,
                    phonetic: sound,
                    pattern: item.pattern,
                    description: item.description
                });
            }
        });
        
        return questions;
    },

            for (const cat of type.categories) {

    // 从年级单词库查找含有特定音标的单词
    getWordsWithSoundFromGrade(soundSymbol, maxWords = 10) {
        const words = [];
        try {
            const textbook = getCurrentTextbook();
            if (!textbook || !textbook.units) return words;
            
            for (const unit of Object.values(textbook.units)) {
                if (unit.vocabulary && Array.isArray(unit.vocabulary)) {
                    for (const word of unit.vocabulary) {
                        if (word.letterSounds && Array.isArray(word.letterSounds)) {
                            // 查找匹配该音标的字母组合
                            const matchingSound = word.letterSounds.find(ls => ls.sound === soundSymbol);
                            if (matchingSound) {
                                // 计算highlight位置
                                const highlight = this.findHighlightPosition(word.word, matchingSound.letters);
                                words.push({
                                    word: word.word,
                                    chinese: word.chinese,
                                    highlight: highlight,
                                    letterSound: matchingSound
                                });
                                if (words.length >= maxWords) break;
                            }
                        }
                    }
                }
                if (words.length >= maxWords) break;
            }
        } catch (e) {
            console.warn('从年级单词库获取单词失败:', e);
        }
        return words;
    },
    
    // 查找字母组合在单词中的位置
    findHighlightPosition(word, letters) {
        // 尝试直接匹配
        const index = word.indexOf(letters);
        if (index !== -1) {
            return [index, index + letters.length];
        }
        // 尝试不区分大小写匹配
        const lowerWord = word.toLowerCase();
        const lowerLetters = letters.toLowerCase();
        const lowerIndex = lowerWord.indexOf(lowerLetters);
        if (lowerIndex !== -1) {
            return [lowerIndex, lowerIndex + letters.length];
        }
        // 如果找不到，尝试单字符匹配
        if (letters.length === 1) {
            return [0, 1];
        }
        return null;
    },
    
    generatePhoneticQuestions(sounds) {
        const questions = [];
        const allSounds = this.getAllPhoneticSounds();
        
        // 易混淆音标映射（用于生成更有挑战性的干扰选项）
        const CONFUSABLE_PHONETICS = {
            '/iː/': ['/ɪ/', '/e/', '/eɪ/'],
            '/ɪ/': ['/iː/', '/e/', '/aɪ/'],
            '/e/': ['/æ/', '/ɪ/', '/eɪ/'],
            '/æ/': ['/e/', '/ʌ/', '/aɪ/'],
            '/ɜː/': ['/ə/', '/ʌ/', '/ɔː/'],
            '/ə/': ['/ɜː/', '/ʌ/', '/əʊ/'],
            '/ʌ/': ['/æ/', '/ə/', '/e/'],
            '/ɑː/': ['/ʌ/', '/ɒ/', '/ɔː/'],
            '/ɒ/': ['/ɔː/', '/ɑː/', '/əʊ/'],
            '/ɔː/': ['/ɒ/', '/əʊ/', '/ɜː/'],
            '/ʊ/': ['/uː/', '/ʌ/', '/ə/'],
            '/uː/': ['/ʊ/', '/aʊ/', '/əʊ/'],
            '/eɪ/': ['/aɪ/', '/e/', '/eə/'],
            '/aɪ/': ['/eɪ/', '/aʊ/', '/ɪ/'],
            '/ɔɪ/': ['/eɪ/', '/aɪ/', '/ɪ/'],
            '/aʊ/': ['/əʊ/', '/uː/', '/aɪ/'],
            '/əʊ/': ['/aʊ/', '/ɔː/', '/ə/'],
            '/ɪə/': ['/eə/', '/ʊə/', '/ɪ/'],
            '/eə/': ['/ɪə/', '/eɪ/', '/æ/'],
            '/ʊə/': ['/ɪə/', '/ə/', '/uː/'],
            '/θ/': ['/s/', '/t/', '/ð/'],
            '/ð/': ['/z/', '/d/', '/θ/'],
            '/ʃ/': ['/s/', '/tʃ/', '/ʒ/'],
            '/ʒ/': ['/z/', '/ʃ/', '/dʒ/'],
            '/tʃ/': ['/ʃ/', '/tr/', '/dʒ/'],
            '/dʒ/': ['/ʒ/', '/dr/', '/tʃ/'],
            '/ŋ/': ['/n/', '/m/'],
            '/s/': ['/z/', '/θ/', '/ʃ/'],
            '/z/': ['/s/', '/ð/', '/ʒ/'],
            '/p/': ['/b/', '/t/'],
            '/b/': ['/p/', '/d/'],
            '/t/': ['/d/', '/p/'],
            '/d/': ['/t/', '/b/'],
            '/k/': ['/g/', '/t/'],
            '/g/': ['/k/', '/d/'],
            '/f/': ['/v/', '/θ/'],
            '/v/': ['/f/', '/ð/'],
            '/tr/': ['/tʃ/', '/dr/'],
            '/dr/': ['/dʒ/', '/tr/']
        };
        
        sounds.forEach(sound => {
            if (!sound.examples || sound.examples.length === 0) return;
            
            const confusables = CONFUSABLE_PHONETICS[sound.symbol] || [];
            
            // 优先从年级单词库获取单词，如果没有则使用默认示例
            const gradeWords = this.getWordsWithSoundFromGrade(sound.symbol, 5);
            const useGradeWords = gradeWords.length >= 2; // 只有当年级单词库有足够单词时才使用
            
            // 题型A：看单词选音标 - 用易混淆音标作干扰项
            let exampleA;
            if (useGradeWords) {
                exampleA = gradeWords[Math.floor(Math.random() * gradeWords.length)];
            } else {
                exampleA = sound.examples[Math.floor(Math.random() * sound.examples.length)];
            }
            let distractorsA = confusables
                .map(symbol => allSounds.find(s => s.symbol === symbol))
                .filter(Boolean)
                .slice(0, 3);
            
            if (distractorsA.length < 3) {
                const remaining = allSounds
                    .filter(s => s.symbol !== sound.symbol && !distractorsA.includes(s))
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3 - distractorsA.length);
                distractorsA = [...distractorsA, ...remaining];
            }
            
            questions.push({
                type: 'word_to_symbol',
                sound: sound,
                question: '划线部分的发音是？',
                word: exampleA.word,
                highlight: exampleA.highlight,
                options: this.shuffle([
                    { text: sound.symbol, isCorrect: true },
                    ...distractorsA.slice(0, 3).map(s => ({ text: s.symbol, isCorrect: false }))
                ]),
                correctAnswer: sound.symbol
            });
            
            // 题型C：看音标选单词 - 用易混淆音标的单词作干扰项
            let exampleC;
            if (useGradeWords) {
                // 使用不同的单词避免重复
                const availableWords = gradeWords.filter(w => w.word !== exampleA.word);
                exampleC = availableWords.length > 0 
                    ? availableWords[Math.floor(Math.random() * availableWords.length)]
                    : sound.examples[Math.floor(Math.random() * sound.examples.length)];
            } else {
                exampleC = sound.examples[Math.floor(Math.random() * sound.examples.length)];
            }
            let distractorsC = confusables
                .flatMap(symbol => {
                    const s = allSounds.find(x => x.symbol === symbol);
                    return s ? s.examples.slice(0, 2).map(e => ({ word: e.word, symbol: s.symbol })) : [];
                })
                .filter(e => e.word !== exampleC.word)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            
            if (distractorsC.length < 3) {
                const remaining = allSounds
                    .flatMap(s => s.examples.map(e => ({ word: e.word, symbol: s.symbol })))
                    .filter(e => e.symbol !== sound.symbol && e.word !== exampleC.word && !distractorsC.find(d => d.word === e.word))
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3 - distractorsC.length);
                distractorsC = [...distractorsC, ...remaining];
            }
            
            questions.push({
                type: 'symbol_to_word',
                sound: sound,
                question: `哪个单词含有 ${sound.symbol} 音？`,
                symbol: sound.symbol,
                options: this.shuffle([
                    { text: exampleC.word, isCorrect: true },
                    ...distractorsC.slice(0, 3).map(e => ({ text: e.word, isCorrect: false }))
                ]),
                correctAnswer: exampleC.word
            });
            
            // 题型E：找出不同的音 - 两个相同音标 + 一个易混淆音标
            if (confusables.length > 0 && (useGradeWords || sound.examples.length >= 2)) {
                // 从当前音标选2个示例（优先使用年级单词）
                let sameExamples;
                if (useGradeWords && gradeWords.length >= 2) {
                    sameExamples = this.shuffle([...gradeWords]).slice(0, 2);
                } else {
                    sameExamples = sound.examples.slice(0, 2);
                }
                
                // 从易混淆音标中选1个
                const diffSymbol = confusables[Math.floor(Math.random() * confusables.length)];
                const diffSound = allSounds.find(s => s.symbol === diffSymbol);
                
                // 获取易混淆音标对应的年级单词
                let diffWords = [];
                if (useGradeWords) {
                    diffWords = this.getWordsWithSoundFromGrade(diffSymbol, 5);
                }
                
                if (diffSound && (diffSound.examples.length > 0 || diffWords.length > 0)) {
                    let diffExample;
                    if (diffWords.length > 0) {
                        diffExample = diffWords[Math.floor(Math.random() * diffWords.length)];
                    } else {
                        diffExample = diffSound.examples[Math.floor(Math.random() * diffSound.examples.length)];
                    }
                    
                    // 避免重复单词
                    const usedWords = [sameExamples[0].word, sameExamples[1].word];
                    if (usedWords.includes(diffExample.word)) {
                        // 跳过这个题目
                        return;
                    }
                    
                    const allWords = this.shuffle([
                        { word: sameExamples[0].word, highlight: sameExamples[0].highlight, isDifferent: false },
                        { word: sameExamples[1].word, highlight: sameExamples[1].highlight, isDifferent: false },
                        { word: diffExample.word, highlight: diffExample.highlight, isDifferent: true }
                    ]);
                    
                    questions.push({
                        type: 'find_different',
                        sound: sound,
                        diffSound: diffSound,
                        question: '哪个单词的划线部分发音不同？',
                        words: allWords,
                        options: allWords.map(w => ({ text: w.word, isCorrect: w.isDifferent })),
                        correctAnswer: diffExample.word
                    });
                }
            }
        });
        
        // 题型G：听音拼词
        this.addListenSpellQuestions(questions);
        
        // 题型H：音标归类
        this.addPhoneticSortQuestions(questions);
        
        // 题型F：最小对立体辨析
        this.addMinimalPairQuestions(questions);
        
        return this.shuffle(questions);
    },
    
    // 获取年级单词库中的所有单词
    getAllGradeWords() {
        const words = [];
        try {
            const textbook = getCurrentTextbook();
            if (!textbook || !textbook.units) return words;
            
            for (const unit of Object.values(textbook.units)) {
                if (unit.vocabulary && Array.isArray(unit.vocabulary)) {
                    for (const word of unit.vocabulary) {
                        if (word.word && word.word.length >= 3 && word.word.length <= 7) {
                            words.push({
                                word: word.word,
                                chinese: word.chinese || ''
                            });
                        }
                    }
                }
            }
        } catch (e) {
            console.warn('获取年级单词库失败:', e);
        }
        return words;
    },
    
    // 题型G：听音拼词
    addListenSpellQuestions(questions) {
        const allWords = this.getAllGradeWords();
        if (allWords.length < 3) return;
        
        // 随机选择2-3个单词
        const selectedWords = this.shuffle([...allWords]).slice(0, 3);
        
        selectedWords.forEach(wordData => {
            const word = wordData.word;
            const letters = word.toLowerCase().split('');
            
            // 生成干扰字母（发音相似的混淆）
            const confusable = {
                'a': ['e', 'o'],
                'e': ['a', 'i'],
                'i': ['e', 'y'],
                'o': ['a', 'u'],
                'u': ['o'],
                'c': ['s', 'k'],
                's': ['c', 'z'],
                'b': ['d', 'p'],
                'd': ['b', 't'],
                'p': ['b', 't'],
                't': ['d', 'p'],
                'g': ['j'],
                'j': ['g']
            };
            
            // 添加2-3个干扰字母
            const distractors = [];
            const usedLetters = [...letters];
            let attempts = 0;
            while (distractors.length < 3 && attempts < 20) {
                const letter = letters[Math.floor(Math.random() * letters.length)];
                const possibleConfuse = confusable[letter] || [];
                if (possibleConfuse.length > 0) {
                    const confuse = possibleConfuse[Math.floor(Math.random() * possibleConfuse.length)];
                    if (!usedLetters.includes(confuse)) {
                        distractors.push(confuse);
                        usedLetters.push(confuse);
                    }
                }
                attempts++;
            }
            
            // 如果干扰字母不够，添加随机字母
            const allLetters = 'abcdefghijklmnopqrstuvwxyz';
            while (distractors.length < 3) {
                const randomLetter = allLetters[Math.floor(Math.random() * allLetters.length)];
                if (!usedLetters.includes(randomLetter)) {
                    distractors.push(randomLetter);
                    usedLetters.push(randomLetter);
                }
            }
            
            // 混合所有字母并打乱
            const allPoolLetters = this.shuffle([...letters, ...distractors]);
            
            questions.push({
                type: 'listen_spell',
                question: '听发音，拼单词',
                word: word,
                chinese: wordData.chinese,
                pool: allPoolLetters, // 所有可用的字母（打乱顺序）
                correctAnswer: word.toLowerCase(),
                placedLetters: [] // 已放置的字母（用于跟踪用户的选择）
            });
        });
    },
    
    // 题型H：音标归类
    addPhoneticSortQuestions(questions) {
        const allWords = this.getAllGradeWords();
        if (allWords.length < 6) return;
        
        // 定义音标分组（按发音规律）
        const phoneticGroups = [
            { label: '/iː/', sounds: ['iː', 'ee', 'ea'], words: [] },
            { label: '/e/', sounds: ['e', 'ea'], words: [] },
            { label: '/æ/', sounds: ['æ', 'a'], words: [] },
            { label: '/aɪ/', sounds: ['aɪ', 'i', 'i_e', 'y'], words: [] },
            { label: '/əʊ/', sounds: ['əʊ', 'o', 'o_e', 'oa', 'ow'], words: [] },
            { label: '/aʊ/', sounds: ['aʊ', 'ou', 'ow'], words: [] },
            { label: '/ɔɪ/', sounds: ['ɔɪ', 'oy', 'oi'], words: [] }
        ];
        
        // 将单词分配到各组
        allWords.forEach(wordData => {
            const word = wordData.word.toLowerCase();
            for (const group of phoneticGroups) {
                // 检查单词是否包含该音标的字母组合
                const hasMatch = group.sounds.some(sound => {
                    // 简单匹配（实际应该用音标数据）
                    return word.includes(sound) || 
                           (sound.length === 1 && word.includes(sound + sound));
                });
                
                if (hasMatch && group.words.length < 4) {
                    group.words.push({
                        word: wordData.word,
                        chinese: wordData.chinese,
                        targetGroup: group.label
                    });
                    break;
                }
            }
        });
        
        // 选择有足够单词的组来生成题目
        const validGroups = phoneticGroups.filter(g => g.words.length >= 2);
        if (validGroups.length < 2) {
            // 如果没有足够的分组，使用默认的简单分组
            const shortWords = allWords.filter(w => w.word.length <= 4);
            const longWords = allWords.filter(w => w.word.length > 4);
            
            if (shortWords.length >= 2 && longWords.length >= 2) {
                questions.push({
                    type: 'phonetic_sort',
                    question: '音标归类',
                    baskets: [
                        { label: '短单词', words: this.shuffle(shortWords.slice(0, 3)).map(w => ({ word: w.word, chinese: w.chinese, targetGroup: 'short' })) },
                        { label: '长单词', words: this.shuffle(longWords.slice(0, 3)).map(w => ({ word: w.word, chinese: w.chinese, targetGroup: 'long' })) }
                    ],
                    allWords: this.shuffle([...shortWords.slice(0, 3), ...longWords.slice(0, 3)])
                });
            }
            return;
        }
        
        // 随机选择两组
        const shuffledGroups = this.shuffle([...validGroups]);
        const group1 = shuffledGroups[0];
        const group2 = shuffledGroups[1];
        
        // 每组取2-3个单词
        const words1 = this.shuffle([...group1.words]).slice(0, 3);
        const words2 = this.shuffle([...group2.words]).slice(0, 3);
        
        questions.push({
            type: 'phonetic_sort',
            question: '音标归类',
            baskets: [
                { label: group1.label, words: words1 },
                { label: group2.label, words: words2 }
            ],
            allWords: this.shuffle([...words1, ...words2])
        });
    },
    
    // 添加最小对立体辨析题目
    addMinimalPairQuestions(questions) {
        if (!MINIMAL_PAIRS || MINIMAL_PAIRS.length === 0) return;
        
        // 随机选择2-3对最小对立词
        const shuffledPairs = this.shuffle([...MINIMAL_PAIRS]).slice(0, 3);
        
        shuffledPairs.forEach(pair => {
            // 随机选择播放哪个词
            const playFirst = Math.random() > 0.5;
            const correctWord = playFirst ? pair.word1 : pair.word2;
            
            questions.push({
                type: 'minimal_pair',
                question: '听音辨词',
                tip: pair.tip,
                word1: pair.word1,
                word2: pair.word2,
                playWord: correctWord,
                options: this.shuffle([
                    { text: pair.word1, isCorrect: pair.word1 === correctWord },
                    { text: pair.word2, isCorrect: pair.word2 === correctWord }
                ]),
                correctAnswer: correctWord
            });
        });
    },
    
    getAllPhoneticSounds() {
        const sounds = [];
        Object.values(PHONETIC_DATA).forEach(type => {
            type.categories.forEach(cat => {
                cat.sounds.forEach(sound => sounds.push(sound));
            });
        });
        return sounds;
    },
    
    generateLetterOptions(correctLetter) {
        const vowels = ['a', 'e', 'i', 'o', 'u', 'ai', 'ay', 'ea', 'ee', 'oo', 'ou', 'ow'];
        const consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'r', 's', 't', 'v', 'w', 'y', 'z', 'th', 'sh', 'ch', 'ng'];
        
        const allLetters = [...vowels, ...consonants];
        const options = [correctLetter];
        
        while (options.length < 4) {
            const randomLetter = allLetters[Math.floor(Math.random() * allLetters.length)];
            if (!options.includes(randomLetter) && randomLetter !== correctLetter) {
                options.push(randomLetter);
            }
        }
        
        return options;
    },

            case 'minimal_pair':
                // 题型F：最小对立体辨析 - 使用单词作为可点击选项
                questionContent = `
                    <div class="phonetic-question-type">🎧 听音辨词</div>
                    <p class="phonetic-question-tip">${q.tip || '听一听，选出你听到的单词'}</p>
                    <button class="phonetic-audio-btn" id="minimal-audio-btn" onclick="App.playMinimalPairAudio('${q.playWord}')" style="margin-bottom: var(--space-lg);">

                    </button>
                `;
                // 最小对立体题型不使用phonetic-options-grid，而是将单词本身作为选项
                break;
                
            case 'listen_spell':
                // 题型G：听音拼词
                const letterPool = q.pool.map((letter, idx) => `
                    <div class="phonetic-letter-block" id="letter-${idx}" data-letter="${letter}" onclick="App.selectSpellLetter(${idx})">
                        ${letter}
                    </div>
                `).join('');
                const answerSlots = q.word.split('').map((_, idx) => `
                    <div class="phonetic-answer-slot" id="answer-slot-${idx}" onclick="App.removeSpellLetter(${idx})"></div>
                `).join('');
                questionContent = `
                    <div class="phonetic-question-type">🔤 听音拼词</div>
                    <p class="phonetic-spell-hint">听发音，把字母组成正确的单词</p>
                    <button class="phonetic-audio-btn" id="spell-audio-btn" onclick="App.playSpellAudio('${q.word}')" style="margin-bottom: var(--space-lg);">
                        🔊 点击听发音
                    </button>
                    <div class="phonetic-spell-container">
                        <div class="phonetic-answer-area" id="answer-area">
                            ${answerSlots}
                        </div>
                        <div class="phonetic-letter-pool" id="letter-pool">
                            ${letterPool}
                        </div>
                        <p class="phonetic-spell-hint-text">点击字母放入答案区，点击答案区的字母可以移除</p>
                    </div>
                `;
                break;
                
            case 'phonetic_sort':
                // 题型H：音标归类
                const baskets = q.baskets.map((basket, idx) => {
                    const basketWords = basket.words.map(w => w.word).join(', ');
                    return `
                        <div class="phonetic-basket" id="basket-${idx}" data-basket="${idx}" data-target="${basket.words[0]?.targetGroup || ''}" onclick="App.selectBasket(${idx})">
                            <div class="phonetic-basket-label">${basket.label}</div>
                            <div class="phonetic-basket-words" id="basket-words-${idx}"></div>

                const sortWords = q.allWords.map((word, idx) => `

                    </div>
                `).join('');
                questionContent = `

                    ${q.options.map((opt, idx) => `
                        <div class="phonetic-option" onclick="App.selectMinimalPairAnswer('${opt.text}', ${opt.isCorrect})" id="phonetic-option-${idx}" data-word="${opt.text}">
                            ${opt.text}
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (q.type === 'listen_spell' || q.type === 'phonetic_sort') {
            // 这两种题型不使用标准选项网格
            optionsContent = '';
        } else {
            optionsContent = `
                <div class="phonetic-options-grid" id="phonetic-options">
                    ${q.options.map((opt, idx) => `
                        <div class="phonetic-option" onclick="App.selectPhoneticAnswer(${idx})" id="phonetic-option-${idx}">
                            ${opt.text}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        const html = `
            <div class="phonetic-practice-page">
                <button class="back-btn" onclick="App.confirmPhoneticExit()">

                </button>
                
                <div class="phonetic-progress">
                    <div class="phonetic-progress-bar">
                        <div class="phonetic-progress-fill" style="width:${percent}%"></div>
                    </div>
                    <span class="phonetic-progress-text">${progress}/${total}</span>
                </div>
                
                <div class="phonetic-question-card">
                    ${questionContent}
                </div>
                
                ${optionsContent}
                
                <div id="phonetic-feedback"></div>
            </div>
        `;
        this.setContent(html);
        
        // 初始化特殊题型的状态
        if (q.type === 'phonetic_sort') {
            // 音标归类题型：初始化状态
            this.phoneticSortState = {
                selectedBasket: null,
                placedWords: {}
            };
        }
    },
    
    // 播放听音拼词的音频
    playSpellAudio(word) {
        const btn = document.getElementById('spell-audio-btn');
        if (btn) {
            btn.classList.add('playing');
            btn.textContent = '🔊 播放中...';
        }
        
        TTS.speak(word).finally(() => {
            if (btn) {
                btn.classList.remove('playing');
                btn.textContent = '🔊 点击再听一次';
            }
        });
    },
    
    // 选择字母进行拼写
    selectSpellLetter(letterIndex) {
        const state = this.phoneticState;
        const q = state.questions[state.currentIndex];
        
        // 找到第一个空的槽位
        let emptySlotIndex = -1;
        for (let i = 0; i < q.word.length; i++) {
            const slot = document.getElementById(`answer-slot-${i}`);
            if (slot && !slot.textContent.trim()) {
                emptySlotIndex = i;
                break;
            }
        }
        
        if (emptySlotIndex === -1) {
            // 所有槽位都已填满，检查答案
            this.checkSpellAnswer();
            return;
        }
        
        const letterEl = document.getElementById(`letter-${letterIndex}`);
        const slotEl = document.getElementById(`answer-slot-${emptySlotIndex}`);
        
        if (letterEl && slotEl) {
            const letter = letterEl.dataset.letter;
            slotEl.textContent = letter;
            slotEl.dataset.letter = letter;
            slotEl.classList.add('filled');
            letterEl.classList.add('used');
            letterEl.onclick = null;
            
            // 播放点击音效
            TTS.speak(letter).catch(() => {});
            
            // 检查是否所有槽位都已填满
            let allFilled = true;
            for (let i = 0; i < q.word.length; i++) {
                const slot = document.getElementById(`answer-slot-${i}`);
                if (!slot || !slot.textContent.trim()) {
                    allFilled = false;
                    break;
                }
            }
            
            if (allFilled) {
                this.checkSpellAnswer();
            }
        }
    },
    
    // 移除答案区的字母
    removeSpellLetter(slotIndex) {
        const slotEl = document.getElementById(`answer-slot-${slotIndex}`);
        if (!slotEl || !slotEl.textContent.trim()) return;
        
        const letter = slotEl.dataset.letter;
        
        // 找到对应的字母块并恢复
        const letterBlocks = document.querySelectorAll('.phonetic-letter-block');
        for (let i = 0; i < letterBlocks.length; i++) {
            const block = letterBlocks[i];
            if (block.dataset.letter === letter && block.classList.contains('used')) {
                block.classList.remove('used');
                block.onclick = () => this.selectSpellLetter(i);
                break;
            }
        }
        
        // 清空槽位
        slotEl.textContent = '';
        delete slotEl.dataset.letter;
        slotEl.classList.remove('filled');
    },
    
    // 检查听音拼词的答案
    checkSpellAnswer() {
        const state = this.phoneticState;
        const q = state.questions[state.currentIndex];
        
        // 收集用户输入的答案
        let userAnswer = '';
        for (let i = 0; i < q.word.length; i++) {
            const slot = document.getElementById(`answer-slot-${i}`);
            if (slot) {
                userAnswer += slot.textContent.trim().toLowerCase();
            }
        }
        
        const isCorrect = userAnswer === q.correctAnswer.toLowerCase();
        
        // 禁用所有交互
        document.querySelectorAll('.phonetic-letter-block').forEach(el => {
            el.onclick = null;
        });
        document.querySelectorAll('.phonetic-answer-slot').forEach(el => {
            el.onclick = null;
        });
        
        if (isCorrect) {
            state.correctCount++;
        } else {
            state.wrongCount++;
            // 显示正确答案
            for (let i = 0; i < q.word.length; i++) {
                const slot = document.getElementById(`answer-slot-${i}`);
                if (slot && slot.textContent.trim().toLowerCase() !== q.correctAnswer[i].toLowerCase()) {
                    slot.style.background = 'rgba(225, 112, 85, 0.3)';
                    slot.style.borderColor = 'var(--danger)';
                }
            }
        }
        
        // 显示反馈
        const feedback = document.getElementById('phonetic-feedback');
        feedback.innerHTML = `
            <div class="phonetic-feedback ${isCorrect ? 'correct' : 'wrong'}">
                <div class="phonetic-feedback-icon">${isCorrect ? '✅' : '❌'}</div>
                <div>${isCorrect ? '回答正确！' : '回答错误'}</div>
                ${!isCorrect ? `
                    <div style="margin-top:8px;font-size:14px;color:var(--text-secondary);">
                        正确答案：<strong>${q.correctAnswer}</strong> ${q.chinese ? '- ' + q.chinese : ''}
                    </div>
                    <div class="option-phonetic-tip">
                        💡 提示：仔细听发音，注意每个字母的发音位置
                    </div>
                ` : ''}
            </div>
            <button class="next-question-btn" onclick="App.nextPhoneticQuestion()">
                ${state.currentIndex < state.questions.length - 1 ? '下一题' : '查看结果'}
            </button>
        `;
    },
    
    // 选择音标归类的篮子
    selectBasket(basketIndex) {
        const state = this.phoneticState;
        
        // 移除其他篮子的选中状态
        document.querySelectorAll('.phonetic-basket').forEach((el, idx) => {
            el.classList.remove('selected');
            if (idx === basketIndex) {
                el.classList.add('selected');
            }
        });
        
        // 更新状态
        if (!this.phoneticSortState) {
            this.phoneticSortState = {
                selectedBasket: null,
                placedWords: {}
            };
        }
        this.phoneticSortState.selectedBasket = basketIndex;
        
        // 更新提示文字
        const instruction = document.getElementById('sort-instruction');
        if (instruction) {
            const basketLabel = state.questions[state.currentIndex].baskets[basketIndex].label;
            instruction.innerHTML = `<strong>已选择：${basketLabel}</strong> - 现在点击单词进行归类`;
        }
    },
    
    // 选择音标归类的单词
    selectSortWord(wordIndex) {
        const state = this.phoneticState;
        const q = state.questions[state.currentIndex];
        
        if (!this.phoneticSortState || this.phoneticSortState.selectedBasket === null) {
            // 没有选择篮子，提示用户
            const instruction = document.getElementById('sort-instruction');
            if (instruction) {
                instruction.innerHTML = `<strong style="color:var(--danger);">请先选择一个篮子！</strong>`;
            }
            return;
        }
        
        const wordEl = document.getElementById(`sort-word-${wordIndex}`);
        if (!wordEl || wordEl.classList.contains('placed')) return;
        
        const selectedBasket = this.phoneticSortState.selectedBasket;
        const wordData = q.allWords[wordIndex];
        
        // 检查答案
        const basketData = q.baskets[selectedBasket];
        const targetWord = basketData.words.find(w => w.word === wordData.word);
        const isCorrect = !!targetWord;
        
        // 标记单词为已放置
        wordEl.classList.add('placed');
        wordEl.onclick = null;
        
        if (isCorrect) {
            // 正确：将单词移动到篮子中
            state.correctCount++;
            const basketWords = document.getElementById(`basket-words-${selectedBasket}`);
            const basket = document.getElementById(`basket-${selectedBasket}`);
            if (basketWords) {
                basketWords.innerHTML += `<span class="phonetic-sort-word placed" style="display:inline-block;margin:2px;font-size:14px;padding:4px 8px;background:var(--success);color:white;border-radius:4px;">${wordData.word}</span>`;
            }
            if (basket) {
                basket.classList.add('correct');
                setTimeout(() => basket.classList.remove('correct'), 500);
            }
        } else {
            // 错误
            state.wrongCount++;
            const basket = document.getElementById(`basket-${selectedBasket}`);
            if (basket) {
                basket.classList.add('wrong');
                setTimeout(() => basket.classList.remove('wrong'), 500);
            }
            // 延迟后移除单词，允许重新选择
            setTimeout(() => {
                wordEl.classList.remove('placed');
                wordEl.onclick = () => this.selectSortWord(wordIndex);
            }, 800);
        }
        
        // 检查是否所有单词都已归类
        const placedCount = document.querySelectorAll('.phonetic-sort-word.placed').length;
        if (placedCount >= q.allWords.length) {
            // 显示完成反馈
            setTimeout(() => {
                this.showPhoneticSortComplete();
            }, 500);
        }
    },
    
    // 音标归类完成
    showPhoneticSortComplete() {
        const state = this.phoneticState;
        
        const feedback = document.getElementById('phonetic-feedback');
        feedback.innerHTML = `
            <div class="phonetic-feedback correct">
                <div class="phonetic-feedback-icon">🎉</div>
                <div>归类完成！</div>
                <div style="margin-top:8px;font-size:14px;color:var(--text-secondary);">
                    正确率：${state.correctCount} / ${state.correctCount + state.wrongCount}
                </div>
            </div>
            <button class="next-question-btn" onclick="App.nextPhoneticQuestion()">
                ${state.currentIndex < state.questions.length - 1 ? '下一题' : '查看结果'}
            </button>
        `;
    },
    
    // 选择最小对立体答案
    selectMinimalPairAnswer(selectedWord, isCorrect) {
        const state = this.phoneticState;
        const q = state.questions[state.currentIndex];
        
        // 禁用所有选项
        document.querySelectorAll('.phonetic-option').forEach((el) => {
            el.onclick = null;
            const word = el.dataset.word;
            if (word === q.correctAnswer) {
                el.classList.add('correct');
            } else if (word === selectedWord && !isCorrect) {
                el.classList.add('wrong');
            }
        });
        
        if (isCorrect) {
            state.correctCount++;
        } else {
            state.wrongCount++;
        }
        
        // 获取单词的音标
        const getWordPhonetic = (word) => {
            if (PHONETIC_DATA) {
                for (const type of Object.values(PHONETIC_DATA)) {
                    for (const cat of type.categories || []) {
                        for (const sound of cat.sounds || []) {
                            for (const ex of sound.examples || []) {
                                if (ex.word === word) {
                                    return sound.symbol;
                                }
                            }
                        }
                    }
                }
            }
            return '';
        };
        
        // 生成选项详情
        const labels = ['A', 'B'];
        const optionsDetail = `
            <div class="option-phonetic-detail">
                ${q.options.map((opt, idx) => {
                    const phonetic = getWordPhonetic(opt.text);
                    return `
                        <div class="option-phonetic-item ${opt.isCorrect ? 'correct' : ''} ${opt.text === selectedWord && !isCorrect ? 'selected-wrong' : ''}">
                            <span class="option-phonetic-label">${labels[idx]}</span>
                            <span class="option-phonetic-text">${opt.text} ${phonetic ? '- ' + phonetic : ''}</span>
                            ${opt.isCorrect ? '<span style="color:var(--success);margin-left:8px;">✓</span>' : ''}
                            ${opt.text === selectedWord && !isCorrect ? '<span style="color:var(--danger);margin-left:8px;">✗</span>' : ''}
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        // 生成错误提示
        let tipText = '';
        if (!isCorrect) {
            const correctPhonetic = getWordPhonetic(q.correctAnswer);
            const selectedPhonetic = getWordPhonetic(selectedWord);
            tipText = `<div class="option-phonetic-tip">
                💡 提示：${correctPhonetic} 和 ${selectedPhonetic} 发音不同！
                ${q.tip || ''}
            </div>`;
        } else if (q.tip) {
            tipText = `<div style="margin-top:8px;font-size:14px;color:var(--text-secondary);">${q.tip}</div>`;

            <div class="phonetic-feedback ${isCorrect ? 'correct' : 'wrong'}">

                ${!isCorrect ? `<div style="margin-top:8px;font-size:14px;color:var(--text-secondary);">

    highlightWord(word, highlight) {

        return `${word.substring(0, start)}<span class="phonetic-highlight">${word.substring(start, end)}</span>${word.substring(end)}`;

                            </div>

                <div>${isCorrect ? '回答正确！' : '回答错误'}</div>
                ${!isCorrect ? `<div style="margin-top:8px;font-size:14px;color:var(--text-secondary);">
                    正确答案：${q.correctAnswer}
                </div>` : ''}
                ${optionsDetail}

            <button class="next-question-btn" onclick="App.nextPhoneticQuestion()">

        } else if (accuracy >= 70) {
            grade = '👍';
            message = '做得不错！继续加油！';
        } else if (accuracy >= 50) {
            grade = '💪';
            message = '还需要多多练习哦！';
        } else {
            grade = '📚';
            message = '别灰心，多听多练一定会进步！';
        }
        
        const html = `
            <div class="phonetic-complete-page">
                <button class="back-btn" onclick="App.showPhoneticMain()">

                        <span class="phonetic-stat-value">${total}</span>
                    </div>
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">正确数</span>
                        <span class="phonetic-stat-value success">${state.correctCount}</span>
                    </div>
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">错误数</span>
                        <span class="phonetic-stat-value danger">${state.wrongCount}</span>
                    </div>
                    <div class="phonetic-stat-item">
                        <span class="phonetic-stat-label">正确率</span>
                        <span class="phonetic-stat-value ${accuracy >= 70 ? 'success' : 'danger'}">${accuracy}%</span>
                    </div>
                </div>
                
                <button class="phonetic-practice-btn" onclick="App.startPhoneticPractice()">
                    再练一次
                </button>
                
                <button class="primary-btn secondary" style="width:100%;margin-top:12px;" onclick="App.showPhoneticMain()">
                    返回音标练习
                </button>
            </div>
        `;
        this.setContent(html);
    },
    
    // ==================== 工具函数 ====================
    
    setContent(html) {
        this.elements.content.innerHTML = html;
        window.scrollTo(0, 0);
    },
    
    showModal(title, message, buttons = []) {
        const modal = this.elements.modal;
        
        if (buttons.length === 0) {
            buttons = [{ text: '确定', type: 'primary', onClick: () => this.closeModal() }];
        }
        
        let buttonsHtml = buttons.map((btn, index) => `
            <button class="modal-btn ${btn.type}" data-btn-index="${index}">
                ${btn.text}
            </button>
        `).join('');
        
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="modal-buttons">${buttonsHtml}</div>
            </div>
        `;
        
        modal.querySelectorAll('.modal-btn').forEach((btnEl, index) => {
            btnEl.addEventListener('click', () => {
                if (buttons[index] && buttons[index].onClick) {
                    buttons[index].onClick();
                }
            });
        });
        
        modal.classList.add('show');
    },
    
    closeModal() {
        this.elements.modal.classList.remove('show');
    },
    
    showToast(message, duration = 2000) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    },
    
    formatTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
        return date.toLocaleDateString('zh-CN');
    },
    
    wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

// ==================== 单词强化训练模块 ====================

const WordMemoryModule = {
    // 模块状态
    state: {
        words: [],           // 单词列表
        tasks: [],           // 任务列表 [{ wordIndex, direction, status }]
        queue: [],           // 待学习队列（任务索引）
        currentIndex: 0,     // 当前任务索引
        stats: {
            total: 0,
            mastered: 0,
            reviewed: 0
        },
        selectedUnit: null,   // 选中的单元
        answerGiven: false,   // 是否已作答
        correctAnswer: null   // 正确答案
    },
    
    // 初始化模块
    init(unitId = 'all') {
        this.state.selectedUnit = unitId;
        this.state.words = this.getWordsFromUnit(unitId);
        
        // 创建任务队列（每个单词两个任务：英译中+中译英）
        this.state.tasks = [];
        this.state.words.forEach((word, index) => {
            this.state.tasks.push({ wordIndex: index, direction: 'en_to_cn', status: 0 });
            this.state.tasks.push({ wordIndex: index, direction: 'cn_to_en', status: 0 });
        });
        
        // 初始化队列（任务索引）
        this.state.queue = this.state.tasks.map((_, i) => i);
        this.shuffle(this.state.queue);
        
        // 重置统计
        this.state.stats = {
            total: this.state.tasks.length,
            mastered: 0,
            reviewed: 0
        };
        
        this.state.currentIndex = 0;
        this.state.answerGiven = false;
        
        return this.state.tasks.length > 0;
    },
    
    // 从单元获取单词列表
    getWordsFromUnit(unitId) {
        const textbook = getCurrentTextbook();
        if (!textbook) return [];
        
        if (unitId === 'all') {
            // 所有单元的单词
            const words = [];
            Object.values(textbook.units).forEach(unit => {
                if (unit.vocabulary) {
                    words.push(...unit.vocabulary);
                }
            });
            return words;
        }
        
        return textbook.units[unitId]?.vocabulary || [];
    },
    
    // 随机打乱数组
    shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    },
    
    // 获取当前任务
    getCurrentTask() {
        if (this.state.queue.length === 0) return null;
        const taskIndex = this.state.queue[0];
        const task = this.state.tasks[taskIndex];
        const word = this.state.words[task.wordIndex];
        return { ...task, taskIndex, word };
    },
    
    // 获取当前进度
    getProgress() {
        const total = this.state.stats.total;
        const completed = total - this.state.queue.length;
        return {
            current: completed + 1,
            total: total,
            percentage: Math.round((completed / total) * 100)
        };
    },
    
    // 生成选项
    generateOptions(currentTask) {
        const { word, direction } = currentTask;
        const correctAnswer = direction === 'en_to_cn' ? word.chinese : word.word;
        
        // 从同单元其他单词中随机选2个作为干扰项
        const otherWords = this.state.words.filter((w, i) => i !== wordIndex);
        const distractors = [];
        
        while (distractors.length < 2 && otherWords.length > 0) {
            const randomIndex = Math.floor(Math.random() * otherWords.length);
            const distractorWord = otherWords.splice(randomIndex, 1)[0];
            const distractor = direction === 'en_to_cn' ? distractorWord.chinese : distractorWord.word;
            if (!distractors.includes(distractor) && distractor !== correctAnswer) {
                distractors.push(distractor);
            }
        }
        
        // 如果单词不够，使用一些通用干扰项
        if (distractors.length < 2) {
            const fallbackCn = ['苹果', '香蕉', '橙子', '葡萄', '西瓜', '草莓', '芒果', '菠萝'];
            const fallbackEn = ['apple', 'banana', 'orange', 'grape', 'watermelon', 'strawberry', 'mango', 'pineapple'];
            const fallback = direction === 'en_to_cn' ? fallbackCn : fallbackEn;
            
            while (distractors.length < 2) {
                const randomFallback = fallback[Math.floor(Math.random() * fallback.length)];
                if (!distractors.includes(randomFallback) && randomFallback !== correctAnswer) {
                    distractors.push(randomFallback);
                }
            }
        }
        
        // 打乱选项顺序
        return this.shuffle([correctAnswer, ...distractors]);
    },
    
    // 处理答题
    handleAnswer(selectedAnswer) {
        const currentTask = this.getCurrentTask();
        if (!currentTask || this.state.answerGiven) return null;
        
        const { word, direction, taskIndex } = currentTask;
        const correctAnswer = direction === 'en_to_cn' ? word.chinese : word.word;
        
        this.state.answerGiven = true;
        this.state.correctAnswer = correctAnswer;
        
        const isCorrect = selectedAnswer === correctAnswer;
        
        if (!isCorrect) {
            // 答错：自动标记为陌生
            this.handleMemoryFeedback(0);
        }
        
        return {
            isCorrect,
            correctAnswer,
            selectedAnswer
        };
    },
    
    // 处理熟练度反馈
    handleMemoryFeedback(status) {
        const taskIndex = this.state.queue.shift();
        this.state.tasks[taskIndex].status = status;
        
        if (status === 2) {
            // 熟练：不再添加回队列
            this.state.stats.mastered++;
        } else if (status === 1) {
            // 模糊：插到队列第3位后（间隔重复）
            const insertPos = Math.min(3, this.state.queue.length);
            this.state.queue.splice(insertPos, 0, taskIndex);
        } else {
            // 陌生：插到队首（优先再练）
            this.state.queue.unshift(taskIndex);
        }
        
        this.state.stats.reviewed++;
        this.state.answerGiven = false;
        this.state.correctAnswer = null;
        
        return this.state.queue.length === 0;
    },
    
    // 检查是否通关
    checkComplete() {
        return this.state.queue.length === 0;
    },
    
    // 获取统计数据
    getStats() {
        return {
            ...this.state.stats,
            avgReviewCount: this.state.stats.total > 0 
                ? (this.state.stats.reviewed / this.state.stats.total).toFixed(1) 
                : 0
        };
    },
    
    // 重置模块
    reset() {
        this.state = {
            words: [],
            tasks: [],
            queue: [],
            currentIndex: 0,
            stats: {
                total: 0,
                mastered: 0,
                reviewed: 0
            },
            selectedUnit: null,
            answerGiven: false,
            correctAnswer: null
        };
    }
};

        // 生成选项
        const wordIndex = task.wordIndex;
        const correctAnswer = direction === 'en_to_cn' ? word.chinese : word.word;
        const otherWords = this.state.words?.filter((w, i) => i !== wordIndex) || [];
        const distractors = [];
        
        while (distractors.length < 2 && otherWords.length > 0) {
            const randomIndex = Math.floor(Math.random() * otherWords.length);
            const distractorWord = otherWords.splice(randomIndex, 1)[0];
            const distractor = direction === 'en_to_cn' ? distractorWord.chinese : distractorWord.word;
            if (!distractors.includes(distractor) && distractor !== correctAnswer) {
                distractors.push(distractor);
            }
        }
        
        // 如果单词不够，使用一些通用干扰项
        if (distractors.length < 2) {
            const fallbackCn = ['苹果', '香蕉', '橙子', '葡萄', '西瓜', '草莓', '芒果', '菠萝'];
            const fallbackEn = ['apple', 'banana', 'orange', 'grape', 'watermelon', 'strawberry', 'mango', 'pineapple'];
            const fallback = direction === 'en_to_cn' ? fallbackCn : fallbackEn;
            
            while (distractors.length < 2) {
                const randomFallback = fallback[Math.floor(Math.random() * fallback.length)];
                if (!distractors.includes(randomFallback) && randomFallback !== correctAnswer) {
                    distractors.push(randomFallback);
                }
            }
        }
        
        const options = WordMemoryModule.shuffle([correctAnswer, ...distractors]);
        
        // 渲染页面
        const html = `
            <div class="word-memory-training">
                <!-- 进度条 -->
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progress.percentage}%"></div>
                    <div class="progress-text">${progress.current}/${progress.total}</div>
                </div>
                
                <!-- 主卡片 -->
                <div class="word-memory-card-display">
                    <span class="mode-label ${modeClass}">${modeLabel}</span>
                    
                    <div class="word-memory-main">
                        ${direction === 'en_to_cn' ? `
                            <div class="word-memory-word" onclick="TTSModule.speakWord('${word.word}')">${word.word}</div>
                            <div class="word-memory-phonetic" onclick="TTSModule.speakWord('${word.word}')">${word.phonetic || ''}</div>
                        ` : `
                            <div class="word-memory-chinese">${word.chinese}</div>
                        `}
                    </div>
                    
                    <!-- 熟练度按钮 -->
                    <div class="proficiency-buttons" id="proficiency-buttons">
                        <button class="proficiency-btn strange" onclick="App.handleMemoryFeedback(0)">
                            <span class="emoji">😨</span>
                            <span class="label">陌生</span>
                        </button>
                        <button class="proficiency-btn vague" onclick="App.handleMemoryFeedback(1)">
                            <span class="emoji">🤔</span>
                            <span class="label">模糊</span>
                        </button>
                        <button class="proficiency-btn mastered" onclick="App.handleMemoryFeedback(2)">
                            <span class="emoji">😎</span>
                            <span class="label">熟练</span>
                        </button>
                    </div>
                </div>
                
                <!-- 选项区域 -->
                <div class="word-memory-options" id="word-memory-options">
                    ${options.map((option, index) => `
                        <div class="word-memory-option" 
                             data-option="${option}" 
                             onclick="App.handleWordOption(this, '${option.replace(/'/g, "\\'")}')">
                            ${option}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        
        this.setContent(html);
        
        // 播放发音（英译中模式）
        if (direction === 'en_to_cn') {
            setTimeout(() => {
                TTSModule.speakWord(word.word);
            }, 300);
        }
    },
    
    // 处理选项点击
    handleWordOption(element, selectedOption) {
        // 防止重复点击
        if (element.classList.contains('correct') || element.classList.contains('wrong')) {
            return;
        }
        
        const result = WordMemoryModule.handleAnswer(selectedOption);
        
        if (result) {
            const options = document.querySelectorAll('.word-memory-option');
            
            options.forEach(opt => {
                opt.onclick = null; // 移除点击事件
                
                if (opt.dataset.option === result.correctAnswer) {
                    opt.classList.add('correct');
                } else if (opt.dataset.option === selectedOption && !result.isCorrect) {
                    opt.classList.add('wrong');
                }
            });
            
            // 如果答错，震动
            if (!result.isCorrect) {
                this.vibrateDevice();
            }
            
            // 如果答对，显示提示
            if (result.isCorrect) {
                this.showToast('✓ 回答正确！', 1000);
            }
        }
    },
    
    // 处理熟练度反馈
    handleMemoryFeedback(status) {
        const isComplete = WordMemoryModule.handleMemoryFeedback(status);
        
        if (isComplete) {
            this.showWordMemoryComplete();
        } else {
            this.renderWordMemoryTraining();
        }
    },
    
    // 显示通关界面
    showWordMemoryComplete() {
        const stats = WordMemoryModule.getStats();
        const unitName = WordMemoryModule.state.selectedUnit === 'all' 
            ? '全部单元' 
            : `Unit ${WordMemoryModule.state.selectedUnit.replace('unit', '')}`;
        
        const html = `
            <div class="word-memory-complete">
                <div class="complete-icon">🎉</div>
                <h1>恭喜通关！</h1>
                
                <div class="stats-card">
                    <div class="stats-title">📊 本次训练统计</div>
                    
                    <div class="stat-row">
                        <span class="stat-label">训练范围</span>
                        <span class="stat-value">${unitName}</span>
                    </div>
                    
                    <div class="stat-row">
                        <span class="stat-label">掌握单词</span>
                        <span class="stat-value highlight">${stats.mastered}个</span>
                    </div>
                    
                    <div class="stat-row">
                        <span class="stat-label">总练习次数</span>
                        <span class="stat-value">${stats.reviewed}次</span>
                    </div>
                    
                    <div class="stat-row">
                        <span class="stat-label">平均每词</span>
                        <span class="stat-value">${stats.avgReviewCount}次</span>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn primary" onclick="App.restartWordMemory()">
                        🔄 再来一轮
                    </button>
                    <button class="action-btn secondary" onclick="App.renderHome()">
                        🏠 返回首页
                    </button>
                </div>
            </div>
        `;
        
        this.setContent(html);
        
        // 更新学习记录
        StorageModule.incrementWordsLearned(stats.mastered);
    },
    
    // 重新开始
    restartWordMemory() {
        const unitId = WordMemoryModule.state.selectedUnit;
        this.startWordMemory(unitId);
    },
    
    // 震动反馈
    vibrateDevice() {
        if ('vibrate' in navigator) {
            navigator.vibrate([100, 50, 100]);
        }
    }
});

// ==================== 学科切换管理 ====================
const SUBJECTS = {
    ENGLISH: 'english',
    MATH: 'math',
    CHINESE: 'chinese'
};

const SUBJECT_CONFIG = {
    english: { name: '英语', icon: '📖', color: '#FF6B6B' },
    math: { name: '数学', icon: '📐', color: '#9B59B6' },
    chinese: { name: '语文', icon: '📚', color: '#27AE60' }
};

const SubjectManager = {
    STORAGE_KEY: 'currentSubject',
    
    // 获取当前学科
    getCurrent() {
        return localStorage.getItem(this.STORAGE_KEY) || SUBJECTS.ENGLISH;
    },
    
    // 设置当前学科
    setCurrent(subject) {
        localStorage.setItem(this.STORAGE_KEY, subject);
    },
    
    // 渲染学科切换栏
    renderTabs(currentSubject) {
        const tabs = Object.entries(SUBJECT_CONFIG).map(([key, config]) => {
            const isActive = key === currentSubject;
            return `
                <button class="subject-tab ${isActive ? 'active' : ''}" 
                        data-subject="${key}" 
                        onclick="SubjectManager.switchSubject('${key}')">
                    <span class="tab-icon">${config.icon}</span>
                    <span>${config.name}</span>
                </button>
            `;
        }).join('');
        
        return `
            <div class="subject-tabs">
                ${tabs}
            </div>
        `;
    },
    
    // 切换学科
    switchSubject(subject) {
        this.setCurrent(subject);
        
        // 更新主题色
        this.updateThemeColor(subject);
        
        // 更新标签样式
        document.querySelectorAll('.subject-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.subject === subject);
        });
        
        // 更新内容显示
        this.updateContentDisplay(subject);
    },
    
    // 更新主题色
    updateThemeColor(subject) {
        const config = SUBJECT_CONFIG[subject];
        if (config && config.color) {
            document.documentElement.style.setProperty('--current-subject-color', config.color);
            // 根据主色计算浅色
            const lightColor = this.adjustColorBrightness(config.color, 20);
            document.documentElement.style.setProperty('--current-subject-light', lightColor);
        }
    },
    
    // 调整颜色亮度
    adjustColorBrightness(hex, percent) {
        const num = parseInt(hex.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = Math.min(255, (num >> 16) + amt);
        const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
        const B = Math.min(255, (num & 0x0000FF) + amt);
        return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
    },
    
    // 更新内容显示
    updateContentDisplay(subject) {
        // 隐藏所有内容
        document.querySelectorAll('.subject-content').forEach(content => {
            content.classList.remove('active');
        });
        
        // 显示对应学科内容
        const targetContent = document.getElementById(`content-${subject}`);
        if (targetContent) {
            targetContent.classList.add('active');
        }
    }
};

// ==================== PWA / Service Worker ====================
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(registration => {
                console.log('[App] ServiceWorker registered:', registration.scope);
                
                // 检查更新
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // 发现新版本，显示温和提示
                            console.log('[App] New version available!');
                            showUpdateBanner();
                        }
                    });
                });
                
                // 定期检查更新（每小时一次）
                setInterval(() => {
                    registration.update();
                }, 60 * 60 * 1000);
            })
            .catch(err => {
                console.log('[App] ServiceWorker registration failed:', err);
            });
    });
    
    // 监听来自 Service Worker 的消息
    navigator.serviceWorker.addEventListener('message', event => {
        if (event.data && event.data.type === 'SKIP_WAITING') {
            window.location.reload();
        }
    });
}

    if (document.getElementById('update-banner')) return;
    
    const banner = document.createElement('div');
    banner.id = 'update-banner';
    banner.innerHTML = `
        <div class="update-banner-content">
            <span>🔔 发现新版本</span>
            <div class="update-banner-actions">
                <button class="update-btn-later" onclick="this.parentElement.parentElement.parentElement.remove()">稍后</button>
                <button class="update-btn-now" onclick="updateNow()">立即更新</button>
            </div>
        </div>
    `;
    
    // 添加样式
    const style = document.createElement('style');
    style.textContent = `
        #update-banner {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;

            display: flex;

// 立即更新
function updateNow() {
    const banner = document.getElementById('update-banner');
    if (banner) {
        banner.innerHTML = '<div class="update-banner-content"><span>⏳ 正在更新...</span></div>';
    }
    
    // 通知 Service Worker 跳过等待
    if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ action: 'skipWaiting' });
    }
    
    // 1秒后刷新页面
    setTimeout(() => {
        window.location.reload();
    }, 1000);
}
