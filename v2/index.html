// ==================== DataLoader Module (V2) ====================
const DataLoader = {
    _cache: {},
    VERSION: '2.1.3',  // 数据版本，更新时需递增
    
    // 检查并清理过期缓存
    _checkAndCleanCache() {
        const versionKey = 'englearn_data_version';
        const cachedVersion = localStorage.getItem(versionKey);
        
        if (cachedVersion !== this.VERSION) {
            console.log('检测到新版本数据，清理旧缓存...');
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith('englearn_data_') && key !== versionKey) {
                    localStorage.removeItem(key);
                }
            });
            localStorage.setItem(versionKey, this.VERSION);
        }
    },
    
    async loadGrade(gradeId) {
        // 首次加载时检查版本
        if (!this._versionChecked) {
            this._checkAndCleanCache();
            this._versionChecked = true;
        }
        
        // 确保gradeId是字符串
        if (typeof gradeId !== 'string') {
            console.warn('gradeId不是字符串，使用默认值:', gradeId);
            gradeId = 'grade3_2';
        }
        
        // 内存缓存
        if (this._cache[gradeId]) {
            return this._cache[gradeId];
        }
        
        // localStorage缓存
        const cacheKey = `englearn_data_${gradeId}`;
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
            try {
                const data = JSON.parse(cached);
                if (data && data.units) {
                    this._cache[gradeId] = data;
                    return data;
                }
            } catch (e) {
                console.warn('缓存解析失败:', e);
            }
        }
        
        // 从外部JSON文件加载
        try {
            const response = await fetch(`data/english/${gradeId}.json`);
            if (response.ok) {
                const data = await response.json();
                if (data && data.units) {
                    this._cache[gradeId] = data;
                    localStorage.setItem(cacheKey, JSON.stringify(data));
                    console.log(`从外部JSON加载 ${gradeId} 成功`);
                    return data;
                }
            }
        } catch (e) {
            console.warn('外部JSON加载失败，使用内嵌数据:', e);
        }
        
        // 降级到GRADES内嵌数据
        if (GRADES[gradeId] && GRADES[gradeId].units) {
            this._cache[gradeId] = GRADES[gradeId];
            return GRADES[gradeId];
        }
        
        // 最终降级
        console.warn('找不到年级数据:', gradeId, '，使用默认年级');
        return GRADES['grade3_2'];
    },
    
    async preloadAll() {
        return Promise.all(Object.keys(GRADES).map(id => this.loadGrade(id)));
    },
    
    // 清除所有缓存
    clearCache() {
        this._cache = {};
        Object.keys(GRADES).forEach(id => {
            localStorage.removeItem(`englearn_data_${id}`);
        });
        localStorage.removeItem('englearn_data_version');
    }
};



// 异步获取教材数据
async function getCurrentTextbookAsync() {
    const gradeId = StorageModule.getCurrentGrade();
    return await DataLoader.loadGrade(gradeId);
}

// 同步获取教材数据（优先使用GRADES元数据，异步加载详细数据）
function getCurrentTextbook() {
    const gradeId = StorageModule.getCurrentGrade();
    // 优先从DataLoader缓存获取（包含完整units数据）
    if (DataLoader._cache[gradeId] && DataLoader._cache[gradeId].units) {
        return DataLoader._cache[gradeId];
    }
    // 否则返回GRADES中的元数据（已有modules信息）
    return GRADES[gradeId] || GRADES['grade3_2'];
}

// 获取当前年级名称
function getCurrentGradeName() {
    const gradeId = StorageModule.getCurrentGrade();
    const grade = GRADES[gradeId] || GRADES['grade3_2'];
    return grade ? grade.name : '三年级下';
}

// 获取单元完整信息（兼容GRADES元数据和外部JSON两种格式）
function getUnitInfo(textbook, unit) {
    // unit可能是字符串id、{id: "unit1"}或完整对象
    const unitId = typeof unit === 'string' ? unit : (unit.id || unit);
    const unitData = textbook.units ? textbook.units[unitId] : null;
    
    return {
        id: unitId,
        name: unitData?.name || (typeof unit === 'object' ? unit.name : null) || unitId,
        nameCN: unitData?.nameCN || (typeof unit === 'object' ? unit.nameCN : null) || '',
        topic: unitData?.topic || '',
        vocabulary: unitData?.vocabulary || [],
        sentences: unitData?.sentences || [],
        module: unitData?.module || (typeof unit === 'object' ? unit.module : null) || ''
    };
}

const SM2Module = {
    DEFAULT_EASE_FACTOR: 2.5,
    MIN_EASE_FACTOR: 1.3,
    
    getTodayString() {
        const today = new Date();
        return today.toISOString().split('T')[0];

    calculate(quality, easeFactor, interval = 0, repetitions = 0) {
        let newEaseFactor = easeFactor || this.DEFAULT_EASE_FACTOR;
        let newInterval = interval;
        let newRepetitions = repetitions;
        
        if (quality >= 3) {
            if (newRepetitions === 0) {
                newInterval = 1;
            } else if (newRepetitions === 1) {
                newInterval = 6;
            } else {
                newInterval = Math.round(newInterval * newEaseFactor);
            }
            newRepetitions += 1;
            newEaseFactor = newEaseFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
        } else {
            newRepetitions = 0;
            newInterval = 1;
            newEaseFactor = newEaseFactor - 0.2;
        }
        
        newEaseFactor = Math.max(this.MIN_EASE_FACTOR, newEaseFactor);
        const nextReview = this.addDays(new Date(), newInterval);
        
        return {
            easeFactor: Math.round(newEaseFactor * 100) / 100,
            interval: newInterval,
            nextReview: nextReview.toISOString().split('T')[0],
            nextReviewFull: nextReview.toISOString(),
            repetitions: newRepetitions
        };
    },
    
    addDays(date, days) {
        const result = new Date(date);
        result.setDate(result.getDate() + days);
        return result;
    },
    
    isDue(nextReview) {
        const today = this.getTodayString();
        if (!nextReview) return true;
        const reviewDate = nextReview.split('T')[0];
        return reviewDate <= today;
    },
    
    getWordProgress(wordKey) {
        const allProgress = this.getAllProgress();
        return allProgress[wordKey] || null;
    },
    
    getAllProgress() {
        try {
            const data = localStorage.getItem('sm2_word_progress');
            return data ? JSON.parse(data) : {};
        } catch (e) {
            return {};
        }
    },
    
    saveAllProgress(progress) {
        try {
            localStorage.setItem('sm2_word_progress', JSON.stringify(progress));
        } catch (e) {
            console.error('保存单词进度失败:', e);
        }
    },
    
    updateWordProgress(wordKey, quality) {
        const allProgress = this.getAllProgress();
        const current = allProgress[wordKey] || {
            easeFactor: this.DEFAULT_EASE_FACTOR,
            interval: 0,
            repetitions: 0,
            reviewCount: 0,
            lastQuality: null
        };
        
        const result = this.calculate(
            quality,
            current.easeFactor,
            current.interval,
            current.repetitions
        );
        
        allProgress[wordKey] = {
            ...current,
            ...result,
            reviewCount: (current.reviewCount || 0) + 1,
            lastReview: new Date().toISOString(),
            lastQuality: quality
        };
        
        this.saveAllProgress(allProgress);
        return allProgress[wordKey];
    },
    
    getTodayReviewWords(limit = 20) {
        const allProgress = this.getAllProgress();
        const dueWords = [];
        
        for (const [wordKey, progress] of Object.entries(allProgress)) {
            if (this.isDue(progress.nextReview)) {
                dueWords.push({ wordKey, ...progress });
            }
        }
        
        dueWords.sort((a, b) => {
            const dateA = a.nextReview || '9999-12-31';
            const dateB = b.nextReview || '9999-12-31';
            return dateA.localeCompare(dateB);
        });
        
        return limit ? dueWords.slice(0, limit) : dueWords;
    },
    
    getTodayReviewCount() {
        return this.getTodayReviewWords().length;
    },
    
    getReviewStats() {
        const allProgress = this.getAllProgress();
        const todayCount = this.getTodayReviewCount();
        
        const mastered = Object.values(allProgress).filter(p =>
            p.repetitions >= 4 && p.interval >= 21
        ).length;
        
        const learning = Object.values(allProgress).filter(p =>
            p.repetitions > 0 && p.repetitions < 4
        ).length;
        
        const newWords = Object.values(allProgress).filter(p =>
            p.repetitions === 0 || p.reviewCount === 1
        ).length;
        
        return {
            totalWords: Object.keys(allProgress).length,
            todayCount,
            mastered,
            learning,
            newWords,
            masteryRate: Object.keys(allProgress).length > 0
                ? Math.round((mastered / Object.keys(allProgress).length) * 100)
                : 0
        };
    },
    
    statusToQuality(status) {
        switch (status) {
            case 0: return 1;
            case 1: return 3;
            case 2: return 5;
            default: return 3;
        }
    },
    
    getMasteryLevel(progress) {
        if (!progress || !progress.repetitions) {
            return { level: 'new', text: '新单词' };
        }
        
        const interval = progress.interval || 0;
        const reps = progress.repetitions || 0;
        
        if (interval >= 21 && reps >= 4) {
            return { level: 'mastered', text: '已掌握' };
        } else if (reps >= 2) {
            return { level: 'learning', text: '学习中' };
        } else if (reps >= 1) {
            return { level: 'familiar', text: '认识' };
        } else {
            return { level: 'new', text: '新单词' };
        }
    },
    
    initWordProgress(wordKey) {
        const allProgress = this.getAllProgress();
        if (!allProgress[wordKey]) {
            allProgress[wordKey] = {
                easeFactor: this.DEFAULT_EASE_FACTOR,
                interval: 0,
                repetitions: 0,
                nextReview: this.getTodayString(),
                reviewCount: 0,
                lastReview: null,
                lastQuality: null
            };
            this.saveAllProgress(allProgress);
        }
        return allProgress[wordKey];
    },
    
    removeWordProgress(wordKey) {
        const allProgress = this.getAllProgress();
        delete allProgress[wordKey];
        this.saveAllProgress(allProgress);
    },
    
    clearAllProgress() {
        localStorage.removeItem('sm2_word_progress');
    },
    
    exportProgress() {
        return this.getAllProgress();
    },
    
    importProgress(data) {
        if (data && typeof data === 'object') {
            this.saveAllProgress(data);
            return true;
        }
        return false;
    }
};

const StorageModule = {
    PREFIX: 'englearn_',
    
    KEYS: {
        VOCABULARY_PROGRESS: 'vocabulary_progress',
        REVIEW_SCHEDULE: 'review_schedule',
        LEARNING_HISTORY: 'learning_history',
        USER_SETTINGS: 'user_settings',
        FAVOURITES: 'favourites',
        STATISTICS: 'statistics',
        UNIT_PROGRESS: 'unit_progress',
        CURRENT_GRADE: 'current_grade'
    },
    
    // 获取当前用户ID
    getCurrentUserId() {
        return localStorage.getItem(UserModule.STORAGE_KEYS.CURRENT_USER) || null;
    },
    
    // 获取当前年级ID
    getCurrentGrade() {
        const grade = this.get(this.KEYS.CURRENT_GRADE, 'grade3_2');
        // 确保返回字符串类型
        if (typeof grade === 'object' && grade !== null) {
            return grade.id || 'grade3_2';
        }
        return grade;
    },
    
    // 设置当前年级ID
    setCurrentGrade(gradeId) {
        return this.save(this.KEYS.CURRENT_GRADE, gradeId);
    },
    
    // 获取用户专属键
    getUserKey(key) {
        const userId = this.getCurrentUserId();
        return userId ? `${userId}_${key}` : key;
    },
    
    // 初始化当前用户数据
    init() {
        const currentUser = UserModule.getCurrentUser();
        if (currentUser) {
            this.initForUser(currentUser.id);
        }
    },
    
    // 为指定用户初始化数据
    initForUser(userId) {
        const originalUserId = this.getCurrentUserId();
        this.setCurrentUserIdForStorage(userId);
        
        this.ensureDataStructure();
        
        // 恢复原始用户
        if (originalUserId) {
            this.setCurrentUserIdForStorage(originalUserId);
        }
    },
    
    // 内部方法：设置用户ID（不影响全局current_user）
    setCurrentUserIdForStorage(userId) {
        // 这个方法用于在获取统计数据时临时切换用户
        this._tempUserId = userId;
    },
    
    // 内部方法：获取当前用户ID（优先使用临时值）
    _getCurrentUserId() {
        return this._tempUserId || this.getCurrentUserId();
    },
    
    // 获取用户专属键
    _getUserKey(key) {
        const userId = this._getCurrentUserId();
        return userId ? `${userId}_${key}` : key;
    },
    
    ensureDataStructure() {
        const userKey = this._getUserKey.bind(this);
        
        Object.values(this.KEYS).forEach(key => {
            const fullKey = this.PREFIX + userKey(key);
            if (!localStorage.getItem(fullKey)) {
                if (key === this.KEYS.STATISTICS) {
                    localStorage.setItem(fullKey, JSON.stringify(this.getDefaultStatistics()));
                } else if (key === this.KEYS.USER_SETTINGS) {
                    localStorage.setItem(fullKey, JSON.stringify(this.getDefaultSettings()));
                } else {
                    localStorage.setItem(fullKey, JSON.stringify(key === this.KEYS.REVIEW_SCHEDULE || key === this.KEYS.LEARNING_HISTORY || key === this.KEYS.FAVOURITES ? [] : {}));
                }
            }
        });
    },
    
    getDefaultSettings() {
        return {
            ttsRate: 0.85,
            theme: 'light',
            showPhonetic: true,
            autoPlay: true,
            dailyGoal: 10,
            reminderTime: '20:00'
        };
    },
    
    getDefaultStatistics() {
        return {
            totalWordsLearned: 0,
            totalReviewsDone: 0,
            streakDays: 0,
            lastStudyDate: null,
            wordsPerDay: {},
            accuracyHistory: []
        };
    },
    
    save(key, data) {
        try {
            const fullKey = this.PREFIX + this._getUserKey(key);
            localStorage.setItem(fullKey, JSON.stringify(data));
            return true;
        } catch (e) {
            console.error('保存数据失败:', e);
            return false;
        }
    },
    
    get(key, defaultValue = null) {
        try {
            const fullKey = this.PREFIX + this._getUserKey(key);
            const data = localStorage.getItem(fullKey);
            return data ? JSON.parse(data) : defaultValue;
        } catch (e) {
            console.error('读取数据失败:', e);
            return defaultValue;
        }
    },
    
    remove(key) {
        const fullKey = this.PREFIX + this._getUserKey(key);
        localStorage.removeItem(fullKey);
    },
    
    saveSetting(key, value) {
        const settings = this.get(this.KEYS.USER_SETTINGS, this.getDefaultSettings());
        settings[key] = value;
        return this.save(this.KEYS.USER_SETTINGS, settings);
    },
    
    getSetting(key, defaultValue = null) {
        const settings = this.get(this.KEYS.USER_SETTINGS, this.getDefaultSettings());
        return settings.hasOwnProperty(key) ? settings[key] : defaultValue;
    },
    
    getWordProgress(wordKey) {
        const progress = this.get(this.KEYS.VOCABULARY_PROGRESS, {});
        return progress[wordKey] || null;
    },
    
    saveWordProgress(wordKey, progressData) {
        const progress = this.get(this.KEYS.VOCABULARY_PROGRESS, {});
        progress[wordKey] = {
            ...progressData,
            lastUpdated: new Date().toISOString()
        };
        return this.save(this.KEYS.VOCABULARY_PROGRESS, progress);
    },
    
    getAllWordProgress() {
        return this.get(this.KEYS.VOCABULARY_PROGRESS, {});
    },
    
    getUnitWordProgress(unitId) {
        const allProgress = this.getAllWordProgress();
        const unitProgress = {};
        for (const key in allProgress) {
            if (key.startsWith(unitId + '_')) {
                unitProgress[key] = allProgress[key];
            }
        }
        return unitProgress;
    },
    
    getUnitCompletion(unitId, totalWords) {
        const unitProgress = this.getUnitWordProgress(unitId);
        const learnedCount = Object.keys(unitProgress).filter(key => 
            unitProgress[key].status === 'learned' || unitProgress[key].status === 'mastered'
        ).length;
        return totalWords > 0 ? Math.round((learnedCount / totalWords) * 100) : 0;
    },
    
    getReviewSchedule() {
        return this.get(this.KEYS.REVIEW_SCHEDULE, []);
    },
    
    addReviewTask(task) {
        const schedule = this.getReviewSchedule();
        schedule.push({
            ...task,
            id: Date.now().toString(),
            createdAt: new Date().toISOString()
        });
        return this.save(this.KEYS.REVIEW_SCHEDULE, schedule);
    },
    
    updateReviewTask(taskId, updates) {
        const schedule = this.getReviewSchedule();
        const index = schedule.findIndex(t => t.id === taskId);
        if (index !== -1) {
            schedule[index] = { ...schedule[index], ...updates };
            return this.save(this.KEYS.REVIEW_SCHEDULE, schedule);
        }
        return false;
    },
    
    removeReviewTask(taskId) {
        const schedule = this.getReviewSchedule();
        const filtered = schedule.filter(t => t.id !== taskId);
        return this.save(this.KEYS.REVIEW_SCHEDULE, filtered);
    },
    
    getTodayReviews() {
        const schedule = this.getReviewSchedule();
        const today = new Date().toDateString();
        return schedule.filter(task => {
            const reviewDate = new Date(task.nextReview).toDateString();
            return reviewDate <= today;
        });
    },
    
    getReviewCount() {
        return this.getTodayReviews().length;
    },
    
    addLearningRecord(record) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        history.push({
            ...record,
            id: Date.now().toString(),
            timestamp: new Date().toISOString()
        });
        if (history.length > 100) {
            history.shift();
        }
        return this.save(this.KEYS.LEARNING_HISTORY, history);
    },
    
    getLearningHistory(limit = 20) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        return history.slice(-limit).reverse();
    },
    
    getFavourites() {
        return this.get(this.KEYS.FAVOURITES, []);
    },
    
    addFavourite(wordKey, wordData) {
        const favourites = this.getFavourites();
        if (!favourites.find(f => f.wordKey === wordKey)) {
            favourites.push({
                wordKey,
                ...wordData,
                addedAt: new Date().toISOString()
            });
            return this.save(this.KEYS.FAVOURITES, favourites);
        }
        return false;
    },
    
    removeFavourite(wordKey) {
        const favourites = this.getFavourites();
        const filtered = favourites.filter(f => f.wordKey !== wordKey);
        return this.save(this.KEYS.FAVOURITES, filtered);
    },
    
    isFavourite(wordKey) {
        const favourites = this.getFavourites();
        return favourites.some(f => f.wordKey === wordKey);
    },
    
    getStatistics() {
        return this.get(this.KEYS.STATISTICS, this.getDefaultStatistics());
    },
    
    updateStatistics(updates) {
        const stats = this.getStatistics();
        return this.save(this.KEYS.STATISTICS, { ...stats, ...updates });
    },
    
    incrementWordsLearned(count = 1) {
        const stats = this.getStatistics();
        stats.totalWordsLearned += count;
        const today = new Date().toDateString();
        stats.wordsPerDay[today] = (stats.wordsPerDay[today] || 0) + count;
        this.updateStreak();
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    incrementReviewsDone(count = 1) {
        const stats = this.getStatistics();
        stats.totalReviewsDone += count;
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    updateStreak() {
        const stats = this.getStatistics();
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (stats.lastStudyDate) {
            const lastDate = new Date(stats.lastStudyDate);
            if (lastDate.toDateString() === today.toDateString()) {
                // 今天已经学习，不更新
            } else if (lastDate.toDateString() === yesterday.toDateString()) {
                stats.streakDays += 1;
            } else {
                stats.streakDays = 1;
            }
        } else {
            stats.streakDays = 1;
        }
        
        stats.lastStudyDate = today.toISOString();
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    getStreakDays() {
        const stats = this.getStatistics();
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (stats.lastStudyDate) {
            const lastDate = new Date(stats.lastStudyDate);
            if (lastDate.toDateString() !== today.toDateString() && 
                lastDate.toDateString() !== yesterday.toDateString()) {
                return 0;
            }
        }
        
        return stats.streakDays || 0;
    },
    
    getTodayWordsLearned() {
        const stats = this.getStatistics();
        const today = new Date().toDateString();
        return stats.wordsPerDay[today] || 0;
    },
    
    getUnitProgress(unitId) {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        return allProgress[unitId] || {
            wordsLearned: 0,
            sentencesLearned: 0,
            dialoguesLearned: 0,
            exercisesDone: 0,
            completed: false
        };
    },
    
    updateUnitProgress(unitId, updates) {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        allProgress[unitId] = {
            ...allProgress[unitId],
            ...updates,
            lastUpdated: new Date().toISOString()
        };
        return this.save(this.KEYS.UNIT_PROGRESS, allProgress);
    },
    
    completeUnit(unitId) {
        return this.updateUnitProgress(unitId, { completed: true, completedAt: new Date().toISOString() });
    },
    
    getCompletedUnits() {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        return Object.keys(allProgress).filter(unitId => allProgress[unitId].completed);
    },
    
    clearAllData() {
        Object.values(this.KEYS).forEach(key => {
            this.remove(key);
        });
        this.ensureDataStructure();
    },
    
    // 清除指定用户的所有数据
    clearUserData(userId) {
        const prefix = this.PREFIX + userId + '_';
        const keysToRemove = [];
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith(prefix)) {
                keysToRemove.push(key);
            }
        }
        
        keysToRemove.forEach(key => localStorage.removeItem(key));
    },
    
    exportData() {
        const data = {};
        Object.keys(this.KEYS).forEach(key => {
            data[key] = this.get(key);
        });
        return data;
    },
    
    importData(data) {
        if (data && typeof data === 'object') {
            Object.keys(data).forEach(key => {
                if (this.KEYS.hasOwnProperty(key)) {
                    this.save(key, data[key]);
                }
            });
            return true;
        }
        return false;
    }
};

 */

const TTSModule = {
    config: {
        voice: 'UK English Female',  // 使用英式发音，与国际音标一致
        chineseVoice: 'Chinese Female',
        rate: 0.85,
        pitch: 1.0
    },
    
    // 标记ResponsiveVoice是否可用
    responsiveVoiceReady: false,
    
    availableVoices: [
        { id: 'US English Female', name: '美式女声', lang: 'en-US' },
        { id: 'UK English Female', name: '英式女声', lang: 'en-GB' },
        { id: 'US English Male', name: '美式男声', lang: 'en-US' },
        { id: 'UK English Male', name: '英式男声', lang: 'en-GB' },
        { id: 'Chinese Female', name: '中文女声', lang: 'zh-CN' },
        { id: 'Chinese Male', name: '中文男声', lang: 'zh-CN' }
    ],
    
    // 页面初始化时加载TTS
    init() {
        return new Promise((resolve) => {
            // 设置超时，5秒内没加载成功就使用百度TTS
            const timeout = setTimeout(() => {
                console.warn('ResponsiveVoice 加载超时，将使用百度TTS');
                resolve(false);
            }, 5000);
            
            if (typeof responsiveVoice !== 'undefined') {
                clearTimeout(timeout);
                console.log('✓ ResponsiveVoice 已加载');
                this.responsiveVoiceReady = true;
                resolve(true);
                return;
            }
            
            const script = document.createElement('script');
            script.src = 'https://code.responsivevoice.org/responsivevoice.js?key=free-non-commercial-use';
            script.onload = () => {
                clearTimeout(timeout);
                console.log('✓ ResponsiveVoice 加载成功');
                this.responsiveVoiceReady = true;
                setTimeout(() => resolve(true), 300);
            };
            script.onerror = () => {
                clearTimeout(timeout);
                console.warn('ResponsiveVoice 加载失败，将使用百度TTS');
                this.responsiveVoiceReady = false;
                resolve(false);
            };
            document.head.appendChild(script);
        });

    // 用户交互后激活音频（iOS Safari需要这个来解锁音频）
    activateAudioAfterGesture() {
        if (this._audioActivated) return;
        this._audioActivated = true;
        
        console.log('🎵 开始激活音频系统...');
        
        // iOS Safari / PWA 独立模式 音频解锁
        // 方法1: 创建一个静音的AudioContext并resume
        try {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass) {
                const ctx = new AudioContextClass();
                ctx.resume().then(() => {
                    console.log('✓ AudioContext已解锁');
                    // 创建一个极短的静音音频节点播放
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    gainNode.gain.value = 0; // 静音
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.001);
                    ctx.close();
                }).catch(e => console.warn('AudioContext解锁失败:', e));
            }
        } catch (e) { console.warn('AudioContext创建失败:', e); }
        
        // 方法2: 播放一个静音音频来解锁iOS音频
        try {
            const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
            silentAudio.volume = 0.01; // 几乎静音
            silentAudio.play().then(() => {
                console.log('✓ 静音音频播放成功，iOS音频已解锁');
            }).catch(e => console.warn('静音音频播放失败:', e));
        } catch (e) { console.warn('静音音频创建失败:', e); }
        
        // 方法3: 预加载speechSynthesis voices（iOS PWA需要）
        try {
            if ('speechSynthesis' in window) {
                const voices = speechSynthesis.getVoices();
                if (voices.length === 0) {
                    speechSynthesis.addEventListener('voiceschanged', () => {
                        console.log('✓ speechSynthesis voices已加载:', speechSynthesis.getVoices().length);
                    }, { once: true });
                } else {
                    console.log('✓ speechSynthesis voices已就绪:', voices.length);
                }
            }
        } catch (e) { console.warn('speechSynthesis激活失败:', e); }
        
        console.log('✅ 音频系统激活完成');
    },
    
    // 检测是否是iOS设备
    isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    },
    
    containsChinese(text) {
        return /[\u4e00-\u9fa5]/.test(text);
    },
    
    autoDetectVoice(text) {
        if (this.containsChinese(text)) {
            return this.config.chineseVoice;
        }
        return this.config.voice;
    },
    
    speak(text, options = {}) {
        return new Promise(async (resolve, reject) => {
            const voice = options.voice || this.autoDetectVoice(text);
            const rate = options.rate || this.config.rate;
            
            // 优先使用 ResponsiveVoice
            if (this.responsiveVoiceReady && typeof responsiveVoice !== 'undefined') {
                responsiveVoice.speak(text, voice, {
                    rate: rate,
                    pitch: options.pitch || this.config.pitch,
                    onend: () => resolve(),
                    onerror: (e) => {
                        console.warn('ResponsiveVoice错误，尝试备用方案:', e);
                        // iOS上跳过百度TTS，直接用Web Speech API
                        if (this.isIOS()) {
                            this.speakWithBrowser(text).then(resolve);
                        } else {
                            this.speakWithBaidu(text).then(resolve).catch(() => {
                                this.speakWithBrowser(text).then(resolve);
                            });
                        }
                    }
                });
            } 
            // Fallback: iOS直接用Web Speech API，其他平台先尝试百度TTS
            else {
                if (this.isIOS()) {
                    this.speakWithBrowser(text).then(resolve);
                } else {
                    this.speakWithBaidu(text).then(resolve).catch(() => {
                        this.speakWithBrowser(text).then(resolve);
                    });
                }
            }
        });
    },
    
    // 百度TTS（备用方案）
    speakWithBaidu(text) {
        return new Promise((resolve, reject) => {
            const isChinese = this.containsChinese(text);
            const lang = isChinese ? 'zh' : 'en';
            
            // 百度TTS公开接口
            const url = `https://tts.baidu.com/text2audio?tex=${encodeURIComponent(text)}&cuid=baike&lan=${lang}&ctp=1&pdt=301&vol=9&rate=32&per=0`;
            
            const audio = new Audio(url);
            this.currentAudio = audio;
            
            audio.onended = () => {
                this.currentAudio = null;
                resolve();
            };
            
            audio.onerror = (e) => {
                this.currentAudio = null;
                console.warn('百度TTS失败:', e);
                reject(e);
            };
            
            audio.play().catch(e => {
                this.currentAudio = null;
                reject(e);
            });
        });
    },
    
    // 浏览器原生TTS（最后的备用方案）
    speakWithBrowser(text) {
        return new Promise((resolve) => {
            if (!('speechSynthesis' in window)) {
                console.warn('浏览器不支持TTS');
                resolve();
                return;
            }
            
            const isChinese = this.containsChinese(text);
            const targetLang = isChinese ? 'zh-CN' : 'en-US';
            
            // 获取合适的语音（iOS需要等待voices加载）
            const getBestVoice = () => {
                const voices = speechSynthesis.getVoices();
                
                // 调试：打印所有可用声音（帮助排查PWA问题）
                console.log('🎤 可用声音列表:', voices.map(v => `${v.name} (${v.lang})`));
                
                let voice = null;
                
                if (isChinese) {
                    // 中文声音：优先女声
                    voice = voices.find(v => v.name.includes('Ting-Ting') || v.name.includes('Sin-ji')) ||
                            voices.find(v => v.lang === 'zh-CN') || 
                            voices.find(v => v.lang.startsWith('zh'));
                } else {
                    // 英语声音：优先Karen或Samantha（iOS女声）
                    // iOS Eloquence 低质量声音列表（需要过滤掉）
                    const eloquenceVoices = ['Eddy', 'Flo', 'Grandma', 'Grandpa', 'Reed', 'Rocko', 'Sandy', 'Shelley'];
                    
                    // 检查是否是 Eloquence 低质量声音
                    const isEloquence = (v) => eloquenceVoices.some(name => v.name.includes(name));
                    
                    // 优先级：Karen > Samantha > Victoria > en-AU > en-US > en-GB > 任意英语（排除Eloquence）
                    voice = voices.find(v => v.name.includes('Karen') && !isEloquence(v)) ||
                            voices.find(v => v.name.includes('Samantha') && !isEloquence(v)) ||
                            voices.find(v => v.name.includes('Victoria') && !isEloquence(v)) ||
                            voices.find(v => v.lang === 'en-AU' && !isEloquence(v)) ||
                            voices.find(v => v.lang === 'en-US' && !isEloquence(v)) ||
                            voices.find(v => v.lang === 'en-GB' && !isEloquence(v)) ||
                            voices.find(v => v.lang.startsWith('en') && !isEloquence(v));
                    
                    // 如果只有 Eloquence 声音可用，返回 null（让 ResponsiveVoice 处理）
                    if (!voice) {
                        console.warn('🎤 只检测到 Eloquence 低质量声音，建议使用 ResponsiveVoice');
                    }
                    
                    console.log('🎤 选择的声音:', voice ? `${voice.name} (${voice.lang})` : '无（将使用 ResponsiveVoice）');
                }
                return voice;
            };
            
            const doSpeak = () => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = targetLang;
                utterance.rate = this.config.rate;
                utterance.pitch = this.config.pitch;
                
                const voice = getBestVoice();
                if (voice) {
                    utterance.voice = voice;
                }
                
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                
                // iOS Safari/Chrome 需要取消之前的播放
                speechSynthesis.cancel();
                setTimeout(() => {
                    speechSynthesis.speak(utterance);
                }, 100);
            };
            
            // iOS: voices 可能还没加载完，需要等待
            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                doSpeak();
            } else {
                // 等待 voices 加载（iOS 需要这个）
                let resolved = false;
                const onVoicesLoaded = () => {
                    if (resolved) return;
                    resolved = true;
                    speechSynthesis.removeEventListener('voiceschanged', onVoicesLoaded);
                    doSpeak();
                };
                speechSynthesis.addEventListener('voiceschanged', onVoicesLoaded);
                // 超时保护（缩短到500ms，iOS一般很快）
                setTimeout(() => {
                    if (resolved) return;
                    resolved = true;
                    speechSynthesis.removeEventListener('voiceschanged', onVoicesLoaded);
                    doSpeak();
                }, 500);
            }
        });
    },
    
    speakChinese(text, options = {}) {
        return this.speak(text, { ...options, voice: this.config.chineseVoice });
    },
    
    // 当前播放的音频元素
    currentAudio: null,
    
    cancel() {
        if (this.responsiveVoiceReady && typeof responsiveVoice !== 'undefined') {
            responsiveVoice.cancel();
        }
        if (this.currentAudio) {
            this.currentAudio.pause();
            this.currentAudio = null;
        }
    },
    
    isSpeaking() {
        if (this.responsiveVoiceReady && typeof responsiveVoice !== 'undefined') {
            return responsiveVoice.isPlaying();
        }
        return this.currentAudio && !this.currentAudio.paused;
    },
    
    speakWord(word, phonetic = '') {
        return this.speak(word, { rate: this.config.rate });
    },
    
    speakSentence(sentence) {
        return this.speak(sentence, { rate: this.config.rate * 0.9 });
    },
    
    async speakWithHighlight(text, onWordChange) {
        const words = text.split(/\s+/);
        for (let i = 0; i < words.length; i++) {
            if (onWordChange) {
                onWordChange(words[i], i, words.length);
            }
            await this.speak(words[i], { rate: this.config.rate });
            await this.wait(100);
        }
    },
    
    setRate(rate) {
        this.config.rate = Math.max(0.5, Math.min(2.0, rate));
        StorageModule.saveSetting('tts_rate', this.config.rate);
    },
    
    getRate() {
        return this.config.rate;
    },
    
    getRateLabel() {
        const rate = this.config.rate;
        if (rate <= 0.7) return '很慢';
        if (rate <= 0.85) return '较慢';
        if (rate <= 1.0) return '正常';
        if (rate <= 1.3) return '较快';
        return '很快';
    },
    
    loadSettings() {
        const savedRate = StorageModule.getSetting('tts_rate');
        if (savedRate) {
            this.config.rate = parseFloat(savedRate);
        }
    },
    
    getAvailableVoices() {
        return this.availableVoices;
    },
    
    setVoice(voiceId) {
        this.config.voice = voiceId;
    },
    
    wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

/**
 * 记忆曲线算法模块
 */

const MemoryModule = {
    config: {
        intervals: [
            5, 30, 720, 1440, 2880, 5760, 10080, 21600, 43200, 86400
        ],
        
        STATES: {
            NEW: 'new',
            LEARNING: 'learning',
            REVIEW: 'review',
            MASTERED: 'mastered',
            FORGOTTEN: 'forgotten'
        },
        
        MASTER_THRESHOLD: 4,
        RESET_THRESHOLD: 2
    },
    
    createReviewTask(wordKey, wordData) {
        const now = new Date();
        const firstReview = new Date(now.getTime() + this.config.intervals[0] * 60 * 1000);
        
        return {
            wordKey,
            word: wordData.word,
            chinese: wordData.chinese,
            phonetic: wordData.phonetic,
            letterSounds: wordData.letterSounds || [],
            unitId: wordData.unitId,
            moduleId: wordData.moduleId,
            easeFactor: 2.5,
            interval: 0,
            repetitions: 0,
            nextReview: firstReview.toISOString(),
            status: this.config.STATES.NEW,
            history: []
        };
    },
    
    calculateNextReview(task, quality) {
        const now = new Date();
        let newTask = { ...task };
        
        newTask.history = [...(task.history || []), {
            date: now.toISOString(),
            quality,
            interval: task.interval
        }];
        
        if (quality < 2) {
            newTask.repetitions = 0;
            newTask.interval = 0;
            newTask.nextReview = new Date(now.getTime() + 5 * 60 * 1000).toISOString();
            newTask.status = this.config.STATES.LEARNING;
            
            if (task.forgotCount !== undefined) {
                newTask.forgotCount = task.forgotCount + 1;
            } else {
                newTask.forgotCount = 1;
            }
            
            newTask.easeFactor = Math.max(1.3, task.easeFactor - 0.2);
        } 
        else {
            newTask.forgotCount = 0;
            newTask.repetitions += 1;
            
            const qualityBonus = (quality - 3) * 0.1;
            newTask.easeFactor = Math.max(1.3, task.easeFactor + qualityBonus);
            
            if (newTask.repetitions === 1) {
                newTask.interval = 1;
            } else if (newTask.repetitions === 2) {
                newTask.interval = 3;
            } else {
                newTask.interval = Math.round(task.interval * newTask.easeFactor);
            }
            
            newTask.interval = Math.min(60, newTask.interval);
            
            const nextTime = now.getTime() + newTask.interval * 24 * 60 * 60 * 1000;
            newTask.nextReview = new Date(nextTime).toISOString();
            
            if (newTask.repetitions >= this.config.MASTER_THRESHOLD) {
                newTask.status = this.config.STATES.MASTERED;
            } else {
                newTask.status = this.config.STATES.REVIEW;
            }
        }
        
        newTask.lastReview = now.toISOString();
        
        return newTask;
    },
    
    processAnswer(task, isCorrect, responseTime = 0) {
        let quality;
        if (!isCorrect) {
            if (responseTime < 2000) {
                quality = 1;
            } else {
                quality = 0;
            }
        } else {
            if (responseTime < 1000) {
                quality = 5;
            } else if (responseTime < 2000) {
                quality = 4;
            } else if (responseTime < 4000) {
                quality = 3;
            } else {
                quality = 2;
            }
        }
        
        return this.calculateNextReview(task, quality);
    },
    
    getStatusDescription(task) {
        if (!task || !task.status) return '新单词';
        
        switch (task.status) {
            case this.config.STATES.NEW:
                return '新单词';
            case this.config.STATES.LEARNING:
                return '学习中';
            case this.config.STATES.REVIEW:
                return `复习中 (${task.repetitions}/${this.config.MASTER_THRESHOLD})`;
            case this.config.STATES.MASTERED:
                return '已掌握';
            case this.config.STATES.FORGOTTEN:
                return '已遗忘';
            default:
                return '未知状态';
        }
    },
    
    getTimeUntilReview(nextReview) {
        const now = new Date();
        const reviewDate = new Date(nextReview);
        const diff = reviewDate - now;
        
        if (diff <= 0) {
            return '现在可以复习';
        }
        
        const minutes = Math.floor(diff / (1000 * 60));
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        if (days > 0) {
            return `${days}天后`;
        } else if (hours > 0) {
            return `${hours}小时后`;
        } else {
            return `${minutes}分钟后`;
        }
    },
    
    isDueForReview(nextReview) {
        const now = new Date();
        const reviewDate = new Date(nextReview);
        return reviewDate <= now;
    },
    
    getSuggestion(quality) {
        if (quality >= 4) {
            return '很好！继续保持！';
        } else if (quality >= 2) {
            return '不错，但可以再多练习一下';
        } else if (quality >= 1) {
            return '试着回忆一下它的发音和用法';
        } else {
            return '多听几遍，试着理解它的意思';
        }
    },
    
    scheduleReview(wordKey, wordData) {
        const task = this.createReviewTask(wordKey, wordData);
        StorageModule.addReviewTask(task);
        
        StorageModule.saveWordProgress(wordKey, {
            status: task.status,
            nextReview: task.nextReview,
            easeFactor: task.easeFactor,
            interval: task.interval,
            repetitions: task.repetitions
        });
        
        return task;
    },
    
    updateReviewTask(task) {
        StorageModule.updateReviewTask(task.id, task);
        
        StorageModule.saveWordProgress(task.wordKey, {
            status: task.status,
            nextReview: task.nextReview,
            easeFactor: task.easeFactor,
            interval: task.interval,
            repetitions: task.repetitions
        });
    },
    
    getTodayReviewTasks(limit = 20) {
        const allReviews = StorageModule.getTodayReviews();
        
        allReviews.sort((a, b) => {
            return new Date(a.nextReview) - new Date(b.nextReview);
        });
        
        return limit ? allReviews.slice(0, limit) : allReviews;
    },
    
    getUnitReviewTasks(unitId) {
        const allTasks = StorageModule.getReviewSchedule();
        return allTasks.filter(task => task.unitId === unitId);
    },
    
    getReviewStats() {
        const allTasks = StorageModule.getReviewSchedule();
        const todayReviews = this.getTodayReviewTasks();
        
        const stats = {
            totalWords: allTasks.length,
            dueToday: todayReviews.length,
            mastered: allTasks.filter(t => t.status === this.config.STATES.MASTERED).length,
            learning: allTasks.filter(t => t.status === this.config.STATES.LEARNING).length,
            new: allTasks.filter(t => t.status === this.config.STATES.NEW).length,
            review: allTasks.filter(t => t.status === this.config.STATES.REVIEW).length
        };
        
        stats.masterRate = stats.totalWords > 0 
            ? Math.round((stats.mastered / stats.totalWords) * 100) 
            : 0;
        
        return stats;
    },
    
    getReviewCount() {
        return this.getTodayReviewTasks().length;
    },
    
    generateReviewReport(results) {
        const total = results.length;
        const correct = results.filter(r => r.isCorrect).length;
        const wrong = total - correct;
        
        const avgResponseTime = results.reduce((sum, r) => sum + r.responseTime, 0) / total;
        
        const byUnit = {};
        results.forEach(r => {
            if (!byUnit[r.unitId]) {
                byUnit[r.unitId] = { total: 0, correct: 0 };
            }
            byUnit[r.unitId].total++;
            if (r.isCorrect) byUnit[r.unitId].correct++;
        });
        
        return {
            date: new Date().toISOString(),
            total,
            correct,
            wrong,
            accuracy: total > 0 ? Math.round((correct / total) * 100) : 0,
            avgResponseTime: Math.round(avgResponseTime),
            byUnit,
            suggestions: this.getImprovementSuggestions(results)
        };
    },
    
    getImprovementSuggestions(results) {
        const suggestions = [];
        const wrongResults = results.filter(r => !r.isCorrect);
        
        if (wrongResults.length > 0) {
            suggestions.push('建议多听几遍这些单词的正确发音');
        }
        
        const slowResults = results.filter(r => r.responseTime > 3000);
        if (slowResults.length > results.length * 0.3) {
            suggestions.push('试着加快反应速度，看到单词就能想起意思');
        }
        
        const accuracy = results.filter(r => r.isCorrect).length / results.length;
        if (accuracy >= 0.9) {
            suggestions.push('太棒了！继续保持，你学得很好！');
        } else if (accuracy >= 0.7) {
            suggestions.push('做得不错，但还有进步空间');
        } else {
            suggestions.push('别灰心，多练习几次就会越来越好');
        }
        
        return suggestions;
    }
};

const Memory = {
    scheduleReview: (wordKey, wordData) => MemoryModule.scheduleReview(wordKey, wordData),

/**
 * 题型枚举
 */
const QUESTION_TYPES = {
    EN_TO_CN: 'en_to_cn',
    CN_TO_EN: 'cn_to_en',
    LISTEN_CHOOSE: 'listen_choose',
    SPELLING: 'spelling',  // 已废弃：混淆项无意义
    PHONETIC: 'phonetic',
    MINIMAL_PAIR: 'minimal_pair'  // 最小对立体辨析
};

/**
 * 题目生成器
 */
const QuestionGenerator = {
    generateEnToCn(word, allWords) {
        const correctAnswer = word.chinese;
        const distractors = this.getDistractors(word, allWords, 'chinese', 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        return {
            type: QUESTION_TYPES.EN_TO_CN,
            question: `单词 "${word.word}" 的中文意思是？`,
            word: word.word,
            phonetic: word.phonetic,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generateCnToEn(word, allWords) {
        const correctAnswer = word.word;
        const distractors = this.getDistractors(word, allWords, 'word', 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        return {
            type: QUESTION_TYPES.CN_TO_EN,
            question: `"${word.chinese}" 的英文是？`,
            chinese: word.chinese,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generateListenChoose(word, allWords) {
        const correctAnswer = word.word;
        const distractors = this.getDistractors(word, allWords, 'word', 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        return {
            type: QUESTION_TYPES.LISTEN_CHOOSE,
            question: '请选择你听到的单词',
            playAudio: true,
            audioWord: word.word,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generateSpelling(word) {
        const correctAnswer = word.word;
        const wrongSpellings = this.generateWrongSpellings(word.word, 3);
        const options = this.shuffle([correctAnswer, ...wrongSpellings]);
        return {
            type: QUESTION_TYPES.SPELLING,
            question: '🎧 听发音，选出正确的拼写：',
            word: word.word,
            playAudio: true,
            audioWord: word.word,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    generatePhonetic(word, letterGroup) {
        const correctAnswer = letterGroup.sound;
        const distractors = this.getPhoneticDistractors(letterGroup.sound, 3);
        const options = this.shuffle([correctAnswer, ...distractors]);
        
        const highlighted = this.highlightLetters(word.word, letterGroup.letters);
        
        return {
            type: QUESTION_TYPES.PHONETIC,
            question: '高亮部分的发音是？',
            wordHighlighted: highlighted,
            letters: letterGroup.letters,
            word: word.word,
            options: options.map(opt => ({ text: opt, isCorrect: opt === correctAnswer })),
            correctAnswer
        };
    },
    
    getDistractors(word, allWords, field, count) {
        const sameWords = allWords.filter(w => w.word !== word.word);
        const shuffled = sameWords.sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count).map(w => w[field]);
    },
    
    generateWrongSpellings(word, count) {
        const wrongs = [];
        const wordLower = word.toLowerCase();
        
        // 常见易混淆字母对
        const confusions = {
            'a': ['e', 'o'], 'e': ['a', 'i'], 'i': ['e', 'y'], 'o': ['a', 'u'], 'u': ['o'],
            'c': ['s', 'k'], 's': ['c', 'z'], 'z': ['s'],
            'f': ['v', 'ph'], 'v': ['f'],
            'g': ['j'], 'j': ['g'],
            'l': ['ll', 'le'], 'r': ['er', 're'],
            'y': ['i', 'ie'], 'w': ['u', 'wh']
        };
        
        const methods = [
            // 替换易混淆字母
            (w) => {
                for (let i = 0; i < w.length; i++) {
                    const char = w[i];
                    if (confusions[char]) {
                        const replacement = confusions[char][Math.floor(Math.random() * confusions[char].length)];
                        return w.slice(0, i) + replacement + w.slice(i + 1);
                    }
                }
                return null;
            },
            // 交换相邻字母
            (w) => {
                if (w.length < 2) return null;
                const idx = Math.floor(Math.random() * (w.length - 1));
                return w.slice(0, idx) + w[idx + 1] + w[idx] + w.slice(idx + 2);
            },
            // 删除一个字母
            (w) => {
                if (w.length < 3) return null;
                const idx = Math.floor(Math.random() * w.length);
                return w.slice(0, idx) + w.slice(idx + 1);
            },
            // 重复一个字母
            (w) => {
                const idx = Math.floor(Math.random() * w.length);
                return w.slice(0, idx) + w[idx] + w.slice(idx);
            }
        ];
        
        let attempts = 0;
        while (wrongs.length < count && attempts < 50) {
            const method = methods[Math.floor(Math.random() * methods.length)];
            const wrong = method(wordLower);
            if (wrong && wrong !== wordLower && !wrongs.includes(wrong) && wrong.length >= 2) {
                wrongs.push(wrong);
            }
            attempts++;
        }
        
        return wrongs;
    },
    
    highlightLetters(word, letters) {
        const regex = new RegExp(`(${letters})`, 'gi');
        return word.replace(regex, '<span class="highlight">$1</span>');
    },
    
    getPhoneticDistractors(correctSound, count) {
        const commonPhonetics = [
            '/æ/', '/e/', '/ɪ/', '/ɒ/', '/ʌ/', '/ə/',
            '/p/', '/b/', '/t/', '/d/', '/k/', '/g/',
            '/s/', '/z/', '/ʃ/', '/ʒ/', '/h/', '/f/',
            '/iː/', '/uː/', '/ɔː/', '/ɑː/', '/ɜː/',
            '/eɪ/', '/aɪ/', '/əʊ/', '/aʊ/', '/ɔɪ/'
        ];
        const filtered = commonPhonetics.filter(p => p !== correctSound);
        const shuffled = filtered.sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count);
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

/**
 * 复习引擎
 */
const ReviewEngine = {
    generateReviewSession(words, count = 10) {
        const session = [];
        const shuffledWords = this.shuffle([...words]);
        
        for (let i = 0; i < Math.min(count, shuffledWords.length); i++) {
            const word = shuffledWords[i];
            const questionType = this.pickQuestionType(word);
            const question = this.generateQuestion(word, words, questionType);
            session.push(question);
        }
        
        return session;
    },
    
    pickQuestionType(word) {
        const types = ['en_to_cn', 'cn_to_en', 'listen_choose'];
        
        if (word.letterSounds && word.letterSounds.length > 0) {
            types.push('phonetic');
        }
        
        return types[Math.floor(Math.random() * types.length)];
    },
    
    generateQuestion(word, allWords, type) {
        switch (type) {
            case QUESTION_TYPES.EN_TO_CN:
                return QuestionGenerator.generateEnToCn(word, allWords);
            case QUESTION_TYPES.CN_TO_EN:
                return QuestionGenerator.generateCnToEn(word, allWords);
            case QUESTION_TYPES.LISTEN_CHOOSE:
                return QuestionGenerator.generateListenChoose(word, allWords);
            // 拼写辨析已删除（混淆项无意义）
            case QUESTION_TYPES.PHONETIC:
                const letterGroup = word.letterSounds[Math.floor(Math.random() * word.letterSounds.length)];
                return QuestionGenerator.generatePhonetic(word, letterGroup);
            default:
                return QuestionGenerator.generateEnToCn(word, allWords);
        }
    },
    
    shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
};

        try {
            const users = localStorage.getItem(this.STORAGE_KEYS.USERS);
            return users ? JSON.parse(users) : [];
        } catch (e) {
            console.warn('用户数据损坏，已重置:', e);
            localStorage.removeItem(this.STORAGE_KEYS.USERS);
            return [];
        }
    },
    
    // 保存用户列表
    saveUsers(users) {
        localStorage.setItem(this.STORAGE_KEYS.USERS, JSON.stringify(users));
    },
    
    // 获取当前用户
    getCurrentUser() {
        const currentUserId = localStorage.getItem(this.STORAGE_KEYS.CURRENT_USER);
        if (!currentUserId) return null;
        
        const users = this.getUsers();
        return users.find(u => u.id === currentUserId) || null;
    },
    
    // 设置当前用户
    setCurrentUser(userId) {
        localStorage.setItem(this.STORAGE_KEYS.CURRENT_USER, userId);
    },
    
    // 创建新用户
    createUser(name, avatar) {
        const users = this.getUsers();
        const newUser = {
            id: 'user_' + Date.now(),
            name: name || '新用户',
            avatar: avatar || this.AVATARS[0],
            createdAt: new Date().toISOString()
        };
        
        users.push(newUser);
        this.saveUsers(users);
        this.setCurrentUser(newUser.id);
        
        // 初始化用户数据
        StorageModule.initForUser(newUser.id);
        
        return newUser;
    },
    
    // 删除用户
    deleteUser(userId) {
        const users = this.getUsers();
        const filteredUsers = users.filter(u => u.id !== userId);
        this.saveUsers(filteredUsers);
        
        // 清除用户数据
        StorageModule.clearUserData(userId);
        
        // 如果删除的是当前用户，切换到第一个用户
        if (this.getCurrentUser()?.id === userId) {
            if (filteredUsers.length > 0) {
                this.setCurrentUser(filteredUsers[0].id);
            } else {
                localStorage.removeItem(this.STORAGE_KEYS.CURRENT_USER);
            }
        }
    },
    
    // 检查是否有用户
    hasUsers() {
        return this.getUsers().length > 0;
    },
    
    // 获取用户统计数据
    getUserStats(userId) {
        // 临时切换到该用户以获取数据
        const originalUser = this.getCurrentUser();
        this.setCurrentUser(userId);
        
        const stats = {
            totalWordsLearned: StorageModule.getStatistics().totalWordsLearned || 0,
            totalReviewsDone: StorageModule.getStatistics().totalReviewsDone || 0,
            streakDays: StorageModule.getStreakDays()
        };
        
        // 恢复原始用户
        if (originalUser) {
            this.setCurrentUser(originalUser.id);
        }
        
        return stats;
    }
};

/**
 * 答题引擎
 * 生成和批改三种题型：单项选择、词形转换、句型转换
 */
const ExerciseEngine = {
    // 洗牌算法
    shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    },
    
    // 生成一套完整练习（15题）
    generateQuiz(difficulty = null) {
        // 如果没有指定难度，随机分配
        const quiz = [];
        
        // 基础题5题
        const basicCount = difficulty === 'challenge' ? 0 : (difficulty === 'improved' ? 2 : 5);
        // 提高题6题
        const improvedCount = difficulty === 'basic' ? 3 : (difficulty === 'challenge' ? 2 : 6);
        // 挑战题4题
        const challengeCount = 15 - basicCount - improvedCount;
        
        // 生成各类型题目
        for (let i = 0; i < basicCount; i++) {
            const q = this.generateQuestion(EXERCISE_TYPES.GRAMMAR_CHOICE, DIFFICULTY.BASIC);
            if (q) quiz.push(q);
        }
        for (let i = 0; i < improvedCount; i++) {
            const q = this.generateQuestion(EXERCISE_TYPES.WORD_FORM, DIFFICULTY.IMPROVED);
            if (q) quiz.push(q);
        }
        for (let i = 0; i < challengeCount; i++) {
            const q = this.generateQuestion(EXERCISE_TYPES.SENTENCE_TRANSFORM, DIFFICULTY.CHALLENGE);
            if (q) quiz.push(q);
        }
        
        return this.shuffle(quiz);
    },
    
    // 生成单题
    generateQuestion(type, difficulty) {
        switch (type) {
            case EXERCISE_TYPES.GRAMMAR_CHOICE:
                return this.generateGrammarChoice(difficulty);
            case EXERCISE_TYPES.WORD_FORM:
                return this.generateWordForm(difficulty);
            case EXERCISE_TYPES.SENTENCE_TRANSFORM:
                return this.generateSentenceTransform(difficulty);
            default:
                return this.generateGrammarChoice(difficulty);
        }
    },
    
    // 生成单项选择题
    generateGrammarChoice(difficulty) {
        // 优先从年级数据获取
        const textbook = getCurrentTextbook();
        const gradeQuestions = textbook?.grammar?.choiceQuestions?.[difficulty];
        const questions = gradeQuestions || EXERCISE_DATA.grammarTraps[difficulty];
        if (!questions || questions.length === 0) return null;
        const q = questions[Math.floor(Math.random() * questions.length)];
        return {
            type: EXERCISE_TYPES.GRAMMAR_CHOICE,
            difficulty: difficulty,
            difficultyLabel: difficulty === 'basic' ? '基础' : (difficulty === 'improved' ? '提高' : '挑战'),
            ...q
        };
    },
    
    // 生成词形转换题
    generateWordForm(difficulty) {
        // 优先从年级数据获取
        const textbook = getCurrentTextbook();
        const gradeQuestions = textbook?.grammar?.wordForms?.[difficulty];
        const questions = gradeQuestions || EXERCISE_DATA.wordForms[difficulty];
        if (!questions || questions.length === 0) return null;
        const q = questions[Math.floor(Math.random() * questions.length)];
        return {
            type: EXERCISE_TYPES.WORD_FORM,
            difficulty: difficulty,
            difficultyLabel: difficulty === 'basic' ? '基础' : (difficulty === 'improved' ? '提高' : '挑战'),
            ...q
        };
    },
    
    // 生成句型转换题
    generateSentenceTransform(difficulty) {
        // 优先从年级数据获取
        const textbook = getCurrentTextbook();
        const gradeQuestions = textbook?.grammar?.sentenceTransform?.[difficulty];
        const questions = gradeQuestions || EXERCISE_DATA.sentenceTemplates[difficulty];
        if (!questions || questions.length === 0) return null;
        const q = questions[Math.floor(Math.random() * questions.length)];
        return {
            type: EXERCISE_TYPES.SENTENCE_TRANSFORM,
            difficulty: difficulty,
            difficultyLabel: difficulty === 'basic' ? '基础' : (difficulty === 'improved' ? '提高' : '挑战'),
            ...q
        };
    },
    
    // 检查答案
    checkAnswer(question, userAnswer) {
        if (!userAnswer || !userAnswer.trim()) {
            return { correct: false, correctAnswer: question.answer };
        }
        
        switch (question.type) {
            case EXERCISE_TYPES.GRAMMAR_CHOICE:
                const userIdx = parseInt(userAnswer);
                return {
                    correct: userIdx === question.answer,
                    correctAnswer: question.answer,
                    userAnswer: userIdx
                };
                
            case EXERCISE_TYPES.WORD_FORM:
            case EXERCISE_TYPES.SENTENCE_TRANSFORM:
                // 选择题：答案已转换为索引
                const idx = parseInt(userAnswer);
                return {
                    correct: idx === question.answer,
                    correctAnswer: question.answer,
                    userAnswer: idx
                };
                
            default:
                return { correct: false, correctAnswer: question.answer };
        }
    },
    
    // 获取讲解
    getExplanation(question) {
        return question.explanation || '这是一道语法练习题，注意观察句子结构哦！';
    },
    
    // 获取题型名称
    getTypeName(type) {
        switch (type) {
            case EXERCISE_TYPES.GRAMMAR_CHOICE:
                return '单项选择';
            case EXERCISE_TYPES.WORD_FORM:
                return '词形转换';
            case EXERCISE_TYPES.SENTENCE_TRANSFORM:
                return '句型转换';
            default:
                return '练习题';
        }
    },
    
    // 获取题型图标
    getTypeIcon(type) {
        switch (type) {
            case EXERCISE_TYPES.GRAMMAR_CHOICE:
                return '📝';
            case EXERCISE_TYPES.WORD_FORM:
                return '🔄';
            case EXERCISE_TYPES.SENTENCE_TRANSFORM:
                return '✨';
            default:
                return '📚';
        }
    }
};

    // ==================== 单词学习（动态队列版）====================
    
    async startUnitVocabulary(unitId) {
        const textbook = await getCurrentTextbookAsync();
        const unit = textbook.units[unitId];
        if (!unit) return;
        
        AppState.currentUnit = unitId;
        AppState.learningMode = 'vocabulary';
        
        // 合并单词和词组
        const words = unit.vocabulary || [];
        const phrases = unit.phrases || [];
        
        // 创建卡片列表：单词 + 词组
        const wordCards = words.map((v, i) => ({
            ...v,
            _type: 'word',
            index: i,
            unitId: unitId,
            moduleId: unit.module
        }));
        const phraseCards = phrases.map((p, i) => ({
            ...p,
            _type: 'phrase',
            word: p.english,  // 统一使用 word 字段
            chinese: p.chinese,
            index: words.length + i,
            unitId: unitId,
            moduleId: unit.module
        }));
        
        AppState.currentCards = [...wordCards, ...phraseCards];
        
        // 如果没有内容则返回
        if (AppState.currentCards.length === 0) {
            alert('暂无学习内容');
            return;
        }
        
        // 创建动态任务队列（每个单词/词组2个任务：英译中+中译英）
        const cards = AppState.currentCards;
        const tasks = [];
        cards.forEach((card, index) => {
            // 词组只有英译中模式（词组不支持中译英）
            if (card._type === 'phrase') {
                tasks.push({ wordIndex: index, direction: 'en_to_cn', status: 0 });
            } else {
                tasks.push({ wordIndex: index, direction: 'en_to_cn', status: 0 });
                tasks.push({ wordIndex: index, direction: 'cn_to_en', status: 0 });
            }
        });
        
        // 初始化状态
        AppState.currentTasks = tasks;
        AppState.taskQueue = tasks.map((_, i) => i);
        this.shuffleArray(AppState.taskQueue);
        AppState.currentTaskIndex = 0;
        AppState.memoryStats = { total: tasks.length, mastered: 0 };
        AppState.answerGiven = false;
        AppState.sessionStartTime = Date.now();
        
        this.renderVocabularyCard();
    },
    
    // 数组随机打乱
    shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    },

        if (AppState.taskQueue.length === 0) {
            this.showLearningComplete();
            return;

        const taskIndex = AppState.taskQueue[0];
        const task = AppState.currentTasks[taskIndex];
        const word = AppState.currentCards[task.wordIndex];
        const direction = task.direction;

        // 保存当前单词和方向，供 showWordAnswer 使用
        AppState.currentWord = word;
        AppState.currentDirection = direction;
        
        // 计算进度
        const completed = AppState.memoryStats.total - AppState.taskQueue.length;
        const progress = Math.round((completed / AppState.memoryStats.total) * 100);

            `;
        } else {

                <h1 class="word-text">${word.chinese}</h1>
            `;
        }
        
        // 类型标签

        const html = `

    // 显示单词答案
    showWordAnswer() {
        const word = AppState.currentWord;
        const direction = AppState.currentDirection;
        
        // 显示翻译内容
        const translationArea = document.getElementById('translation-area');
        const translationText = document.getElementById('translation-text');

    // 处理单词学习熟练度反馈
    handleVocabularyFeedback(status) {
        const taskIndex = AppState.taskQueue.shift();
        AppState.currentTasks[taskIndex].status = status;
        
        // 使用SM-2算法更新单词进度
        const word = AppState.currentWord;
        if (word && word.word) {
            const wordKey = `${AppState.currentUnit}_${word.word}`;
            const quality = SM2Module.statusToQuality(status);
            SM2Module.updateWordProgress(wordKey, quality);
            
            const progress = SM2Module.getWordProgress(wordKey);
            if (progress) {
                const mastery = SM2Module.getMasteryLevel(progress);
                console.log(`单词 ${word.word} 复习完成: ${mastery.text}, 下次复习: ${progress.nextReview}, 间隔: ${progress.interval}天`);
            }
        }
        
        // 原有队列逻辑保持不变
        if (status === 2) {
            AppState.memoryStats.mastered++;
        } else if (status === 1) {
            const insertPos = Math.min(3, AppState.taskQueue.length);
            AppState.taskQueue.splice(insertPos, 0, taskIndex);
        } else {
            AppState.taskQueue.unshift(taskIndex);
        }
        
        // 显示下一个任务
        this.renderVocabularyCard();
    },
    speakWord(word) {
        TTS.speakWord(word);
    },

        const unit = textbook.units[unitId];
        if (!unit || !unit.vocabulary) return;
        
        AppState.currentUnit = unitId;
        AppState.quizMode = 'unit';

     * 启动语法练习答题系统
     * @param {string} difficulty - 难度级别: 'basic', 'improved', 'challenge', 或 null（随机混合）
     */
    startExerciseReview(difficulty = null) {
        AppState.quizMode = 'exercise';
        AppState.exerciseDifficulty = difficulty;
        
        // 使用 ExerciseEngine 生成15题
        AppState.currentQuiz = ExerciseEngine.generateQuiz(difficulty);
        AppState.currentQuizIndex = 0;

    /**
     * 渲染语法练习题目
     */
    renderExerciseQuestion() {
        if (AppState.currentQuizIndex >= AppState.currentQuiz.length) {
            this.showExerciseComplete();
            return;
        }
        
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const total = AppState.currentQuiz.length;
        const progress = Math.round((AppState.currentQuizIndex / total) * 100);
        const typeName = ExerciseEngine.getTypeName(question.type);
        const typeIcon = ExerciseEngine.getTypeIcon(question.type);
        
        let questionHtml = '';
        
        switch (question.type) {
            case EXERCISE_TYPES.GRAMMAR_CHOICE:
                questionHtml = `
                    <p class="question-text" style="font-size:22px;margin-bottom:20px;">${question.question}</p>
                `;
                break;
                
            case EXERCISE_TYPES.WORD_FORM:
                questionHtml = `
                    <p class="question-text" style="font-size:18px;margin-bottom:8px;color:var(--text-secondary);">${question.instruction}</p>
                    <p class="question-text" style="font-size:28px;margin-bottom:20px;">${question.question}</p>
                `;
                break;
                
            case EXERCISE_TYPES.SENTENCE_TRANSFORM:
                // 如果有划线目标，在原句中用下划线标记
                let displayOriginal = question.original;
                if (question.underline) {
                    displayOriginal = question.original.replace(question.underline, `<u style="text-decoration-color:var(--primary);text-decoration-thickness:2px;">${question.underline}</u>`);
                }
                questionHtml = `
                    <p class="question-text" style="font-size:18px;margin-bottom:8px;color:var(--text-secondary);">${question.instruction}</p>
                    <p class="question-text" style="font-size:22px;margin-bottom:20px;">原句：${displayOriginal}</p>
                `;
                break;
        }
        
        let optionsHtml = '';
        // 所有题型都显示选择题选项
        if (question.options && question.options.length > 0) {
            optionsHtml = `
                <div class="exercise-options">
                    ${question.options.map((opt, i) => `
                        <button class="exercise-option-btn" onclick="App.selectExerciseAnswer(${i})">
                            <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                            <span class="option-text">${opt}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        }
        
        const html = `
            <div class="review-card-page exercise-page" style="padding:16px;padding-bottom:160px;">

                    <div class="learning-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>

                    </div>
                </div>

                    <div class="question-meta">
                        <span class="question-type-badge ${question.difficulty}">${question.difficultyLabel}</span>
                        <span class="question-type-label">${typeIcon} ${typeName}</span>
                    </div>
                    ${questionHtml}
                </div>
                
                ${optionsHtml}
                
                <div class="quiz-feedback correct" id="quiz-feedback-correct" style="display:none;">
                    <div class="feedback-icon">🎉</div>
                    <div class="feedback-text">回答正确！</div>
                </div>
                
                <div class="quiz-feedback wrong" id="quiz-feedback-wrong" style="display:none;">
                    <div class="feedback-icon">😢</div>
                    <div class="feedback-text" id="wrong-answer-text">正确答案是：</div>
                </div>
            </div>
        `;
        
        this.setContent(html);
        AppState.cardStartTime = Date.now();
        
        // 自动聚焦输入框（对于非选择题）并添加回车提交
        if (question.type !== EXERCISE_TYPES.GRAMMAR_CHOICE) {
            setTimeout(() => {
                const input = document.getElementById('exercise-answer-input');
                if (input) {
                    input.focus();
                    // 添加回车提交事件
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter' && !input.disabled) {
                            this.submitExerciseAnswer();
                        }
                    });
                }
            }, 100);
        }

    /**
     * 选择语法练习答案（选择题）
     */
    selectExerciseAnswer(optionIndex) {
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const result = ExerciseEngine.checkAnswer(question, optionIndex.toString());
        
        // 添加选项按钮状态和反馈图标
        const options = document.querySelectorAll('.exercise-option-btn');
        options.forEach((btn, i) => {
            btn.disabled = true;
            if (i === optionIndex) {
                btn.classList.add('selected');
                // 添加反馈图标
                const feedback = document.createElement('span');
                feedback.className = 'answer-feedback ' + (result.correct ? 'correct' : 'wrong');
                feedback.textContent = result.correct ? '✓' : '✗';
                btn.appendChild(feedback);
            }
            if (i === question.answer) {
                btn.classList.add('correct');
            }
        });
        
        this.showExerciseFeedback(result);
    },
    
    /**
     * 提交语法练习答案（填空题）
     */
    submitExerciseAnswer() {
        const input = document.getElementById('exercise-answer-input');
        if (!input) return;
        
        const userAnswer = input.value.trim();
        if (!userAnswer) {
            this.showToast('请输入答案');
            return;
        }
        
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const result = ExerciseEngine.checkAnswer(question, userAnswer);
        this.showExerciseFeedback(result);
    },
    
    /**
     * 显示语法练习反馈
     */
    showExerciseFeedback(result) {
        const correctDiv = document.getElementById('quiz-feedback-correct');
        const wrongDiv = document.getElementById('quiz-feedback-wrong');
        
        if (result.correct) {
            correctDiv.style.display = 'flex';
            wrongDiv.style.display = 'none';
            AppState.reviewResults.push({ correct: true });
        } else {
            correctDiv.style.display = 'none';
            wrongDiv.style.display = 'flex';
            
            const wrongText = document.getElementById('wrong-answer-text');
            if (wrongText) {
                let answerText = result.correctAnswer;
                if (typeof result.correctAnswer === 'number') {
                    const question = AppState.currentQuiz[AppState.currentQuizIndex];
                    answerText = question.options[result.correctAnswer];
                }
                wrongText.innerHTML = `正确答案是：<strong>${answerText}</strong>`;
            }
        }
        
        // 显示讲解
        const question = AppState.currentQuiz[AppState.currentQuizIndex];
        const explanation = ExerciseEngine.getExplanation(question);
        
        // 添加讲解区域
        const card = document.querySelector('.exercise-card');
        if (card && !document.getElementById('explanation-box')) {
            const explanationDiv = document.createElement('div');
            explanationDiv.id = 'explanation-box';
            explanationDiv.className = 'explanation-box';
            explanationDiv.innerHTML = `
                <div style="font-size:14px;color:var(--text-secondary);margin-bottom:4px;">💡 讲解</div>
                <div style="font-size:16px;">${explanation}</div>
            `;
            card.appendChild(explanationDiv);
        }
        
        // 禁用输入框
        const input = document.getElementById('exercise-answer-input');
        if (input) {
            input.disabled = true;
        }
        
        // 禁用选项按钮和提交按钮
        document.querySelectorAll('.exercise-option-btn').forEach(btn => {
            btn.disabled = true;
            btn.classList.add('disabled');
        });
        
        // 禁用提交按钮
        document.querySelectorAll('.submit-answer-btn').forEach(btn => {
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.cursor = 'not-allowed';
        });
        
        // 记录答题结果
        AppState.reviewResults.push({ 
            correct: result.correct,
            question: question
        });
        
        // 添加下一题按钮
        this.addNextButton();
    },
    
    /**
     * 添加下一题按钮
     */
    addNextButton() {
        if (document.getElementById('next-exercise-btn')) return;
        
        const isLastQuestion = AppState.currentQuizIndex >= AppState.currentQuiz.length - 1;
        const btnText = isLastQuestion ? '查看结果' : '下一题';
        
        const nextBtn = document.createElement('button');
        nextBtn.id = 'next-exercise-btn';
        nextBtn.className = 'action-btn primary';
        nextBtn.style.cssText = 'position:fixed;bottom:90px;left:16px;right:16px;max-width:400px;margin:0 auto;padding:16px;font-size:18px;border-radius:16px;';
        nextBtn.innerHTML = btnText;
        nextBtn.onclick = () => this.nextExercise();
        
        document.querySelector('.exercise-page').appendChild(nextBtn);
    },

     * 下一题
     */
    nextExercise() {
        AppState.currentQuizIndex++;
        this.renderExerciseQuestion();
    },
