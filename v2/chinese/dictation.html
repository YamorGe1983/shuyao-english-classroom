<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="舒窈小课堂 - 语文汉字默写练习">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="舒窈小课堂">
    <title>语文默写 - 舒窈小课堂</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-light: #FF8E8E;
            --primary-dark: #E85555;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --success: #00B894;
            --danger: #E17055;
            --bg: #F7F9FC;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        .page { display:none; min-height:100vh; padding:20px; flex-direction:column; align-items:center; }
        .page.active { display:flex; }

        /* 选择页 */
        .select-header { text-align:center; margin-bottom:30px; }
        .select-header h1 { font-size:28px; color:var(--primary); }
        .select-header p { color:var(--text-light); margin-top:8px; }
        .lesson-list { width:100%; max-width:600px; }
        .lesson-item {
            background: var(--card); border-radius: 16px; padding: 16px 20px;
            margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer;
            transition: transform 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .lesson-item:active { transform: scale(0.97); }
        .lesson-name { font-size:18px; font-weight:600; }
        .lesson-count { color:var(--text-light); font-size:14px; }
        .wrong-book-btn {
            margin-top:20px; background: var(--accent); color: var(--text);
            border:none; padding:14px 32px; border-radius:25px; font-size:16px; font-weight:600; cursor:pointer;
        }

        /* 默写页 */
        .dictation-header { text-align:center; width:100%; max-width:900px; }
        .tip-bar {
            background: #FFF3E0; color: #E65100; padding: 10px 16px;
            border-radius: 12px; font-size: 14px; text-align: center; margin-bottom: 12px;
        }
        .progress-bar { width:100%; height:8px; background:#eee; border-radius:4px; margin: 8px 0; }
        .progress-fill { height:100%; background:var(--primary); border-radius:4px; transition: width 0.3s; }
        .progress-text { text-align:center; color:var(--text-light); font-size:14px; margin-bottom:12px; }
        .word-label { text-align:center; font-size:16px; color:var(--text-light); margin-bottom:8px; }

        /* 田字格并排 */
        .grid-row {
            display:flex; justify-content:center; align-items:flex-start;
            gap:12px; margin:16px 0; flex-wrap:wrap;
        }
        .char-slot { text-align:center; }
        .char-slot .slot-hint { font-size:12px; color:#aaa; margin-top:4px; }
        .char-slot.active-slot .slot-hint { color:var(--primary); font-weight:600; }
        .char-slot.done-slot canvas { opacity:0.6; }
        canvas.write-canvas {
            border: 2px solid #ccc; border-radius: 8px; background: #fff; touch-action: none;
            display:block;
        }
        .char-slot.active-slot canvas { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,107,0.3); }
        .char-slot.done-slot canvas { border-color: var(--success); }

        /* 笔画粗细 */
        .brush-bar {
            display:flex; align-items:center; justify-content:center; gap:12px; margin:10px 0;
        }
        .brush-bar span { font-size:13px; color:var(--text-light); }
        .brush-btn {
            width:40px; height:40px; border-radius:50%; border:2px solid #ddd;
            background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition: border-color 0.2s;
        }
        .brush-btn.active { border-color:var(--primary); background:#FFF0F0; }
        .brush-dot { border-radius:50%; background:#333; }

        .dictation-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:16px; }
        .btn {
            border:none; padding:12px 24px; border-radius:25px;
            font-size:15px; font-weight:600; cursor:pointer; transition: transform 0.15s;
        }
        .btn:active { transform:scale(0.95); }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-secondary { background:var(--secondary); color:#fff; }
        .btn-accent { background:var(--accent); color:var(--text); }
        .btn-outline { background:transparent; border:2px solid #ddd; color:var(--text-light); }

        /* 批改页 */
        .grading-container { width:100%; max-width:900px; }
        .grading-title { text-align:center; font-size:22px; font-weight:700; color:var(--primary); margin-bottom:16px; }
        .grading-table {
            width:100%; border-collapse: separate; border-spacing: 0;
            background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow);
        }
        .grading-table th {
            background: #f0f0f0; padding: 12px 8px; font-size: 15px;
            font-weight: 600; color: var(--text-light); text-align: center;
        }
        .grading-table td {
            padding: 8px 6px; text-align: center; vertical-align: middle;
            border-top: 1px solid #f0f0f0;
        }
        .grading-table tr:last-child td { border-bottom: none; }
        .grading-cell-written {
            width:80px; height:80px; border:2px solid #eee; border-radius:6px;
            background:#fff; object-fit:contain; display:inline-block;
        }
        .grading-cell-skip {
            width:80px; height:80px; display:inline-flex; align-items:center; justify-content:center;
            color:#ccc; font-size:13px; border:2px solid #eee; border-radius:6px; background:#fff;
        }
        .grading-cell-correct {
            width:80px; height:80px; display:inline-flex; align-items:center; justify-content:center;
            font-size:56px; font-family: 'KaiTi', '楷体', 'STKaiti', serif;
            color: var(--text); border:2px solid #eee; border-radius:6px; background:#fff;
        }
        .grading-cell-info { font-size:11px; color:var(--text-light); margin-top:2px; }
        .grading-cell-btns { display:flex; justify-content:center; align-items:center; gap:8px; }
        .grade-icon { font-size:28px; transition: transform 0.15s; pointer-events:none; }
        .grade-icon.icon-correct { color:var(--success); }
        .grade-icon.icon-wrong { color:var(--danger); }
        .btn-grade-toggle {
            width:52px; height:52px; border-radius:50%; border:none; font-size:22px;
            cursor:pointer; transition: transform 0.15s, background 0.2s;
            display:inline-flex; align-items:center; justify-content:center;
        }
        .btn-grade-toggle:active { transform:scale(0.9); }
        .btn-grade-toggle.is-correct {
            background:#e8f8f5; color:var(--text-light); border:2px solid #b2dfdb;
        }
        .btn-grade-toggle.is-wrong {
            background:var(--danger); color:#fff; border:2px solid var(--danger);
            box-shadow: 0 0 0 4px rgba(225,112,85,0.4);
        }
        .grading-submit-area { text-align:center; margin-top:24px; }

        /* 结果页 */
        .result-card {
            background:var(--card); border-radius:20px; padding:30px;
            box-shadow:var(--shadow); text-align:center; width:100%; max-width:500px;
        }
        .score-big { font-size:72px; font-weight:800; margin:20px 0; }
        .score-A { color: var(--success); }
        .score-A- { color: #2ECC71; }
        .score-B { color: var(--secondary); }
        .score-B- { color: #3498DB; }
        .score-C { color: #F39C12; }
        .score-C- { color: #E67E22; }
        .score-D { color: var(--danger); }
        .result-detail { color:var(--text-light); font-size:16px; margin:10px 0; }
        .wrong-list { text-align:left; margin:20px 0; }
        .wrong-item {
            display:inline-block; background:#FFEAA7; border-radius:8px;
            padding:6px 14px; margin:4px; font-size:18px; font-weight:600;
        }

        /* 订正页 */
        .practice-container { width:100%; max-width:500px; text-align:center; }
        .practice-info { font-size:16px; color:var(--text-light); margin:10px 0; }
        .practice-round { font-size:20px; font-weight:700; color:var(--primary); margin:10px 0; }
        #practice-target { display:inline-block; margin:20px auto; }

        /* 自定义默写页 */
        .custom-input-area {
            width:90%; max-width:500px; margin:0 auto;
        }
        .custom-textarea {
            width:100%; height:160px; border:2px solid #ddd; border-radius:12px;
            padding:14px; font-size:20px; font-family:inherit;
            resize:none; outline:none; transition:border-color 0.2s;
        }
        .custom-textarea:focus { border-color:var(--primary); }
        .custom-hint {
            font-size:13px; color:var(--text-light); margin:8px 0; text-align:left;
            line-height:1.6;
        }
        .custom-btn-row { margin-top:16px; display:flex; gap:10px; justify-content:center; }
        .btn-voice-input {
            background:#FFEAA7; border:none; border-radius:50px;
            padding:10px 20px; font-size:16px; cursor:pointer;
            transition:transform 0.15s;
        }
        .btn-voice-input:active { transform:scale(0.95); }
        .btn-voice-input.recording { background:#E17055; color:#fff; animation:pulse-rec 1s infinite; }
        @keyframes pulse-rec { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .custom-entry {
            margin-top:12px; padding:16px 20px; background:#FFF3E0;
            border-radius:12px; cursor:pointer; display:flex;
            align-items:center; gap:10px; transition:transform 0.15s;
        }
        .custom-entry:active { transform:scale(0.98); }
        .custom-entry-icon { font-size:24px; }
        .custom-entry-text { font-size:16px; font-weight:600; color:#E17055; }
        .custom-entry-sub { font-size:12px; color:#999; margin-top:2px; }

        /* 订正3格并排 */
        .practice-grids {
            display:flex; justify-content:center; gap:8px;
            margin:16px 0; flex-wrap:nowrap;
        }
        .practice-grid-item {
            display:flex; flex-direction:column; align-items:center;
        }
        .practice-grid-label {
            font-size:12px; color:var(--text-light); margin-bottom:4px;
        }
    </style>
</head>
<body>

<!-- 页面1：选择课文 -->
<div id="page-select" class="page active">
    <div class="select-header">
        <h1>📝 语文默写</h1>
        <p>选择要默写的课文</p>
    </div>
    <div id="lessonList" class="lesson-list"></div>
    <div class="custom-entry" onclick="showPage('page-custom')">
        <span class="custom-entry-icon">✏️</span>
        <div>
            <div class="custom-entry-text">自定义默写</div>
            <div class="custom-entry-sub">自己输入词组，自由默写</div>
        </div>
    </div>
    <button class="wrong-book-btn" id="wrongBookBtn" onclick="startWrongBook()">
        📖 错题本 (<span id="wrongCount">0</span>个字)
    </button>
</div>

<!-- 页面2：默写 -->
<div id="page-dictation" class="page">
    <div class="dictation-header">
        <div class="tip-bar">✏️ 请一笔一划书写，注意笔顺哦！</div>
        <div class="progress-bar"><div id="dictProgress" class="progress-fill" style="width:0%"></div></div>
        <div id="dictProgressText" class="progress-text"></div>
    </div>
    <div id="wordLabel" class="word-label"></div>
    <div id="gridArea" class="grid-row"></div>
    <div class="brush-bar">
        <span>笔画：</span>
        <button class="brush-btn" data-size="4" onclick="setBrush(4)"><div class="brush-dot" style="width:6px;height:6px;"></div></button>
        <button class="brush-btn active" data-size="7" onclick="setBrush(7)"><div class="brush-dot" style="width:10px;height:10px;"></div></button>
        <button class="brush-btn" data-size="12" onclick="setBrush(12)"><div class="brush-dot" style="width:16px;height:16px;"></div></button>
    </div>
    <div class="dictation-btns">
        <button class="btn btn-accent" onclick="replayVoice()">🔊 再听一遍</button>
        <button class="btn btn-outline" onclick="undoStroke()">↩️ 撤销</button>
        <button class="btn btn-outline" onclick="clearCanvas()">🗑️ 清除</button>
        <button class="btn btn-primary" onclick="nextWord()">下一个 ➡️</button>
    </div>
</div>

<!-- 页面3：批改 -->
<div id="page-grading" class="page">
    <div class="grading-container">
        <div class="grading-title">📝 批改默写</div>
        <div id="gradingTableArea"></div>
        <div class="grading-submit-area">
            <button class="btn btn-primary" id="btnSubmitGrading" onclick="submitGrading()" style="display:none;font-size:18px;padding:14px 40px;">确认批改 ✅</button>
        </div>
    </div>
</div>

<!-- 页面4：结果 -->
<div id="page-result" class="page">
    <div class="result-card" id="resultCard"></div>
</div>

<!-- 页面5：订正 -->
<div id="page-practice" class="page">
    <div class="practice-container">
        <div id="practiceInfo" class="practice-info"></div>
        <div id="practiceRound" class="practice-round"></div>
        <div class="practice-grids" id="practiceGrids"></div>
        <div style="margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-secondary" id="btnShowStroke" onclick="showStrokeOrder()">👀 看笔顺</button>
            <button class="btn btn-outline" id="btnSkipPractice" onclick="skipCurrentPractice()">⏭️ 跳过</button>
        </div>
    </div>
</div>

<!-- 页面6：自定义默写输入 -->
<div id="page-custom" class="page">
    <div class="select-header">
        <h1>✏️ 自定义默写</h1>
        <p>输入要默写的汉字</p>
    </div>
    <div class="custom-input-area">
        <textarea id="customText" class="custom-textarea" placeholder="在此输入汉字…"></textarea>
        <div class="custom-hint">
            ⚠️ 仅支持中文汉字，非汉字字符将自动过滤<br>
            📝 词组之间用 <b>空格</b>、<b>逗号</b> 或 <b>顿号</b> 分隔<br>
            例：融化 燕子，光彩夺目、荷花
        </div>
        <div class="custom-btn-row">
            <button class="btn-voice-input" id="btnVoiceInput" onclick="toggleVoiceInput()">🎤 语音输入</button>
            <button class="btn btn-primary" onclick="startCustomDictation()" style="font-size:16px;padding:12px 32px;">开始默写 ➡️</button>
        </div>
        <div style="margin-top:16px;">
            <button class="btn btn-outline" onclick="showPage('page-select')">← 返回</button>
        </div>
    </div>
</div>

<script>
// ==================== 状态管理 ====================
const State = {
    wordList: [],       // 乱序后的词组列表 [{char, pinyin, hint, chars}]
    currentWordIdx: 0,  // 当前第几个词组
    snapshots: [],      // 每个字的手写截图（按词组→字索引）
    results: [],        // 批改结果（按字平铺）
    // 当前词组的Canvas状态
    canvases: [],       // 当前词组各字的canvas元素
    ctxs: [],           // 当前词组各字的ctx
    allStrokes: [],     // 当前词组各字的笔画路径 [charStrokes, ...]
    allCurrentStroke: [],// 当前正在写的笔画
    activeSlot: 0,      // 当前正在写第几个字
    isDrawing: false,
    brushSize: 7,       // 默认笔画粗细
    canvasBaseSize: 420,
    // 订正
    practiceWrongChars: [],
    practiceIndex: 0,
    practiceRound: 0,
    practiceWriter: null,
    practiceWriters: [],
    activeGridIdx: 0
};

// ==================== 页面切换 ====================
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ==================== 词库加载 ====================
async function loadWordData() {
    const resp = await fetch('../data/chinese/grade3_2.json');
    return await resp.json();
}

// ==================== 选择页 ====================
async function initSelectPage() {
    const data = await loadWordData();
    const list = document.getElementById('lessonList');
    list.innerHTML = '';
    data.units.forEach(unit => {
        unit.lessons.forEach(lesson => {
            const totalChars = lesson.words.reduce((s, w) => s + (w.chars ? w.chars.length : 1), 0);
            const div = document.createElement('div');
            div.className = 'lesson-item';
            div.innerHTML = `<span class="lesson-name">${lesson.name}</span><span class="lesson-count">${totalChars}字</span>`;
            div.onclick = () => startDictation(lesson.words);
            list.appendChild(div);
        });
    });
    updateWrongCount();
}

function updateWrongCount() {
    document.getElementById('wrongCount').textContent = getWrongBook().length;
}
function getWrongBook() {
    const d = localStorage.getItem('chineseWrongBook');
    return d ? JSON.parse(d) : [];
}
function saveWrongBook(wb) {
    localStorage.setItem('chineseWrongBook', JSON.stringify(wb));
}
function startWrongBook() {
    const wb = getWrongBook();
    if (wb.length === 0) { alert('错题本是空的！'); return; }
    const words = wb.map(c => ({ char: c, pinyin: '', hint: c, chars: [c] }));
    startDictation(words);
}

// ==================== 默写页 ====================
function startDictation(words) {
    // 乱序
    State.wordList = shuffleArray([...words]);
    State.currentWordIdx = 0;
    State.snapshots = [];
    showPage('page-dictation');
    showCurrentWord();
}

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function showCurrentWord() {
    if (State.currentWordIdx >= State.wordList.length) {
        startGrading();
        return;
    }
    const word = State.wordList[State.currentWordIdx];
    const chars = word.chars || [word.char];
    const total = State.wordList.length;

    // 进度
    const pct = (State.currentWordIdx / total * 100).toFixed(0);
    document.getElementById('dictProgress').style.width = pct + '%';
    document.getElementById('dictProgressText').textContent = `第 ${State.currentWordIdx + 1} / ${total} 词`;

    // 词组提示
    document.getElementById('wordLabel').textContent = `共 ${chars.length} 个字`;

    // 创建并排田字格
    const area = document.getElementById('gridArea');
    area.innerHTML = '';
    State.canvases = [];
    State.ctxs = [];
    State.allStrokes = [];
    State.allCurrentStroke = [];
    State.activeSlot = 0;
    State.isDrawing = false;

    // 计算单个格子大小：确保4个格子能并排
    const maxTotalWidth = Math.min(window.innerWidth - 40, 900);
    const gap = 12;
    const gridCount = chars.length;
    const singleSize = Math.min(State.canvasBaseSize, Math.floor((maxTotalWidth - gap * (gridCount - 1)) / gridCount));
    const displaySize = Math.min(singleSize, 280); // 显示尺寸上限

    chars.forEach((c, idx) => {
        const slot = document.createElement('div');
        slot.className = 'char-slot' + (idx === 0 ? ' active-slot' : '');
        slot.id = 'slot-' + idx;

        const canvas = document.createElement('canvas');
        canvas.className = 'write-canvas';
        canvas.width = singleSize;
        canvas.height = singleSize;
        canvas.style.width = displaySize + 'px';
        canvas.style.height = displaySize + 'px';
        canvas.dataset.slotIdx = idx;

        const hint = document.createElement('div');
        hint.className = 'slot-hint';
        hint.textContent = `第${idx + 1}字`;

        slot.appendChild(canvas);
        slot.appendChild(hint);
        area.appendChild(slot);

        const ctx = canvas.getContext('2d');
        State.canvases.push(canvas);
        State.ctxs.push(ctx);
        State.allStrokes.push([]);
        State.allCurrentStroke.push([]);

        drawGridBg(ctx, singleSize);
        setupCanvasEvents(canvas, ctx, singleSize, idx);
    });

    // 语音播报
    speakWord(word.hint || word.char);
}

function drawGridBg(ctx, size) {
    ctx.clearRect(0, 0, size, size);
    ctx.strokeStyle = '#999'; ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, size - 2, size - 2);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.setLineDash([8, 4]);
    ctx.beginPath(); ctx.moveTo(0, size / 2); ctx.lineTo(size, size / 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2, size); ctx.stroke();
    ctx.strokeStyle = '#eee'; ctx.lineWidth = 0.5; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(size, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(size, 0); ctx.lineTo(0, size); ctx.stroke();
    ctx.setLineDash([]);
}

function setupCanvasEvents(canvas, ctx, size, slotIdx) {
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = size / rect.width;
        const scaleY = size / rect.height;
        if (e.touches) {
            return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
    }
    function onStart(e) {
        e.preventDefault();
        State.isDrawing = true;
        State.activeSlot = slotIdx;
        updateActiveSlot();
        const p = getPos(e);
        State.allCurrentStroke[slotIdx] = [p];
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
    }
    function onMove(e) {
        e.preventDefault();
        if (!State.isDrawing || State.activeSlot !== slotIdx) return;
        const p = getPos(e);
        State.allCurrentStroke[slotIdx].push(p);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = State.brushSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }
    function onEnd(e) {
        e.preventDefault();
        if (!State.isDrawing) return;
        State.isDrawing = false;
        if (State.allCurrentStroke[slotIdx] && State.allCurrentStroke[slotIdx].length > 0) {
            State.allStrokes[slotIdx].push([...State.allCurrentStroke[slotIdx]]);
        }
        State.allCurrentStroke[slotIdx] = [];
    }
    canvas.addEventListener('pointerdown', onStart);
    canvas.addEventListener('pointermove', onMove);
    canvas.addEventListener('pointerup', onEnd);
    canvas.addEventListener('pointerleave', onEnd);
}

function updateActiveSlot() {
    State.canvases.forEach((_, idx) => {
        const slot = document.getElementById('slot-' + idx);
        if (!slot) return;
        slot.className = 'char-slot' + (idx === State.activeSlot ? ' active-slot' : '');
    });
}

function undoStroke() {
    const idx = State.activeSlot;
    if (State.allStrokes[idx] && State.allStrokes[idx].length > 0) {
        State.allStrokes[idx].pop();
        redrawSlot(idx);
    }
}

function clearCanvas() {
    const idx = State.activeSlot;
    if (State.allStrokes[idx]) {
        State.allStrokes[idx] = [];
        redrawSlot(idx);
    }
}

function redrawSlot(idx) {
    const ctx = State.ctxs[idx];
    const canvas = State.canvases[idx];
    const size = canvas.width;
    drawGridBg(ctx, size);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = State.brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    State.allStrokes[idx].forEach(stroke => {
        if (stroke.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(stroke[0].x, stroke[0].y);
        for (let i = 1; i < stroke.length; i++) {
            ctx.lineTo(stroke[i].x, stroke[i].y);
        }
        ctx.stroke();
    });
}

function nextWord() {
    // 保存当前词组所有字的截图
    const word = State.wordList[State.currentWordIdx];
    const chars = word.chars || [word.char];
    chars.forEach((_, idx) => {
        if (State.canvases[idx]) {
            State.snapshots.push(State.canvases[idx].toDataURL());
        } else {
            State.snapshots.push(null);
        }
    });
    State.currentWordIdx++;
    showCurrentWord();
}

function setBrush(size) {
    State.brushSize = size;
    document.querySelectorAll('.brush-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.size) === size);
    });
}

// ==================== 语音播报 ====================
function speakWord(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
}
function replayVoice() {
    if (State.currentWordIdx < State.wordList.length) {
        const word = State.wordList[State.currentWordIdx];
        speakWord(word.hint || word.char);
    }
}

// ==================== 批改页 ====================
let gradingGrades = [];

function startGrading() {
    // 展平所有字用于批改
    State.flatChars = [];
    State.wordList.forEach(word => {
        const chars = word.chars || [word.char];
        chars.forEach(c => {
            State.flatChars.push({ char: c, pinyin: word.pinyin || '', hint: word.hint || word.char });
        });
    });
    gradingGrades = new Array(State.flatChars.length).fill(true);
    showPage('page-grading');
    renderGradingTable();
}

function renderGradingTable() {
    const area = document.getElementById('gradingTableArea');
    let rows = '';
    State.flatChars.forEach((item, i) => {
        const snapshot = State.snapshots[i];
        let writtenCell = '';
        if (snapshot) {
            writtenCell = `<img class="grading-cell-written" src="${snapshot}" alt="手写">`;
        } else {
            writtenCell = `<div class="grading-cell-skip">未写</div>`;
        }
        const correctCell = `<div class="grading-cell-correct">${item.char}</div>`;
        const info = item.pinyin ? item.pinyin : (item.hint || '');
        const isCorrect = gradingGrades[i] === true;
        const toggleClass = isCorrect ? 'is-correct' : 'is-wrong';
        const toggleIcon = isCorrect ? '✅' : '❌';
        rows += `<tr>
            <td>${writtenCell}</td>
            <td>${correctCell}<div class="grading-cell-info">${info}</div></td>
            <td><div class="grading-cell-btns">
                <button class="btn-grade-toggle ${toggleClass}" onclick="gradeCharAt(${i})">${toggleIcon}</button>
            </div></td>
        </tr>`;
    });
    area.innerHTML = `<table class="grading-table">
        <thead><tr><th>孩子写的</th><th>正确字</th><th>错？</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
    checkAllGraded();
}

function gradeCharAt(index) {
    gradingGrades[index] = !gradingGrades[index]; // 切换：✅↔❌
    renderGradingTable();
}
function checkAllGraded() {
    // 默认全部✅，确认按钮始终显示
    document.getElementById('btnSubmitGrading').style.display = 'inline-block';
}
function submitGrading() {
    State.results = [...gradingGrades];
    showResult();
}

// ==================== 结果页 ====================
function showResult() {
    const wrongCount = State.results.filter(r => !r).length;
    const totalCount = State.results.length;
    const rightCount = totalCount - wrongCount;
    const score = getScore(wrongCount);

    const wrongChars = [];
    State.results.forEach((r, i) => { if (!r) wrongChars.push(State.flatChars[i].char); });

    const wb = getWrongBook();
    wrongChars.forEach(c => { if (!wb.includes(c)) wb.push(c); });
    saveWrongBook(wb);

    let wrongHtml = '';
    if (wrongChars.length > 0) {
        wrongHtml = `<div class="wrong-list"><p style="margin-bottom:8px;">错字：</p>${wrongChars.map(c => `<span class="wrong-item">${c}</span>`).join('')}</div>`;
    }

    document.getElementById('resultCard').innerHTML = `
        <h2>默写完成！</h2>
        <div class="score-big ${getScoreClass(score)}">${score}</div>
        <div class="result-detail">正确 ${rightCount} / ${totalCount} 字，错误 ${wrongCount} 字</div>
        ${wrongHtml}
        <div style="margin-top:24px;">
            ${wrongChars.length > 0 ? `<button class="btn btn-primary" onclick="startPractice()" style="margin:8px;">📝 开始订正</button>` : ''}
            <button class="btn btn-secondary" onclick="restartDictation()" style="margin:8px;">🔄 重新默写</button>
            <button class="btn btn-outline" onclick="backToSelect()" style="margin:8px;">🏠 返回</button>
        </div>
    `;
    showPage('page-result');
}

function getScore(w) {
    if (w <= 0) return 'A';
    if (w === 1) return 'A-';
    if (w === 2) return 'B';
    if (w === 3) return 'B-';
    if (w === 4) return 'C';
    if (w === 5) return 'C-';
    return 'D';
}
function getScoreClass(s) {
    return {'A':'score-A','A-':'score-A-','B':'score-B','B-':'score-B-','C':'score-C','C-':'score-C-','D':'score-D'}[s] || 'score-D';
}

function restartDictation() {
    State.currentWordIdx = 0;
    State.snapshots = [];
    State.results = [];
    State.wordList = shuffleArray([...State.wordList]);
    showPage('page-dictation');
    showCurrentWord();
}
function backToSelect() { showPage('page-select'); updateWrongCount(); }

// ==================== 订正页 ====================
function startPractice() {
    State.practiceWrongChars = [];
    State.results.forEach((r, i) => { if (!r) State.practiceWrongChars.push(State.flatChars[i].char); });
    if (State.practiceWrongChars.length === 0) { alert('没有错字！'); return; }
    State.practiceIndex = 0;
    State.practiceRound = 0;
    showPage('page-practice');
    showPracticeChar();
}

function showPracticeChar() {
    if (State.practiceIndex >= State.practiceWrongChars.length) {
        document.getElementById('practiceInfo').textContent = '订正完成！所有错字已练习3遍 🎉';
        document.getElementById('practiceRound').textContent = '';
        document.getElementById('practiceGrids').innerHTML = `<button class="btn btn-primary" onclick="backToSelect()">🏠 返回</button>`;
        document.getElementById('btnShowStroke').style.display = 'none';
        document.getElementById('btnSkipPractice').style.display = 'none';
        return;
    }
    const char = State.practiceWrongChars[State.practiceIndex];
    document.getElementById('practiceInfo').textContent = `订正：第 ${State.practiceIndex + 1} / ${State.practiceWrongChars.length} 个错字「${char}」`;
    document.getElementById('practiceRound').textContent = `第 ${State.practiceRound + 1} / 3 遍`;

    // 3个田字格并排（放大200%）
    const gridsArea = document.getElementById('practiceGrids');
    gridsArea.innerHTML = '';
    State.practiceWriters = [];

    // 格子大小：280px（原140的200%），3格并排适配屏幕
    const gridW = Math.min(280, Math.floor((window.innerWidth - 80) / 3));

    for (let i = 0; i < 3; i++) {
        const item = document.createElement('div');
        item.className = 'practice-grid-item';
        item.style.position = 'relative';

        const label = document.createElement('div');
        label.className = 'practice-grid-label';
        label.textContent = `第${i + 1}遍`;

        // 田字格背景canvas
        const wrapper = document.createElement('div');
        wrapper.style.cssText = `position:relative; width:${gridW}px; height:${gridW}px;`;
        const bgCanvas = document.createElement('canvas');
        bgCanvas.width = gridW * 2; bgCanvas.height = gridW * 2; // 高清
        bgCanvas.style.cssText = `position:absolute;top:0;left:0;width:${gridW}px;height:${gridW}px;z-index:0;`;
        const bgCtx = bgCanvas.getContext('2d');
        bgCtx.scale(2, 2);
        drawGridBg(bgCtx, gridW);
        wrapper.appendChild(bgCanvas);

        // Hanzi Writer 容器叠在canvas上方
        const div = document.createElement('div');
        div.id = `hw-practice-${i}`;
        div.style.cssText = `position:absolute;top:0;left:0;width:${gridW}px;height:${gridW}px;z-index:1;`;
        wrapper.appendChild(div);

        item.appendChild(label);
        item.appendChild(wrapper);
        gridsArea.appendChild(item);

        const writer = HanziWriter.create(`hw-practice-${i}`, char, {
            width: gridW, height: gridW, padding: 15,
            showOutline: true, showCharacter: false,
            strokeColor: '#333', drawingColor: '#1a73e8', drawingWidth: 5,
            leniency: 0.7, showHintAfterMisses: 2, highlightOnComplete: true
        });
        State.practiceWriters.push(writer);
    }

    // 当前活跃格子索引
    State.activeGridIdx = 0;
    // 直接触发第一个格子的quiz
    startGridQuiz(0);

    document.getElementById('btnShowStroke').style.display = 'inline-block';
    document.getElementById('btnSkipPractice').style.display = 'inline-block';
}

function startGridQuiz(idx) {
    if (idx >= State.practiceWriters.length) {
        // 3遍都写完，进入下一个错字
        State.practiceRound = 0;
        State.practiceIndex++;
        setTimeout(showPracticeChar, 500);
        return;
    }
    State.activeGridIdx = idx;
    State.practiceWriters[idx].quiz({
        onCorrectStroke: function() {},
        onMistake: function() {},
        onComplete: function() {
            // 当前格写完，进入下一格
            startGridQuiz(idx + 1);
        }
    });
}

function skipCurrentPractice() {
    // 跳过当前错字的所有剩余遍数
    State.practiceRound = 0;
    State.practiceIndex++;
    showPracticeChar();
}

function showStrokeOrder() {
    // 在所有3个格子播放笔顺动画
    if (State.practiceWriters && State.practiceWriters.length > 0) {
        State.practiceWriters.forEach(w => {
            w.hideCharacter();
            w.showOutline();
        });
        // 只在第一个格子播放动画，其余显示轮廓
        State.practiceWriters[0].animateCharacter();
    }
}

// ==================== 初始化 ====================
initSelectPage();
</script>
