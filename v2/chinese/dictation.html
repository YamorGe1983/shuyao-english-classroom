<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="舒窈小课堂 - 语文汉字默写练习">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="舒窈小课堂">
    <title>语文默写 - 舒窈小课堂</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-light: #FF8E8E;
            --primary-dark: #E85555;
            --secondary: #4ECDC4;
            --secondary-light: #7EDED7;
            --accent: #FFE66D;
            --success: #00B894;
            --danger: #E17055;
            --bg: #F7F9FC;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .page { display:none; min-height:100vh; padding:20px; flex-direction:column; align-items:center; }
        .page.active { display:flex; }

        /* 选择页 */
        .select-header { text-align:center; margin-bottom:30px; }
        .select-header h1 { font-size:28px; color:var(--primary); }
        .select-header p { color:var(--text-light); margin-top:8px; }
        .lesson-list { width:100%; max-width:600px; }
        .lesson-item {
            background: var(--card);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lesson-item:active { transform: scale(0.97); }
        .lesson-name { font-size:18px; font-weight:600; }
        .lesson-count { color:var(--text-light); font-size:14px; }
        .wrong-book-btn {
            margin-top:20px;
            background: var(--accent);
            color: var(--text);
            border:none;
            padding:14px 32px;
            border-radius:25px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
        }

        /* 默写页 */
        .dictation-header {
            text-align:center; width:100%; max-width:600px;
        }
        .tip-bar {
            background: #FFF3E0;
            color: #E65100;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }
        .progress-bar {
            width:100%; height:8px; background:#eee; border-radius:4px;
            margin: 12px 0;
        }
        .progress-fill {
            height:100%; background:var(--primary); border-radius:4px;
            transition: width 0.3s;
        }
        .progress-text { text-align:center; color:var(--text-light); font-size:14px; margin-bottom:20px; }
        .grid-container {
            display:flex; justify-content:center; align-items:flex-start;
            gap:16px; flex-wrap:wrap; margin:20px 0;
        }
        .char-slot { position:relative; }
        .char-label {
            text-align:center; font-size:14px; color:var(--text-light);
            margin-top:8px;
        }
        canvas.write-canvas {
            border: 2px solid #ccc;
            border-radius: 8px;
            background: #fff;
            touch-action: none;
        }
        .dictation-btns {
            display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
            margin-top:20px;
        }
        .btn {
            border:none; padding:12px 24px; border-radius:25px;
            font-size:15px; font-weight:600; cursor:pointer;
            transition: transform 0.15s;
        }
        .btn:active { transform:scale(0.95); }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-secondary { background:var(--secondary); color:#fff; }
        .btn-accent { background:var(--accent); color:var(--text); }
        .btn-outline { background:transparent; border:2px solid #ddd; color:var(--text-light); }
        .btn-danger { background:var(--danger); color:#fff; }

        /* 批改页 */
        .grading-container { width:100%; max-width:900px; }
        .grading-title { text-align:center; font-size:22px; font-weight:700; color:var(--primary); margin-bottom:16px; }
        .grading-table {
            width:100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .grading-table th {
            background: #f0f0f0;
            padding: 12px 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            text-align: center;
        }
        .grading-table td {
            padding: 8px 6px;
            text-align: center;
            vertical-align: middle;
            border-top: 1px solid #f0f0f0;
        }
        .grading-table tr:last-child td { border-bottom: none; }
        .grading-cell-written {
            width:80px; height:80px; border:2px solid #eee;
            border-radius:6px; background:#fff;
            object-fit:contain; display:inline-block;
        }
        .grading-cell-skip {
            width:80px; height:80px; display:inline-flex;
            align-items:center; justify-content:center;
            color:#ccc; font-size:13px; border:2px solid #eee;
            border-radius:6px; background:#fff;
        }
        .grading-cell-correct {
            width:80px; height:80px; display:inline-flex;
            align-items:center; justify-content:center;
            font-size:56px;
            font-family: 'KaiTi', '楷体', 'STKaiti', serif;
            color: var(--text); border:2px solid #eee;
            border-radius:6px; background:#fff;
        }
        .grading-cell-info { font-size:11px; color:var(--text-light); margin-top:2px; }
        .grading-cell-btns { display:flex; justify-content:center; gap:10px; }
        .btn-grade-correct, .btn-grade-wrong {
            width:50px; height:50px; border-radius:50%;
            border:none; font-size:22px; cursor:pointer;
            transition: transform 0.15s;
        }
        .btn-grade-correct { background:var(--success); color:#fff; }
        .btn-grade-wrong { background:var(--danger); color:#fff; }
        .btn-grade-correct:active, .btn-grade-wrong:active { transform:scale(0.9); }
        .btn-grade-correct.selected { box-shadow: 0 0 0 4px rgba(0,184,148,0.4); }
        .btn-grade-wrong.selected { box-shadow: 0 0 0 4px rgba(225,112,85,0.4); }
        .grading-submit-area { text-align:center; margin-top:24px; }

        /* 结果页 */
        .result-card {
            background:var(--card); border-radius:20px; padding:30px;
            box-shadow:var(--shadow); text-align:center; width:100%; max-width:500px;
        }
        .score-big {
            font-size:72px; font-weight:800;
            margin:20px 0;
        }
        .score-A { color: var(--success); }
        .score-A- { color: #2ECC71; }
        .score-B { color: var(--secondary); }
        .score-B- { color: #3498DB; }
        .score-C { color: #F39C12; }
        .score-C- { color: #E67E22; }
        .score-D { color: var(--danger); }
        .result-detail { color:var(--text-light); font-size:16px; margin:10px 0; }
        .wrong-list { text-align:left; margin:20px 0; }
        .wrong-item {
            display:inline-block; background:#FFEAA7; border-radius:8px;
            padding:6px 14px; margin:4px; font-size:18px; font-weight:600;
        }

        /* 订正页 */
        .practice-container { width:100%; max-width:500px; text-align:center; }
        .practice-info { font-size:16px; color:var(--text-light); margin:10px 0; }
        .practice-round { font-size:20px; font-weight:700; color:var(--primary); margin:10px 0; }
        #practice-target {
            display:inline-block; margin:20px auto;
        }
    </style>
</head>
<body>

<!-- 页面1：选择课文 -->
<div id="page-select" class="page active">
    <div class="select-header">
        <h1>📝 语文默写</h1>
        <p>选择要默写的课文</p>
    </div>
    <div id="lessonList" class="lesson-list"></div>
    <button class="wrong-book-btn" id="wrongBookBtn" onclick="startWrongBook()">
        📖 错题本 (<span id="wrongCount">0</span>个字)
    </button>
</div>

<!-- 页面2：默写 -->
<div id="page-dictation" class="page">
    <div class="dictation-header">
        <div class="tip-bar">✏️ 请一笔一划书写，注意笔顺哦！</div>
        <div class="progress-bar"><div id="dictProgress" class="progress-fill" style="width:0%"></div></div>
        <div id="dictProgressText" class="progress-text">第 1 / 1 字</div>
    </div>
    <div id="gridArea" class="grid-container"></div>
    <div class="dictation-btns">
        <button class="btn btn-accent" onclick="replayVoice()">🔊 再听一遍</button>
        <button class="btn btn-outline" onclick="undoStroke()">↩️ 撤销</button>
        <button class="btn btn-outline" onclick="clearCanvas()">🗑️ 清除</button>
        <button class="btn btn-outline" onclick="skipChar()">⏭️ 跳过</button>
        <button class="btn btn-primary" onclick="nextChar()">下一个 ➡️</button>
    </div>
</div>

<!-- 页面3：批改 -->
<div id="page-grading" class="page">
    <div class="grading-container">
        <div class="grading-title">📝 批改默写</div>
        <div id="gradingTableArea"></div>
        <div class="grading-submit-area">
            <button class="btn btn-primary" id="btnSubmitGrading" onclick="submitGrading()" style="display:none;font-size:18px;padding:14px 40px;">确认批改 ✅</button>
        </div>
    </div>
</div>

<!-- 页面4：结果 -->
<div id="page-result" class="page">
    <div class="result-card" id="resultCard"></div>
</div>

<!-- 页面5：订正 -->
<div id="page-practice" class="page">
    <div class="practice-container">
        <div id="practiceInfo" class="practice-info"></div>
        <div id="practiceRound" class="practice-round"></div>
        <div id="practice-target"></div>
        <div style="margin-top:20px;">
            <button class="btn btn-secondary" id="btnShowStroke" onclick="showStrokeOrder()">👀 看笔顺</button>
            <button class="btn btn-primary" id="btnStartQuiz" onclick="startPracticeQuiz()" style="display:none;">✏️ 开始写</button>
        </div>
    </div>
</div>

<script>
// ==================== 状态管理 ====================
const State = {
    wordList: [],       // 当前要默写的所有字 [{char, pinyin, hint, wordHint}]
    currentIndex: 0,    // 当前默写到第几个字
    snapshots: [],      // 每个字的手写截图
    results: [],        // 批改结果 true/false
    strokes: [],        // 当前canvas的笔画路径
    currentStroke: [],  // 正在写的笔画
    isDrawing: false,
    canvasSize: 420,
    activeCanvas: null,
    activeCtx: null,
    practiceWrongChars: [],  // 需要订正的字
    practiceIndex: 0,
    practiceRound: 0,
    practiceWriter: null
};

// ==================== 页面切换 ====================
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ==================== 词库加载 ====================
async function loadWordData() {
    const resp = await fetch('../data/chinese/grade3_2.json');
    return await resp.json();
}

// ==================== 选择页 ====================
async function initSelectPage() {
    const data = await loadWordData();
    const list = document.getElementById('lessonList');
    list.innerHTML = '';
    data.units.forEach(unit => {
        unit.lessons.forEach(lesson => {
            const totalChars = lesson.words.reduce((s, w) => s + (w.chars ? w.chars.length : 1), 0);
            const div = document.createElement('div');
            div.className = 'lesson-item';
            div.innerHTML = `<span class="lesson-name">${lesson.name}</span><span class="lesson-count">${totalChars}字</span>`;
            div.onclick = () => startDictation(lesson.words);
            list.appendChild(div);
        });
    });
    updateWrongCount();
}

function updateWrongCount() {
    const wb = getWrongBook();
    document.getElementById('wrongCount').textContent = wb.length;
}

function getWrongBook() {
    const d = localStorage.getItem('chineseWrongBook');
    return d ? JSON.parse(d) : [];
}
function saveWrongBook(wb) {
    localStorage.setItem('chineseWrongBook', JSON.stringify(wb));
}

function startWrongBook() {
    const wb = getWrongBook();
    if (wb.length === 0) { alert('错题本是空的！'); return; }
    const words = wb.map(c => ({ char: c, pinyin: '', hint: '', chars: [c], wordHint: '' }));
    startDictation(words);
}

// ==================== 默写页 ====================
function startDictation(words) {
    // 展开多字词为逐字列表
    State.wordList = [];
    words.forEach(w => {
        const chars = w.chars || [w.char];
        const hint = w.hint || w.char;
        chars.forEach((c, i) => {
            State.wordList.push({
                char: c,
                pinyin: w.pinyin || '',
                hint: hint,
                wordHint: hint,
                isLastOfWord: i === chars.length - 1
            });
        });
    });
    State.currentIndex = 0;
    State.snapshots = [];
    State.results = [];
    showPage('page-dictation');
    showCurrentChar();
}

function showCurrentChar() {
    if (State.currentIndex >= State.wordList.length) {
        startGrading();
        return;
    }
    const item = State.wordList[State.currentIndex];
    const total = State.wordList.length;

    // 进度
    const pct = (State.currentIndex / total * 100).toFixed(0);
    document.getElementById('dictProgress').style.width = pct + '%';
    document.getElementById('dictProgressText').textContent = `第 ${State.currentIndex + 1} / ${total} 字`;

    // 创建Canvas
    const area = document.getElementById('gridArea');
    area.innerHTML = '';
    const size = State.canvasSize;
    const canvas = document.createElement('canvas');
    canvas.className = 'write-canvas';
    canvas.width = size;
    canvas.height = size;
    canvas.style.width = Math.min(size, window.innerWidth - 60) + 'px';
    canvas.style.height = Math.min(size, window.innerWidth - 60) + 'px';
    area.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    State.activeCanvas = canvas;
    State.activeCtx = ctx;
    State.strokes = [];
    State.currentStroke = [];
    State.isDrawing = false;

    drawGridBg(ctx, size);
    setupCanvasEvents(canvas, ctx, size);

    // 语音播报
    speakWord(item.hint || item.char);
}

function drawGridBg(ctx, size) {
    ctx.clearRect(0, 0, size, size);
    // 外框
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, size - 2, size - 2);
    // 横中线
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(0, size / 2);
    ctx.lineTo(size, size / 2);
    ctx.stroke();
    // 竖中线
    ctx.beginPath();
    ctx.moveTo(size / 2, 0);
    ctx.lineTo(size / 2, size);
    ctx.stroke();
    // 对角线
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(size, size);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(0, size);
    ctx.stroke();
    ctx.setLineDash([]);
}

function setupCanvasEvents(canvas, ctx, size) {
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = size / rect.width;
        const scaleY = size / rect.height;
        if (e.touches) {
            return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
    }

    function onStart(e) {
        e.preventDefault();
        State.isDrawing = true;
        const p = getPos(e);
        State.currentStroke = [p];
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
    }
    function onMove(e) {
        e.preventDefault();
        if (!State.isDrawing) return;
        const p = getPos(e);
        State.currentStroke.push(p);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }
    function onEnd(e) {
        e.preventDefault();
        if (!State.isDrawing) return;
        State.isDrawing = false;
        if (State.currentStroke.length > 0) {
            State.strokes.push([...State.currentStroke]);
        }
        State.currentStroke = [];
    }

    // Pointer events (Apple Pencil + mouse)
    canvas.addEventListener('pointerdown', onStart);
    canvas.addEventListener('pointermove', onMove);
    canvas.addEventListener('pointerup', onEnd);
    canvas.addEventListener('pointerleave', onEnd);
}

function undoStroke() {
    if (State.strokes.length === 0) return;
    State.strokes.pop();
    redrawCanvas();
}

function clearCanvas() {
    State.strokes = [];
    redrawCanvas();
}

function redrawCanvas() {
    const ctx = State.activeCtx;
    const size = State.canvasSize;
    drawGridBg(ctx, size);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    State.strokes.forEach(stroke => {
        if (stroke.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(stroke[0].x, stroke[0].y);
        for (let i = 1; i < stroke.length; i++) {
            ctx.lineTo(stroke[i].x, stroke[i].y);
        }
        ctx.stroke();
    });
}

function skipChar() {
    State.snapshots.push(null); // null = 跳过
    State.currentIndex++;
    showCurrentChar();
}

function nextChar() {
    // 保存截图
    if (State.activeCanvas) {
        State.snapshots.push(State.activeCanvas.toDataURL());
    } else {
        State.snapshots.push(null);
    }
    State.currentIndex++;
    showCurrentChar();
}

// ==================== 语音播报 ====================
function speakWord(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

function replayVoice() {
    if (State.currentIndex < State.wordList.length) {
        const item = State.wordList[State.currentIndex];
        speakWord(item.hint || item.char);
    }
}

// ==================== 批改页 ====================
let gradingGrades = []; // 每个字的批改结果 null/true/false

function startGrading() {
    gradingGrades = new Array(State.wordList.length).fill(null);
    showPage('page-grading');
    renderGradingTable();
}

function renderGradingTable() {
    const area = document.getElementById('gradingTableArea');
    let rows = '';
    State.wordList.forEach((item, i) => {
        const snapshot = State.snapshots[i];
        let writtenCell = '';
        if (snapshot) {
            writtenCell = `<img class="grading-cell-written" src="${snapshot}" alt="手写">`;
        } else {
            writtenCell = `<div class="grading-cell-skip">跳过</div>`;
        }
        const correctCell = `<div class="grading-cell-correct">${item.char}</div>`;
        const info = item.pinyin ? item.pinyin : (item.wordHint || '');
        const gradeCorrect = gradingGrades[i] === true ? ' selected' : '';
        const gradeWrong = gradingGrades[i] === false ? ' selected' : '';
        const btns = `
            <button class="btn-grade-correct${gradeCorrect}" onclick="gradeCharAt(${i}, true)">✅</button>
            <button class="btn-grade-wrong${gradeWrong}" onclick="gradeCharAt(${i}, false)">❌</button>
        `;
        rows += `<tr>
            <td>${writtenCell}</td>
            <td>${correctCell}<div class="grading-cell-info">${info}</div></td>
            <td><div class="grading-cell-btns">${btns}</div></td>
        </tr>`;
    });
    area.innerHTML = `<table class="grading-table">
        <thead><tr><th>孩子写的</th><th>正确字</th><th>判断</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;

    // 检查是否全部批改完毕
    checkAllGraded();
}

function gradeCharAt(index, correct) {
    gradingGrades[index] = correct;
    renderGradingTable();
}

function checkAllGraded() {
    const allDone = gradingGrades.every(g => g !== null);
    document.getElementById('btnSubmitGrading').style.display = allDone ? 'inline-block' : 'none';
}

function submitGrading() {
    State.results = [...gradingGrades];
    showResult();
}

// ==================== 结果页 ====================
function showResult() {
    const wrongCount = State.results.filter(r => !r).length;
    const totalCount = State.results.length;
    const rightCount = totalCount - wrongCount;

    const score = getScore(wrongCount);
    const scoreClass = 'score-' + score.replace('-', 'minus-').replace('minus', '');

    // 收集错字
    const wrongChars = [];
    State.results.forEach((r, i) => {
        if (!r) wrongChars.push(State.wordList[i].char);
    });

    // 更新错题本
    const wb = getWrongBook();
    wrongChars.forEach(c => {
        if (!wb.includes(c)) wb.push(c);
    });
    saveWrongBook(wb);

    let wrongHtml = '';
    if (wrongChars.length > 0) {
        wrongHtml = `<div class="wrong-list"><p style="margin-bottom:8px;">错字：</p>${wrongChars.map(c => `<span class="wrong-item">${c}</span>`).join('')}</div>`;
    }

    document.getElementById('resultCard').innerHTML = `
        <h2>默写完成！</h2>
        <div class="score-big ${getScoreClass(score)}">${score}</div>
        <div class="result-detail">正确 ${rightCount} / ${totalCount} 字，错误 ${wrongCount} 字</div>
        ${wrongHtml}
        <div style="margin-top:24px;">
            ${wrongChars.length > 0 ? `<button class="btn btn-primary" onclick="startPractice()" style="margin:8px;">📝 开始订正</button>` : ''}
            <button class="btn btn-secondary" onclick="restartDictation()" style="margin:8px;">🔄 重新默写</button>
            <button class="btn btn-outline" onclick="backToSelect()" style="margin:8px;">🏠 返回</button>
        </div>
    `;
    showPage('page-result');
}

function getScore(wrongCount) {
    if (wrongCount === 0) return 'A';
    if (wrongCount === 1) return 'A-';
    if (wrongCount === 2) return 'B';
    if (wrongCount === 3) return 'B-';
    if (wrongCount === 4) return 'C';
    if (wrongCount === 5) return 'C-';
    return 'D';
}

function getScoreClass(score) {
    const map = {'A':'score-A','A-':'score-A-','B':'score-B','B-':'score-B-','C':'score-C','C-':'score-C-','D':'score-D'};
    return map[score] || 'score-D';
}

function restartDictation() {
    State.currentIndex = 0;
    State.snapshots = [];
    State.results = [];
    showPage('page-dictation');
    showCurrentChar();
}

function backToSelect() {
    showPage('page-select');
    updateWrongCount();
}

// ==================== 订正页（Hanzi Writer练字） ====================
function startPractice() {
    // 收集所有错字
    State.practiceWrongChars = [];
    State.results.forEach((r, i) => {
        if (!r) State.practiceWrongChars.push(State.wordList[i].char);
    });
    if (State.practiceWrongChars.length === 0) {
        alert('没有错字，不需要订正！');
        return;
    }
    State.practiceIndex = 0;
    State.practiceRound = 0;
    showPage('page-practice');
    showPracticeChar();
}

function showPracticeChar() {
    if (State.practiceIndex >= State.practiceWrongChars.length) {
        // 全部练完
        document.getElementById('practiceInfo').textContent = '订正完成！所有错字已练习3遍 🎉';
        document.getElementById('practiceRound').textContent = '';
        document.getElementById('practice-target').innerHTML = `<button class="btn btn-primary" onclick="backToSelect()">🏠 返回</button>`;
        document.getElementById('btnShowStroke').style.display = 'none';
        document.getElementById('btnStartQuiz').style.display = 'none';
        return;
    }

    const char = State.practiceWrongChars[State.practiceIndex];
    const round = State.practiceRound + 1;

    document.getElementById('practiceInfo').textContent = `订正：第 ${State.practiceIndex + 1} / ${State.practiceWrongChars.length} 个错字「${char}」`;
    document.getElementById('practiceRound').textContent = `第 ${round} / 3 遍`;

    // 创建Hanzi Writer
    const target = document.getElementById('practice-target');
    target.innerHTML = '';
    const div = document.createElement('div');
    div.id = 'hw-practice';
    target.appendChild(div);

    State.practiceWriter = HanziWriter.create('hw-practice', char, {
        width: 300,
        height: 300,
        padding: 15,
        showOutline: true,
        showCharacter: false,
        strokeColor: '#333',
        drawingColor: '#1a73e8',
        drawingWidth: 4,
        leniency: 0.7,
        showHintAfterMisses: 2,
        highlightOnComplete: true
    });

    document.getElementById('btnShowStroke').style.display = 'inline-block';
    document.getElementById('btnStartQuiz').style.display = 'none';
}

function showStrokeOrder() {
    if (State.practiceWriter) {
        State.practiceWriter.animateCharacter({
            onComplete: function() {
                document.getElementById('btnStartQuiz').style.display = 'inline-block';
            }
        });
        document.getElementById('btnShowStroke').style.display = 'none';
    }
}

function startPracticeQuiz() {
    if (State.practiceWriter) {
        document.getElementById('btnStartQuiz').style.display = 'none';
        State.practiceWriter.quiz({
            onCorrectStroke: function() {},
            onMistake: function() {},
            onComplete: function(summary) {
                State.practiceRound++;
                if (State.practiceRound >= 3) {
                    // 当前字练完3遍
                    State.practiceRound = 0;
                    State.practiceIndex++;
                }
                // 短暂延迟后显示下一轮
                setTimeout(showPracticeChar, 500);
            }
        });
    }
}

// ==================== 初始化 ====================
initSelectPage();
</script>
</body>
</html>
