<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="舒窈小课堂 - 数学单位练习">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="数学单位练习">
    <title>数学单位练习 - 舒窈小课堂</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    
    <style>
        :root {
            --primary: #4A90D9;
            --primary-light: #6BA3E0;
            --primary-dark: #3A7BC8;
            --secondary: #67D4C4;
            --accent: #FFD93D;
            --bg-primary: #F7F9FC;
            --bg-secondary: #FFFFFF;
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --success: #00B894;
            --danger: #E17055;
            --info: #74B9FF;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, #E8F4FD 0%, #F0F7FF 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        
        /* 选择页面 */
        .select-page {
            text-align: center;
            padding-top: 40px;
        }
        
        .select-page .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .select-page .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .level-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .level-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border: 3px solid transparent;
        }
        
        .level-card:active {
            transform: scale(0.98);
        }
        
        .level-card:hover {
            border-color: var(--primary-light);
        }
        
        .level-card.basic {
            border-left: 4px solid var(--success);
        }
        
        .level-card.advanced {
            border-left: 4px solid var(--accent);
        }
        
        .level-card.all {
            border-left: 4px solid var(--primary);
        }
        
        .level-card .level-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        
        .level-card h3 {
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .level-card .level-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        
        .level-card .level-count {
            display: inline-block;
            background: var(--bg-primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }
        
        /* 返回按钮 */
        .back-btn {
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }
        
        .back-btn:active {
            transform: scale(0.95);
        }
        
        /* 顶部状态栏 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.3);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .header-top .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: none;
        }
        
        .header-top .back-btn:active {
            transform: scale(0.95);
        }
        
        .timer {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .progress-info {
            text-align: center;
        }
        
        .progress-text {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        /* 题目卡片 */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        
        .question-type {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 16px;
        }
        
        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.5;
        }
        
        /* 选项按钮 */
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .option-btn {
            background: white;
            border: 3px solid #E8E8E8;
            border-radius: 16px;
            padding: 20px 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .option-btn:active:not(.disabled) {
            transform: scale(0.95);
        }
        
        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(74, 144, 217, 0.05);
        }
        
        .option-letter {
            width: 28px;
            height: 28px;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        
        .option-btn.correct {
            border-color: var(--success);
            background: rgba(0, 184, 148, 0.1);
            animation: correctPulse 0.5s ease;
        }
        
        .option-btn.correct .option-letter {
            background: var(--success);
            color: white;
        }
        
        .option-btn.wrong {
            border-color: var(--danger);
            background: rgba(225, 112, 85, 0.1);
            animation: wrongShake 0.5s ease;
        }
        
        .option-btn.wrong .option-letter {
            background: var(--danger);
            color: white;
        }
        
        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .option-btn:not(.correct):not(.wrong):not(.disabled) {
            cursor: pointer;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        /* 解析区域 */
        .explanation-card {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFF3CC 100%);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            border-left: 4px solid var(--accent);
        }
        
        .explanation-label {
            font-size: 14px;
            font-weight: 600;
            color: #B8860B;
            margin-bottom: 8px;
        }
        
        .explanation-text {
            font-size: 16px;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* 下一题按钮 */
        .next-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }
        
        .next-btn:active {
            transform: scale(0.98);
            background: var(--primary-dark);
        }
        
        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 完成页面 */
        .complete-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        .complete-icon {
            font-size: 80px;
            margin-bottom: 16px;
        }
        
        .complete-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .complete-score {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
        }
        
        .complete-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .complete-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .retry-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .home-btn {
            width: 100%;
            padding: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 难度选择页面 -->
        <div id="select-page" class="select-page">
            <button class="back-btn" onclick="goBack()">
                ← 返回
            </button>
            
            <div class="title">📐 数学练习</div>
            <div class="subtitle">选择练习难度，开始挑战吧！</div>
            
            <div class="level-cards">
                <div class="level-card basic" onclick="startPractice('basic')">
                    <div class="level-icon">📏</div>
                    <h3>基础练习</h3>
                    <div class="level-desc">填单位 · 单位换算</div>
                    <div class="level-count">共30题</div>
                </div>
                
                <div class="level-card advanced" onclick="startPractice('advanced')">
                    <div class="level-icon">🧮</div>
                    <h3>进阶练习</h3>
                    <div class="level-desc">比大小 · 判断 · 排序 · 应用</div>
                    <div class="level-count">共20题</div>
                </div>
                
                <div class="level-card all" onclick="startPractice('all')">
                    <div class="level-icon">📐</div>
                    <h3>综合练习</h3>
                    <div class="level-desc">全部题目大挑战</div>
                    <div class="level-count">共50题</div>
                </div>
            </div>
        </div>
        
        <!-- 练习页面 -->
        <div id="practice-page" class="hidden">
            <div class="header">
                <div class="header-top">
                    <button class="back-btn" onclick="confirmExit()">
                        ← 返回
                    </button>
                    <div class="timer">
                        ⏱️ <span id="timer-display">00:00</span>
                    </div>
                </div>
                <div class="progress-info">
                    <div class="progress-text">
                        <span id="current-q">1</span> / <span id="total-q">30</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="question-card">
                <div class="question-type" id="question-type">填单位</div>
                <div class="question-text" id="question-text">
                    手机长约15（    ）
                </div>
            </div>
            
            <div class="options-container" id="options-container">
                <!-- 选项将动态生成 -->
            </div>
            
            <div class="explanation-card hidden" id="explanation-card">
                <div class="explanation-label">💡 解析</div>
                <div class="explanation-text" id="explanation-text"></div>
            </div>
            
            <button class="next-btn hidden" id="next-btn" onclick="nextQuestion()">
                下一题 →
            </button>
        </div>
        
        <!-- 完成页面 -->
        <div id="complete-page" class="hidden">
            <div class="complete-card">
                <div class="complete-icon" id="complete-icon">🎉</div>
                <div class="complete-title" id="complete-title">练习完成！</div>
                <div class="complete-score" id="complete-score">85分</div>
                
                <div class="complete-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-correct">0</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-wrong">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-time">00:00</div>
                        <div class="stat-label">用时</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-accuracy">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>
                
                <div class="complete-actions">
                    <button class="retry-btn" onclick="retryPractice()">
                        🔄 再来一次
                    </button>
                    <button class="home-btn" onclick="goHome()">
                        🏠 返回首页
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局状态
        let mathData = null;
        let currentLevel = 'basic';
        let questions = [];
        let currentIndex = 0;
        let correctCount = 0;
        let wrongQuestions = [];
        let timerInterval = null;
        let startTime = null;
        let answered = false;
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/math/units.json');
                mathData = await response.json();
                console.log('数学数据加载成功:', mathData);
            } catch (error) {
                console.error('加载数据失败:', error);
                showToast('加载数据失败');
            }
        }
        
        // 从URL获取难度参数
        function getLevelFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('level') || '';
        }
        
        // 初始化
        async function init() {
            await loadData();
            
            const level = getLevelFromURL();
            if (level && ['basic', 'advanced', 'all'].includes(level)) {
                // 直接开始练习
                startPractice(level);
            }
            // 否则显示选择页面
        }
        
        // 开始练习
        function startPractice(level) {
            currentLevel = level;
            currentIndex = 0;
            correctCount = 0;
            wrongQuestions = [];
            answered = false;
            
            // 根据难度筛选题目
            if (level === 'basic') {
                questions = [...mathData.levels.basic.questions];
            } else if (level === 'advanced') {
                questions = [...mathData.levels.advanced.questions];
            } else {
                // 全部题目
                questions = [
                    ...mathData.levels.basic.questions,
                    ...mathData.levels.advanced.questions
                ];
            }
            
            // 打乱题目顺序
            questions = shuffleArray(questions);
            
            // 更新UI
            document.getElementById('select-page').classList.add('hidden');
            document.getElementById('practice-page').classList.remove('hidden');
            document.getElementById('complete-page').classList.add('hidden');
            
            document.getElementById('total-q').textContent = questions.length;
            
            // 开始计时
            startTime = new Date();
            startTimer();
            
            // 显示第一题
            showQuestion();
        }
        
        // 打乱数组
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        // 显示题目
        function showQuestion() {
            if (currentIndex >= questions.length) {
                showComplete();
                return;
            }
            
            const q = questions[currentIndex];
            answered = false;
            
            // 更新进度
            document.getElementById('current-q').textContent = currentIndex + 1;
            document.getElementById('progress-fill').style.width = 
                ((currentIndex) / questions.length * 100) + '%';
            
            // 更新题目类型
            const typeMap = {
                'fill_unit': '填单位',
                'convert': '单位换算',
                'compare': '比大小',
                'judge': '判断',
                'sort': '排序',
                'application': '应用题'
            };
            document.getElementById('question-type').textContent = typeMap[q.type] || '练习';
            
            // 更新题目
            document.getElementById('question-text').innerHTML = q.question;
            
            // 生成选项
            const container = document.getElementById('options-container');
            const letters = ['A', 'B', 'C', 'D'];
            container.innerHTML = q.options.map((opt, idx) => `
                <button class="option-btn" onclick="selectAnswer(${idx})" data-index="${idx}">
                    <span class="option-letter">${letters[idx]}</span>
                    <span>${opt}</span>
                </button>
            `).join('');
            
            // 隐藏解析和下一题按钮
            document.getElementById('explanation-card').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }
        
        // 选择答案
        function selectAnswer(index) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            // 禁用所有按钮
            buttons.forEach(btn => btn.classList.add('disabled'));
            
            // 标记正确和错误
            if (index === q.answer) {
                buttons[index].classList.add('correct');
                correctCount++;
            } else {
                buttons[index].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
                
                // 记录错题
                wrongQuestions.push({
                    question: q.question,
                    yourAnswer: q.options[index],
                    correctAnswer: q.options[q.answer],
                    explanation: q.explanation
                });
            }
            
            // 显示解析
            document.getElementById('explanation-card').classList.remove('hidden');
            document.getElementById('explanation-text').textContent = q.explanation;
            
            // 显示下一题按钮
            const nextBtn = document.getElementById('next-btn');
            nextBtn.classList.remove('hidden');
            
            if (currentIndex === questions.length - 1) {
                nextBtn.textContent = '查看成绩 🏆';
            } else {
                nextBtn.textContent = '下一题 →';
            }
        }
        
        // 下一题
        function nextQuestion() {
            currentIndex++;
            showQuestion();
        }
        
        // 完成练习
        function showComplete() {
            stopTimer();
            
            // 停止计时
            const endTime = new Date();
            const timeDiff = endTime - startTime;
            const minutes = Math.floor(timeDiff / 60000);
            const seconds = Math.floor((timeDiff % 60000) / 1000);
            const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 计算分数和正确率
            const total = questions.length;
            const accuracy = Math.round((correctCount / total) * 100);
            const score = Math.round((correctCount / total) * 100);
            
            // 更新完成页面
            if (accuracy >= 90) {
                document.getElementById('complete-icon').textContent = '🏆';
                document.getElementById('complete-title').textContent = '太棒了！';
            } else if (accuracy >= 70) {
                document.getElementById('complete-icon').textContent = '🎉';
                document.getElementById('complete-title').textContent = '做得不错！';
            } else if (accuracy >= 50) {
                document.getElementById('complete-icon').textContent = '💪';
                document.getElementById('complete-title').textContent = '继续加油！';
            } else {
                document.getElementById('complete-icon').textContent = '📚';
                document.getElementById('complete-title').textContent = '多练习一下！';
            }
            
            document.getElementById('complete-score').textContent = score + '分';
            document.getElementById('stat-correct').textContent = correctCount;
            document.getElementById('stat-wrong').textContent = total - correctCount;
            document.getElementById('stat-time').textContent = timeStr;
            document.getElementById('stat-accuracy').textContent = accuracy + '%';
            
            // 保存记录
            saveHistory({
                level: currentLevel,
                levelName: currentLevel === 'basic' ? '基础练习' : 
                          currentLevel === 'advanced' ? '进阶练习' : '综合练习',
                score: score,
                correct: correctCount,
                total: total,
                time: timeStr,
                date: new Date().toISOString()
            });
            
            // 切换页面
            document.getElementById('practice-page').classList.add('hidden');
            document.getElementById('complete-page').classList.remove('hidden');
        }
        
        // 保存历史记录
        function saveHistory(record) {
            const history = JSON.parse(localStorage.getItem('mathHistory') || '[]');
            history.unshift(record);
            // 只保留最近20条
            if (history.length > 20) {
                history.pop();
            }
            localStorage.setItem('mathHistory', JSON.stringify(history));
        }
        
        // 计时器
        function startTimer() {
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function updateTimer() {
            if (!startTime) return;
            
            const now = new Date();
            const diff = now - startTime;
            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('timer-display').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 重新练习
        function retryPractice() {
            startPractice(currentLevel);
        }
        
        // 返回首页
        function goHome() {
            window.location.href = 'index.html';
        }
        
        // 返回
        function goBack() {
            window.location.href = 'index.html';
        }
        
        // 确认退出
        function confirmExit() {
            if (confirm('确定要退出练习吗？当前进度将不会保存。')) {
                goBack();
            }
        }
        
        // 显示Toast
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
