<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="舒窈小课堂 - 数学单位练习">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="数学单位练习">
    <title>数学单位练习 - 舒窈小课堂</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    
    <style>
        :root {
            --primary: #4A90D9;
            --primary-light: #6BA3E0;
            --primary-dark: #3A7BC8;
            --secondary: #67D4C4;
            --accent: #FFD93D;
            --bg-primary: #F7F9FC;
            --bg-secondary: #FFFFFF;
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --success: #00B894;
            --danger: #E17055;
            --info: #74B9FF;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, #E8F4FD 0%, #F0F7FF 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        
        /* 顶部状态栏 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.3);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .back-btn:active {
            transform: scale(0.95);
        }
        
        .timer {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .progress-info {
            text-align: center;
        }
        
        .progress-text {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        /* 题目卡片 */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        
        .question-type {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 16px;
        }
        
        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.5;
        }
        
        /* 选项按钮 */
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .option-btn {
            background: white;
            border: 3px solid #E8E8E8;
            border-radius: 16px;
            padding: 20px 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .option-btn:active:not(.disabled) {
            transform: scale(0.95);
        }
        
        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(74, 144, 217, 0.05);
        }
        
        .option-letter {
            width: 28px;
            height: 28px;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        
        .option-btn.correct {
            border-color: var(--success);
            background: rgba(0, 184, 148, 0.1);
            animation: correctPulse 0.5s ease;
        }
        
        .option-btn.correct .option-letter {
            background: var(--success);
            color: white;
        }
        
        .option-btn.wrong {
            border-color: var(--danger);
            background: rgba(225, 112, 85, 0.1);
            animation: wrongShake 0.5s ease;
        }
        
        .option-btn.wrong .option-letter {
            background: var(--danger);
            color: white;
        }
        
        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .option-btn.show-correct {
            border-color: var(--success);
            background: rgba(0, 184, 148, 0.1);
        }
        
        .option-btn.show-correct .option-letter {
            background: var(--success);
            color: white;
        }
        
        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        /* 解释框 */
        .explanation-box {
            background: linear-gradient(135deg, #FFF9C4 0%, #FFECB3 100%);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            border-left: 4px solid #FFC107;
            animation: slideUp 0.3s ease;
        }
        
        .explanation-title {
            font-weight: 600;
            color: #F57C00;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .explanation-text {
            color: #5D4037;
            font-size: 15px;
            line-height: 1.6;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 下一题按钮 */
        .next-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.3);
            transition: all 0.2s ease;
        }
        
        .next-btn:active {
            transform: scale(0.98);
        }
        
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 结果页面 */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .result-subtitle {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            background: var(--bg-primary);
            padding: 16px 8px;
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .accuracy-ring {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
        }
        
        .accuracy-ring svg {
            transform: rotate(-90deg);
        }
        
        .accuracy-ring circle {
            fill: none;
            stroke-width: 10;
        }
        
        .accuracy-ring .bg {
            stroke: #E8E8E8;
        }
        
        .accuracy-ring .progress {
            stroke: var(--success);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }
        
        .accuracy-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .accuracy-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--success);
        }
        
        .accuracy-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* 错题列表 */
        .wrong-list {
            margin-top: 24px;
            text-align: left;
        }
        
        .wrong-list-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .wrong-item {
            background: rgba(225, 112, 85, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .wrong-question {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .wrong-answer {
            font-size: 12px;
            color: var(--danger);
            margin-bottom: 4px;
        }
        
        .wrong-explanation {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }
        
        .action-btn.secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            z-index: 1000;
            animation: toastFade 1.5s ease forwards;
        }
        
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* 开始页面 */
        .start-card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        
        .start-icon {
            font-size: 80px;
            margin-bottom: 16px;
        }
        
        .start-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .start-desc {
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .start-info {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #E8E8E8;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: var(--text-secondary);
        }
        
        .info-value {
            font-weight: 600;
            color: var(--primary);
        }
        
        .start-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.3);
            transition: all 0.2s ease;
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 内容由JS动态渲染 -->
    </div>
    
    <script>
        // 数学单位练习应用
        const MathUnitsApp = {
            questions: [],
            currentIndex: 0,
            answers: [],
            startTime: null,
            timerInterval: null,
            
            // 初始化
            async init() {
                await this.loadQuestions();
                this.showStartPage();
            },
            
            // 加载题目
            async loadQuestions() {
                try {
                    const response = await fetch('data/math/units.json');
                    const data = await response.json();
                    this.questions = data.questions;
                } catch (error) {
                    console.error('加载题目失败:', error);
                    this.showToast('加载失败，请刷新重试');
                }
            },
            
            // 显示开始页面
            showStartPage() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="start-card">
                        <div class="start-icon">📏📐</div>
                        <h1 class="start-title">数学单位练习</h1>
                        <p class="start-desc">
                            长度单位和面积单位练习<br>
                            贴近生活的趣味题目
                        </p>
                        <div class="start-info">
                            <div class="info-item">
                                <span class="info-label">题目数量</span>
                                <span class="info-value">${this.questions.length}题</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">题型类型</span>
                                <span class="info-value">选择、判断</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">单位类型</span>
                                <span class="info-value">mm/cm/dm/m/km</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">面积单位</span>
                                <span class="info-value">mm²/cm²/dm²/m²/km²</span>
                            </div>
                        </div>
                        <button class="start-btn" onclick="MathUnitsApp.startExercise()">
                            🚀 开始答题
                        </button>
                    </div>
                `;
            },
            
            // 开始答题
            startExercise() {
                this.currentIndex = 0;
                this.answers = [];
                this.startTime = Date.now();
                this.startTimer();
                this.showQuestion();
            },
            
            // 开始计时器
            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.updateTimerDisplay();
                }, 1000);
            },
            
            // 更新计时器显示
            updateTimerDisplay() {
                const timerEl = document.getElementById('timer');
                if (timerEl) {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    timerEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            },
            
            // 获取用时（秒）
            getElapsedSeconds() {
                return Math.floor((Date.now() - this.startTime) / 1000);
            },
            
            // 显示题目
            showQuestion() {
                const question = this.questions[this.currentIndex];
                const progress = ((this.currentIndex) / this.questions.length) * 100;
                const typeLabel = this.getTypeLabel(question.type);
                const typeName = this.getTypeName(question.type);
                
                const app = document.getElementById('app');
                app.innerHTML = `
                    <!-- 顶部状态栏 -->
                    <div class="header">
                        <div class="header-top">
                            <button class="back-btn" onclick="MathUnitsApp.confirmExit()">
                                ← 返回
                            </button>
                            <div class="timer" id="timer">
                                00:00
                            </div>
                        </div>
                        <div class="progress-info">
                            <div class="progress-text">第 ${this.currentIndex + 1} 题 / 共 ${this.questions.length} 题</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 题目卡片 -->
                    <div class="question-card">
                        <span class="question-type">${typeLabel}</span>
                        <div class="question-text">${question.question}</div>
                    </div>
                    
                    <!-- 选项 -->
                    <div class="options-container" id="options-container">
                        ${question.options.map((opt, idx) => `
                            <button class="option-btn" onclick="MathUnitsApp.selectOption(${idx})" data-index="${idx}">
                                <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
                                <span>${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                `;
            },
            
            // 获取题型标签
            getTypeLabel(type) {
                const labels = {
                    'fill_unit': '📝 填单位',
                    'compare': '⚖️ 比大小',
                    'judge': '❓ 判断题'
                };
                return labels[type] || '📝 选择题';
            },
            
            // 获取题型名称
            getTypeName(type) {
                const names = {
                    'fill_unit': '填单位',
                    'compare': '比大小',
                    'judge': '判断题'
                };
                return names[type] || '选择题';
            },
            
            // 选择选项
            selectOption(index) {
                const question = this.questions[this.currentIndex];
                const isCorrect = index === question.answer;
                const buttons = document.querySelectorAll('.option-btn');
                
                // 禁用所有按钮
                buttons.forEach(btn => btn.classList.add('disabled'));
                
                // 标记正确答案和错误答案
                buttons.forEach((btn, idx) => {
                    if (idx === question.answer) {
                        btn.classList.add('correct');
                    } else if (idx === index && !isCorrect) {
                        btn.classList.add('wrong');
                    }
                });
                
                // 记录答案
                this.answers.push({
                    questionId: question.id,
                    question: question.question,
                    selectedIndex: index,
                    selectedOption: question.options[index],
                    correctIndex: question.answer,
                    correctOption: question.options[question.answer],
                    isCorrect: isCorrect,
                    explanation: question.explanation
                });
                
                // 显示解释或下一题按钮
                const app = document.getElementById('app');
                const optionsContainer = document.getElementById('options-container');
                
                let feedbackHTML = '';
                if (!isCorrect) {
                    feedbackHTML = `
                        <div class="explanation-box">
                            <div class="explanation-title">💡 正确答案：${question.options[question.answer]}</div>
                            <div class="explanation-text">${question.explanation}</div>
                        </div>
                    `;
                }
                
                const isLast = this.currentIndex === this.questions.length - 1;
                feedbackHTML += `
                    <button class="next-btn" onclick="MathUnitsApp.nextQuestion()">
                        ${isLast ? '🎉 查看结果' : '下一题 →'}
                    </button>
                `;
                
                optionsContainer.insertAdjacentHTML('afterend', feedbackHTML);
            },
            
            // 下一题
            nextQuestion() {
                this.currentIndex++;
                if (this.currentIndex >= this.questions.length) {
                    this.showResult();
                } else {
                    this.showQuestion();
                }
            },
            
            // 显示结果
            showResult() {
                clearInterval(this.timerInterval);
                
                const total = this.questions.length;
                const correct = this.answers.filter(a => a.isCorrect).length;
                const wrong = total - correct;
                const accuracy = Math.round((correct / total) * 100);
                const elapsed = this.getElapsedSeconds();
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const timeStr = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
                
                // 根据正确率显示不同图标
                let emoji = '🌟';
                let title = '太棒了！';
                if (accuracy >= 90) {
                    emoji = '🎉';
                    title = '太棒了！';
                } else if (accuracy >= 70) {
                    emoji = '👍';
                    title = '还不错！';
                } else if (accuracy >= 50) {
                    emoji = '💪';
                    title = '继续加油！';
                } else {
                    emoji = '📚';
                    title = '需要多练习！';
                }
                
                // 计算圆环周长
                const circumference = 2 * Math.PI * 50;
                const offset = circumference - (accuracy / 100) * circumference;
                
                let wrongListHTML = '';
                if (wrong > 0) {
                    const wrongAnswers = this.answers.filter(a => !a.isCorrect);
                    wrongListHTML = `
                        <div class="wrong-list">
                            <div class="wrong-list-title">
                                📝 错题回顾 (${wrong}题)
                            </div>
                            ${wrongAnswers.map(w => `
                                <div class="wrong-item">
                                    <div class="wrong-question">${w.question}</div>
                                    <div class="wrong-answer">你的答案：${w.selectedOption} ❌</div>
                                    <div class="wrong-answer">正确答案：${w.correctOption} ✓</div>
                                    <div class="wrong-explanation">💡 ${w.explanation}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="result-card">
                        <div class="result-icon">${emoji}</div>
                        <h2 class="result-title">${title}</h2>
                        <p class="result-subtitle">已完成数学单位练习</p>
                        
                        <!-- 正确率圆环 -->
                        <div class="accuracy-ring">
                            <svg width="120" height="120">
                                <circle class="bg" cx="60" cy="60" r="50"></circle>
                                <circle class="progress" cx="60" cy="60" r="50" 
                                    stroke-dasharray="${circumference}" 
                                    stroke-dashoffset="${offset}"></circle>
                            </svg>
                            <div class="accuracy-text">
                                <div class="accuracy-value">${accuracy}%</div>
                                <div class="accuracy-label">正确率</div>
                            </div>
                        </div>
                        
                        <!-- 统计数据 -->
                        <div class="result-stats">
                            <div class="stat-item">
                                <div class="stat-value">${correct}</div>
                                <div class="stat-label">答对</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${wrong}</div>
                                <div class="stat-label">答错</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${timeStr}</div>
                                <div class="stat-label">用时</div>
                            </div>
                        </div>
                        
                        <!-- 错题列表 -->
                        ${wrongListHTML}
                        
                        <!-- 操作按钮 -->
                        <div class="action-buttons">
                            <button class="action-btn secondary" onclick="MathUnitsApp.showStartPage()">
                                返回首页
                            </button>
                            <button class="action-btn primary" onclick="MathUnitsApp.startExercise()">
                                再练一次
                            </button>
                        </div>
                    </div>
                `;
            },
            
            // 确认退出
            confirmExit() {
                if (this.currentIndex > 0 && this.currentIndex < this.questions.length) {
                    if (confirm('确定要退出吗？当前进度将不会保存。')) {
                        clearInterval(this.timerInterval);
                        window.location.href = 'index.html';
                    }
                } else {
                    clearInterval(this.timerInterval);
                    window.location.href = 'index.html';
                }
            },
            
            // Toast提示
            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            }
        };
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            MathUnitsApp.init();
        });
    </script>
</body>
</html>
