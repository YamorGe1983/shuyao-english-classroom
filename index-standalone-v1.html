<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="小学英语学习工具 - 牛津上海版三年级下册">
    <meta name="theme-color" content="#FF6B6B">
    <title>英语小课堂 - 小学英语学习</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
/**
 * 小学英语学习App - 样式表
 * 儿童友好的明亮色彩和大按钮设计
 */

/* ==================== 变量定义 ==================== */
:root {
    /* 主色调 */
    --primary: #FF6B6B;
    --primary-light: #FF8E8E;
    --primary-dark: #E85555;
    
    /* 辅助色 */
    --secondary: #4ECDC4;
    --secondary-light: #7EDED7;
    --secondary-dark: #3DBDB4;
    
    /* 强调色 */
    --accent: #FFE66D;
    --accent-dark: #FFD93D;
    
    /* 背景色 */
    --bg-primary: #F7F9FC;
    --bg-secondary: #FFFFFF;
    --bg-card: #FFFFFF;
    
    /* 文字颜色 */
    --text-primary: #2D3436;
    --text-secondary: #636E72;
    --text-light: #B2BEC3;
    --text-white: #FFFFFF;
    
    /* 状态颜色 */
    --success: #00B894;
    --warning: #FDCB6E;
    --danger: #E17055;
    --info: #74B9FF;
    
    /* 模块颜色 */
    --module1: #FF6B6B;
    --module2: #FF8E8E;
    --module3: #4ECDC4;
    --module4: #FFE66D;
    
    /* 阴影 */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
    
    /* 圆角 */
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    
    /* 字体大小 */
    --font-xs: 12px;
    --font-sm: 14px;
    --font-md: 16px;
    --font-lg: 20px;
    --font-xl: 24px;
    --font-xxl: 32px;
    --font-giant: 48px;
    
    /* 间距 */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-xxl: 48px;
    
    /* 导航高度 */
    --nav-height: 70px;
}

/* ==================== 基础样式 ==================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: var(--font-md);
    line-height: 1.6;
    color: var(--text-primary);
    background-color: var(--bg-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
}

h1, h2, h3, h4, h5, h6 {
    font-weight: 600;
    line-height: 1.3;
}

/* ==================== 应用容器 ==================== */
#app {
    min-height: 100vh;
    padding-bottom: calc(var(--nav-height) + 20px);
}

.app-container {
    max-width: 480px;
    margin: 0 auto;
    padding: var(--space-md);
}

/* ==================== 导航栏 ==================== */
#nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--nav-height);
    background: var(--bg-secondary);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
    padding: 0 var(--space-md);
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-sm) var(--space-md);
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
    cursor: pointer;
    background: none;
    border: none;
    font-size: var(--font-xs);
    min-width: 60px;
}

.nav-item .nav-icon {
    font-size: 24px;
    margin-bottom: 2px;
    transition: transform 0.2s ease;
}

.nav-item span:last-child {
    font-size: 11px;
}

.nav-item.active {
    color: var(--primary);
}

.nav-item.active .nav-icon {
    transform: scale(1.1);
}

/* ==================== 内容区域 ==================== */
#content {
    padding: var(--space-md);
    max-width: 480px;
    margin: 0 auto;
}

/* ==================== 首页样式 ==================== */
.home-page {
    padding: var(--space-sm);
}

/* 欢迎卡片 */
.welcome-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    color: var(--text-white);
    text-align: center;
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-lg);
}

.welcome-icon {
    font-size: 60px;
    margin-bottom: var(--space-sm);
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.welcome-card h1 {
    font-size: var(--font-xl);
    margin-bottom: var(--space-xs);
}

.welcome-subtitle {
    opacity: 0.9;
    font-size: var(--font-sm);
}

.stats-row {
    display: flex;
    justify-content: space-around;
    margin-top: var(--space-lg);
}

.stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.stat-number {
    font-size: var(--font-xxl);
    font-weight: 700;
}

.stat-label {
    font-size: var(--font-xs);
    opacity: 0.9;
}

/* 复习提醒 */
.review-reminder {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    display: flex;
    align-items: center;
    margin-bottom: var(--space-lg);
    cursor: pointer;
    transition: transform 0.2s ease;
    box-shadow: var(--shadow-md);
}

.review-reminder:active {
    transform: scale(0.98);
}

.reminder-icon {
    font-size: 36px;
    margin-right: var(--space-md);
}

.reminder-content {
    flex: 1;
    color: var(--text-white);
}

.reminder-content strong {
    font-size: var(--font-md);
}

.reminder-content p {
    font-size: var(--font-sm);
    opacity: 0.9;
}

.reminder-arrow {
    font-size: 24px;
    color: var(--text-white);
}

/* 区块标题 */
.section-title {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: var(--font-lg);
    font-weight: 600;
    margin-bottom: var(--space-md);
    color: var(--text-primary);
}

/* 模块卡片网格 */
.modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.module-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    text-align: center;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
}

.module-card:active {
    transform: scale(0.96);
}

.module-card:hover {
    border-color: var(--primary-light);
}

.module-icon {
    font-size: 40px;
    margin-bottom: var(--space-sm);
}

.module-card h3 {
    font-size: var(--font-md);
    margin-bottom: var(--space-xs);
}

.module-name-cn {
    font-size: var(--font-xs);
    color: var(--text-secondary);
    margin-bottom: var(--space-sm);
}

.module-units {
    font-size: var(--font-xs);
    color: var(--text-light);
}

/* 快速操作按钮 */
.quick-actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

.quick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-lg);
    border-radius: var(--radius-lg);
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: var(--font-md);
    font-weight: 600;
}

.quick-btn.primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: var(--text-primary);
}

.quick-btn.secondary {
    background: linear-gradient(135deg, var(--info) 0%, #5BA4F5 100%);
    color: var(--text-white);
}

.quick-icon {
    font-size: 28px;
    margin-bottom: var(--space-xs);
}

/* ==================== 返回按钮 ==================== */
.back-btn {
    background: var(--bg-card);
    border: none;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--space-md);
}

.back-btn:active {
    transform: scale(0.96);
}

/* ==================== 页面头部 ==================== */
.page-header {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.page-header h1 {
    font-size: var(--font-xxl);
    margin-bottom: var(--space-xs);
}

.page-subtitle {
    color: var(--text-secondary);
    font-size: var(--font-md);
}

.unit-topic {
    color: var(--text-light);
    font-size: var(--font-sm);
    margin-top: var(--space-xs);
}

/* ==================== 模块详情页 ==================== */
.module-detail-page {
    padding: var(--space-sm);
}

.units-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.unit-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.unit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    margin-bottom: var(--space-sm);
}

.unit-info {
    display: flex;
    align-items: center;
    gap: var(--space-md);
}

.unit-number {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: var(--font-md);
}

.unit-text h3 {
    font-size: var(--font-md);
    margin-bottom: 2px;
}

.unit-text p {
    font-size: var(--font-xs);
    color: var(--text-secondary);
}

.unit-arrow {
    font-size: 24px;
    color: var(--text-light);
}

.unit-progress-bar {
    height: 6px;
    background: #E8E8E8;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: var(--space-xs);
}

.unit-progress-text {
    font-size: var(--font-xs);
    color: var(--text-light);
    text-align: right;
    margin-bottom: var(--space-sm);
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary) 0%, var(--secondary-light) 100%);
    border-radius: 3px;
    transition: width 0.3s ease;
}

.unit-actions {
    display: flex;
    gap: var(--space-sm);
    justify-content: space-between;
}

.unit-action-btn {
    flex: 1;
    padding: var(--space-sm);
    border: none;
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: var(--font-xs);
    cursor: pointer;
    transition: all 0.2s ease;
}

.unit-action-btn:active {
    transform: scale(0.95);
    background: var(--primary-light);
    color: white;
}

/* ==================== 单元详情页 ==================== */
.unit-detail-page {
    padding: var(--space-sm);
}

.learning-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    margin-bottom: var(--space-xl);
}

.learning-option-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
}

.learning-option-card:active {
    transform: scale(0.98);
}

.option-icon {
    font-size: 36px;
    margin-right: var(--space-md);
}

.option-content {
    flex: 1;
}

.option-content h3 {
    font-size: var(--font-md);
    margin-bottom: 2px;
}

.option-content p {
    font-size: var(--font-sm);
    color: var(--text-secondary);
}

.option-arrow {
    font-size: 24px;
    color: var(--text-light);
}

.vocab-preview {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    box-shadow: var(--shadow-sm);
}

.vocab-preview h3 {
    font-size: var(--font-md);
    margin-bottom: var(--space-sm);
}

.vocab-tags {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
}

.vocab-tag {
    background: var(--bg-primary);
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    color: var(--text-primary);
}

.vocab-tag.more {
    background: var(--primary-light);
    color: white;
}

/* ==================== 学习页面通用 ==================== */
.learning-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-lg);
}

.learning-progress {
    flex: 1;
    margin: 0 var(--space-md);
}

.progress-bar {
    height: 8px;
    background: #E8E8E8;
    border-radius: 4px;
    overflow: hidden;
}

.progress-text {
    font-size: var(--font-xs);
    color: var(--text-secondary);
    text-align: center;
    display: block;
    margin-top: var(--space-xs);
}

.fav-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: var(--space-sm);
}

.fav-btn:active {
    transform: scale(1.2);
}

/* ==================== 单词卡片页 ==================== */
.vocabulary-page {
    padding: var(--space-sm);
}

.word-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xxl);
    text-align: center;
    box-shadow: var(--shadow-md);
    margin-bottom: var(--space-xl);
}

.word-main {
    margin-bottom: var(--space-xl);
}

.word-text {
    font-size: var(--font-giant);
    font-weight: 700;
    color: var(--primary);
    margin-bottom: var(--space-sm);
    letter-spacing: 2px;
}

.word-phonetic {
    font-size: var(--font-lg);
    color: var(--text-secondary);
    margin-bottom: var(--space-sm);
}

.word-chinese {
    font-size: var(--font-xl);
    color: var(--text-primary);
}

.speak-btn {
    display: block;
    width: 100%;
    padding: var(--space-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-size: var(--font-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-md);
}

.speak-btn:active {
    transform: scale(0.95);
}

.speak-btn.large {
    padding: var(--space-xl);
    font-size: var(--font-xl);
}

.speak-btn.outline {
    background: transparent;
    border: 3px solid var(--primary);
    color: var(--primary);
    margin-top: var(--space-md);
}

.card-actions {
    display: flex;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
}

.card-actions .action-btn {
    flex: 1;
}

.card-info {
    text-align: center;
}

.status-tag {
    display: inline-block;
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    background: var(--bg-primary);
    color: var(--text-secondary);
}

.status-tag.new {
    background: var(--info);
    color: white;
}

.status-tag.mastered {
    background: var(--success);
    color: white;
}

.status-tag.learning {
    background: var(--warning);
    color: var(--text-primary);
}

/* ==================== 句子卡片页 ==================== */
.sentence-page {
    padding: var(--space-sm);
}

.sentence-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    text-align: center;
    box-shadow: var(--shadow-md);
    margin-bottom: var(--space-xl);
}

.sentence-content {
    margin-bottom: var(--space-xl);
}

.sentence-english {
    font-size: var(--font-xxl);
    color: var(--primary);
    margin-bottom: var(--space-md);
    line-height: 1.5;
}

.sentence-chinese {
    font-size: var(--font-lg);
    color: var(--text-secondary);
}

.sentence-actions {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

/* ==================== 对话页 ==================== */
.dialogue-page {
    padding: var(--space-sm);
}

.dialogue-header {
    text-align: center;
    margin-bottom: var(--space-lg);
}

.dialogue-header h2 {
    font-size: var(--font-lg);
    color: var(--primary);
}

.dialogue-content {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-sm);
}

.dialogue-line {
    padding: var(--space-md);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-sm);
    position: relative;
    transition: all 0.2s ease;
}

.dialogue-line.current {
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
    color: white;
}

.dialogue-line.done {
    background: var(--bg-primary);
    opacity: 0.7;
}

.dialogue-line .speaker {
    font-weight: 600;
    font-size: var(--font-sm);
    margin-bottom: var(--space-xs);
    display: block;
}

.dialogue-line .line-text {
    font-size: var(--font-md);
    margin-bottom: var(--space-xs);
}

.dialogue-line .line-chinese {
    font-size: var(--font-sm);
    opacity: 0.8;
}

.line-speak-btn {
    position: absolute;
    right: var(--space-md);
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.3);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

.dialogue-controls {
    display: flex;
    gap: var(--space-md);
    justify-content: center;
}

/* ==================== 练习页 ==================== */
.exercise-page {
    padding: var(--space-sm);
}

.exercise-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: var(--space-xl);
    box-shadow: var(--shadow-md);
}

.exercise-question {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.exercise-question h2 {
    font-size: var(--font-xl);
    color: var(--text-primary);
}

.exercise-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.option-btn {
    display: flex;
    align-items: center;
    padding: var(--space-md);
    background: var(--bg-primary);
    border: 2px solid transparent;
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
}

.option-btn:active {
    transform: scale(0.98);
}

.option-btn:hover {
    border-color: var(--primary-light);
}

.option-letter {
    width: 32px;
    height: 32px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    margin-right: var(--space-md);
    flex-shrink: 0;
}

.option-text {
    font-size: var(--font-lg);
    color: var(--text-primary);
}

.listen-btn {
    margin-bottom: var(--space-lg);
}

/* ==================== 答案结果 ==================== */
.answer-result {
    text-align: center;
    padding: var(--space-lg);
}

.answer-result.correct {
    background: linear-gradient(135deg, #E8F8F5 0%, #D4EDDA 100%);
    border-radius: var(--radius-lg);
}

.answer-result.wrong {
    background: linear-gradient(135deg, #FFF5F5 0%, #FFE8E8 100%);
    border-radius: var(--radius-lg);
}

.result-icon {
    font-size: 48px;
    margin-bottom: var(--space-md);
}

.answer-result h3 {
    font-size: var(--font-xl);
    margin-bottom: var(--space-sm);
}

.answer-result p {
    color: var(--text-secondary);
    margin-bottom: var(--space-lg);
}

.next-btn {

 * 本地存储模块
 * 使用 LocalStorage 存储学习数据
 */

const StorageModule = {
    // 存储键前缀
    PREFIX: 'englearn_',
    
    // 存储键名
    KEYS: {
        VOCABULARY_PROGRESS: 'vocabulary_progress',      // 单词学习进度
        REVIEW_SCHEDULE: 'review_schedule',              // 复习计划
        LEARNING_HISTORY: 'learning_history',           // 学习历史
        USER_SETTINGS: 'user_settings',                 // 用户设置
        FAVOURITES: 'favourites',                       // 收藏的单词
        STATISTICS: 'statistics',                       // 学习统计
        UNIT_PROGRESS: 'unit_progress'                  // 单元进度
    },
    
    // 初始化
    init() {
        // 确保数据结构存在
        this.ensureDataStructure();
    },
    
    // 确保数据结构存在
    ensureDataStructure() {
        if (!localStorage.getItem(this.PREFIX + this.KEYS.VOCABULARY_PROGRESS)) {
            localStorage.setItem(this.PREFIX + this.KEYS.VOCABULARY_PROGRESS, JSON.stringify({}));
        }
        if (!localStorage.getItem(this.PREFIX + this.KEYS.REVIEW_SCHEDULE)) {
            localStorage.setItem(this.PREFIX + this.KEYS.REVIEW_SCHEDULE, JSON.stringify([]));
        }
        if (!localStorage.getItem(this.PREFIX + this.KEYS.LEARNING_HISTORY)) {
            localStorage.setItem(this.PREFIX + this.KEYS.LEARNING_HISTORY, JSON.stringify([]));
        }
        if (!localStorage.getItem(this.PREFIX + this.KEYS.USER_SETTINGS)) {
            localStorage.setItem(this.PREFIX + this.KEYS.USER_SETTINGS, JSON.stringify(this.getDefaultSettings()));
        }
        if (!localStorage.getItem(this.PREFIX + this.KEYS.STATISTICS)) {
            localStorage.setItem(this.PREFIX + this.KEYS.STATISTICS, JSON.stringify(this.getDefaultStatistics()));
        }
        if (!localStorage.getItem(this.PREFIX + this.KEYS.UNIT_PROGRESS)) {
            localStorage.setItem(this.PREFIX + this.KEYS.UNIT_PROGRESS, JSON.stringify({}));
        }
    },
    
    // 获取默认设置
    getDefaultSettings() {
        return {
            ttsRate: 0.85,
            theme: 'light',
            showPhonetic: true,
            autoPlay: true,
            dailyGoal: 10,           // 每日学习目标（单词数）
            reminderTime: '20:00'    // 每日提醒时间
        };
    },
    
    // 获取默认统计
    getDefaultStatistics() {
        return {
            totalWordsLearned: 0,
            totalReviewsDone: 0,
            streakDays: 0,
            lastStudyDate: null,
            wordsPerDay: {},
            accuracyHistory: []
        };
    },
    
    // ==================== 通用方法 ====================
    
    // 保存数据
    save(key, data) {
        try {
            localStorage.setItem(this.PREFIX + key, JSON.stringify(data));
            return true;
        } catch (e) {
            console.error('保存数据失败:', e);
            return false;
        }
    },
    
    // 读取数据
    get(key, defaultValue = null) {
        try {
            const data = localStorage.getItem(this.PREFIX + key);
            return data ? JSON.parse(data) : defaultValue;
        } catch (e) {
            console.error('读取数据失败:', e);
            return defaultValue;
        }
    },
    
    // 删除数据
    remove(key) {
        localStorage.removeItem(this.PREFIX + key);
    },
    
    // 保存设置
    saveSetting(key, value) {
        const settings = this.get(this.KEYS.USER_SETTINGS, this.getDefaultSettings());
        settings[key] = value;
        return this.save(this.KEYS.USER_SETTINGS, settings);
    },
    
    // 获取设置
    getSetting(key, defaultValue = null) {
        const settings = this.get(this.KEYS.USER_SETTINGS, this.getDefaultSettings());
        return settings.hasOwnProperty(key) ? settings[key] : defaultValue;
    },
    
    // ==================== 单词进度 ====================
    
    // 获取单词进度
    getWordProgress(wordKey) {
        const progress = this.get(this.KEYS.VOCABULARY_PROGRESS, {});
        return progress[wordKey] || null;
    },
    
    // 保存单词进度
    saveWordProgress(wordKey, progressData) {
        const progress = this.get(this.KEYS.VOCABULARY_PROGRESS, {});
        progress[wordKey] = {
            ...progressData,
            lastUpdated: new Date().toISOString()
        };
        return this.save(this.KEYS.VOCABULARY_PROGRESS, progress);
    },
    
    // 获取所有单词进度
    getAllWordProgress() {
        return this.get(this.KEYS.VOCABULARY_PROGRESS, {});
    },
    
    // 获取单元的单词进度
    getUnitWordProgress(unitId) {
        const allProgress = this.getAllWordProgress();
        const unitProgress = {};
        for (const key in allProgress) {
            if (key.startsWith(unitId + '_')) {
                unitProgress[key] = allProgress[key];
            }
        }
        return unitProgress;
    },
    
    // 获取单元学习完成度
    getUnitCompletion(unitId, totalWords) {
        const unitProgress = this.getUnitWordProgress(unitId);
        const learnedCount = Object.keys(unitProgress).filter(key => 
            unitProgress[key].status === 'learned' || unitProgress[key].status === 'mastered'
        ).length;
        return totalWords > 0 ? Math.round((learnedCount / totalWords) * 100) : 0;
    },
    
    // ==================== 复习计划 ====================
    
    // 获取复习计划
    getReviewSchedule() {
        return this.get(this.KEYS.REVIEW_SCHEDULE, []);
    },
    
    // 添加复习任务
    addReviewTask(task) {
        const schedule = this.getReviewSchedule();
        schedule.push({
            ...task,
            id: Date.now().toString(),
            createdAt: new Date().toISOString()
        });
        return this.save(this.KEYS.REVIEW_SCHEDULE, schedule);
    },
    
    // 更新复习任务
    updateReviewTask(taskId, updates) {
        const schedule = this.getReviewSchedule();
        const index = schedule.findIndex(t => t.id === taskId);
        if (index !== -1) {
            schedule[index] = { ...schedule[index], ...updates };
            return this.save(this.KEYS.REVIEW_SCHEDULE, schedule);
        }
        return false;
    },
    
    // 删除复习任务
    removeReviewTask(taskId) {
        const schedule = this.getReviewSchedule();
        const filtered = schedule.filter(t => t.id !== taskId);
        return this.save(this.KEYS.REVIEW_SCHEDULE, filtered);
    },
    
    // 获取今日需要复习的单词
    getTodayReviews() {
        const schedule = this.getReviewSchedule();
        const today = new Date().toDateString();
        
        return schedule.filter(task => {
            const reviewDate = new Date(task.nextReview).toDateString();
            return reviewDate <= today;
        });
    },
    
    // 获取需要复习的单词数量
    getReviewCount() {
        return this.getTodayReviews().length;
    },
    
    // ==================== 学习历史 ====================
    
    // 添加学习记录
    addLearningRecord(record) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        history.push({
            ...record,
            id: Date.now().toString(),
            timestamp: new Date().toISOString()
        });
        // 只保留最近100条记录
        if (history.length > 100) {
            history.shift();
        }
        return this.save(this.KEYS.LEARNING_HISTORY, history);
    },
    
    // 获取学习历史
    getLearningHistory(limit = 20) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        return history.slice(-limit).reverse();
    },
    
    // 获取指定日期的学习记录
    getHistoryByDate(date) {
        const history = this.get(this.KEYS.LEARNING_HISTORY, []);
        const targetDate = new Date(date).toDateString();
        return history.filter(record => 
            new Date(record.timestamp).toDateString() === targetDate
        );
    },
    
    // ==================== 收藏 ====================
    
    // 获取收藏列表
    getFavourites() {
        return this.get(this.KEYS.FAVOURITES, []);
    },
    
    // 添加收藏
    addFavourite(wordKey, wordData) {
        const favourites = this.getFavourites();
        if (!favourites.find(f => f.wordKey === wordKey)) {
            favourites.push({
                wordKey,
                ...wordData,
                addedAt: new Date().toISOString()
            });
            return this.save(this.KEYS.FAVOURITES, favourites);
        }
        return false;
    },
    
    // 取消收藏
    removeFavourite(wordKey) {
        const favourites = this.getFavourites();
        const filtered = favourites.filter(f => f.wordKey !== wordKey);
        return this.save(this.KEYS.FAVOURITES, filtered);
    },
    
    // 检查是否已收藏
    isFavourite(wordKey) {
        const favourites = this.getFavourites();
        return favourites.some(f => f.wordKey === wordKey);
    },
    
    // ==================== 统计 ====================
    
    // 获取统计信息
    getStatistics() {
        return this.get(this.KEYS.STATISTICS, this.getDefaultStatistics());
    },
    
    // 更新统计
    updateStatistics(updates) {
        const stats = this.getStatistics();
        return this.save(this.KEYS.STATISTICS, { ...stats, ...updates });
    },
    
    // 增加学习单词数
    incrementWordsLearned(count = 1) {
        const stats = this.getStatistics();
        stats.totalWordsLearned += count;
        
        // 记录每日学习数量
        const today = new Date().toDateString();
        stats.wordsPerDay[today] = (stats.wordsPerDay[today] || 0) + count;
        
        // 检查连续学习天数
        this.updateStreak();
        
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    // 增加复习次数
    incrementReviewsDone(count = 1) {
        const stats = this.getStatistics();
        stats.totalReviewsDone += count;
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    // 更新连续学习天数
    updateStreak() {
        const stats = this.getStatistics();
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (stats.lastStudyDate) {
            const lastDate = new Date(stats.lastStudyDate);
            if (lastDate.toDateString() === today.toDateString()) {
                // 今天已经学习，不更新
            } else if (lastDate.toDateString() === yesterday.toDateString()) {
                // 昨天学习了，连续天数+1
                stats.streakDays += 1;
            } else {
                // 中断了，重置为1
                stats.streakDays = 1;
            }
        } else {
            stats.streakDays = 1;
        }
        
        stats.lastStudyDate = today.toISOString();
        return this.save(this.KEYS.STATISTICS, stats);
    },
    
    // 获取连续学习天数
    getStreakDays() {
        const stats = this.getStatistics();
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (stats.lastStudyDate) {
            const lastDate = new Date(stats.lastStudyDate);
            if (lastDate.toDateString() !== today.toDateString() && 
                lastDate.toDateString() !== yesterday.toDateString()) {
                // 已中断，返回0
                return 0;
            }
        }
        
        return stats.streakDays || 0;
    },
    
    // 获取今日学习单词数
    getTodayWordsLearned() {
        const stats = this.getStatistics();
        const today = new Date().toDateString();
        return stats.wordsPerDay[today] || 0;
    },
    
    // ==================== 单元进度 ====================
    
    // 获取单元进度
    getUnitProgress(unitId) {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        return allProgress[unitId] || {
            wordsLearned: 0,
            sentencesLearned: 0,
            dialoguesLearned: 0,
            exercisesDone: 0,
            completed: false
        };
    },
    
    // 更新单元进度
    updateUnitProgress(unitId, updates) {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        allProgress[unitId] = {
            ...allProgress[unitId],
            ...updates,
            lastUpdated: new Date().toISOString()
        };
        return this.save(this.KEYS.UNIT_PROGRESS, allProgress);
    },
    
    // 标记单元为已完成
    completeUnit(unitId) {
        return this.updateUnitProgress(unitId, { completed: true, completedAt: new Date().toISOString() });
    },
    
    // 获取已完成的单元列表
    getCompletedUnits() {
        const allProgress = this.get(this.KEYS.UNIT_PROGRESS, {});
        return Object.keys(allProgress).filter(unitId => allProgress[unitId].completed);
    },
    
    // ==================== 数据管理 ====================
    
    // 清除所有学习数据
    clearAllData() {
        Object.values(this.KEYS).forEach(key => {
            localStorage.removeItem(this.PREFIX + key);
        });
        this.ensureDataStructure();
    },
    
    // 导出数据
    exportData() {
        const data = {};
        Object.keys(this.KEYS).forEach(key => {
            data[key] = this.get(this.KEYS[key]);
        });
        return data;
    },
    
    // 导入数据
    importData(data) {
        if (data && typeof data === 'object') {
            Object.keys(data).forEach(key => {
                if (this.KEYS.hasOwnProperty(key)) {
                    this.save(this.KEYS[key], data[key]);
                }
            });
            return true;
        }
        return false;
    }
};

// 简化调用接口
const Storage = {
    save: (key, data) => StorageModule.save(key, data),
    get: (key, defaultValue) => StorageModule.get(key, defaultValue),

// 初始化存储模块

// 导出模块
if (typeof module !== 'undefined' && module.exports) {

/**
 * TTS (Text-to-Speech) 发音模块
 * 使用 ResponsiveVoice 实现高质量英语发音
 * 非商业用途免费
 */

const TTSModule = {
    // 配置
    config: {
        voice: 'US English Female',  // 默认使用美式女声
        rate: 0.85,                  // 语速
        pitch: 1.0                   // 音调
    },
    
    // 可用语音列表
    availableVoices: [
        { id: 'US English Female', name: '美式女声', lang: 'en-US' },
        { id: 'UK English Female', name: '英式女声', lang: 'en-GB' },
        { id: 'US English Male', name: '美式男声', lang: 'en-US' },
        { id: 'UK English Male', name: '英式男声', lang: 'en-GB' }
    ],
    
    // 初始化
    init() {
        return new Promise((resolve) => {
            // 检查 ResponsiveVoice 是否已加载
            if (typeof responsiveVoice !== 'undefined') {
                console.log('✓ ResponsiveVoice 已加载');
                resolve(true);
                return;
            }
            
            // 动态加载 ResponsiveVoice
            const script = document.createElement('script');
            script.src = 'https://code.responsivevoice.org/responsivevoice.js?key=free-non-commercial-use';
            script.onload = () => {
                console.log('✓ ResponsiveVoice 加载成功');
                // 等待初始化完成
                setTimeout(() => resolve(true), 500);
            };
            script.onerror = () => {
                console.warn('ResponsiveVoice 加载失败');
                resolve(false);
            };
            document.head.appendChild(script);
        });
    },
    
    // 朗读文本
    speak(text, options = {}) {
        return new Promise((resolve, reject) => {
            const voice = options.voice || this.config.voice;
            const rate = options.rate || this.config.rate;
            const pitch = options.pitch || this.config.pitch;
            
            // 使用 ResponsiveVoice
            if (typeof responsiveVoice !== 'undefined') {
                responsiveVoice.speak(text, voice, {
                    rate: rate,
                    pitch: pitch,
                    onend: () => resolve(),
                    onerror: (e) => {
                        console.error('TTS错误:', e);
                        resolve(); // 不阻塞流程
                    }
                });
            } 
            // 回退到 Web Speech API
            else if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = rate;
                utterance.pitch = pitch;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                speechSynthesis.speak(utterance);
            } 
            else {
                console.warn('无可用的语音合成服务');
                resolve();
            }
        });
    },
    
    // 取消朗读
    cancel() {
        if (typeof responsiveVoice !== 'undefined') {
            responsiveVoice.cancel();
        } else if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
        }
    },
    
    // 检查是否正在朗读
    isSpeaking() {
        if (typeof responsiveVoice !== 'undefined') {
            return responsiveVoice.isPlaying();
        }
        return 'speechSynthesis' in window && speechSynthesis.speaking;
    },
    
    // 朗读单词
    speakWord(word, phonetic = '') {
        return this.speak(word, { rate: this.config.rate });
    },
    
    // 朗读句子
    speakSentence(sentence) {
        return this.speak(sentence, { rate: this.config.rate * 0.9 });
    },
    
    // 逐词高亮朗读
    async speakWithHighlight(text, onWordChange) {
        const words = text.split(/\s+/);
        for (let i = 0; i < words.length; i++) {
            if (onWordChange) {
                onWordChange(words[i], i, words.length);
            }
            await this.speak(words[i], { rate: this.config.rate });
            await this.wait(100);
        }
    },
    
    // 设置语速
    setRate(rate) {
        this.config.rate = Math.max(0.5, Math.min(2.0, rate));
        StorageModule.saveSetting('tts_rate', this.config.rate);
    },
    
    // 获取语速
    getRate() {
        return this.config.rate;
    },
    
    // 获取语速描述
    getRateLabel() {
        const rate = this.config.rate;
        if (rate <= 0.7) return '很慢';
        if (rate <= 0.85) return '较慢';
        if (rate <= 1.0) return '正常';
        if (rate <= 1.3) return '较快';
        return '很快';
    },
    
    // 加载设置
    loadSettings() {
        const savedRate = StorageModule.getSetting('tts_rate');
        if (savedRate) {
            this.config.rate = parseFloat(savedRate);
        }
    },
    
    // 获取可用语音列表
    getAvailableVoices() {
        return this.availableVoices;
    },
    
    // 设置语音
    setVoice(voiceId) {
        this.config.voice = voiceId;
    },
    
    // 延时
    wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
};

/**
 * 记忆曲线算法模块
 * 实现艾宾浩斯遗忘曲线复习计划
 * 采用简化版 FSRS (Free Spaced Repetition Scheduler) 算法
 */

const MemoryModule = {
    // 配置
    config: {
        // 艾宾浩斯复习间隔（分钟）
        intervals: [
            5,           // 第1次：5分钟后
            30,          // 第2次：30分钟后
            720,         // 第3次：12小时后
            1440,        // 第4次：1天后
            2880,        // 第5次：2天后
            5760,        // 第6次：4天后
            10080,       // 第7次：7天后
            21600,       // 第8次：15天后
            43200,       // 第9次：30天后
            86400        // 第10次：60天后
        ],
        
        // 记忆状态
        STATES: {
            NEW: 'new',                 // 新单词
            LEARNING: 'learning',       // 学习中
            REVIEW: 'review',           // 复习中
            MASTERED: 'mastered',       // 已掌握
            FORGOTTEN: 'forgotten'      // 已遗忘
        },
        
        // 掌握阈值（答对几次认为已掌握）
        MASTER_THRESHOLD: 4,
        
        // 重置阈值（连续答错几次需要重新学习）
        RESET_THRESHOLD: 2
    },
    
    // ==================== 复习计划 ====================
    
    /**
     * 创建新单词的复习计划
     * @param {string} wordKey - 单词唯一标识
     * @param {object} wordData - 单词数据
     * @returns {object} 复习任务对象
     */
    createReviewTask(wordKey, wordData) {
        const now = new Date();
        const firstReview = new Date(now.getTime() + this.config.intervals[0] * 60 * 1000);
        
        return {
            wordKey,
            word: wordData.word,
            chinese: wordData.chinese,
            unitId: wordData.unitId,
            moduleId: wordData.moduleId,
            easeFactor: 2.5,          // 初始难度因子
            interval: 0,               // 当前间隔（天）
            repetitions: 0,             // 重复次数
            nextReview: firstReview.toISOString(),
            status: this.config.STATES.NEW,
            history: []
        };
    },
    
    /**
     * 计算下次复习时间
     * @param {object} task - 当前复习任务
     * @param {number} quality - 回答质量 (0-5)
     *   0: 完全忘记
     *   1: 错误，但看到答案后想起
     *   2: 错误，但很容易想起
     *   3: 正确，但有些犹豫
     *   4: 正确，稍有犹豫
     *   5: 完全正确，立即想起
     * @returns {object} 更新后的任务
     */
    calculateNextReview(task, quality) {
        const now = new Date();
        let newTask = { ...task };
        
        // 记录历史
        newTask.history = [...(task.history || []), {
            date: now.toISOString(),
            quality,
            interval: task.interval
        }];
        
        // 遗忘 - 需要重新学习
        if (quality < 2) {
            newTask.repetitions = 0;
            newTask.interval = 0;
            newTask.nextReview = new Date(now.getTime() + 5 * 60 * 1000).toISOString(); // 5分钟后重试
            newTask.status = this.config.STATES.LEARNING;
            
            // 如果连续遗忘，增加状态标记
            if (task.forgotCount !== undefined) {
                newTask.forgotCount = task.forgotCount + 1;
            } else {
                newTask.forgotCount = 1;
            }
            
            // 降低难度因子
            newTask.easeFactor = Math.max(1.3, task.easeFactor - 0.2);
        } 
        // 记住了
        else {
            // 重置遗忘计数
            newTask.forgotCount = 0;
            
            // 增加重复次数
            newTask.repetitions += 1;
            
            // 根据质量调整难度因子
            const qualityBonus = (quality - 3) * 0.1;
            newTask.easeFactor = Math.max(1.3, task.easeFactor + qualityBonus);
            
            // 计算新间隔（使用简化版 SM-2 算法）
            if (newTask.repetitions === 1) {
                newTask.interval = 1; // 1天
            } else if (newTask.repetitions === 2) {
                newTask.interval = 3; // 3天
            } else {
                newTask.interval = Math.round(task.interval * newTask.easeFactor);
            }
            
            // 确保间隔不超过最大值（60天）
            newTask.interval = Math.min(60, newTask.interval);
            
            // 计算下次复习时间
            const nextTime = now.getTime() + newTask.interval * 24 * 60 * 60 * 1000;
            newTask.nextReview = new Date(nextTime).toISOString();
            
            // 更新状态
            if (newTask.repetitions >= this.config.MASTER_THRESHOLD) {
                newTask.status = this.config.STATES.MASTERED;
            } else {
                newTask.status = this.config.STATES.REVIEW;
            }
        }
        
        // 更新最后复习时间
        newTask.lastReview = now.toISOString();
        
        return newTask;
    },
    
    /**
     * 处理用户回答
     * @param {object} task - 当前复习任务
     * @param {boolean} isCorrect - 是否正确
     * @param {number} responseTime - 响应时间（毫秒）
     * @returns {object} 更新后的任务
     */
    processAnswer(task, isCorrect, responseTime = 0) {
        // 质量评分
        let quality;
        if (!isCorrect) {
            // 回答错误
            if (responseTime < 2000) {
                quality = 1; // 看错了
            } else {
                quality = 0; // 真忘了
            }
        } else {
            // 回答正确
            if (responseTime < 1000) {
                quality = 5; // 太快了，太熟练
            } else if (responseTime < 2000) {
                quality = 4; // 正常速度
            } else if (responseTime < 4000) {
                quality = 3; // 稍慢
            } else {
                quality = 2; // 犹豫
            }
        }
        
        return this.calculateNextReview(task, quality);
    },
    
    /**
     * 获取单词的复习状态描述
     * @param {object} task - 复习任务
     * @returns {string} 状态描述
     */
    getStatusDescription(task) {
        if (!task || !task.status) return '新单词';
        
        switch (task.status) {
            case this.config.STATES.NEW:
                return '新单词';
            case this.config.STATES.LEARNING:
                return '学习中';
            case this.config.STATES.REVIEW:
                return `复习中 (${task.repetitions}/${this.config.MASTER_THRESHOLD})`;
            case this.config.STATES.MASTERED:
                return '已掌握';
            case this.config.STATES.FORGOTTEN:
                return '已遗忘';
            default:
                return '未知状态';
        }
    },
    
    /**
     * 获取距离下次复习的时间描述
     * @param {string} nextReview - 下次复习时间 (ISO string)
     * @returns {string} 时间描述
     */
    getTimeUntilReview(nextReview) {
        const now = new Date();
        const reviewDate = new Date(nextReview);
        const diff = reviewDate - now;
        
        if (diff <= 0) {
            return '现在可以复习';
        }
        
        const minutes = Math.floor(diff / (1000 * 60));
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        if (days > 0) {
            return `${days}天后`;
        } else if (hours > 0) {
            return `${hours}小时后`;
        } else {
            return `${minutes}分钟后`;
        }
    },
    
    /**
     * 检查是否需要立即复习
     * @param {string} nextReview - 下次复习时间
     * @returns {boolean}
     */
    isDueForReview(nextReview) {
        const now = new Date();
        const reviewDate = new Date(nextReview);
        return reviewDate <= now;
    },
    
    /**
     * 获取复习建议
     * @param {number} quality - 回答质量
     * @returns {string} 建议文本
     */
    getSuggestion(quality) {
        if (quality >= 4) {
            return '很好！继续保持！';
        } else if (quality >= 2) {
            return '不错，但可以再多练习一下';
        } else if (quality >= 1) {
            return '试着回忆一下它的发音和用法';
        } else {
            return '多听几遍，试着理解它的意思';
        }
    },
    
    // ==================== 复习任务管理 ====================
    
    /**
     * 添加单词到复习计划
     * @param {string} wordKey - 单词标识
     * @param {object} wordData - 单词数据
     */
    scheduleReview(wordKey, wordData) {
        const task = this.createReviewTask(wordKey, wordData);
        StorageModule.addReviewTask(task);
        
        // 同时更新单词进度
        StorageModule.saveWordProgress(wordKey, {
            status: task.status,
            nextReview: task.nextReview,
            easeFactor: task.easeFactor,
            interval: task.interval,
            repetitions: task.repetitions
        });
        
        return task;
    },
    
    /**
     * 更新复习任务
     * @param {object} task - 更新后的任务
     */
    updateReviewTask(task) {
        StorageModule.updateReviewTask(task.id, task);
        
        // 更新单词进度
        StorageModule.saveWordProgress(task.wordKey, {
            status: task.status,
            nextReview: task.nextReview,
            easeFactor: task.easeFactor,
            interval: task.interval,
            repetitions: task.repetitions
        });
    },
    
    /**
     * 获取今日复习任务
     * @param {number} limit - 限制数量
     * @returns {array} 复习任务列表
     */
    getTodayReviewTasks(limit = 20) {
        const allReviews = StorageModule.getTodayReviews();
        
        // 按紧急程度排序
        allReviews.sort((a, b) => {
            return new Date(a.nextReview) - new Date(b.nextReview);
        });
        
        return limit ? allReviews.slice(0, limit) : allReviews;
    },
    
    /**
     * 获取单元的复习任务
     * @param {string} unitId - 单元ID
     * @returns {array} 复习任务列表
     */
    getUnitReviewTasks(unitId) {
        const allTasks = StorageModule.getReviewSchedule();
        return allTasks.filter(task => task.unitId === unitId);
    },
    
    /**
     * 获取复习统计数据
     * @returns {object} 统计数据
     */
    getReviewStats() {
        const allTasks = StorageModule.getReviewSchedule();
        const todayReviews = this.getTodayReviewTasks();
        
        const stats = {
            totalWords: allTasks.length,
            dueToday: todayReviews.length,
            mastered: allTasks.filter(t => t.status === this.config.STATES.MASTERED).length,
            learning: allTasks.filter(t => t.status === this.config.STATES.LEARNING).length,
            new: allTasks.filter(t => t.status === this.config.STATES.NEW).length,
            review: allTasks.filter(t => t.status === this.config.STATES.REVIEW).length
        };
        
        // 计算掌握率
        stats.masterRate = stats.totalWords > 0 
            ? Math.round((stats.mastered / stats.totalWords) * 100) 
            : 0;
        
        return stats;
    },
    
    /**
     * 获取今日需要复习的单词数量
     * @returns {number} 需要复习的单词数量
     */
    getReviewCount() {
        return this.getTodayReviewTasks().length;
    },
    
    /**
     * 生成复习报告
     * @param {array} results - 复习结果
     * @returns {object} 报告数据
     */
    generateReviewReport(results) {
        const total = results.length;
        const correct = results.filter(r => r.isCorrect).length;
        const wrong = total - correct;
        
        const avgResponseTime = results.reduce((sum, r) => sum + r.responseTime, 0) / total;
        
        // 分类统计
        const byUnit = {};
        results.forEach(r => {
            if (!byUnit[r.unitId]) {
                byUnit[r.unitId] = { total: 0, correct: 0 };
            }
            byUnit[r.unitId].total++;
            if (r.isCorrect) byUnit[r.unitId].correct++;
        });
        
        return {
            date: new Date().toISOString(),
            total,
            correct,
            wrong,
            accuracy: total > 0 ? Math.round((correct / total) * 100) : 0,
            avgResponseTime: Math.round(avgResponseTime),
            byUnit,
            suggestions: this.getImprovementSuggestions(results)
        };
    },
    
    /**
     * 获取改进建议
     * @param {array} results - 复习结果
     * @returns {array} 建议列表
     */
    getImprovementSuggestions(results) {
        const suggestions = [];
        
        // 分析错误类型
        const wrongResults = results.filter(r => !r.isCorrect);
        
        if (wrongResults.length > 0) {
            suggestions.push('建议多听几遍这些单词的正确发音');
        }
        
        // 分析响应时间
        const slowResults = results.filter(r => r.responseTime > 3000);
        if (slowResults.length > results.length * 0.3) {
            suggestions.push('试着加快反应速度，看到单词就能想起意思');
        }
        
        // 总体建议
        const accuracy = results.filter(r => r.isCorrect).length / results.length;
        if (accuracy >= 0.9) {
            suggestions.push('太棒了！继续保持，你学得很好！');
        } else if (accuracy >= 0.7) {
            suggestions.push('做得不错，但还有进步空间');
        } else {
            suggestions.push('别灰心，多练习几次就会越来越好');
        }
        
        return suggestions;
    }
};

    getSuggestion: (quality) => MemoryModule.getSuggestion(quality),
    generateReviewReport: (results) => MemoryModule.generateReviewReport(results)
};

                </div>
                
                <div class="card-info">

    // 发音
    speakWord(word) {
        TTS.speakWord(word);
    },
    
    // 发音整个句子
    speakSentence(sentence) {
        TTS.speakSentence(sentence);
    },
    
    // 下一个单词
    nextCard() {
        // 记录学习
        const card = AppState.currentCards[AppState.currentCardIndex];
        StorageModule.addLearningRecord({
            type: 'vocabulary',
            word: card.word,
            unitId: card.unitId,
            moduleId: card.moduleId
        });
        
        // 安排复习
        const wordKey = `${card.unitId}_${card.word}`;
        if (!StorageModule.getWordProgress(wordKey)) {
            MemoryModule.scheduleReview(wordKey, {
                word: card.word,
                chinese: card.chinese,
                unitId: card.unitId,
                moduleId: card.moduleId
            });
        }
        
        StorageModule.incrementWordsLearned();
        
        AppState.currentCardIndex++;
        
        if (AppState.currentCardIndex >= AppState.currentCards.length) {
            this.showLearningComplete();
        } else {
            this.renderVocabularyCard();
        }
    },
    
    // 上一个单词
    previousCard() {
        if (AppState.currentCardIndex > 0) {
            AppState.currentCardIndex--;
            this.renderVocabularyCard();
        }
    },
    
    // 切换收藏
    toggleFavourite(wordKey, wordData) {
        if (StorageModule.isFavourite(wordKey)) {
            StorageModule.removeFavourite(wordKey);
            this.showToast('已取消收藏');
        } else {
            StorageModule.addFavourite(wordKey, wordData);
            this.showToast('已添加到收藏');

        this.renderVocabularyCard();

    // ==================== 对话学习 ====================
    
    // 开始单元对话学习
    startUnitDialogue(unitId) {
        const unit = TEXTBOOK_DATA.units[unitId];
        if (!unit || !unit.dialogues) return;
        
        const dialogue = unit.dialogues[0];
        if (!dialogue) return;
        
        AppState.currentUnit = unitId;
        AppState.learningMode = 'dialogue';
        AppState.currentDialogue = dialogue;
        AppState.currentLineIndex = 0;
        
        this.renderDialogue();
    },
    
    // 渲染对话
    renderDialogue() {
        const dialogue = AppState.currentDialogue;
        const lines = dialogue.lines;
        
        const html = `
            <div class="dialogue-page">
                <div class="learning-header">
                    <button class="back-btn" onclick="App.renderUnitDetail('${AppState.currentUnit}')">← 返回</button>
                </div>
                
                <div class="dialogue-header">
                    <h2>${dialogue.title}</h2>
                </div>
                
                <div class="dialogue-content">
                    ${lines.map((line, i) => `
                        <div class="dialogue-line ${i === AppState.currentLineIndex ? 'current' : ''} ${i < AppState.currentLineIndex ? 'done' : ''}">
                            <span class="speaker">${line.speaker}:</span>
                            <p class="line-text">${line.text}</p>
                            <p class="line-chinese">${line.text}</p>
                            <button class="line-speak-btn" onclick="App.speakLine(${i})">🔊</button>
                        </div>
                    `).join('')}
                </div>
                
                <div class="dialogue-controls">
                    ${AppState.currentLineIndex > 0 ? `
                        <button class="action-btn secondary" onclick="App.previousLine()">← 上句</button>
                    ` : ''}
                    
                    ${AppState.currentLineIndex < lines.length - 1 ? `
                        <button class="action-btn primary" onclick="App.playAndNextLine()">
                            🔊 听 → 下句
                        </button>
                    ` : `
                        <button class="action-btn primary" onclick="App.finishDialogue()">
                            完成 ✓
                        </button>
                    `}
                </div>
            </div>
        `;
        
        this.setContent(html);
        
        // 自动发音当前行
        if (AppState.currentLineIndex === 0) {
            setTimeout(() => {
                this.speakLine(0);
            }, 500);
        }
    },
    
    // 发音指定行
    speakLine(index) {
        const line = AppState.currentDialogue.lines[index];
        TTS.speakSentence(line.text);
    },
    
    // 播放并下一行
    playAndNextLine() {
        const line = AppState.currentDialogue.lines[AppState.currentLineIndex];
        TTS.speakSentence(line.text);
        
        setTimeout(() => {
            AppState.currentLineIndex++;
            this.renderDialogue();
        }, 2000);
    },
    
    // 上一行
    previousLine() {
        if (AppState.currentLineIndex > 0) {
            AppState.currentLineIndex--;
            this.renderDialogue();
        }
    },
    
    // 完成对话
    finishDialogue() {
        StorageModule.addLearningRecord({
            type: 'dialogue',
            dialogue: AppState.currentDialogue.title,
            unitId: AppState.currentUnit
        });
        
        this.showToast('太棒了！对话学习完成！');
        this.renderUnitDetail(AppState.currentUnit);
    },
    
    // ==================== 练习功能 ====================
    
    // 开始单元练习
    startUnitExercises(unitId) {
        const unit = TEXTBOOK_DATA.units[unitId];
        if (!unit || !unit.exercises) return;
        
        AppState.currentUnit = unitId;
        AppState.learningMode = 'exercises';
        AppState.currentCards = unit.exercises;
        AppState.currentCardIndex = 0;
        AppState.reviewResults = [];
        AppState.sessionStartTime = Date.now();
        
        this.renderExercise();
    },
    
    // 渲染练习
    renderExercise() {
        const exercise = AppState.currentCards[AppState.currentCardIndex];
        if (!exercise) {
            this.showExerciseComplete();
            return;
        }
        
        const total = AppState.currentCards.length;
        const progress = Math.round((AppState.currentCardIndex / total) * 100);
        
        let exerciseHtml = '';
        
        switch (exercise.type) {
            case 'choice':
                exerciseHtml = this.renderChoiceExercise(exercise);
                break;
            case 'fill':
                exerciseHtml = this.renderFillExercise(exercise);
                break;
            case 'listen_select':
                exerciseHtml = this.renderListenSelectExercise(exercise);
                break;
            default:
                exerciseHtml = this.renderChoiceExercise(exercise);
        }
        
        const html = `
            <div class="exercise-page">
                <div class="learning-header">
                    <button class="back-btn" onclick="App.confirmExerciseExit()">← 退出</button>
                    <div class="learning-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <span class="progress-text">${AppState.currentCardIndex + 1} / ${total}</span>
                    </div>
                </div>
                
                <div class="exercise-card">
                    <div class="exercise-question">
                        <h2>${exercise.question}</h2>
                    </div>
                    
                    ${exerciseHtml}
                </div>
            </div>
        `;
        
        this.setContent(html);
    },
    
    // 渲染选择题
    renderChoiceExercise(exercise) {
        return `
            <div class="exercise-options">
                ${exercise.options.map((opt, i) => `
                    <button class="option-btn" onclick="App.checkAnswer('${opt}', '${exercise.answer}')">
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        <span class="option-text">${opt}</span>
                    </button>
                `).join('')}
            </div>
        `;
    },
    
    // 渲染填空题
    renderFillExercise(exercise) {
        return `
            <div class="exercise-options">
                ${exercise.options.map((opt, i) => `
                    <button class="option-btn" onclick="App.checkAnswer('${opt}', '${exercise.answer}')">
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        <span class="option-text">${opt}</span>
                    </button>
                `).join('')}
            </div>
        `;
    },
    
    // 渲染听力选择题
    renderListenSelectExercise(exercise) {
        return `
            <button class="speak-btn large listen-btn" onclick="App.playExerciseAudio('${exercise.audio}')">
                🔊 点击听音
            </button>
            <div class="exercise-options">
                ${exercise.options.map((opt, i) => `
                    <button class="option-btn" onclick="App.checkAnswer('${opt}', '${exercise.answer}')">
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        <span class="option-text">${opt}</span>
                    </button>
                `).join('')}
            </div>
        `;
    },
    
    // 播放练习音频
    playExerciseAudio(audioKey) {
        // 使用TTS朗读答案（这里简化处理）
        TTS.speak(audioKey.replace(/_/g, ' '));
    },
    
    // 检查答案
    checkAnswer(selected, correct) {
        const isCorrect = selected === correct;
        const exercise = AppState.currentCards[AppState.currentCardIndex];
        
        // 记录结果
        AppState.reviewResults.push({
            question: exercise.question,
            selected,
            correct,
            isCorrect,
            type: exercise.type,
            unitId: AppState.currentUnit
        });
        
        // 显示结果
        this.showAnswerResult(isCorrect, correct);
    },
    
    // 显示答案结果
    showAnswerResult(isCorrect, correct) {
        const html = `
            <div class="answer-result ${isCorrect ? 'correct' : 'wrong'}">
                <div class="result-icon">${isCorrect ? '✅' : '❌'}</div>
                <h3>${isCorrect ? '回答正确！' : '回答错误'}</h3>
                ${!isCorrect ? `<p>正确答案是: <strong>${correct}</strong></p>` : ''}
                
                <button class="action-btn primary next-btn" onclick="App.nextExercise()">
                    ${AppState.currentCardIndex < AppState.currentCards.length - 1 ? '下一题 →' : '查看结果'}
                </button>
            </div>
        `;
        
        // 替换选项区域
        const optionsContainer = document.querySelector('.exercise-options');
        if (optionsContainer) {
            optionsContainer.innerHTML = html;
        }
        
        // 如果答对，播放鼓励音效
        if (isCorrect) {
            TTS.speak('Great!');
        } else {
            TTS.speak('Try again next time!');
        }
    },
    
    // 下一题
    nextExercise() {
        AppState.currentCardIndex++;
        this.renderExercise();
    },
    
    // 确认退出练习
    confirmExerciseExit() {
        this.showModal('确认退出', '你确定要退出练习吗？当前进度不会保存。', [
            { text: '取消', type: 'secondary', onClick: () => this.closeModal() },
            { text: '确定', type: 'primary', onClick: () => {
                this.closeModal();
                this.renderUnitDetail(AppState.currentUnit);
            }}
        ]);
    },

        const results = AppState.reviewResults;

        const total = results.length;
        const accuracy = Math.round((correctCount / total) * 100);
        
        const report = MemoryModule.generateReviewReport(results);
        
        const html = `
            <div class="complete-page">

                        <span class="stat-num">${correctCount}/${total}</span>
                        <span class="stat-label">正确数</span>
                    </div>
                    <div class="complete-stat">
                        <span class="stat-num">${accuracy}%</span>
                        <span class="stat-label">正确率</span>
                    </div>
                </div>
                
                ${report.suggestions.length > 0 ? `
                    <div class="suggestions">
                        ${report.suggestions.map(s => `<p>💡 ${s}</p>`).join('')}

                <div class="complete-actions">
                    <button class="action-btn primary" onclick="App.renderUnitDetail('${AppState.currentUnit}')">

                    <button class="action-btn secondary" onclick="App.startUnitExercises('${AppState.currentUnit}')">

        `;
        
        this.setContent(html);
    },
    
    // 开始复习会话
    startReviewSession() {
        const tasks = MemoryModule.getTodayReviewTasks(20);
        if (tasks.length === 0) {
            this.showToast('没有需要复习的单词');
            return;
        }
        
        AppState.learningMode = 'review';
        AppState.currentCards = tasks;
        AppState.currentCardIndex = 0;
        AppState.reviewResults = [];
        AppState.sessionStartTime = Date.now();
        AppState.isReviewMode = true;
        
        this.renderReviewCard();
    },
    
    // 渲染复习卡片
    renderReviewCard() {
        const task = AppState.currentCards[AppState.currentCardIndex];
        if (!task) {
            this.showReviewComplete();
            return;
        }
        
        const total = AppState.currentCards.length;
        const progress = Math.round((AppState.currentCardIndex / total) * 100);
        
        const html = `
            <div class="review-card-page">
                <div class="learning-header">
                    <button class="back-btn" onclick="App.confirmReviewExit()">← 退出</button>
                    <div class="learning-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <span class="progress-text">${AppState.currentCardIndex + 1} / ${total}</span>
                    </div>
                </div>
                
                <div class="review-word-card" id="review-card">
                    <div class="word-display">
                        <h1 class="word-text">${task.word}</h1>
                        <p class="word-chinese">${task.chinese}</p>
                    </div>
                    
                    <button class="speak-btn" onclick="App.speakWord('${task.word}')">
                        🔊 发音
                    </button>
                </div>
                
                <div class="reveal-area" id="reveal-area">
                    <button class="reveal-btn" onclick="App.revealAnswer()">
                        👀 显示答案
                    </button>
                </div>
                
                <div class="answer-buttons" id="answer-buttons" style="display: none;">
                    <p class="answer-prompt">记得这个单词吗？</p>
                    <div class="answer-btns">
                        <button class="answer-btn wrong" onclick="App.answerReview(false)">
                            😟 不记得
                        </button>
                        <button class="answer-btn correct" onclick="App.answerReview(true)">
                            😊 记得！
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        this.setContent(html);
        
        AppState.cardStartTime = Date.now();
        
        // 自动发音
        setTimeout(() => {
            TTS.speakWord(task.word);
        }, 500);
    },
    
    // 显示答案
    revealAnswer() {
        const task = AppState.currentCards[AppState.currentCardIndex];
        
        document.getElementById('reveal-area').style.display = 'none';
        document.getElementById('answer-buttons').style.display = 'block';
        
        // 发音提示
        TTS.speak(task.word);
    },
    
    // 回答复习
    answerReview(isCorrect) {
        const task = AppState.currentCards[AppState.currentCardIndex];
        const responseTime = Date.now() - AppState.cardStartTime;
        
        // 处理答案并更新复习计划
        const updatedTask = MemoryModule.processAnswer(task, isCorrect, responseTime);
        MemoryModule.updateReviewTask(updatedTask);
        
        // 记录结果
        AppState.reviewResults.push({
            word: task.word,
            chinese: task.chinese,
            isCorrect,
            responseTime,
            unitId: task.unitId,
            newStatus: updatedTask.status
        });
        
        // 更新统计
        if (isCorrect) {
            StorageModule.incrementReviewsDone();
        }
        
        // 显示反馈并继续
        this.showReviewFeedback(isCorrect, updatedTask);
    },
    
    // 显示复习反馈
    showReviewFeedback(isCorrect, task) {
        const feedbackHtml = `
            <div class="review-feedback ${isCorrect ? 'correct' : 'wrong'}">
                <div class="feedback-icon">${isCorrect ? '🎉' : '💪'}</div>
                <p class="feedback-text">${isCorrect ? MemoryModule.getSuggestion(5) : MemoryModule.getSuggestion(0)}</p>
                <p class="next-review">下次复习: ${MemoryModule.getTimeUntilReview(task.nextReview)}</p>
                
                <button class="action-btn primary" onclick="App.nextReviewCard()">
                    继续 →
                </button>
            </div>
        `;
        
        const container = document.querySelector('.answer-buttons');
        if (container) {
            container.innerHTML = feedbackHtml;
        }
    },
    
    // 下一个复习卡片
    nextReviewCard() {
        AppState.currentCardIndex++;
        this.renderReviewCard();
    },
    
    // 确认退出复习
    confirmReviewExit() {
        this.showModal('确认退出', `你已完成 ${AppState.currentCardIndex} 个单词的复习，确定要退出吗？`, [
            { text: '取消', type: 'secondary', onClick: () => this.closeModal() },
            { text: '确定', type: 'primary', onClick: () => {
                this.closeModal();
                this.renderReview();
            }}
        ]);
    },
    
    // 显示复习完成
    showReviewComplete() {
        const report = MemoryModule.generateReviewReport(AppState.reviewResults);
        
        const html = `
            <div class="complete-page">
                <div class="complete-icon">🏆</div>
                <h1>复习完成！</h1>
                
                <div class="complete-stats">
                    <div class="complete-stat">
                        <span class="stat-num">${report.total}</span>
                        <span class="stat-label">复习单词</span>
                    </div>
                    <div class="complete-stat">
                        <span class="stat-num">${report.accuracy}%</span>
                        <span class="stat-label">正确率</span>
                    </div>
                </div>
                
                ${report.suggestions.length > 0 ? `
                    <div class="suggestions">
                        ${report.suggestions.map(s => `<p>💡 ${s}</p>`).join('')}
                    </div>
                ` : ''}
                
                <div class="complete-actions">
                    <button class="action-btn primary" onclick="App.renderHome()">
                        返回首页
                    </button>
                    <button class="action-btn secondary" onclick="App.renderReview()">
                        查看详情
                    </button>
                </div>
            </div>
        `;
        
        this.setContent(html);
    },
    
    // 开始单词复习（快捷方式）
    startVocabularyReview() {
        this.navigateTo('review');
    },
    
    // 随机复习
    startRandomReview() {
        // 从所有已学习的单词中随机选择
        const allProgress = StorageModule.getAllWordProgress();
        const words = Object.keys(allProgress).map(key => {
            const [unitId, word] = key.split('_');
            const unit = TEXTBOOK_DATA.units[unitId];
            const vocab = unit?.vocabulary?.find(v => v.word === word);
            return vocab ? { ...vocab, unitId, task: allProgress[key] } : null;
        }).filter(Boolean);
        
        if (words.length < 5) {
            this.showToast('请先学习一些单词');
            this.renderHome();
            return;
        }
        
        // 随机打乱并选择
        const shuffled = words.sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, Math.min(10, words.length));
        
        AppState.learningMode = 'random_review';
        AppState.currentCards = selected.map((w, i) => ({
            ...w,
            index: i
        }));
        AppState.currentCardIndex = 0;
        AppState.reviewResults = [];
        AppState.sessionStartTime = Date.now();
        AppState.isReviewMode = true;
        
        this.renderReviewCard();
    },
    
    // ==================== 进度页面 ====================
    
    // 渲染进度页面
    renderProgress() {
        const stats = StorageModule.getStatistics();
        const reviewStats = MemoryModule.getReviewStats();

        const history = StorageModule.getLearningHistory(10);
        
        const html = `
            <div class="progress-page">
                <div class="page-header">
                    <h1>📊 学习进度</h1>
                </div>
                
                <!-- 总体统计 -->
                <div class="stats-overview">
                    <div class="stat-card large">
                        <div class="stat-icon">📚</div>
                        <div class="stat-info">
                            <span class="stat-num">${stats.totalWordsLearned || 0}</span>
                            <span class="stat-label">已学单词</span>
                        </div>
                    </div>
                    <div class="stat-card large">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-info">

                </div>
                
                <!-- 复习进度 -->
                <div class="progress-section">
                    <h3>📈 记忆进度</h3>
                    <div class="memory-stats">
                        <div class="memory-item">
                            <span class="memory-label">已掌握</span>
                            <div class="memory-bar">
                                <div class="memory-fill mastered" style="width: ${reviewStats.totalWords > 0 ? (reviewStats.mastered / reviewStats.totalWords * 100) : 0}%"></div>
                            </div>

                        </div>
                        <div class="memory-item">
                            <span class="memory-label">复习中</span>
                            <div class="memory-bar">
                                <div class="memory-fill review" style="width: ${reviewStats.totalWords > 0 ? (reviewStats.review / reviewStats.totalWords * 100) : 0}%"></div>

                                <div class="memory-fill new" style="width: ${reviewStats.totalWords > 0 ? (reviewStats.new / reviewStats.totalWords * 100) : 0}%"></div>
                            </div>
                            <span class="memory-num">${reviewStats.new}</span>
                        </div>
                    </div>
                </div>
                
                <!-- 单元完成情况 -->
                <div class="progress-section">
                    <h3>📖 单元进度</h3>
                    <div class="units-progress">
                        ${TEXTBOOK_DATA.modules.map(mod => `

                                <h4>${mod.nameCN}</h4>
                                <div class="module-units">
                                    ${mod.units.map(unit => {
                                        const unitData = TEXTBOOK_DATA.units[unit.id];
                                        const wordCount = unitData?.vocabulary?.length || 0;
                                        const completion = StorageModule.getUnitCompletion(unit.id, wordCount);
                                        const isCompleted = completedUnits.includes(unit.id);
                                        return `
                                            <div class="unit-progress-item ${isCompleted ? 'completed' : ''}">
                                                <span class="unit-name">${unit.name}</span>
                                                <div class="unit-progress-bar">
                                                    <div class="progress-fill" style="width: ${completion}%"></div>
                                                </div>
                                                <span class="unit-percent">${completion}%</span>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- 最近学习 -->
                <div class="progress-section">
                    <h3>🕐 最近学习</h3>
                    <div class="recent-history">
                        ${history.length > 0 ? history.map(record => `
                            <div class="history-item">
                                <span class="history-type">${record.type === 'vocabulary' ? '📚' : record.type === 'sentence' ? '💬' : '✏️'}</span>
                                <span class="history-content">${record.word || record.sentence || record.dialogue || ''}</span>
                                <span class="history-time">${this.formatTime(record.timestamp)}</span>
                            </div>
                        `).join('') : '<p class="empty-hint">还没有学习记录，开始学习吧！</p>'}

        this.setContent(html);
    },
    
    // ==================== 设置页面 ====================
    
    // 渲染设置页面
    renderSettings() {
        const settings = StorageModule.getSetting('ttsRate', 0.85);
        
        const html = `
            <div class="settings-page">
                <div class="page-header">
                    <h1>⚙️ 设置</h1>
                </div>
                
                <!-- 发音设置 -->
                <div class="settings-section">
                    <h3>🔊 发音设置</h3>
                    
                    <div class="setting-item">
                        <label>语速调节</label>
                        <div class="speed-control">
                            <button class="speed-btn" onclick="App.adjustSpeed(-0.1)">慢</button>
                            <span class="speed-value" id="speed-value">${TTS.getRateLabel()}</span>
                            <button class="speed-btn" onclick="App.adjustSpeed(0.1)">快</button>
                        </div>
                        <input type="range" class="speed-slider" 
                               min="0.5" max="1.5" step="0.1" 
                               value="${TTS.getRate()}"
                               onchange="App.setSpeed(this.value)">
                    </div>
                    
                    <button class="setting-btn" onclick="App.testTTS()">
                        🔊 测试发音
                    </button>
                </div>
                
                <!-- 学习设置 -->
                <div class="settings-section">
                    <h3>📚 学习设置</h3>
                    
                    <div class="setting-item">
                        <label>每日学习目标</label>
                        <select class="setting-select" onchange="App.setDailyGoal(this.value)">
                            <option value="5">5个单词</option>
                            <option value="10" selected>10个单词</option>
                            <option value="15">15个单词</option>
                            <option value="20">20个单词</option>
                        </select>
                    </div>
                    
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="auto-play" checked 
                                   onchange="App.toggleAutoPlay(this.checked)">
                            自动播放发音

                    </div>
                    
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="show-phonetic" checked
                                   onchange="App.togglePhonetic(this.checked)">
